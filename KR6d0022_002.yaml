body:
  text: 隋章安尊者灌頂結集陳隋天台智者大師説唐荊溪尊者湛然述記閩鼓山私淑比丘道霈纂要先申品目次釋經文今初妙法蓮華經方便品第二方者法也便者用也法有方圓用有差會雖俱法用以偏望圓偏差圓會會雖勝差然會已非差用亦成妙三權是矩是方一實是規是圓若智詣於矩則善用偏法逗會衆生若智詣於規則善用圓法逗會衆生譬如偏舉一指以目偏處是舉偏法以目智宜用法以釋方將用以釋便若總舉指以目圓處宜將祕以釋方妙以釋便也用偏法如以一指偏目一方若用圓法如以五指遍示諸方舉偏法釋方便蓋隨衆生欲非佛本懷如經令離諸著出三界苦是故如來殷勤稱歎方便僭補曰以三權對一實共論以未開故秪論於權是體外方便非今品意又方便者門也門名能通通於所通如世之門本為能通三皆入實故名為門方便權略皆是弄引為真實作門真實得顯功由方便從能顯得名故以門釋方便如經開方便門示真實相此義但是入實之門非今品意又方者祕也便者妙也於昔成祕彼祕被開於今成妙妙達於方即是真祕達即是開用妙之便以開祕方妙外無法故云即是點內衣裏無價之珠與王頂上唯有一珠無二無別指客作人是長者子亦無二無別衆生身中有昔種緣名為衣珠自退已來於彼醉客偏門尚為偏門之名何況圓所若不開之三權未顯如衣覆珠今經開之與果智一作人亦爾思之可知如斯之言是祕是妙如經唯我知是相十方佛亦然止止不須説我法妙難思故以祕釋方以妙釋便正是今品之意故言方便品也初番釋者是體外方便化物之權隨他意語次釋亦是體外方便自行化他之權亦是隨自他意語後釋是同體方便即是自行權隨自意語初釋者自有三文簡初文者三教一向名他名權權隔實故釋次文者以三教之他與圓自對辨釋第三文者三俱體內無非真實但名為自自外無他他即自也又初釋方便非能入非所入次釋方便是能入非所入後釋方便是所入非能入故知名同其義大異世人多不見此意浪釋方便品釋初文者且指三教但是法用尚非能通況是所通是故三教非能非所故三方便悉皆為粗釋次意者門是三教得是能通不云三教即是圓故非所通既其不即故猶是粗釋第三文者亦開前二初非能非所次則能通並開成所所中善巧名為方便故妙方便異於方法及能通門故知下結斥故正法華名善權品權即方便無二無別低頭舉手皆成佛道方便善權皆真實也當知今品乃是如來方便攝一切法如空包色若海納流豈可以一枝一派釋法界之大都耶今明權實先作四句謂一切法皆權一切法皆實一切法亦權亦實一切法非權非實一切法權者如文云諸法如是相性體力本末等介爾有言皆是權也一切法實者如文如來巧説諸法悅可衆心衆心以入實為悅又諸法從本來常自寂滅相又云如來所説皆悉到於一切智地又云皆實不虗又大經四句皆不可説也一切法亦權亦實者如文所謂諸法如實相是雙明一切亦權亦實例如不淨觀亦實亦虗云云不淨下引例假想故虗治欲故實秪此一觀是實是虗何妨一法亦權亦實一切法非權非實者文云非如非異又云亦復不行上中下法有為無為實不實法非虗非實如實相也若一切法皆權何所不破縱令百千種師一一師作百千種説無不是權如來有所説尚復是權況復人師寧得非權如前所出悉皆權也若一切法皆實者何所不破唯此一事實餘二則非真但一究竟道寧得衆多究竟道耶若一切法亦權亦實者復何所不破一切悉有權有實那得自是一途一一法中皆有權實不得一向權一向實也若一切法非權非實復何所不破何復紛紜強生建立佛雖能於此不可説法方便能説而衆生不堪若發軫單説此法取衆生者即不能得也故言不可説不可説也且置此事以自行權實共別教權實共取衆生者大機利者直得鈍者曲得小機利鈍俱不得蓋華嚴意也復置此事單用三藏權實取衆生者大機利鈍者密得顯不得佛初成道第二轉法輪陳如一人證初果八萬諸天證無生法忍二乘不知故云密得小機利鈍者但保於證取亦不得蓋三藏意也復置是事合用四種權實共取衆生者大機利鈍者曲直俱得小機利鈍者保證俱不得蓋方等意也復置是事捨三藏權實用三種權實共取衆生者大機利鈍俱得小機利鈍保證俱不得蓋般若意也復置是事捨三種權實單用圓教自行權實取衆生者大小機利鈍俱得蓋法華意也如來智慧靡所不達明照時宜用與可否故釋品云方者諸方法也便者善巧用也巧用方法取衆生皆得是故殷勤稱歎方便此約前四時三種法用不能至實故但成於初義釋品若至法華縱名法用亦成祕妙之法用也即可以用釋今經品則方法之名昔日通四今無復三又華嚴論教但是滿字論時但是乳論法是一自行一化他若對人但是菩薩二乘聾啞若依今經文未曾向人説如此事約三藏者若論教唯是半字若論法是一種化他若論時即是酪若依今文住立門外著弊垢衣執除糞器二乘人耳約方等若論教對半論滿若論時並酪明酥若論法有三種化他一種自行若依今文心相體信入出無難約般若若論教帶半論滿若依時挾生而熟若依法則有二種化他一種自行若依今文出內取與皆使令知約法華論教廢半論滿若論時純是醍醐若論法唯有自行若依今文開權顯實此實我子我之所生我實是父付以家業授記作佛前教不説者今皆發之正直捨方便但説無上道故是自行之權故言方便品僭補曰經前品旨文句有略解廣解料揀等此但撮其要不能具録智力有餘者宜自撿之二正釋經文從此品下訖分別功德品十九行偈或至偈後現在四信弟子文盡凡十五品半是正説分若作兩正説從此下訖授學無學人記凡八品是迹門正説今且逐近就迹門正説八品中初方便品更為兩一略開三顯一二廣開三顯一略更為二初略開三顯一二騰疑致請略中有長行有偈頌長行中又為二一寄言歎二智二絶言歎二智若不措言則無能知者雖復稱揚言不能盡寄言為二一歎諸佛權實二歎釋迦權實諸佛道同是故俱歎上光照他土彌勒橫問文殊引古大衆豎聞正表於此故發軫定起即明諸佛道同也就歎諸佛文為三一雙歎二雙釋三雙結就雙歎中先經家提起次正歎今初爾時世尊從三昧安詳而起告舍利弗爾時者文殊問答已竟佛從定起之時也佛常在定何故言起此有所示往古諸佛説此經時必前入無量義即入法華今佛亦爾此示世界悉檀哀從定起冥真達俗二俱審諦説必不謬增長物信此示為人悉檀哀從定起佛寂而常照尚須入定方乃説法況復散心妄有所説此是對治悉檀哀從定起入定緣理安心實相出定令他安心實相此是第一義悉檀哀從定起安此四法故言安詳而起也告舍利弗者小乘中智慧第一將欲因其破小智顯大智開權顯實此乃經家提起之文法華論云佛入甚深三昧正念不動如實智觀從三昧而起現如來得自在力故如來入定無能驚忤故論與今義相應第一義悉檀出過世間故無能驚忤四悉檀無障礙故得自在跏趺坐者古往微塵恆沙諸佛及弟子盡行此法故又跏趺起惡覺尚生他敬心況入深境界而不適悅天人耶又非世受用法不與外道共能破魔軍煩惱故又能生三種菩提道故也三種菩提者一性淨菩提二離垢淨菩提三究竟菩提次正歎二智中二先歎實諸佛智慧甚深無量實者諸佛智慧也非三種化他權實故言諸佛顯自行之實故言智慧此智慧體即一心三智甚深無量者即稱歎之辭也明佛實智豎徹如理之底故言甚深橫窮法界之邊故言無量譬如根深則條茂源遠則流長實智既然權智例爾次歎權其智慧門難解難入一切聲聞辟支佛所不能知權智者蓋是自行道前方便有進趣之力故名為門等覺已下是道前從門入到道中妙覺道中道中稱實道前謂權也此約四十二位因果論權實也難解難入者歎權之辭也不謀而了無方大用七種方便不能測度十住始解十地為入舉初與後中間難示難悟可知而別舉聲聞緣覺所不能知者執重故別破之耳法身本意元以自行權實擬之無機逃走故言不知華嚴頓照聾啞瞽聵故言不知方等彈斥保住草菴故言不知般若轉教無心悕取一䬸之意故言不知今大機啓發放光動地彼此今古諸佛道同由懷疑惑故言不知利根菩薩節節能知鈍同二乘是亦不知也又方便智慧為門得入方便智即是三教各各四門齊教入證也自有佛智為門得入佛智慧如上説圓因稱方便品即是自行觀智為門即今經所歎其智慧門圓教四門即其一也圓教四門者具如止觀即教智行理言即其一者謂智慧為門也自有實為門入方便智雙照二諦即其義也以實為門入方便智雙照二諦者即此經開顯之後從體起用即權即實也二雙釋諸佛二智所以者何佛曾親近至名稱普聞佛曾親近至盡行道法是釋諸佛實智良由外值佛多稟承至要故實智甚深良由內行純厚盡行道法故實智無量無量則釋橫廣甚深則釋豎高也勇猛精進二句是釋諸佛權智其智慧門難解難入良由勇猛精進能入難入之門既入門已澤被無疆物欽勝德故名稱普聞亦可分句勇猛精進能入法門即釋權智深名稱普聞即釋權智廣觀權文無深廣之語例實智此義則成例實智此義則成者以即實之權權即實也三雙結諸佛二智成就甚深未曾有法隨宜所説意趣難解稱理究竟故言成就到彼岸底故言甚深此結成實智也稱機適會故言隨宜非七方便所知故言難解此結成權智也有時解成就甚深未曾有法結自行權實隨宜所説意趣難解結化他權實歎諸佛權實二智竟二歎釋迦權實二智文亦為三初雙歎次雙釋後雙結今初舍利弗吾從成佛已來至引導衆生令離諸著吾從成佛已來歎實智若實智不圓佛道不成既云成佛一成一切成即是歎實智也種種因緣下是歎權智四十餘年以三種化他權實逗會衆生故言種種因緣也譬喻者小乘中以芭蕉水沫為譬大乘中以乾城鏡幻等譬依諸論者以小乘譬乳大乘譬醍醐也廣演者能於一法出無量義也無數方便者即七種方便也引導衆生令離諸著者説散十善離三途著説淨十善離欲界著説三藏離見思著説菩薩法離涅槃著説佛法離順道法愛著次雙釋二智所以者何如來方便知見波羅蜜皆已具足如來半句即是釋實智從真如實相中來而得成佛道故名如來即釋成實智也方便即是釋權智由於方便善巧故能種種因緣知見波羅蜜者即是雙舉權實知見也一切種智名實知佛眼名實見道種智名權知法眼名權見悉到事理邊底故名波羅蜜皆已具足者權實悉究竟也若不作雙釋之意那忽言皆已皆已者雙釋意顯也三雙結二智舍利弗如來知見至成就一切未曾有法如來知見如前説廣大明橫深遠明豎如此實智非橫非豎寄言往歎論其橫豎照無限極如函大蓋大也無量無礙下即是結權智也自行之權道前方便約諸法門故知是結權智明矣實智無若干也無量即佛地四等也無礙即佛地四辨也能於一辭一義旋出無量樂説不窮比別通菩薩如甲上土方地力即十力畏即四無所畏禪盡禪之實相定即首楞嚴定三昧即王三昧深入無際者結成豎深成就一切未曾有法結成橫廣一寄言歎竟二絶言歎三初舉絶歎之由舍利弗如來能種種分別至悅可衆心如來能種種分別巧説諸法者即舉權也言辭柔軟悅可衆心者舉實也何以得知上見他土説頓云其聲清淨出柔軟音下身子領解云聞佛柔軟音深遠甚微妙據前後兩文知是舉實智也前歎中前實後權今何意前權後實明前欲寄言故從實而舒權今欲絶言須卷權歸實耳次指絶言之境舍利弗取要言之無量無邊未曾有法佛悉成就取要言之是指實境要者莫過于實也無量無邊未曾有法是指權境又舉要是創指之端無量無邊是指權未曾有法是指實言此二法佛悉成就修道得故此那可説若單明一事不應言悉既雙指權實其意明矣三正絶言歎為二初絶言歎止舍利弗不須復説明此法深寂言語道斷體不可説故止而歎之設慈悲為説聞不能解傷其善根是故止也二釋止歎之意為兩一就佛是無上人成就修得無上法故不可説所以者何至唯佛與佛乃能究盡就佛成就下明上人權實橫滿不可説從唯佛與佛下明上人權實豎深不可説成就對不成就乃至難解對不難解即是橫明成就修道得故故不可説唯佛與佛乃能究盡者初中分獲未盡其源如十四夜月光用未普獨佛與佛究竟邊底如十五夜月體無不圓光無不遍如此豎深修道得故故不可説次明甚深境界不可思議故不可説有二初一句略標權實章如文諸法實相僭補曰諸法實相一句兩向向前即屬前科唯佛與佛乃能究盡諸法實相也向下即是標權實章門所謂諸法如是相等十如之文釋此一句也次十句廣釋權實相所謂諸法如是相至如是本末究竟等今作四番釋一約十法界二約佛法界三約離合四約位經云諸法故用十法界釋也經云佛所成就第一希有之法故用佛法界釋也經云止止不須説我法妙難思故用離合釋也經云唯佛與佛乃能究盡故用位釋也一約十法界者四聖六凡是為十界世出世間數不出十一一界中雖復多派不出十如十如者謂如是相性體力作因緣果報本末究竟等三塗表苦為相定惡聚為性摧折色心為體登刀入鑊為力起十惡為作有漏惡業為因惡愛取等為緣惡習為果三惡趣為報本末皆癡為等三善道表樂為相定善聚為性升出色心為體樂受為力起五戒十善為作白業為因善愛取為緣善習為果人天趣為報初後相在為等二乘界表涅槃為相解脫為性五分為體無繫為力道品為作無漏慧行為因修出世善法為緣四果為果方便土為報前後相在為等菩薩佛界者緣因為相了因為性正因為體四弘為力六度萬行為作智慧莊嚴為因福德莊嚴為緣三菩提為果大涅槃為報圓融無礙為等又如地獄界當地自具相性本末亦具畜生界相性本末乃至具佛法界相性本末無有缺減阿毗曇毗婆沙第七云地獄道成就他化天法即是其例餘九法界亦如是當知一一界皆有九界十如若照自位九界十如皆名為權照其自位佛界十如名之為實一中具無量無量中具一所以名不可思議言自位者雖明十界界界各十且照當界以九為權以一為實故須結云一中無量一界具十一一十如若自若他若因若果在一心故故云無量中一一中無量不可以一説不可以多説不可以權説不可以實説因果善惡空有大小凡聖漸頓開合心法依正一多自在一切諸法悉皆如是是知談法界者未窮斯妙致使惑果事而迷因理僭補曰若照自位九界為權佛界為實者心佛衆生三無差別各具三千法門但佛法太高衆生法太廣為易修觀故但觀心法三千故云自位也須知一中無量凡夫雖具絶理情迷二乘雖具捨離求脫菩薩雖具照則不周名不了了如來洞覽橫豎具足先重立境云一中無量凡夫絶理等者自鄙無分故云絶理隨想異見故云情迷既絶且迷徒具何益二乘等者即二教二乘煩惱即真捨而不觀避空求空反資小脫菩薩等者藏通照六別照次第故云不周皆迷己界不達佛界不了了言尚該十地故今應指別地及因橫豎具足者一中無量為橫無量即一為豎多一相即故云具足唯獨自明了餘人所不見不可宣示止止絶言其在此耳二約佛法界釋者佛界非相非不相而名如是相指萬善緣因故下文云衆寶莊校即其義也佛界非性非不性而名如是性指智慧了因故下文云有大白牛也佛界非體非不體而名如是體指實相正因故下文云其車高廣也佛界非力非不力而名為力指菩提道心慈善根力等故下文云又於其上張設幰蓋也佛界非作非不作而名如是作指任運無功用道故下文云其疾如風也佛界非因非不因而名如是因指四十一位故下文云乘是寶乘遊於四方也佛界非緣非不緣而名如是緣指一切助菩提道故下文云又多僕從而侍衛之佛界非果非不果而名如是果指妙覺朗然圓因所尅故下文云直至道場也佛界非報非不報而名如是報指大般涅槃故下文云得無量無漏清淨之果報也佛界非本非末而言本末本即佛相末即佛報是自行權也佛界非等非不等而名究竟等指於實相故標章云實相是自行之實也即實而權故言本末即權而實故言為等問此中佛界與前十中佛界何別答前則在迷在因通悟通果今乃唯果不通因迷故一一法皆用雙非非相非不相雖出雙非意存三諦下九準知乃至本末究竟等也如是方名究竟佛乘是故皆以大車文結此則於今品文是佛果家之諸法實相於彼譬説即至道場之莊嚴大車於彼宿世即極果佛之開權寶渚於彼本門即久成佛之所契妙法若正宗可識豈迷流通一句一偈之言彌可信也三德三軌之説皎若目前若得此意廣演於八年不出乎一念經五十小劫詎動於剎那例知一代逗機居于心性十方佛事宛然矚目法界根性覽而易通隨宜所説咸指藏理此是如來自行權實最為無上無上相乃至無上果報橫廣豎深而無有上故標章云諸法實相也例亦應言諸法實性實體實力乃至應言實究竟等但略舉一而蔽諸耳如來遍照橫豎悉周如觀掌果秖為凡夫如雙盲二乘如眇目菩薩夜視朧不曉不可得説止止絶言其意在此耳三約離合者若佛心中所觀十界十如皆無上相乃至無上果報唯是一佛法界如海總萬流千車一轍此即自行權實若隨他意則有九法界十如相性等即是化他權實化他雖復有實皆束為權自行雖復有權皆束為實此即自行化他權實隨他則開隨自則合橫豎周照開合自在雖開無量無量而一雖合為一一而無量雖無量一而非一非無量雖非一非無量而一而無量唯佛與佛乃能究盡凡夫則誹謗不信二乘則迷悶不受菩薩則塵未明為此義故止止絶言四約位者如是相者一切衆生皆有實相本自有之乃是如來藏之相貌也如是性即是性德智慧第一義空也如是體即是中道法性之理也是為三德通十法界位位皆有若研此三德入於十信位則名如是力如是作入四十一地名如是因如是緣若至佛地名如是果如是報初三名本後三名末初後同是三德故言究竟等初位三德通惡通善通賢通聖通小通大通始通極雖在惡而不沉雖在善而不升雖在賢而不下雖在聖而不高雖在小而不窄雖在大而不寬雖在始而非新雖在極而非故故是不可思議不可得説止止絶言耳復次三德究竟等者十界相性權實開合差別若干以平等大慧如實觀之究竟皆等若迷此境即有六界相性名為世諦若解此境即有二乘相性名為真諦達此非迷非解即有菩薩佛界性相中道第一義諦若以此慧等於俗諦俗諦非迷等於真諦真諦非解非解非迷雙非迷解但名平等若雙照者權即是實實即是權雖二而不二亦名究竟等也又權實不二之境七種方便不能以不二智等不二境唯有諸佛以不二智等不二境故言究竟等又今大乘機動不明九界性相直説一切性相悉入佛界性相昔教不説謂昔不與今等今教説知昔與今等故言究竟等初約惑解等次約人等後約教等説此甚廣記者不能委悉耳南嶽讀此文皆云如故呼為十如也天台依義讀文凡有三轉一云是相如是性如乃至是報如二云如是相如是性乃至如是報三云相如是性如是乃至報如是若皆稱為如者如名不異即空義也若作如是相等點空相性名字施設即假義也若作相如是等如於中道實相之是即是中義也分別令易解故明空假中得意為言空即假中約如明空一空一切空點如明相一假一切假就是論中一中一切中非一二三而一二三不縱不橫名為實相此之十如乃十界上因果之法一法界具十如是十法界具百如是又一法界具九法界則百法界千如是九界為權佛界為實細論各具權實然此權實不可思議乃是三世諸佛二智所依之境何法不收此境發智何智不發故荊溪云的指妙境出自法華正指此也初歎二佛二智長行竟次偈頌有二十一行為兩初十七行半頌長行歎二智後三行半頌略開三顯一動執生疑前又二初四行頌寄言歎後十三行半頌絶言歎夫偈頌長行互有廣略者令義易顯耳長行二佛權實各歎表化緣異故頌中二佛合歎示二智理同故初寄言中又二初兩行合頌二佛二智後二行合頌二佛釋歎結歎等也今初爾時世尊欲重宣此義而説偈言世雄不可量至無能測量者初世雄不可量一句合頌上二佛實智次諸天下三句揀人次佛力無所畏下一偈合頌上二佛權智也力無畏等頌諸功德是頌權智餘法者即指化他之權是實智之餘助耳正頌上種種因緣云云言頌開合者此有三異一上舉人又標法故云諸佛智慧今但頌人將人以美法故云世雄二者上開歎今合歎以法別故須開以人總故須合三者上云一切二乘不知今言一切衆生類不知後二行合頌二佛釋歎結歎之意也本從無數佛至我已悉知見本從無數佛具足行諸道頌上諸佛釋歎佛曾親近百千諸佛盡行道法之文也甚深微妙法頌上結歎實成就甚深未曾有法也難見難可了頌上結歎權意趣難解也於無量億劫行此諸道已頌上釋迦釋歎知見波羅蜜皆已得具足上二句舉因具足次道場得成果一句舉果具足我已悉知見一句頌上結釋迦二智如來知見廣大之文也初四行頌寄言歎竟第二有十三行半頌上絶言文為五初半行如是大果報即頌不思議境如是大果報種種性相義但舉初後中間略可知義字兼頌究竟等也大與種種如玄義中説但舉初後者仍先舉後二却舉初二故先云大果報次云性相義也義字等者義謂義理秪一究竟之言有三諦三觀義理也大與種種等者具如玄文第二半行追頌取要言之佛悉成就也我及十方佛乃能知是事第三半行追頌上止不須説也是法不可示言辭相寂滅實相非方所故不可示非言語道故云言辭相寂滅第四頌舉不知之人有十行半文為八初半偈總揀不入者即七方便也諸餘衆生類無有能得解次二句揀能入者即圓教十信故云信力堅固者除諸菩薩衆信力堅固者僭補曰七方便借藏教七賢位名法華七方便一兩教二乘二兩教菩薩三別教十信四十住五十行六十回向七圓五品是也問圓十信未證法身何以非方便答此品初佛從定起即歎二佛二智無有知者今偈云諸餘衆生類無有能得解除諸菩薩衆信力堅固者即圓教十信故言信力堅固者長行唯佛與佛知頌中明十信知互舉耳據此偈佛金口親許圓十信知豈可雷同前三教判入方便耶以信鄰初住即斷惑證真故也華嚴經云一切世界諸羣生少有欲求聲聞乘求獨覺者轉復少趣大乘者甚難遇趣大乘者猶為易能信此法倍甚難法華舉七方便與圓十信較量華嚴舉三乘與圓十信較量皆許十信能信此法其義一揆可互相印證也三一行半揀二乘不知諸佛弟子衆至其力所不堪四一行舉身子不知假使滿世間皆如舍利弗盡思共度量不能測佛智五一行半舉諸大弟子正使滿十方至亦復不能知六二行舉支佛辟支佛利智至莫能知少分七二行半舉發心菩薩不入新發意菩薩至不能知佛智發心語通或可六度菩薩三僧祗未斷惑名為發心或可指上人天中自攝得六度而發心之語別擬通別等發心也八一行揀不退菩薩亦不知也不退諸菩薩其數如恆沙一心共思求亦復不能知通教不退斷界內惑是故不知別教地前亦有證位不退行不退等亦所不知也第四八段竟第五一行半頌上難解法佛能知實相境又告舍利弗至十方佛亦然無漏不思議者頌上結要舉權實所止之境也甚深微妙法一句頌上第一希有難解之法我今已具得三句頌上唯佛與佛乃能究盡也明諸佛道同同皆究竟故云唯我知是相十方佛亦然釋不思議者如如意珠無毫釐之有能雨衆寶實相不生能生般若也第二十三行半頌絶言歎竟初十七行半頌長行竟後三行半頌略開三顯一文二初略開三顯一二騰疑致請就略開顯為二初行半頌諸佛顯實次頌釋迦開三互明一邊耳今初舍利弗當知至要當説真實諸佛語無異者此論諸佛化道是同次兩句勸信後兩句世尊法久後要當説真實即顯實也動昔之執生今之疑將非魔作佛正由聞此語也佛既如實語勸信何事翻疑為防因疑起謗者故須勸信耳次頌釋迦開三文為三初一行正明開三告諸聲聞衆及求緣覺乘我令脫苦縛逮得涅槃者將明二乘之非故言逮得涅槃者又解我令脫苦縛逮得涅槃即擬六度菩薩乘何以知之修六度行即免四趣縛未能入滅度三僧祗百劫乃得涅槃逮之言遠乃及耳又六度行前度他故言我令脫苦縛後取無漏故言逮得涅槃此義推之知是六度乘也又以數推之下句云佛以方便力示以三乘教若不指此將何為三不應重數二乘為三乘也次半行正明三乘是方便佛以方便力示以三乘教次兩句出立三之意衆生處處著引之令得出意是權引離諸苦故非為真實但是方便門耳初略開顯竟二騰疑致請由聞三是方便故執動疑生是諸聲聞聞三乘是方便所以疑於方便又聞要當説真實所以疑於真實文為二一敘疑二正請決敘疑又二一經家敘二正生疑初二先敘千二百疑爾時大衆中有諸聲聞至千二百人次敘四衆疑及發聲聞辟支佛心比丘比丘尼優婆塞優婆夷上云三乘皆是方便敘疑但在二乘者以其執重疑深故偏舉若至下陳疑中即云求佛諸菩薩大數有八萬亦皆有疑故知三乘僉疑偏舉二乘耳二正生疑二一疑佛二智各作是念至一切聲聞辟支佛所不能及從何故殷勤稱歎方便即是總疑權實二智從而作是言佛所得法甚深者是疑實智有所言説意趣難知下是疑權智以聞諸佛語無異要當説真實從此生疑何者佛昔説三乘智慧同證不差但餘習有盡不盡耳今忽稱歎如來二智非我所及是故疑佛二智也二疑己所得佛説一解脫義至而今不知是義所趣從佛説一解脫義我等亦得此法下此是自疑所得三乘聖道是真出要我修此理亦到涅槃而今忽言皆是方便未知何者真實故言不知是義所趣此從上斥三為方便而生是疑一敘疑竟二正請決文有三請二止就前為三止佛預知三周得益前後不俱故三抑俟其三請也就初請為二一長行二偈頌長行為二一陳疑爾時舍利弗知四衆心疑至今者四衆咸皆有疑二正請惟願世尊敷演斯事至甚深微妙難解之法二偈頌中有十一行偈文為六初二句頌疑實智爾時舍利弗欲重宣此義而説偈言慧日大聖尊久乃説是法第二三行頌疑權智自説得如是至諸佛之所得第三三行明三乘四衆有疑無漏諸羅漢至願佛為解説初一行上句明羅漢次句明菩薩既云涅槃何以言菩薩上云逮得涅槃者此中稱及及者此菩薩自求涅槃又以及他故異二乘知是菩薩後二行明緣覺出家二衆及八部等皆中乘之機也第四一行半明身子疑於諸聲聞衆至為是所行道第五一行明佛子疑佛口所生子合掌瞻仰待願出微妙音時為如實説第六二行總明同疑請也諸天龍神等至欲聞具足道夫偈頌長行可以意推如其非頌即是長出於義非急者不能煩文分擘故略耳次明二止恐驚疑故爾時佛告舍利弗至一切世間諸天及人皆當驚疑二舍利弗騰宿根利是故更請舍利弗重白佛言至而説偈言法王無上尊惟説願勿慮是會無量衆有能敬信者次佛三止之護上慢故佛復止舍利弗至重説偈言止止不須説我法妙難思諸增上慢者聞必不敬信三身子述慧益多牒疑三請有二初長行爾時舍利弗重白佛言至長夜安隱多所饒益次偈頌爾時舍利弗欲重宣此義而説偈言無上兩足尊至則生大歡喜一略開三顯一騰疑致請竟二廣開三顯一斷疑生信有三周共八品一從此文至第二卷盡回向佛道偈止為上根法説周二從爾時舍利弗我今無復疑悔下乃至授記凡四品為中根譬説周三化城喻等三品為下根因緣説周亦名理事行問三周為三根人云何一周通有三説若爾一説應具三根答法説非止逗上中之上又有中下從正略傍故言逗上耳餘二周亦如是答意者許各具三根法説自被法説中三餘二亦爾但説三根攝九即足從正略旁者上根中上根為正中下是旁亦應云具論有三且言上耳若逗上根上三俱被但上根為多為正中下是略是旁中下三根為正為旁亦復如是夫衆生心神不定遇惡緣轉利為鈍遇善緣轉鈍為利先世值佛聞法自有轉下中為上俱於法説得悟自有轉下為中聞譬説得解下者不轉三周乃了如此轉根譬三刀斫木利一中二鈍者三下利鈍之名不失木斷之處是同譬者刀如根木如惑執者如機佛令其斫受教如聞法運斫如用觀木斷如證曾磨如轉遇磨不同故有利鈍問三根入初住有利鈍不答真修體顯則無差降問若爾初住已上更起緣修有優劣不答此同位人無復勝負真修體融寧得有異耶問經中多明菩薩為上根緣覺中根聲聞下根若言菩薩上根應併在法説中得悟緣覺併在譬説中得解聲聞併在於因緣中得悟耶然經中一往判出三根至於悟解義未必然今經但見聲聞得解不見支佛者支佛是中根既值佛出世入聲聞數隨根得悟故不別標緣覺耳故身子請偈云其求緣覺者比丘比丘尼依此文即知緣覺入四衆中攝也又法師品云比丘比丘尼優婆塞優婆夷求聲聞者求支佛者豈無緣覺得解耶舊云菩薩是上根不必皆利從多為上而執心易轉原其域懷求佛但執過三百已即求近果此疑易悟三根菩薩同在法説得解上者或在略説中者或在廣説之初下者與身子齊今明菩薩語通但使發大心悉是菩薩何必併是利根及身子尚少豈得初周之初已併得悟若爾流通壽量何意有諸菩薩節節得悟無生忍者發菩提心者舊云壽量中悟皆是法身增道損生今言不爾有六百八十萬億那由他恆河沙人得無生法忍此人始得此忍當知壽量之前未是法身故知菩薩得悟不可局在初周之初也問菩薩得悟通於始終二乘得悟亦應至後答三周定父子天性已竟則皆名菩薩設在後悟同名菩薩悟也問若三乘同悟何意但見聲聞領解其二則無答今明無佛出世名獨覺聞佛説十二因緣法名緣覺既入聲聞數中得悟領解皆不別出大意可見身子迦葉等悉是中乘根性故聲聞領解兼得緣覺無勞別出也又四衆中有發緣覺心者其人得悟即不一也信解品云密遣二人追捉將還即是其義菩薩不領解者聲聞之教不明得佛今經開其歸大之路自恐解謬故對佛述解菩薩不爾故無領解又其意有二一菩薩本意求佛設有異執而執輕終歸取佛無有不得之慮今聞三周之説但是正其觀慧故不須領解二菩薩悟大處處有文二乘作佛始自今教逐要流傳故略菩薩領解梵文或有漢略不書耳問若同皆領解何故聲聞得記不見緣覺菩薩受記此亦三意一者昔明二乘入正位不能發心何由得記今既悟大欣斯別決故為記劫國也菩薩發心求佛行成自滿故不欣急求佛亦不促授又前教處處授菩薩記此是恆説逐要傳譯如前云云僭補曰逐要傳譯如前云云者即此三意中第一意為聲聞授劫國記即是逐要菩薩授記乃是恆説非此所急況迹門流通調達龍女皆授記何云不授即如次所引二菩薩亦有別記調達龍女豈非記耶又法師品云求聲聞者求辟支佛者求佛道者如是等類咸於佛前聞法華經我皆與授記當得三菩提此豈非皆記耶三二乘昔來未曾得八相記故記其劫國菩薩先已曾記故不重明耳淺近之記初住已得非菩薩所欣菩薩所期乃是圓極妙覺遠記耳故壽量品中始從發心訖一生得妙因斯滿極果頓圓此乃授法身記莂何謂無記耶問若小悟大應同授法身記那得授八相記耶答八相是應記既得應記知必有本欲使物知聞共結來緣故與應記耳又此二乘若聞壽量即同損生得法身記也又明待時不待時爾前不悟必待法華悟者名為待時法華前教已解者名不待時何故爾佛有顯密二説若顯説為論法華之前二乘未悟大道要須五味調熟會在法華故云説時未至故今正是其時決定説大乘此即待時也若密教為論未必具待五味在法華方會爾前密有入者故名不待時此乃大判時不時若就三周亦是待時不待時迹本二門亦是待時不侍時致有前後悟入即此意也僭補曰應在三周前後得記者是待時也不在三周之數前後密得者是不待時也又迹門是待時本門是不待時也問有一種根性非密非顯二時不攝者應是失時永不得悟耶答餘經或謂此為失時今經不爾此人雖於密顯兩時不悟雖生滅度之想而於彼土得聞是經故無失時乃是待彼土之時耳問五千起去應是失時答此等應以如來滅度後弘經人受益也問身子初周為四衆三根請譬周為中下請云何言佛各為三根人三周説法耶答此語不便請則普請説亦普説但上根智利聞法得悟中根處中聞譬得悟下根居下聞三得悟汝當隨義云何隨語問宿世是過去事法譬是當現事不答經無文義推應爾引三歸一三望一一則是當舉事為譬譬即是現準後望前應如所問僭補曰三周差別之義文句有十種料揀廣大精微無疑不破此但略撮其要以便好略之機不能具録有志樂多聞者宜自撿之初周法説文為五一從殷勤三請下訖卷正是法説二從第二卷初訖偈頌是身子領解三從吾今於天人下訖佛所護念是佛述成四從汝於來世訖宜應自欣慶是與授記五從四衆訖盡回向佛道是四衆歡喜今初法説有長行偈頌長行為三一許二受旨三正説許文為三一順許二誡許三揀許今初爾時世尊告舍利弗汝已殷勤三請豈得不説二誡許汝今諦聽善思念之吾當為汝分別解説諦聽是聞慧善思是思慧念之是修慧大經明四善法為大涅槃因一善知識如來也餘者可解大經四善法者德王品釋十功德中云一者親近善友二者聽聞正法三者思惟其義四者如説修行唯此四法是涅槃因若言苦行是涅槃因無有是處三揀衆許説此語時至汝今善聽當為汝説五千在座故如來三止今將許説威神遣去故名揀衆五濁障多名罪重執小翳大名根深未得謂得名上慢未得三果未證無學有如此失者謂障執慢三種之失也而不制止者上聞開三顯一言略義隱猶未生謗足作繫珠因緣去則有益若聞廣開三顯一乖情起謗住則有損是故不制止也此衆無復枝葉者枝葉細末不任器用此等執方便之方便方便之方便者四果是方便更於暖頂妄計為極是執方便之方便也於大非器大品云攀拊枝葉棄於根本是人為不黠即是此義也退亦佳矣者既以小自翳復妨他大光今退無謗法之愆復無障他之過故云佳矣上枝葉未去如來三止貞實願聞故身子三請師弟鑒機非徒靳固也問佛大慈悲何不神力使其住而不聞如華嚴中聾啞何不增狀毒鼓如喜根勝意答各有所以華嚴末席始開於漸未破小執故在座而隔今諸佛法久後要當説真實正欲滅化城破草菴宜須揀遣若去住俱謗宜如喜根強説今去則有益那忽令住住則有損那忽不遣喜根以慈故強説如來以悲故發遣問五千在座即不蒙益去有何益答此非當機是結緣人耳已如上説昔大通佛時亦有無量衆生心生疑惑世世與師俱生今皆得度此人亦爾説大經時萬五千億人於是經中不生信心是人於未來亦當得信例此益在不久金光明中時閻浮提有二種人亦斯例意汝今善聽即結許也毒鼓者大經云譬如有人以毒塗鼓於大衆中擊令出聲聞者皆死鼓者平等法身毒者無緣慈悲打者發起衆也聞者當機衆也死者無明破也今世惑破近死正當當機人也來世惑破遠死此五千等雖非當機亦聊作繫珠因緣耳金光明第七云二種人者一者深信大乘方等二者毀訾不生信樂不生信樂者亦得結緣故引為例喜根勝意者諸法無行經云爾時文殊師利言世尊師子吼鼓音王如來滅度之後爾時有菩薩比丘名曰喜根時為法師質直端正不壞威儀不捨世法爾時衆生普皆利根樂聞深論其喜根法師於衆人前不稱讚少欲知足細行獨處但教衆人諸法實相所謂一切法性即是貪欲之性貪欲性即是諸法性嗔恚性即是諸法性愚癡性即是諸法性其喜根法師以是方便教化衆生衆生所行皆是一相各不相是非所行之道心無嗔癡以無嗔癡因緣故逮得法忍於佛法中決定不壞世尊爾時復有比丘法師行菩薩道名曰勝意其勝意比丘護持禁戒得四禪四無色定行十二頭陀世尊是勝意比丘有諸弟子其心輕動樂見他過世尊後於一時勝意菩薩入聚落乞食誤至喜根弟子家見舍主居士子即到其所敷座而坐為居士子稱讚少欲知足細行説無利語過讚歎遠衆樂獨行者又於居士子前復説喜根法師過失是比丘不實以邪見道教化衆生是雜行者説淫欲無障礙嗔恚無障礙愚癡無障礙一切諸法皆無障礙是居士子利根得無生法忍即語勝意比丘大德汝知貪欲為是何法勝意言居士我知貪欲是煩惱居士子言大德是煩惱為在內在外耶勝意比丘言不在內不在外大德若貪欲不在內不在外不在東西南北四維上下十方即是無生若無生者云何説若垢若淨爾時勝意比丘瞋恚不喜從座起去作如是言是喜根比丘以妄語法多惑衆人是人以不學入音聲法門故聞佛音聲則喜聞外道音聲則瞋於梵行音聲則喜於非梵行音聲則瞋以不學入音聲法門故乃至爾時喜根菩薩於衆僧前説是諸偈云貪欲是涅槃恚癡亦如是如此三事中有無量佛道若有人分別貪欲瞋恚癡是人去佛遠譬如天與地菩提與貪欲是一而非二皆入一法門平等無有異凡夫聞怖畏去佛道甚遠貪欲不生滅不能令心惱若人有我心及有得見者是人為貪欲將入於地獄貪欲之實性即是佛法性佛法之實性亦是貪欲性是二法一相所謂是無相若能如是知則為世間導乃至説是諸偈法時三萬諸天子得無生法忍萬八千人漏盡解脫即時地裂勝意比丘墮大地獄以是業障罪因緣故百千億那由他劫於大地獄受諸苦毒從地獄出七十四萬世常被誹謗若干百千劫乃至不聞佛之名字自是已後還得值佛出家學道而無志樂於六十二萬世常返道入俗亦以業障餘罪故於若干百千世諸根暗鈍世尊爾時喜根法師於今東方過十萬億佛土有國名寶莊嚴於中得阿耨多羅三藐三菩提號曰勝光明威德王如來應供正遍知今現在彼其勝意比丘今我身是世尊我未入如是法相門時受如是苦分別苦顛倒苦是故若發菩薩心者若發小乘心者不欲起如是業障罪不欲受如是苦惱者不應拒逆佛法無有處所可生瞋癡佛告文殊師利汝聞是諸偈得何等利世尊我畢是業障罪已聞是偈因緣故所在生處利根智慧得深法忍巧説深法文殊師利為誰力故能憶如是無量阿僧祇劫罪業因緣世尊諸菩薩有所念有所説有所思惟皆是佛之神力所以者何一切諸法皆從佛出故僭補曰按諸法無行經喜根勝意二菩薩所説之法勝意是藏教事六度菩薩斷煩惱而證菩提喜根是一乘圓教大菩薩以三毒之性即諸法實性一相無相是諸法實相勝意以著相故謗喜根即是謗法華經是法住法位世間相常住亦是謗治世語言資生業等皆與實相不相違背亦是謗十法界十如因果權實之法本末究竟皆與實相等以謗大法故生身陷地獄從地獄出復得人身又若干劫受諸罪報謗法之罪經有明文所謂謗斯經故獲罪如是讀之令人心悸毛豎所以佛稱種智修假多聞雖學三乘權教依之修證而一乘大法不可不學所謂自行權本為實也凡業是經者喜根所説之法當深究研窮而即之於心勝意著相謗法前車既覆後之來者宜痛誡也第二受旨舍利弗言唯然世尊願樂欲聞如文一許二受旨竟第三正法説文為二一明四佛章廣上諸佛權實二明釋迦章廣上釋迦權實上句逗少是文略總云諸佛是人略但開三顯一是義略此中章句多是文廣明五佛是人廣明六番是義廣六者一歎法希有二説無虗妄三開方便四示真實五為五濁施權六揀偽敦實歎法令生尊重説無虗謬止其誹謗開方便使莫執小示真實使其悟大舉五濁示必施三揀偽要顯真實於五佛章中一一應備六義而前後互出不具足者蓋如來巧説使略而無闕詣而不煩文耳初四佛章二一總明諸佛二列三世總章應具六今但四一歎法二無虗妄三開方便四示真實闕二義者指後文也今初佛告舍利弗至如優曇鉢華時一現耳歎法中法譬雙歎時乃説之者諸佛同出五濁必前施三如今世尊四十餘年始顯真實久久稀疏故言時乃説之久不説者為人不堪故時未至故五千未遣故今人已堪時已至五千已去決定説大乘故言時乃説之優曇華者此言靈瑞三千年一現現則金輪王出表三乘調熟已後方説妙法授法王記又隔跨酪生酥熟酥三味已後乃説醍醐觀心者觀心即中名為瑞此觀通一切法至實相名為靈法譬雙歎者法喻蓮華此云優曇者乃是優曇蓮華非尋常蓮華也第二勸信無虗妄法舍利弗汝等當信佛之所説言不虗妄不虗妄者此理至深理與昔異此言至妙言與昔反此行至普行與昔乖此人至勝勝於昔劣還指客作四種之粗而今皆妙恐物生謗故勸信也信無虗妄人説無虗妄法第三施方便文三謂標釋結今初舍利弗諸佛隨宜説法意趣難解初明佛道隨三種機宜説方便故言隨宜而佛意在實物莫能解故言意趣難解也二釋所以者何我以無數方便至演説諸法釋者舉今佛之權能釋諸佛之方便巧慧同故借此釋彼云我以無數方便謂諸佛施權亦如我也三是法非思量三句有兩義或作結施權謂佛意難知唯佛與佛能了稟教者謂三諸佛知一耳或作顯實即是次文第四顯真實文為五一標勝人法二標出世意三重徵起四正顯實五總結今初是法非思量分別之所能解唯有諸佛乃能知之標人法者舉無分別法唯是佛所知佛以無分別智解知無分別法即是顯實法也二標出世意所以者何諸佛世尊唯以一大事因緣故出現於世出世意者為兩初總次分字總者諸佛覺如實之相乘此實道出應於世秖令衆生得此實相唯為此事出現於世曾無他事除諸法實相餘皆名魔事分字釋者一則一實相也非五非三非七非九故言一也其性廣博博五三七九故名為大諸佛出世之儀式故名為事衆生有此機感佛故名為因佛乘機而應故名為緣是為出世之本意而今説三者為一弄引耳如人欲取先當與之雖説種種道其實為一乘即此義也三重徵起舍利弗云何名諸佛世尊至出現於世重示者將欲分別更重提起為解釋之端又此大事佛所尊重如釋論中明父王欲多聞太子名數數説之無有厭足云云如釋論等者文初適云諸佛大事今復徵云何名諸佛大事等者佛所尊重故數言之故引為例云云者論更有文亦云如王好施所生太子名數數與等一標勝人法二標出世意三重徵起竟四正顯實為令衆生開示悟入佛之知見也法華論有四義一者無上義除一切智更無餘事如經開佛知見為令衆生得清淨故出現於世二同義聲聞辟支佛佛性法身平等故如經欲示衆生佛知見故出現於世三不知義謂二乘人不知究竟唯一佛乘故如經欲悟佛知見故出現於世四為令證不退轉地現與無量智業故如經欲令衆生入佛知見故出現於世論言次第初開佛知見為無上次示三乘同有佛性法身雖明佛智無上但恐佛獨有故第二明三乘同有雖三乘同有而二乘不悟示其令悟雖悟而不得不退故第四令得不退今師作四解不乖論論句句釋今一句作四釋論明證不退轉地今作四位釋論知如來能證實今作四智釋論明同義今作觀心釋論明不知究竟處今作四門釋今為顯實無量法皆一也一色一香無非中道此義可知玄義中十妙則是十種一也十妙者一境妙境即理境也謂十如是等境心佛衆生三無差別不可思議經云唯佛與佛乃能究盡諸法實相所謂諸法如是相等是也二智妙智即全境所發之智也以境妙故智亦隨妙函蓋相應不可思議經云我所得智慧微妙最第一是也三行妙行即所修之行也以智妙故智導於行行亦隨妙不可思議經云行此諸道已道場得成果是也四位妙位即修行所歷之位次也謂十住十行十回向十地等諸位以行妙故所證之位亦妙不可思議經云乘是寶乘遊於四方是也五三法妙三法即真性觀照資成之三法也真性是理觀照是慧資成是定此之三法是佛所證不可思議經云佛自住大乘如其所得法定慧力莊嚴是也六感應妙感即衆生應即佛也謂衆生能以圓機感佛佛即以妙應應之如水不上升月不下降而一月普現衆水不可思議經云一切衆生皆是吾子是也七神通妙天心名神慧性名通天然慧性徹照無礙名為神通謂如來無謀之應善權方便稱適機宜變現自在不可思議經云今佛世尊入于三昧是不可思議現希有事是也八説法妙謂説大小乘偏圓之法咸令衆生悟入佛之知見一音宣演不可思議經云如來能種種分別巧説諸法言辭柔軟悅可衆心是也九眷屬妙謂佛出世十方諸大菩薩皆來贊輔或以神通而來生者或以宿願而來生者或以應現而來生者皆名眷屬俱不可思議經云但教化菩薩無聲聞弟子是也十利益妙謂佛説法一切衆生咸得開悟本性入佛知見猶如時雨普洽大地蒙益不可思議經云現在未來若聞一句一偈我皆與授阿耨多羅三藐三菩提記是也佛為一事依經且作四一消文一者理一二人一三行一四教一理一有二一正釋二結成今初諸佛世尊至欲令衆生入佛知見道故出現於世理一復為四意一約四位二約四智三約四門四約觀心一四位者諦境不可知見約於智眼乃能知見二智四眼不能知見唯一切種智佛眼則能知見經云為令衆生開佛知見不論佛果自知自見若偏語佛果即失衆生若語衆生則無佛知見故不可偏取三教行人雖是衆生未有佛眼佛智故不能知見實相圓教四位亦是衆生又分得佛眼佛智則衆生義成知見義亦成故寄此四位以釋理一如瑞相中天雨四華表萬善同歸得入四位乘四位華以趣佛果故約位顯理也開者即是十住初破無明開如來藏見實相理何者性德之理而為通別兩惑之所染著難可了知通惑謂見思別惑謂無明通別兩惑同在一念初心能圓信圓受圓伏而未能斷不名為開隨喜之前初心圓信名字位也圓受五品位也圓伏六根位也將此凡心即為伏斷故云能也內加觀行外藉法雨助破通別惑藏顯出真修性知見朗然開發如日出暗滅眼目有用故名為開緣修破惑故名使得清淨問若入初住方名開者當知此經凡夫絶分何故論文云為凡夫答四釋之中約智約位唯聖方開約觀約門乃通名字況為令之語令凡入聖結緣之益準此可知所以四釋方顯今意不妨高位不棄凡夫仁王云入理般若名為住入理之言義通深淺從初立稱故且云住住於十住小白華位也示者惑障既除知見體顯體備萬德顯示分明故名為示即是十行大白位也悟者障除體顯法界行明事理融通更無二趣攝大乘師云如理智如量智今理量不二故名為悟即十回向小赤位也入者事理既融自在無礙自在流注任運從阿到茶入薩婆若海如攝大乘師云如理如量通達自在如量知見能持衆德如理知見能遮衆惑於釋悟入並引攝大乘者借別成圓故釋悟中云理量不二釋入中云理量自在當知別中無此事也若爾前釋住中引仁王云入理名住者準例借別亦可十住如理十行如量量即理故名住理即量故名行即是十地大赤位也然圓道妙位一位之中即具四十一地功德秪開即具示悟入等更非異心但如理知見無有分別淺深之相欲顯如量知見故分別四位耳發心畢竟二不別如是二心前心難既云難易即知初心與畢竟心應有明晦淺深之別猶如月體初後俱圓而有朔望之殊先開中云朔望者朔明也謂月初明望謂相望即圓滿時日月相望月非朔望寄於朔望則有虧盈四位知見皆明照實相而説開入之異耳二約四智者今欲以圓教四智對於四位不如般若中通教釋也僭補曰四智之名出般若通教通於三教今歸一實則三教俱圓以示無淺深故引用也一道慧見道實性實性中得開佛知見也二道種慧知十法界諸道種別解惑之相一一皆示佛知見也三一切智知一切法一相寂滅即悟佛知見也四一切種智知一切法一相寂滅相種種行類相貌皆識即入佛知見也初文者慧因智果各具別圓因果之上各加種者故得別名各加一切故受果稱所謂因該果海果徹因源是也又道慧如理名開道種慧如量名示一切智理量不二稱悟一切種智理量雙照為入此亦約實理無淺深中而淺深分別也三約圓教四門橫釋四句者空門一空一切空即開佛知見也有門一有一切有即示佛知見也亦空亦有門一切亦空亦有即悟佛知見也非空非有門一切非空非有即入佛知見也能通則四所通則一開示悟入是能通之門所知所見是所通之理也四約觀心釋者觀於心性三諦之理不可思議此觀明淨名為開雖不可思議而能分別空假中心宛然無濫名為示空假中心即三而一即一而三名為悟空假中心非空假中而齊照空假中名為入是為一心三觀而分開示悟入之殊也所以四種釋者見理由位位立由智智發由門門通由觀觀故則門通門通故智成智成故位立位立故見理見理故名為理一也二結成舍利弗是為諸佛以一大事因緣故出現於世如文初理一竟二明人一佛告舍利弗諸佛如來但教化菩薩就昔方便謂教化三乘理實而言但化菩薩如彼窮子自謂客作賤人長者所觀實為己子即是人一也三明行一諸有所作常為一事唯以佛之知見示悟衆生三乘衆行名之為諸為圓故諸即是一事此行何所至到唯趣佛之知見即是行一也四明教一舍利弗如來但以一佛乘故至無有餘乘若二若三圓頓之教名一佛乘故序品云説大乘經即是教義也自別教已去皆名有餘之説即不了義非佛一乘今言但以一佛乘者純説佛法之圓教乘也無餘乘者無別教帶方便有餘之説無二者無般若中之帶二無三者無方等中所對之三也如此二三皆無況三藏中三耶四正顯實竟五總結舍利弗一切十方諸佛法亦如是如文初總明諸佛章竟次三世佛章各明教一行一後總論人一理一在文可見若當章自作四一者亦得而不及總文顯也菩薩瓔珞經第十三明九世佛過去三世佛現未亦爾未來過去佛者古佛慈悲入未來作種種形度衆生者是未來現在佛者當受未來記者是未來未來佛者當佛轉次受記者是過去準此可知現在現在佛者當化主者是現在未來佛次補者是現在過去佛古佛垂迹者是一過去諸佛章又二初開權舍利弗過去諸佛至而為衆生演説諸法以無量無數方便者明開權也次顯實是法皆為一佛乘故至究竟皆得一切種智是法皆為一佛乘故明顯實也例上一佛乘即是教一從諸佛聞法法被衆生兼得人一究竟皆得一切種智種智所知即是理一能知即是行一雖不次第四一兼足也二未來佛章開顯如文舍利弗未來諸佛至究竟皆得一切種智三現在佛章正是化主又三初標佛出之意舍利弗現在十方至安樂衆生如諸佛章中唯以一大事因緣出現於世此亦如是唯為饒益安樂衆生而出於世也次開權是諸佛亦以無量無數方便至而為衆生演説諸法三顯實是法皆為一佛乘故至欲令衆生入佛之知見故舍利下總顯人理也現在佛章從初即量開權顯實經舍利弗是諸佛下即當總文故前料簡中云三世佛章各明教行後總明人理若爾何不秪合著現佛章中為四一文而用為總耶以經文初自云舍利弗是諸佛等故知是總一明四佛章竟第二廣釋迦章於六義中無歎法希有但有五一開權二顯實三為五濁施方便四揀偽敦實五無虗妄今初舍利弗我今復如是至方便力而為説法我今亦如是我即釋迦現在先三後一如四佛不異故言亦復如是知諸衆生有種種欲者即是五乘根性欲過去名根現在名欲未來名性深心所著者即是根也方便者即隨宜開三乘權法也二顯實舍利弗如此皆為一佛乘一切種智故佛乘是教一一切是行一種智所知是理一第三為五濁故施權有二先標意舍利弗十方世界中尚無二乘何況有三將舉五濁先標其意上已説諸佛開權顯實未明隱實施權其妙法清淨湛一如空尚無帶二帶三之權況有單三單五之權秪為五濁障重實不得宣須施單五單三之權亦施帶二帶三之權故言於一佛乘分別説三分別説於帶二帶三之三及單五單三之三次釋五濁之相有三初唱數列名舍利弗諸佛出於五濁惡世至見濁命濁二明體相如是如是者明體相也體者劫濁無別體劫是長時剎那是短時但約四濁立此假名文云劫濁亂時即此義也衆生濁亦無別體攬見慢果報上立此假名文云衆生垢重即此義也煩惱濁指五鈍使為體見濁指五利使為體命濁指連持色心為體相者四濁增劇聚在此時瞋恚增劇刀兵起貪欲增劇飢餓起愚癡增劇疾疫起三災起故煩惱倍隆諸見轉熾粗弊色心惡名穢稱摧年減壽衆濁交湊如水奔昏風波鼓努魚龍攪撓無一憀賴時使之然如劫初光音天墮地地使有欲如忉利天入粗澀園園生鬭心是名劫濁相如水奔昏謂水濁也光音等者世界初成時此天初下即第二禪初天初下人間身有光明猶能飛行無男女根無所食噉如是乃至食林藤地膚至粳米等男女根生具如俱舍劫章中明地是惡緣從緣而説故云使然如忉利等者亦是舉例更顯地生欲惡故也帝釋城外有四園苑謂衆車粗雜喜諸天欲戰從粗澀園出諸戰具須車出車苑若歡喜園入中生喜欲界生欲亦復如是煩惱濁者貪海納流未曾飽足瞋蚖吸毒撓諸世間癡暗頑嚚過於漆墨慢高下視陵忽無度疑網無信不可告實是為煩惱濁相見濁者無人謂有人有道謂無道十六知見六十二等猶如羅網又似稠林纏縛屈曲不能得出是見濁相衆生濁者攬於色心立一主宰譬如黐膠無物不著流宕六道處處受生如貧如短名長名富是為衆生濁相命濁者朝生暮殞晝出夕沒波轉煙回瞬息不住是命濁相濁相衆多不能具説次第者煩惱見為根本從此二濁成於衆生從衆生有連持命此四經時謂為劫濁也料揀者問五濁若障大華嚴中未除濁而聞法者何也答此應四句分別一大乘根利障重以根利故重障不能障此土華嚴初聞大乘者是也二根利障輕三根鈍障輕他方淨土聞大乘者是也四根鈍障重如此土身子等除濁方聞大乘者是也問五濁障小不答此就小乘應四句分別小乘根利遮輕障不能障身子是也根利遮重障亦不能障央掘是也根鈍遮輕亦不為障槃特是也根鈍遮重此則成障不聞小乘不得度者是央堀魔羅此云一切世間現婆羅門子母跋陀羅幼失父年十二色力人相具足慧辨聰明師摩尼跋陀羅婆羅門通達四毗陀經時師暫受王請留世間現守舍婆羅門婦年少端正於世間現生愛染心前執其衣世間現言仁今便是我之母如何尊處而行非法內懷愧悚捨衣遠避其婦懷慚以繩自縊足未離地摩尼跋陀羅事畢還家見婦自懸以刀截繩高聲大叫誰為此事時婦答言是世間現欲行非法強見凌逼作如是事跋陀先知此人有大功德思惟是已語世間現汝是惡人毀辱所尊汝今非復真婆羅門當殺千人可得除罪世間現奉命即殺千人還禮師足師復告言更當殺千人一人一指作鬘冠首而還然後得成婆羅門央掘即殺千人指少一見母即欲殺母世尊現其前捨母欲殺佛佛示現避去世間現説偈云住住大沙門白淨王太子我是央掘魔今當稅一指世尊答偈云住住央掘魔輸汝慧劒稅我住無生際而汝不覺知乃至世尊向央掘説偈言汝來央掘魔出家受三皈央掘説偈答言此乘是大乘説名無礙智是故我今日歸依於如來乃至世尊歎言善哉央掘善來比丘即成沙門威儀具足如舊比丘爾時十方諸佛遣大菩薩曰今釋迦牟尼佛與大法將戰降大師子度無量衆乃至央掘問佛如來言我住無生際住解脫地云何而復住此娑婆世界願説因緣佛告央掘汝當與文殊師利俱往十方各過恆河沙世界一一界中諸佛問如是義猶如鴈王從此而去彼一一佛皆答言釋迦牟尼佛即是我身汝還當為汝説央掘與文殊師利即還本國具述上事請佛為答佛即告言央掘魔羅涅槃無生際即是如來如來即是涅槃無生際云云此經有四卷劉宋求那跋陀羅譯但録其大概耳槃特比丘無多聞性佛令誦苕帚二字誦帚忘苕誦苕忘帚一日連誦出曰苕帚豁然心開證阿羅漢果問自有不在華嚴不在三藏而得聞大聞小乘者何也答此就四教教教中作四門分別根利遮輕者聞非空非有門入也根利遮重者聞亦空亦有門入也根鈍遮輕者聞空門入也根鈍遮重者聞有門入也兩教四門約小乘分別兩教四門約大乘分別細推可解若論因果則二因三果二因謂煩惱及見餘三是果義兼依正論人法一人四法人謂衆生法即餘四論三障二報障二煩惱障業在其間二報者即衆生命二煩惱者見亦通得名煩惱故業在其間者煩惱潤業業能招報故云其間論三假衆生是因成假命是相續假相待假可知衆生下中論三假門相待可知者即劫煩惱見也劫即長短相待煩惱違順等相待見即有無等相待若通論各具三假依正二報莫不皆從三假而成今從分別且別説也故別對之問既言五濁何者是五清答準例邪正三毒邪是五濁正是五清他方淨土無邪三毒則五濁障輕此義可知言正三毒者他方淨土如阿閦國亦有女人無邪欲故舉一準餘諸可例識三結釋舍利弗劫濁亂時至於一佛乘分別説三第三為五濁釋施權竟第四揀偽敦真文二初揀真偽二開除釋疑初又為二一若不聞知非真弟子二聞不信受成增上慢今初舍利弗若我弟子至非辟支佛如世弟子隨順師法繼嗣傳燈若不聞不知師之正法則無法可順何謂弟子如來昔為五濁説三汝隨順得涅槃得聞得知名為弟子今五濁既除為汝説一何意不聞不知不聞者即不聞教一不知者即不知行一非真即非理一非弟子即非人一也二聞不信受成增上慢又舍利弗至若不信此法無有是處不信成慢者此敦其使信何者汝自謂是後身身尚無量實非後身汝自謂究竟猶餘二百由旬實非究竟未得謂得豈非增上慢耶真羅漢者濁除根利知非究竟信真實法未是後身不起上慢知非究竟信於究竟即信理一無增上慢即成行一信則信教是為教一是佛弟子則人一也第二開除釋疑又二先開除除佛滅度後至受持讀誦解義者是人難得除佛滅後不成增上慢次所以者何佛滅下明好人難得深經難解亦不成上慢若佛在世正説此經不信不受非真羅漢成增上慢若佛滅後方得羅漢者偏執權經不信圓法聽許非增上慢又佛雖入滅此經尚在不信不受應是上慢耶即得開除佛滅度後雖有此經解其文義者此人難遇羅漢不信不解亦聽許非增上慢次釋疑若遇餘佛於此法中便得決了若佛滅後解經人難遇得羅漢者即永入涅槃耶即釋云是人雖生滅度之想捨命已後便生界外有餘之國值遇餘佛得聞此經即便決了釋論第九十三釋畢定品云羅漢受先世身身必應滅住在何處而具足佛道答羅漢三界漏因緣盡更不復生三界出三界外有淨佛土無煩惱名於是國土佛所聞法華經具足佛道即引法華云有羅漢若不聞法華自謂得滅度我於餘國為説是事汝皆作佛論既引經為證今釋經還將論解南嶽師云餘佛者四依也羅漢遇之聞經決了又羅漢修念佛定見十方佛為説此經便得決了又凡夫行人苦到懺悔見十方佛為説亦得決了第四揀偽敦真竟第五明無虗妄止物謗心舍利弗汝等當一心信解至唯一佛乘文三初勸信釋迦實説次諸佛如來下勸信諸佛三無有餘乘下結成不虗也初法説周長行竟第二偈頌有一百二十一行分二初四行一句頌上許答後一百十六行三句頌上正答上許答有三謂順誡揀今不頌順但頌揀誡爾時世尊欲重宣此義而説偈言比丘比丘尼至舍利弗善聽初三行半頌上五千退上慢我慢不信四衆通有但出家二衆多修道得禪謬謂聖果偏起上慢在俗矜高多起我慢女人智淺多生邪僻不自見其過者三失覆心藏玼揚德不能自省是無慚人也若自見過是有羞僧也於戒有缺漏者律儀有失名缺定共道共有失名漏無道定等故內起惡覺如玉含瑕無律儀故外動身口如玉露瑕覆罪自得故名護惜小智者不得學無學智而有世間小智妄謂有漏以為無漏小中之小故言小智也糟粳者無無漏禪定潤故如糟無理慧故如粳是五千等有世間禪如糟有文字解如粳封文失旨如粳無米又糟粳譬其無大機枝葉譬其非好器悉不任用故須遣之此衆無枝葉二句頌上衆已清淨舍利弗善聽一句即頌上誡許誡令善聽也後一百十六行三句頌上正答又為二初從諸佛所得法下有七十三行一句頌四佛章門二從今我亦如是下有四十三行半頌上釋迦章門就初又為四初三十四行三句頌上諸佛門第二有二十七行半頌過去佛門第三有六行半頌未來佛門第四有四行半頌現在佛門今就初頌諸佛章門中文為五初五行三句頌諸佛施權第二十三行頌諸佛顯實第三四行半頌上勸信第四九行半舉五濁第五兩行頌上不虗今初二初四行一句頌施權諸佛所得法至優波提舍經諸佛所得法者修道得於諸權法也無量方便力下頌上無數方便種種因緣演説諸法也衆生心念者頌上隨宜説法也頌中廣出隨宜之相即是照九法界機説七方便總言九七不可定判故言若干隨欲之宜應用世界悉檀隨性之宜應用為人悉檀隨惡業宜應用對治悉檀現起希望名念法門不同名種種過去所習名性現在欣樂名欲或可習欲成性成性生習欲善惡業者七方便傳傳為善惡云云佛以權智照諸方便性欲然後以諸因緣譬喻隨其所宜説九部經十二部如玄義中説九部經者九部法為二乘説從十二部經出九部修多羅闕大乘方等授記及無問自説也優波提舍此云論議餘名可解十二部頌云長行重頌并授記孤起無問而自説因緣譬喻及本事本生方廣未曾有論議俱成十二名廣如大論三十三二一行半結施權之意鈍根樂小法至為是説涅槃前世根鈍今世無機不堪聞大故言不行深妙道前世貪著障重今世衆苦所惱唯可聞小故言為是説涅槃也初五行三句頌諸佛施權竟第二十三行頌諸佛顯實文四初三行頌理一我設是方便至以故説是經令得入佛慧頌上一大事因緣也決定説大乘總頌開示悟佛知見入大乘為本頌上入佛知見也二四行半頌上諸佛但教化菩薩以明人一有佛子心淨至皆成佛無疑僭補曰此四行半偈總頌人一然更有三周差別之意前三行半明為上根法説及授記與舍利弗同也後一行為三乘人作譬説因緣説及授記與四大弟子等同也初分為五初一行三軌行道心淨是入慧悲室柔軟是著忍辱衣利根是坐法空座無量諸佛所二句是安住三法中於無量佛所上求下化故云而行深妙道謂修行實相妙法也二為此佛子下一行説法授記明為説實相妙法授記作佛正與舍利弗初周聞法得記同也三以深心下半偈念佛修戒深心念佛者心佛一如法界一相繫緣法界是文殊一行三昧念實相佛也修持淨戒兼得六度是深心修六波羅蜜度度到彼岸也四此等聞得佛半偈得記大喜謂聞授記得佛而得如來無量大喜充滿法身也五佛知彼心下半偈稱機法説明為大機直説大乘實相雖則為實施權究竟開權顯實也初三行半竟後一行明為三乘人作譬説因緣説一句偈皆為授記與四大弟子等同也三一行三句頌上教一十方佛土中至説佛智慧故假名引導即方便教也牒假名三教顯佛慧一教無二者無通教中半滿相對之二也無三者無三藏中之三如此等二三皆是假名字引導諸衆生令入一佛乘也四有三行三句頌上諸有所作常為一事行一文也諸佛出於世至此事為不可事即是行終不以小乘濟度於衆生即是頌上常為一大事之意也佛自住大乘以此度衆生頌上唯以佛之知見示悟衆生後一行釋不以小度之意第二十三行頌諸佛顯實竟第三四行半頌上勸信有二初二行半舉果勸信舉果中初行半明內心若人信歸佛至而獨無所畏若人信歸佛如來不欺誑者明佛心清淨無明慳垢衆惡已斷淨心中説故是可信次一行明外色我以相嚴身光明照世間無量衆所尊為説實相印身相炳著光色端嚴內無暗惑外有光明則口無欺誑為衆所尊説大乘印則可信受後二行舉因勸信此亦為二一明昔誓舍利弗當知我本立誓願欲令一切衆如我等無異我昔誓願非但自誓菩提亦誓衆生同入佛慧今酬誓故説是亦可信二明願滿如我昔所願今者已滿足化一切衆生皆令入佛道今菩提既滿衆生亦入汝既自證佛慧亦驗我誓不虗結成舉因勸信也問本誓既普今衆生尚多願云何滿答佛三世益物今明現在論願滿也第三四行半頌上勸信竟第四九行半舉五濁上明五濁在釋迦章後今頌文在總佛門末釋迦門中又更重出此明諸佛同出五濁皆先三後一也此文為四初一行總明五濁障大若我遇衆生盡教以佛道無智者錯亂迷惑不受教若我遇衆生者中阿含十二云劫初光音天下生世間無男女尊卑衆共生世故言衆生此據最初也若攬衆陰而有假名衆生此據一期受報也若言處處受生故名衆生者此據業力五道流轉也正法念云十種衆生謂長短方圓三角青黃赤白紫云何衆生生死長在地獄時身受不可思議苦心念無量無邊惡在畜生時身迭相吞噉心迭相逼惱在於鬼時身若燒山心如沸鑊邪見熾盛抵突癡凶在人時身口意常作不饒益事以自勞苦身口意常念不饒益事以自牽纏在天時耽染六塵縱逸嬉戲不聞正法杜塞福源是名衆生生死長云何衆生生死短在地獄時能一念寂靜心取戒在畜生時能一念靜心皈依三寶在餓鬼時能一念靜心靜諸根在人時能修六度養父母敬三寶以善嚴身口意在天時能捨天樂持戒樂禪教化讀誦梵行少語是為衆生生死短言梵行少語者欲界諸地法爾多語以有言語皆由覺觀以少語故覺觀少煩惱漸薄故云短也云何衆生方生死如單越於一切物無我所捨身必上天從天上又上天唯向升善處是名生死方楞方者猶如方物動靜定故於此死已定生天上云何衆生圓生死唯在三途四趣中團圞圓轉如旋火煙回是也云何三角生死謂善業不善業無記等是也角者聚也諸律論文多以聚名角云何衆生青生死恆入暗地獄常怖怕是也云何衆生黃生死餓鬼飢羸萎黃是也云何衆生赤生死畜生迭相食噉流血赫然是也云何衆生白生死謂人中天中白業善道如諸天臨死時餘天語言汝生人道去南閻浮提是汝作福處若人臨死知識語言汝向天中去當知兩處是白生死又第五云心畫地獄黑色鬼鴿色畜生黃人赤天白此義云何答上説五道果報今説五道造業故其不同耳如是等衆生若與佛相遇衆生以苦惱自煎諸佛以大悲濟物悲與苦相對故言相遇又佛如衆生如一如無二天性相關故言相遇夫大悲恆愍衆生若以人天教我則墮暗惑止免青黃赤紫等生死非教佛道若遇衆生令修小乘我則墮慳貪此事為不可秖出二十五有若遇衆生教令通別我則墮偏僻失佛知見今皆令衆生得實相妙慧體達一切皆是佛法無非正道此則盡教以佛道生死苦永盡我常如是説但衆生根鈍罪重不可如願過去有佛號住無住發願使己國衆生同日同時成佛即日滅度又賢劫前有佛號平等亦願己國及十方衆生亦同一日成佛即日滅度今日有佛復有衆生云何耶佛言止止我前所言得人身者耳頗有發願令五道同日成佛不佛言不可以非器之身成無上道要先化三趣令得人天然後乃可如願三趣非善道何能成佛如人求寶聚不於空中求二六行別明五濁為五初二行明衆生濁我知此衆生至備受諸苦毒善本者真如實相也不依此種善根故不感大也堅著五欲者即諸惡之本從癡有愛則我病生二一行別明命濁受胎之微形世世常增長薄德少福人衆苦所逼迫觀心釋者一念心起即為未來作業業即胎胎業無窮世世不斷不斷即是增長也受胎之形形即五陰陰名世壽命連持諸陰入世初從薄酪已至老死故名世世增長是命濁受陰身經説凡夫受身初七未轉異二七有生相如薄酪三七如厚酪四七如凝酥五七如壞六七如肉摶七七於肉摶生五疱頭手腳等八七又五疱一頭兩膊兩腕九七續生二十四疱四疱作眼耳鼻舌二十疱為二十指十七轉現腹相漸漸皮骨分解作諸異相生七百筋七千脈隨所須相用一風染之須白相白風染乃至餘風亦如是香風故安隱端正臭風故不安隱則醜陋邪戾後出胎食五穀則生八萬戶蟲也三一行是見濁入邪見稠林若有若無等依止此諸見具足六十二五見交加如稠林密茂若有是常見若無是斷見因此二見生六十二或云外道計我有四句色即是我離色是我色大我小我住色中我大色小色住我中四陰亦爾是為二十三世為六十并根本為六十二如大品中説四一行頌煩惱濁深著虗妄法堅受不可捨我慢自矜高諂曲心不實五一行頌劫濁於千萬億劫不聞佛名字亦不聞正法如是人難度長時無佛法即是劫濁又上來四濁集在時中故名劫濁如是人難度者五濁障故不信一乘則不可度也觀解者念念惡覺永無正觀自覺即不見佛心無八正即不聞法此心難度三一行為五濁故即權為説小是故舍利弗我為設方便説諸盡苦道示之以涅槃四一行半即是終令入大我雖説涅槃至來世得作佛析三界妄盡滅色取空則非真滅若體達無明本無常寂即是真滅雖本無常寂若不修道無由契會故言佛子行道已來世得作佛也第四九行半舉五濁竟第五兩行頌上不虗上云汝等當信佛之所説言不虗妄勸信前已頌訖不虗今更頌初二句先明釋迦先開三我有方便力開示三乘法次兩句明諸佛後顯實互現耳一切諸世尊皆説一乘道後一行正明不虗今此諸大衆皆應除疑惑諸佛語無異唯一無二乘前權後實誠言不虗勿生疑也已上三十四行三句頌上諸佛門竟第二二十七行半頌上過去佛章文為二初二行頌説三過去無數劫至演説諸法相二有二十五行半頌顯一上文顯實兼有四一今偈具頌於中又二初一行略頌上三一是諸世尊等皆説一乘法化無量衆生令入於佛道皆説一乘法即是頌教一化無量衆生頌人一令入於佛道即頌理一兼得行一二有二十四行半約五乘廣頌顯一就文為二初一行半總約五乘以顯一又諸大聖主至助顯第一義天人羣生類是舉諸乘以明人一更以異方便舉諸行以顯行一兼得教一第一義是正因佛性即是理一又異方便者若用圓妙正觀此即實相方便不名為異若用七方便觀助顯第一義者名異方便二有二十三行別約五乘以顯真實即為三初二行明菩薩乘若有衆生類至皆已成佛道若作五乘釋者但是六度菩薩乘若作七方便釋者兼得通別菩薩乘何者三教大乘皆行六度而運心有異相心行六度即三藏菩薩無相即通教非相非無相次第行六度即別教今但列六度未知定判屬誰尋上文云更以異方便者非獨六度菩薩即三教菩薩方便昔聞法皆已成教一昔六度行皆已成行一如是諸人等皆已成人一皆已成佛道皆已理一也二一行明二乘諸佛滅度後若人善軟心如是諸衆生皆已成佛道從諸佛滅度後若人善軟心一行開聲聞緣覺皆入一乘何以得知大品歎阿羅漢心調柔軟又淨名云住調伏心是賢聖行是以知之昔善軟心皆成行一諸人等是人一成佛道是理一三二十行明人天乘不彰是人天但明造像起塔專至散亂故知是天人業問人天小善應住果報云何皆言已成佛道答此應明三佛性義大經言復有佛性善根人有闡提人無者即是人天小善低頭舉手為山始簣合抱初毫昔方便未開謂住果報今開方便行即是緣因佛性能趣菩提成顯實之義也就此為二前十九行約天人小善成緣因種子以明顯實後一行約了因種子以明顯實尋文可解前十九行為十初三行半約造塔明天乘諸佛滅度已至積土成佛廟因時至心傾財捨寶果時任運自然受樂故是天乘也木樒者長安有木名樒亦任造像金光明云以佛舍利如芥粟許置小塔中三十三天已有自然果報即其義也二一行童子戲砂作塔即是人業乃至童子戲聚沙為佛塔如是諸人等皆已成佛道因時泛泛悠然作善果時作意勤求得樂故是人業成佛道則是理一人一三四行約志心造像明天業若人為佛故至皆已成佛道優婆塞戒經不許用膠得失意罪而此經用者古師云外國用樹膠耳光宅言或有處必須於像聽許用牛皮膠若有他物即不得用也有言大豆汁可代膠清然牛皮終是不淨物後得不淨果報不淨錢不任造像可換取如法淨錢造像地持不用雌黃臭物戒經不許造半身像得失意罪善相不起墮落生死中然造像各有所擬若當堂佛必須坐消息佛或坐或臥行動佛必應立而弟子於塔殿立像前不得坐此處定屬佛故若白衣舍餘處坐像前不能久立乞坐者得立像前即不得坐也造像功德經略明十一功德一者世世眼目清潔二者生處無惡三者常生貴家四者身如紫磨金色五者豐饒珍寶六者生賢善家七者生得為王八者作金輪王九者生梵天壽命一劫十者不墮惡道十一者後生還能敬重三寶又云若人臨終發言造像乃至如麥能除三世八十億劫生死之罪當知此等功德並是華報果在佛地也四一行明人業乃至童子戲若草木及茟或以指爪甲而畫作佛像僭補曰茟音委草木華始生者謂用草木茟指爪以畫佛像雖是童戲皆成佛道五一行半結成顯實如是諸人等至度脫無量衆諸人皆成人一漸漸積功德即成行一佛道即成理一但化菩薩即成教一説法教化也六三行半約諸塵供養明天業若人於塔廟至皆已成佛通七一行約散心用塵供養明人業若人散亂心乃至以一華供養於畫像漸見無數佛八一行約身業供養明天人業或有人禮拜或復但合掌乃至舉一手或復小低頭禮拜一句五體著地是上禮即天業合掌低頭是中禮即人業九一行半結成以此供養像至如薪盡火滅非但顯實自成佛道亦能施權薪盡涅槃也十有一行約口業例上應具天人今但出人業若人散亂心入於塔廟中一稱南無佛皆已成佛道南無或言度我又云歸命畢命歸佛耳調達臨終稱南無未得稱佛便墮地獄佛記其從地獄出當作辟支佛字曰南無外國事天像者以金為像頭賊來盜之取不能得即稱南無佛便得頭明日衆聚云天像失頭便是無天來著耳著者云何失頭天即降一人云賊來取頭即稱南無佛諸天皆驚動是故得我便是故失頭衆人云天不如佛耶既不如者何不事佛賊稱南無佛尚得天頭況賢者稱南無佛十方尊神不可當但精進勿懈怠那先經云人臨死稱南無佛得免泥黎者云何如人持一石置水石必沒無疑若能持百石子置船上者必不沒若直爾死必入泥黎如石置水若臨死稱南無佛佛力故令不入泥黎般力故使石不沒也胎經報恩經云華林園第三大會九十二億人者是釋尊遺法中一稱南無佛人得見彌勒也上十九行頌緣因種子竟第二有一行明了因種子於諸過去佛在世或滅後若有聞是法皆已成佛道問何以約過去章廣明五乘答三世皆有但未來未起現在始行於證義弱過去開權已久受化之人皆成四一證義事強搆之虗言不如驗之實事故於過去廣説五乘也僭補曰經中散心念佛聚沙為塔指爪畫佛合掌低頭等雖是人天小善當時諸人皆於過去劫中成佛已竟譬如毫末微芽能成參天大樹膚寸纖雲能注滂沱大雨衆生亦爾雖一念微善皆從真如實相中流出是為緣因佛性終得菩提譬如三草二木雖大小有殊皆一地所生一雨所潤究竟成就理自然耳過去既爾現未亦然此文既明故後三佛章中不重出已上二十七行半頌過去佛門竟也第三有六行半頌上未來佛章文為二初一行半頌説三未來諸世尊至以無量方便後五行頌顯一為四初一行頌人一度脫諸衆生入佛無漏智若有聞法者無一不成佛二一行頌行一諸佛本誓願我所行佛道普欲令衆生亦同得此道三兩行頌教一未來世諸佛至是故説一乘知法常無性者實相常住無自性乃至無無因性無性亦無性是名無性知法常無性等者一實理上性相二空無性性空即無四性既云實相無自性等故知即是理性性空性空既爾和空準知無性亦無即是相空故知經中一無性言具二無性即是無性性無相性也本自有之故曰常無知者照也具如止觀第五不思議境中一念三千非自他等既無四性一念亦無即是性空既無一念無念亦無即是相空即是不思議之二空也若不了今家依於智論中論等準理準義緣於心性立此二空諸無可準非用法相者之所逮也故於實道須間修性若本自二空即是性德若推檢入空即是修德推而不成須修萬行正助合行行中具足一切諸行方名緣因聞斯義已方乃名間問世間因緣可以四句了生無生今性本淨非關緣起何須以此四句推之答世緣起法亦本無生但由情計謂之為生理性亦爾由謂自他等故須推之二空不顯尚須更約續待推檢況因緣耶佛種從緣起者中道無性即是佛種迷此理者由無明為緣則有衆生起解此理者由教行為緣則有正覺起欲起佛種須一乘教此即頌教一也又無性者即正因佛性也佛種從緣起者即是緣了以緣資了正種得起一起一切起如此三性名為一乘也四一行頌理一也是法住法位世間相常住於道場知已導師方便説是法者是十界十如染淨之法住法位者佛如衆生如皆住於如如為法位也世間相常住者出世正覺以如為位亦以如為相位相常住世間衆生亦以如為位亦以如為相豈不常住世間相既常住豈非理一理一中云是法等者正示理一其染淨之法皆名是法染謂衆生是九界淨即正覺是佛界衆生正覺是能住法染淨一如是所住位位無二稱同立一如不出真如也又釋世間者即是陰界入也常住者即正因也正因常故緣了亦常故言世間相常住也於道場知已此舉果釋成開權顯實道場朗然斯理久暢物情障重方便施三已上六行半頌未來佛門竟第四有四行半頌現在佛章為三初一行半頌為化之意正為安隱衆生天人所供養至亦説如是法二一行頌上顯實知第一寂滅以方便力故雖示種種道其實為佛乘知第一寂滅即頌理一雖施方便其實為佛乘或頌教一或頌行一三二行正頌開權知衆生諸行至隨應方便説四行半現在佛竟第一有七十三行一句頌四佛章門竟第二有四十三行半頌釋迦章凡兩意一頌上二本下法説上根已悟中根未了故須作喻還譬上法譬不孤起承躡有由故言譬本若以義判則有六義一長者二見火三一乘化不得四三乘化得五還説一乘六不虗自餘攝入六義之內論總別者初開三顯一總敘釋迦一化教門從五濁去皆屬別譬也次本迹者總敘佛教總含本迹從五濁去別明本迹五濁一章正明居法身本見衆生苦起大悲心從一乘化不得者垂迹耳大分為二初從今我亦如是下兩行偈略頌上權實為下總譬作本第二從我以佛眼觀見下有四十一行半偈廣頌上六義為下別譬作本今初今我亦如是至皆令得歡喜此二偈略頌上權實者初一偈頌上顯實具四一今我亦如是如於諸佛之是同以一實教化衆生此是總頌顯實也安隱者涅槃祕藏是安隱處佛自住其中亦安置衆生入祕密藏安隱處即頌理一衆生即頌人一種種法門入於佛道即頌行一宣示即教一後一偈頌上施權智慧力者即權智力也知衆生性欲者鑒小機也方便説諸法者正施權也皆令得歡喜者隨宜稱機也又二偈為下總譬作本者初偈云今我亦如是我即釋迦是一化之主為下有大長者譬作本次句安隱衆生者安隱即大涅槃常樂住處此處寂靜無五濁障故名安隱安隱即對不安隱不安隱即三界生死行化之所有五濁障名不安隱即為下火宅譬作本衆生即是五道受化之徒為下五百人譬作本又安隱者即是安隱法還對不安隱法不安隱法即五濁法也為下火起譬作本第三句種種法門即對不種種為下唯有一門譬作本次偈知衆生性欲者即是五道中別有三乘根性為下三十子譬作本向上即是略頌向下即是總譬本本末相承文義整足譬中當更引上證下云云二偈雖略收佛一化開權顯實原始要終罄無不盡故稱略頌為下總譬本也初兩行偈頌上權實為下總譬作本竟第二我以佛眼觀見下有四十一行半偈廣頌上六義為下別譬作本文分為六初我以佛眼下四行頌上五濁設三為下見火譬作本第二從我始坐道場下十七行半頌施方便化為下捨几用車譬作本第三從我見佛子等下六行頌上顯實為下等賜大車譬作本第四如三世諸佛下五行半頌上歎法希有釋迦章雖無指諸佛章中也第五汝等勿有疑下二行半頌上不虗第六以五濁惡世下六行揀衆敦信此三意合為下不虗譬作本大槩如此今初四行頌五濁上云為五濁故説三今為五濁故出世出世本應説大障不獲已故前説小今初四行頌五濁説三舍利弗當知我以佛眼觀見六道衆生衆生濁貧窮無福慧劫濁入生死險道相續苦不斷命濁深著於五欲如犛牛愛尾以貪愛自蔽盲瞑無所見煩惱濁不求大勢佛及與斷苦法深入諸邪見以苦欲捨苦見濁為是衆生故而起大悲心文分三初我以佛眼觀見者頌佛能見佛在法身之地以常寂佛眼圓照羣機若根利濁輕則以盧舍那像説一乘法若根鈍濁重則脫瓔珞以老比丘像驚入火宅方便説三秪是于時鑒機故言我以佛眼觀見也若觀色法應用天眼若分別根機應用法眼云何言以佛眼見耶佛眼圓通舉勝兼劣又四眼入佛眼皆名佛眼六道衆生下第二有二行三句四字明所見五濁六道衆生頌衆生濁貧窮無福慧一句頌劫濁入生死險道相續苦不斷此頌命濁深著於五欲一行頌煩惱濁不求大勢佛一行頌見濁以外道不求正法深入邪見以苦欲捨苦此正頌見濁或云五熱炙身欲望捨苦反得苦報或云諸見即是受受即是苦行此苦因望欲捨苦豈可得耶普曜經云五道源來五戒為人十善生天慳貪墮餓鬼抵突墮畜生十惡墮地獄無五趣五陰六衰則是泥洹不處生死不住泥洹便受菩提決五道源來者五道因也從一至一故名為趣衰秪是賊能損耗故毗曇毗婆沙第七云地獄中人初生時念云昔聞沙門説貪欲是地獄過惡大可畏處我昔不斷貪欲今受此劇惱此舉貪欲是地獄因也又云五道各有自爾法地獄色斷還續畜生能飛虗空餓鬼施摶食時能來到人中人中有勇健念力梵行勇健者不見果而廣能修因念力者久遠所作而能憶梵行者能得解脫達分得正決定天中有自然隨意所須即得解脫達分者涅槃名解脫所修善根不住生死名之為達聲聞三生支佛百劫解脫之分名解脫分得正決定者初果也地獄中成就他化自在天煩惱業及善而不現前行他化自在成就地獄煩惱業及不善而不現前行舉上舉下中間可知地獄此方名胡稱泥梨者秦言無有無有喜樂無氣味無歡無利故云無有或言卑下或言墮落中陰倒懸諸根皆毀壞故或言無者更無赦處獄卒是變化令見非衆生數初將罪人縛至閻王所者是衆生數若受苦時非衆生數初皆正語若受苦痛聲不復可分別畜生者形傍行傍故名畜生又畜生者名遍有遍五道中四天三十三天悉有而上天所乘象馬等是福業化作非衆生數也又畜生者名盲冥盲冥者無明多故名畜生劫初時皆解聖語後飲食異心諂而語皆變不復能語劫初時等者諸教相中畜生能言皆此時也鬼者胡言闍梨哆秦言祖父衆生最初生彼道名祖父後生者亦名祖父又慳貪墮此趣此趣多飢渴故名餓鬼亦被諸天驅使亦希望飲食故名餓鬼人者胡言摩䨲奢此云意昔頂生王初化諸有所作善思惟善籌量善憶念人民如王教諸有所作先思量憶念故名人為意又人能息意能修道得達分又云人名慢五道中多慢者稱人趣也阿修羅者修羅名天阿言非非天故稱阿修羅又修羅名端正彼不端正故言阿修羅修羅名酒阿之言無彼無酒故言阿修羅也天者天然自然樂勝身勝衆事悉勝餘趣常以光自照故名為天阿含云衆生是假名界是法五趣衆生與法界和合若衆生行不善心時與不善界俱行善心時與善界俱行勝心時與勝界俱行鄙心時與鄙界俱是故比丘當作是學善種種界前是因緣釋六趣後觀心釋六趣也為是衆生故下第三有半行明起大悲而起大悲心者上舉能見次明所見今明大悲熏心應入三界施設方便引趣佛慧也初四行為下見火譬作本竟第二十七行半頌施方便化為下捨几用車譬作本就此為二初有六行半明念用大乘擬不得次尋念下十一行明念同諸佛用三乘化稱宜可得就初念用大化又為三初一行半明用大擬宜次衆生下三行明衆生無機三我即下二行明念息大化今初我始坐道場至微妙最第一始坐道場者至理無時假時化物為化之初故言始也事釋者初在此處修治得道故言道場坐此樹下得三菩提故名道樹感樹恩故觀樹念地德故經行道成賽澤之時欲以大法擬宜衆生也觀心釋者樹即十二因緣之大樹也深觀緣起自成菩提欲以無漏法林樹蔭益衆生故言觀樹經行者大乘三十七品是行道法自以道品履一切地得成佛道欲以此法化度衆生是故起行樹地無有分別豈須報恩未曾有經云秖以通化傳法名報恩耳過去因果經云佛成道初一七日思惟我法妙無能受者二七日思衆生上中下根三七日思惟誰應先聞法即至波羅奈為五人説四諦陳如得法眼淨頞拔提十力迦葉摩訶男拘利未得道佛重説四諦四人得法眼淨佛又説五陰無常苦空非我五人得阿羅漢佛為佛寶四諦為法寶五人及佛是六阿羅漢即是僧寶五比丘者諸女聽仙人説法惡生王瞋割兩臂耳鼻等血變為乳惡生王者拘鄰是仙人者佛是佛誓令得甘露令初聞法音也問何故初為五人轉法輪答人先見諦故人是現見故人為證故佛所行事業與人同故諸天從人中得善利故人中有四衆故輪王出世聲至他化自在憍陳如得道聲至梵天佛得道聲至首陀會首陀會即摩醯首羅色究竟天也何故爾答善業名譽業稱讚父母師長業有上中下故爾也若使有頂有頂三有之頂非非想天有耳識者佛聲亦至彼輪王行十善生欲天欲天喜我眷屬增多故陳如離欲故徹梵佛最勝至尼吒若依大乘佛得道聲遍至百億尼吒又遍十方無量世界尼吒尼吒即色究竟上又言有頂者為顯佛聲彼無耳識非聲不及瑤師云事之至深至聖猶思而後行一七思佛智微妙二七思衆生根性不同三七思法藥萬品即舉偈證之我所得智慧微妙最第一衆生諸根鈍云何而可度今明佛在法身之地寂而常照恆以佛眼洞覽無遺豈始至道場淹留三七方思此事言三七者明有所表也表佛初欲三周説法故假言三七耳初七思法説次七思譬説後七思因緣説皆無機不得是故息大施小也此偏就圓教大乘為釋耳若通途約大乘釋者初七思惟欲説圓教大乘次七思惟欲説別教後七思惟欲説通教大乘皆無機不得是故息大説三藏三乘為方便之化也觀心釋者初欲觀中道中道妙難觀不得次欲觀即假即假觀分別智難生不得後欲觀即空即空巧度又不得方觀方便析法小觀也第二三行明無機又為三初半行明障重衆生諸根鈍著樂癡所盲二半行明不堪聞如斯之等類云何而可度三二行明諸梵雖請説大佛知無機所以不説爾時諸梵王至請我轉法輪第三有二行明念欲息化又二初一行半明無機強説聞則有損我即自思惟至墜於三惡道後半行正明息化我寧不説法疾入於涅槃一念用大乘擬不得竟第二有十一行頌上於一佛乘方便説三也就此為二初十行正明化得後一行釋疑就前十行有四初一行明三乘擬宜尋念過去佛所行方便力我今所得道亦應説三乘尋念者念彼雖無大機不容永捨要以方便而濟度之非都不知設三欲引同諸佛故云尋念也第二六行半明有小機此又為二初四行半明諸佛歎後二行明釋迦酬順上欲大化於彼無機故諸佛不歎今欲説小曲會根緣則始終得度所以佛歎也就初佛歎為五初三句釋迦自敘諸佛現作是思惟時十方佛皆現梵音慰喻我佛現者由念佛方便力故佛現由擬法會機二義故佛現二一行一句明諸佛正歎釋迦善哉釋迦文至而用方便力歎釋迦能隱實設權故云善哉為一施三引入佛慧即是第一導師得是無上法者即是得實智微妙第一而用方便力者隨諸佛隱實用權也三一行明諸佛亦隱實用權我等亦皆得最妙第一法為諸衆生類分別説三乘四一行雙釋二義少智樂小法不自信作佛是故以方便分別説諸果為衆生少智不堪聞大所以隱實而復樂小所以施權五半行雙結二義雖復説三乘但為教菩薩雖復説三終為顯實也第二有二行明釋迦酬順二初一行發言酬順舍利弗當知我聞聖師子深淨微妙音稱南無諸佛既聞諸佛歎對曰南無南無此云敬從也後一行念順物機復作如是念我出濁惡世如諸佛所説我亦隨順行第二六行半明有小機竟第三一行半正明施教思惟是事已至為五比丘説諸法寂滅相不可以言宣下即是前説中道無性佛種之理此理非數又不可説今以方便作三乘説又非生非滅而以方便作生滅説又偏真之理亦非示説以方便故作四門説初為五人説無常有門也諸法寂滅等者問此中三釋義有何別答然初一説以權實相對即實不可説説屬於權三權是數故一實非數次生滅不生滅相對即不生滅不可言宣此小衍相對也亦是事理相對第三即是偏真之理亦不可宣是則大小兩理俱不可説方便為物俱可得説雖俱可説佛意在大衆生於實並非其宜故思方便作生滅説第四一行明受行悟入也是名轉法輪便有涅槃音及以阿羅漢法僧差別名轉佛心中化他之法度入他心名轉法輪陳如初得見諦即斷見惑分證滅諦亦是分得有餘涅槃涅槃之音起自於此由此得成無學便有羅漢之名能説三乘法者名佛所説三乘即法見諦羅漢等名僧三寶於是現世間一上十行明化得竟第二一行是釋疑從久遠劫來讚示涅槃法生死苦永盡我常如是説疑師云佛初未能鑒機尋念諸佛始知根性即釋云非我不知用於方便特欲引同故念諸佛非始念方知從久遠劫來見其樂小已為讚示令盡衆苦所以聞小即得解脫也疑弟子云云何衆生一世暫聞即證羅漢即釋云從久遠劫來為其讚示稱於本習故速得道從久遠劫來者久遠之言準下宿世乃指大通之後以小熟故故以一文釋其二疑第二十七行半頌上施權為下捨几用車譬作本竟第三有六行頌上顯實為下等賜大車譬作本文具四一初二行頌人一舍利弗當知至方便所説法僭補曰既已曾從諸佛聞方便法則知開顯後久發大心志求佛道不特一佛二佛而已故成人一二一行頌理一我即作是念如來所以出為説佛慧故今正是其時為説佛慧即是上一切種智佛知見也三二行頌教一舍利弗當知至但説無上道鈍根不信者皆信佛喜無畏説無上道即教一四一行頌行一菩薩聞是法疑網皆已除千二百羅漢悉亦當作佛悉亦當作佛是行一也又上六偈有四意初二行明大乘機發亦云索果次兩行一句明佛歡喜衆生得大乘益故次三句正明顯實次一行受行悟人也明由機發故索果索果由於機發此應有四句自有障除機未發如諸羅漢在三藏時以樂小故濁障雖除大根鈍故妙機未發自有大機發障未除如法華中諸凡夫人等雖未斷結以大根利故機發自有障即除機即發如説無量義時證二乘果即於此座大機即發自有障未除大機未發即五千等是也志求佛道者即是索大非求小果也索有三意一大機有感果之義機中論索二情中密求為得為不得即此意三發言索即是殷勤三請也昔教之中已有二求但未發言至於今日具此三索問昔出宅索三是機情索者文云如先所許此乃求三何關求一答出外不見必有異途將昔許三以求異意耳亦得是索一也第三六行頌上顯實為下等賜大車譬作本竟第四五行半頌上歎法希有就此為二初一行頌上如是妙法妙法者權實也如三世諸佛説法之儀式我今亦如是説無分別法如三世者引同諸佛用權權是引物之儀式也説無分別法引同諸佛顯實實則言語道斷豈存儀式又權實本無分別為鈍根小智分別權實今還悟入一三不二即知佛説三一無分別也諸佛皆爾何獨我耶二四行半頌上時乃説之諸佛興出世至過於優曇華上已舉曇華頌中還説諸佛興出世兩句久久懸遠時有佛出此舉值佛難正使出於世兩句此舉説法華難如今佛出世四十餘年始顯真實無量無數劫兩句此舉聞法華難如五千之流梵音盈耳越席而去聞豈不難乎能聽是法者兩句舉能信解者難普衆唯身子前達中下雖聽猶未能了舉曇華譬上四難但合聞者餘可解僭補曰曇華喻四難更有聞法喜讚一言過於優曇之喻謂末法聞經喜讚一言達於佛心斯人稀有過於佛在世説法也第五二行半頌上不虗又二初一行半勿於可信人生疑汝等勿有疑至無聲聞弟子法王者夫為人王言則不二佛為法王豈容虗説夫方便可是權假真實寧應是妄聞法王説法勿生疑也夫方便可是權假者意明前教可是權施據佛本懷雖非虗妄以實望權故云權假施已復廢終歸真實今已説實故勸莫疑次一行勿於可信法起疑汝等舍利弗聲聞及菩薩當知是妙法諸佛之祕要可信法者此經四十餘年蘊在佛心他無知者名為祕一乘直道總攝萬途故言要也今日開顯正直分明何疑之有第六六行頌上揀衆敦信又二初三行頌揀衆以五濁惡世至廣讚一乘道五濁一行頌上揀非佛弟子何者若樂諸欲是行魔業故須揀之上文著涅槃尚非佛弟子此文著生死那是佛弟子耶當來世惡人下一行頌上揀增上慢上慢者未得上法謂得上法不信受一乘毀墮惡道故揀也有慚愧清淨一行頌上如來滅後解義者是人難得雖現前無佛為讚一乘若遇餘佛便得決了也次三行頌敦信舍利弗當知至自知當作佛初一行半敦信於權次一行半敦信於實實權無疑自知作佛僭補曰汝等既已知者知佛為世之導師人天眼目其設權隨宜方便之事本為顯實無復疑惑心大歡喜自知作佛也四五六三段合為下不虗譬作本竟法説周五段中初法説竟
