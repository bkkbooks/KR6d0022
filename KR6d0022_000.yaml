body:
  text: 法華文句纂要序原夫如來於法身地寂照羣機大悲熏心誕神演法一乘頓圓非華嚴無以捷其始五味漸熟非法華無以暢其終是以佛日東升高山大士先蒙其照慧輪當午幽谷微善咸沐其光三周一雨而機自低昂九喻一乘而緣見同異三周者一為上根法説二為中根譬説三為下根宿世因緣説九喻者一蓮華喻為總總譬本迹兩門妙法也二八喻為別八喻者一火宅喻喻三界不安隱二窮子喻喻小乘無大乘功德法財三藥草喻喻有漏諸善皆能除惡而無漏之善為最四化城喻喻二乘真空涅槃防見思之非禦生死之敵五衣珠喻喻王子結緣下一乘了因之種六鑿井喻喻菩薩但習法華前諸衍經如見乾土去水尚遠若聞解此經如見溼泥近實相水也七髻珠喻喻中道實相極果所宗以上七喻皆喻迹門開權顯實也八醫子喻喻大醫王遍療一切衆生之病唯此一喻喻本門開迹顯本也大意謂三周皆一實相之法而三種機宜自見低昂耳九喻皆喻一乘之理而緣見同異二者皆在機在緣而法無差別也七喻之説出法華論前不舉蓮華後不説鑿井但用中間七喻作七對治荊溪謂一二得經旨餘于理似不成今依經補足九喻寧違論不可違經也其施權也誘其入實其垂迹也令其達本本中之本始於無始威音釋見壽量品迹中之本起於不輕菩薩迹本本迹互現無涯極界塵而壽量莫窮竭墨點而時分無盡墨點見化城品本迹之道既明開顯之意斯了且一期大法罄智海以敷揚兩門流通極多品而勸讚良以衆生本來是佛秪為不覺不知欲令一念回機不啻再四叮囑一偈一句盡入授記之中三德三軌妙修説法之行三德者法身解脫般若乃佛之極果也三軌者弘法之軌則也法師品云入如來室著如來衣坐如來座如來室者一切衆生中大慈悲心是如求衣者柔和忍辱心是如來座者一切法空是安住是中以不懈怠心為諸菩薩四衆廣説是法華經注云入如來室修同體慈即法身德著如來衣修寂滅忍即解脫德坐如來座能坐所坐畢竟空寂即般若德即一而三即三而一是弘法之三軌也故寶塔品云聖主世尊雖久滅度在寶塔中尚為法來諸人云何不勤為法蓋此經王法師品頌云決了聲聞法是諸經之王乃一化之大本五時之極唱受持讀誦為人解説如説修行究竟成佛智士得之自慶自幸而已矣寧復有加於此者乎天台智者大師靈嶽親承大蘇妙悟得法華三昧發旋陀羅尼照了法華若高輝之臨幽谷達諸法相若長風之遊太虗於是九旬談妙以釋經題次釋章句以解文義復著摩訶止觀以明妙行蓋大師以佛之心印己之心以己法華釋佛之法華如空合空了無縫隙似水投水殊無異味師之前法門巨匠釋此經者凡數家皆各名世及師言一出如杲日麗天而衆景失曜矣後代亦有不明師之言得佛之心者往往別為注釋不無一二新得無過枝末小節其猶捧土益仞究竟無所加損余少年行腳嘗歷講肆親炙諸碩德而於台賢性相之旨粗得其綱領後入禪專事參究而諸教乘束置高閣又十載及罷參後再取當年所習教法讀之方知原是自家祖翁田地契券分明不爽毫髮自是以來復加鑽研首事華嚴日與毗盧老人文殊普賢眉毛撕結未嘗暫離至年六十有四始纂華嚴疏論要語注於經文之下成一百二十卷刊行于世時年已七十矣彈指間不覺八旬之年又至因思法華一部乃成未了之業釋今不為得無孤負此生乎乃請文句及記從頭溫習即於是年歲次甲戌冬十月朔日發筆但纂大師釋經正義令人開示悟入者録之其正義已足而滔滔雄辨縱橫發揮者略録其要不能具録又破古處長篇纍牘實當時之藥石乃今日之辨髦則不須録其經前所立科段繁者略汰之闕者備補之又理之精深文之簡奧者則引荊溪記文略釋之又有義之未發愚之鄙見者則僭補一二蓋務逗適機宜以似同見同行而已乃命名曰法華文句纂要但老眼昏華精力弗逮不無舛誤幸高德垂覽不吝指示以便改正共相流通實所望也是為序康凞乙亥冬復月長至日私淑比丘道霈拜書法華經文句纂要品目卷第一序品第一卷第二方便品第二卷第三譬喻品第三卷第四信解品第四藥草喻品第五授記品第六卷第五化城喻品第七五百弟子授記品第八授學無學人記品第九法師品第十見寶塔品第十一卷第六提婆達多品第十二持品第十三安樂行品第十四從地涌出品第十五如來壽量品第十六卷第七分別功德品第十七隨喜功德品第十八法師功德品第十九常不輕菩薩品第二十如來神力品第二十一囑纍品第二十二藥王菩薩本事品第二十三妙音菩薩品第二十四觀世音菩薩普門品第二十五陀羅尼品第二十六妙莊嚴王本事品第二十七普賢菩薩勸發品第二十八法華經文句纂要品目終
