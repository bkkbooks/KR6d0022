body:
  text: 隋章安尊者灌頂結集陳隋天台智者大師説唐荊溪尊者湛然述記閩鼓山私淑比丘道霈纂要先申品目次釋經文今初妙法蓮華經化城喻品第七釋化城喻品化者神力所為也以神力故無而欻有名之為化防非禦敵稱之為城內合二乘涅槃乃權智所為也以權智力無而説有用教為化防思禦見名為涅槃暫以蘇息引入寶所未究竟而言滅度權假施設故言化城喻如前説即動樹訓風舉扇類月等此因緣釋也約教者若三藏義者於涅槃生安隱想生滅度想若通教二乘與三藏同菩薩不爾釋論云菩薩過險一腳入城一腳門外憶衆生故從城入險誓願扶餘習入生死而不以空為證也別教不道城如化用城防險從城門經過將城作方便斷見思惑不道此為極也圓教知無賊病亦不須城今是圓教意故題為化城即寶所也此品説因緣事下根得悟應名宿世品答品初廣説因緣末則結譬化城若從前應稱宿世經從末故言化城又上根疑薄但取道樹三七思惟以明機緣中根疑濃探取二萬億佛所教無上道以為機緣下根疑復厚則明宿世久達機緣若從宿世之始明久遠因緣語其中間言其化城明其究竟言其寶所經家處中標品收得初後從此義便故言化城品問化城是權寶所是實何意棄實從權答由知城是化則知寶所是實故標化不失實也次釋經文此品正説因緣後兩品授記初又二一明知見久遠二明宿世結緣此二各有長行偈頌初長行有三一出所見事佛告諸比丘至彼佛滅度已來甚大久遠二舉譬明久遠譬如三千大千世界至百千萬億阿僧祇劫三結見昔如今我以如來知見力故觀彼久遠猶若今日如來三達明遠如見今日所引往事決定不虗二偈頌有七行頌前三義初一行頌所見事爾時世尊欲重宣此義而説偈言我念過去世無量無邊劫有佛兩足尊名大通智勝二四行頌譬久遠如人以力磨至如是無量劫三二行頌結今昔如來無礙智至通達無量劫一明知見久遠竟第二正明結緣為二初結緣由二正結緣由中又二遠由近由遠由又二一大通佛成道二十方梵王請法今初五一佛壽長遠佛告諸比丘至壽五百四十萬億那由他劫二成道前事有二一佛坐道場其佛本坐道場破魔軍已至猶不在前諸佛道同為緣事異釋迦苦行六年草生攢䏶至肘不覺諸天哭喚動地不聞移坐得道彌勒即出家日得道彼佛十劫猶不現前非根有利鈍道有難易緣宜賒促應示長短耳二諸天供養爾時忉利諸天至至於滅度亦復如是僭補曰大通如來雖坐道場未曾成佛然諸天始終供養皆備於此時乃是如來修成功德亦是諸天福力所感遇佛成道乃至涅槃大申供養曾無斷絶是為緣因佛性也二成道前事竟三明正成道諸比丘至成阿耨多羅三藐三菩提僭補曰諸佛因地發願度生衆生界空方成佛道若生界未空則無成佛之期大通智勝佛十劫坐道場佛法不現前者以衆生界未空願力所持令佛法不現前耳過十小劫諸佛之法乃現在前成三菩提者功成道著自然成佛非佛本願也古喻如撥火杖意在撥火撥之既久自然而燒本不欲燒也撥火喻智德杖燒喻斷德智斷圓滿不期成而成也然雖成佛而度生之願未滿果後行因盡未來際無有盡也四明成道後眷屬供養其佛未出家時至以偈頌曰大威德世尊至歸命無上尊五明請轉法輪爾時十六王子至重説偈言世雄無等倫至當轉無上輪一大通佛成道竟第二諸梵天請文二一威光照動佛告諸比丘至勝諸天光初威光者過去因果經云薩婆悉達處胎時三千國土朗然大光日月所不照處大明其中衆生各得相見初成道時亦如是朝為色天中為欲天晡為鬼神説法夜亦如是觀解忽生衆生者心性本淨陰入界覆之則暗若修觀慧本性理顯又兩山二鐵圍山是二諦其國中間是中道日月光是二智佛光是中道無分別智光照本有三諦洞然明現二十方梵請文為二先九方後上方九方為四一東二東南三南四總明六方前三方梵文各有七一覩瑞二驚駭三相問決四尋光見佛五三業供養六請法七默許皆如文上方梵止有六世尊即説故無默許今初東方爾時東方五百萬億諸國土中至而説偈言我等諸宮殿至遍照於十方爾時五百萬億國土諸梵天王至以偈頌曰世尊甚希有至惟願哀納受爾時諸梵天王至而説偈言世雄兩足尊惟願演説法以大慈悲力度苦惱衆生爾時大通智勝如來默然許之二東南方又諸比丘東南方五百萬億國土至而説偈言是事何因緣至度脫苦衆生爾時五百萬億諸梵天王至以偈頌曰聖主天中王至今得值世尊爾時諸梵天王至而説偈言大聖轉法輪至忍善者增益爾時大通智勝如來默然許之三南方又諸比丘南方五百萬億國土至而説偈言我等諸宮殿至為佛出世間爾時五百萬億諸梵天王至以偈頌曰世尊甚難見至惟願垂納受爾時諸梵天王至以偈頌曰惟願天人尊至當演深遠音爾時大通智勝如來默然許之四總明六方總明六方者一西南二西方三西北四北方五東北六下方以省文故例上三方共九方也西南方乃至下方亦復如是先九方竟後明上方爾時上方五百萬億國土至而説偈言今以何因緣至為佛出世間爾時五百萬億諸梵天王至以偈頌曰善哉見諸佛至皆共成佛道爾時五百萬億諸梵天王至而説偈言世尊轉法輪至無量劫習法舊云東東南請小七方請大上方請小大若釋論明梵本請大佛雖説小未遂所請若依方便品文梵王請大然佛佛道同不應偏請又如今佛自始至終具轉五味法輪一一皆酬梵請彼亦應然初十六子請轉滿教如今佛説華嚴東東南二方請轉半教如今佛説三藏後七方請轉對半明滿如今佛説方等上方梵請帶半明滿如今佛説般若後十六子請廢半明滿如今佛説法華醍醐教也今古節目文義相應一結緣遠由竟第二結緣近由由佛受請説法故後得覆講正作結緣文為二一先轉半字法輪二諸王子請轉廢半明滿字法輪初為二一受請説法二聞法得道今初爾時大通智勝如來至生滅則老死憂悲苦惱滅此中應説三乘如序品文而今不説者正為下根論昔結緣今日開顯略不言六度耳三轉者謂示勸證亦將三轉對示教利喜示即示轉教即勸轉利喜即證轉也亦對見諦思惟無學也為聲聞三轉為緣覺再轉為菩薩一轉何故爾由根利鈍即三刀斫木之意此一往説耳通則例皆三轉何故三轉諸佛語法法至於三為衆生有三根故大論及婆沙悉作此説問初為五人作下根説今云何作三根耶答當時有八萬諸天密證無生何云無三根為生三慧三道故聲聞緣覺菩薩十二行法輪者有二一教二行教十二者即示勸證是也行十二者三轉皆生眼智明覺又教十二為能轉行十二為所轉十二行是輪十二教非輪言是輪非輪者輪以摧碾為義唯教為行豈能摧惑若不摧惑亦無輪名若作二輪義眼智明覺者約四十八法於上下四諦開此四心即眼智明覺成十六心謂苦法忍為眼苦法智為智苦類忍為明類智為覺忍因智果也餘三諦亦爾故成十六心三根人各得十六心故成四十八行也十二諦約三轉各四諦是教法輪十二行是行法輪教輪則能轉唯是一權智所轉則有十二教也若行法輪能轉之教有十二所轉之行亦十二或通三人或約一人今就見道三人利根聞示轉即生眼智明覺三人合舉故言十二行也沙門等所不能轉者沙門不聞尚不能知何況能轉婆羅門雖聞其名不解其理魔梵亦爾夫轉者轉此法度入他心令彼得悟破六十二見乃名轉法輪為無此義魔梵等所不能轉小乘四諦以生滅為體大乘以無生為體十二因緣者還是別相細觀四諦耳約苦集即有無明老死約道滅即有無明滅乃至老死滅也涅槃經云十二因緣下智觀者得聲聞菩提中智觀者得緣覺菩提上智觀者得菩薩菩提上上智觀者得佛菩提二聞法得道佛於天人大衆之中説是法時初會説諦緣時六百萬億那由他人以不受一切法故而於諸漏心得解脫皆得深妙禪定三明六通具八解脫第二即方等大乘第三般若第四即後説法華説法時千萬億恆河沙那由他等衆生亦以不受一切法故而於諸漏心得解脫從是已後諸聲聞衆無量無邊不可稱數僭補曰以不受一切法故而於諸漏心得解脫者蓋受即是苦不受則於諸漏心得解脫理固然耳梵語三昧此云正受不受諸受名正受也問衆生根塵識念念起滅三受熾然何能不受答首楞嚴云見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體行者若能於此如實信解深自研窮悟明實相則無受無受者不受亦不受是名不受一切法而於諸漏心得解脫悟明實相也又經敘四時不及華嚴何也乃是闕文理必具也從是已後聲聞無量不可稱計者明聞法得道者多不可稱量計數須知此等聲聞皆是大聲聞與十六王子行輩具經五昧後同聞法華者所謂我等今日真是聲聞以佛道聲令一切聞非齊教聲聞也一轉半字法輪竟第二王子重請轉滿字法輪二初出家等七段二正結緣初七段中一出家二請法三所將亦出家四佛受請五時衆有解不解六説法七説已入定今初爾時十六王子至求阿耨多羅三藐三菩提諸根者六根也六根清淨故言通利又六根互用故言通入佛境界故言利智慧明了者開示悟入佛知見也二請法俱白佛言至深心所念佛自證知彼佛初説圓頓諸子大乘功德悉皆具足愍諸方便重請佛開權顯實也聲聞皆已成就者明其障除機動是故為請我等志願如來知見者此法華經但明佛之知見唯志於此即正請滿字廢半之文明顯若此也三所將亦出家爾時轉輪聖王至王即聽許四佛受請爾時彼佛受沙彌請至皆共受持諷誦通利過二萬劫者上施三既久不容中間無事望下文意二萬劫中必説方等般若文云説六波羅蜜及諸神通事般若是行神通是事諸方等經多明不可思議事行也頌中又云分別真實法即是大品明實相般若意也五時衆有解不解説是經時至千萬億種皆生疑惑十六沙彌信受及二乘即信得解者其餘千萬皆生疑惑是不解衆此不解衆即與十六子結法華之緣者也六八千劫説法佛説是經於八千劫未曾休廢七説已入定説此經已即入靜室住於禪定八萬四千劫明説法已入定正是結緣之近由由佛入定不出諸疑惑衆無所咨問十六於後為不解者覆講説經也文中明入定處所即是靜室正入定即是住於禪定入定時節即是八萬四千劫云云云云者此中具明時節之意諸佛奚嘗不與定俱但由物機在十六子結緣齊限須爾許時具如次文所述者是一出家請法等七段竟第二正結緣就此有二先法説結緣次譬説結緣就法説有三第一明昔日共結緣第二明中間更相值遇第三明今還説法華第一有四一者知佛入定二者王子覆講三者衆得利益四者佛從定起稱歎十六菩薩由佛入定所以得説佛知一化將畢不復熟此段之人故令王子共其結緣又知此等必由王子究竟得度所以入定久而不出也今初是時十六菩薩沙彌知佛入室寂然禪定二王子覆講各升法座至廣説分別妙法華經三説法利益一一皆度六百萬億至三藐三菩提心皆發菩提心故云度若初發心時誓願當作佛已為度竟不用於一佛乘分別説三也四佛從定起稱歎勸信此中復二一正稱歎十六菩薩大通智勝佛至開示衆生令入其中二勸物親近汝等皆當數數親近至三菩提如來之慧一昔日結緣竟第二明中間常相逢值佛告諸比丘至于今不盡逢值有三種若相逢遇常受大乘此輩中間皆已成就不至于今若相逢遇遇其退大仍接以小此輩中間猶故未盡今得還聞大乘之教三但論遇小不論遇大則中間未度于今亦不盡方始受大乃至滅後得道者是也問如上塵數多許時節今始得羅漢當知無生法忍何易可階答一云大聖善巧依四悉檀作如是説或説佛道長遠或説佛道易成對治厭長者説短生輕易想者説長或為發生宿善或隨世所欲或為聞説長短即得入第一義當知皆是權行四悉引諸實行令入道耳二中間常相值竟第三明今日還説法華此文復二一先會古今後明還説法華先會古今復二一結師之古今二會弟子古今今初諸比丘我今語汝至成阿耨多羅三藐三菩提十六沙彌是古八方作佛是今也次會弟子古今又二一會現在弟子諸比丘我等為沙彌時至聲聞弟子是也現在復四一不退者住三菩提也二此諸衆生退轉者今住聲聞三所以者何下釋漸入之意四爾時所化下正結古今四段如文不須分釋也二會佛滅度後弟子我滅後復有弟子至除諸如來方便説法疑者云現在者得聞佛説法華得入一道可以入結緣之流未來者不聞法華而入滅度此豈能捨小得入一乘釋云雖云滅度終會得聞我於餘國作佛得聞是經餘國者三乘通教有餘國也除諸如來方便説者斷疑也三是方便説其實無三也一會古今竟第二明今日還説法華又三一時衆清淨二正説法華三釋前施三意今初諸比丘若如來自知涅槃時到至深入禪定涅槃時到者諸佛出世教道將畢之時即説此經如迦葉佛日月燈明等説此經竟即入涅槃釋迦説法華竟仍唱當滅衆又清淨者得三藏教益免難也信解堅固者於方等教心相體信也了達空法者聞般若教於空法中心得了達即轉教意也二正説法華便集諸菩薩及聲聞衆至唯一佛乘得滅度耳集菩薩是聚親族等説此經也上釋親族是法身大士為影響衆以此文驗之其義明也集諸菩薩是會親族及聲聞衆是命其子也三釋施三意比丘當知至是人若聞則便信受問若無二乘得滅度者何故如來前説權教謂如來知衆生有小性欲著五塵弊五濁故先説三令破弊免難後説一也一法説竟僭補曰此經化城寶所之譬為二乘説華嚴亦有其義為第八不動地菩薩説二經宜合觀之方知權實修證之門不滯半塗也第二譬説結緣有開有合開譬為二第一導師譬譬上覆講共結大緣第二將導譬譬上中間相遇今還説法華也若中間相逢從我聞法皆為三菩提者不為此人設譬若中間相逢于今有住聲聞地者正為此人設譬也就初導師譬其文有五一五百由旬譬譬上未度之衆樂著諸有輪回處所二險難惡道譬譬上未度之衆煩惱垢重於如來智慧難信難解三若有多衆譬正譬上百千萬億種皆生疑惑不解之衆生也四欲過此道至珍寶處譬譬上聞覆講法華之衆大乘機發欲至寶所五者一導師譬譬上第十六王子也今初五百由旬譬譬如五百由旬五百由旬者三界果報處為三百有餘國處為四百實報國處為五百下文合譬云知諸生死生死即是五百處所明矣但佛旨難知更須廣解見惑為一百五下分為二百身見戒取疑貪嗔五上分為三百掉舉慢無明色染無色染塵沙為四百無明為五百下文合譬云煩惱險難惡道義相扶也入空觀能過三百入假觀能過四百入中觀能過五百下合文云善知險道通塞之相即雙知因果二種五百義相扶也二險難惡道譬險難惡道曠絶無人怖畏之處險難惡道者譬生死因果也分段變易此即果險難也見思五住即因險難也由此因果故言惡道也無人者道有二種一曠絶有人可依二無人可依譬生死中有涅槃煩惱中有菩提雖復曠絶則有人可依若生死煩惱無涅槃菩提藥中無病病中無藥此則曠絶無人可依也三多衆譬若有多衆多衆者此譬王子所化未度之衆也四欲過險道譬欲過此道至珍寶處大乘機發欲過此險道至於佛果故言至珍寶處五有一導師譬有一導師聰慧明達善知險道通塞之相導師者即第十六王子本師釋迦也眼耳清淨曰聰意清淨曰利總而言之即六根清淨也智即一心三智也明即具足五眼也僭補曰善知險道通塞之相者明險無險曰通無險見險曰塞迷悟通塞之相導師皆知第一導師譬竟第二將導譬文為三一所將人衆譬譬本結緣未得度者本緣不失而為導師所將二中路懈退譬譬上中間相值退大接小化城止息三滅化引至寶所譬譬上還為説法華經即與火宅等賜大車方便中但説無上道意同也今初所將人衆譬將導衆人欲過此難所將人衆者通是結緣之衆也若別論者昔得大益被將已竟未得大益正是所將若約五百人三十子則未得開悟之人也二中路懈退譬文為二一退大二接小退大擬上息一接小擬上施三退大文為三一中路懈退即擬上無大機二白導師言擬上不受勸誡我等疲極即是不受勸門而復怖畏即不受誡門三不能復進者即擬上息化也今初中路懈退所將人衆中路懈退中路者非是半途名中路但以發心為始至佛為終此兩楹間而起退意故名中路二白導師白導師言我等疲極而復怖畏白導師者自有通途慈悲導師如文云有一導師將導衆人者是也自有結緣導師如文云所將人衆白導師言是也自有權智導師如文云導師多諸方便者是也自有實智導師如文云導師知此人衆是也今言白導師者正白結緣之導師也以其退大則大滅接小則小生一生一滅感於法身呼此為白王子知其退大即是聞其所白善根微弱無明所翳故言疲極憚生死名為怖畏三不能復進不能復進前路猶遠今欲退還不能復進前路猶遠者見思塵沙無明難可卒斷也然用小乘接之不令退還人天亦有進義一退大竟第二以小接三一傷其失寶譬知有小無大也導師多諸方便至云何捨大珍寶而欲退還二化作城譬正用方便有二一正化作作是念已至化作一城上車譬云吾為汝等造作此車今城是有故須先作也二説化告衆人言至若能前至寶所亦可得去説化城譬擬上勸示證也汝等勿怖莫得退還者勸轉令前進入城也今此大城乃至隨意所作者是示轉示城可住也若入是城快得安隱是證轉讚城安隱也前至寶所亦可得去者但於今佛未開顯之前不得彰灼而有此語若論宿世應有是言何者既知退意王子教化言汝等若畏生死且取涅槃消息然後更行大道亦可隨意亦如今人欲學大乘而畏怖生死欲起退心有人勸言汝且斷煩惱證羅漢然後更取大道亦可得也三入城譬譬三乘悟入是時疲極之衆至生安隱想大歡喜即聞慧未曾有即暖位免惡道即頂位快安隱即忍位前入城即見諦位已度想即無學位此與火宅適子願勇鋭推排出宅同也生已度想如得盡智安隱想如得無生智又具智德如已度證斷德如安隱也二退大接小化作城竟第三滅化引至寶所譬寶所者大經有三文一至菩提心二至菩提三至大涅槃門若至菩提心必至菩提及涅槃引此三文者至菩提心謂至因菩提涅槃謂至果果中有智斷菩提是智涅槃是斷具説始終具説智斷故説三文也然過五百有三義一免惡道二得好路三是寶所菩提心謂度惡道菩提行如平坦路三得佛道如至寶所下文云今為汝説實汝所得非滅此明度五百惡道也為佛一切智當發大精進謂行菩提好道也汝證一切智十力等佛法謂得佛道也何故要須度五百二乘度三百菩薩度四百佛乘度五百也此中有二一知息已爾時導師知此人衆既得止息無復疲倦既得止息無復疲倦者譬上涅槃時到衆又清淨免難大機發也二向寶所即滅化城語衆人言至為止息耳即滅化城引向寶所譬上正説法華示真實相寶所有二義若用究竟則以極果為寶所上文云唯佛與佛乃能究盡諸法實相也若分入即以初發心住為寶所故上文云無上寶聚不求自得又云得佛法分佛子所應得者皆已得之寶處在近向者大城我所化作即舉廢權譬以帖顯實譬也上云如來智慧難信難解是諸人等應以是法漸入佛慧問車城皆譬無生智車何故無城何故有而車三城一車動城靜答長者道門外有車有隔故諸子不見可得假設門外有車車實無也城在迥地不得假設故城是有也就理教者執三教取理則三教皆得理此即有義如城也將理取教理既唯一此教即無如車也問化為三車與化城何異答三車為説法輪作譬化城為神通輪作譬又車約聲作譬諸子聞而不見城為色作譬故諸子入城生安隱想也二將導譬竟問凡五處開三顯一為有何異答通論無異別論有差一方便品約教開三顯一文云如來但以一佛乘故為衆生説法無二亦無三也二火宅約行開三顯一車是運義運則譬行文云各乘大車遊於四方嬉戲快樂也三信解中約人開三顯一結會傭作之人即是長者之子我等昔來真是佛子也四藥草喻中約差別無差別明權實不的去取但明衆生不知佛令其知若七種差別即知權同依一理無差別即知實差別無差別無差別而差別令知此意耳終不説言無一有一此約自行權實二智隨自意語故佛能知而衆生不知也亦是通前通後知不知明權實也通前通後者總明通前四品通後化城知不知之義也五今化城正約理開三顯一寶所化城皆是小大兩理破除二乘化理顯於寶所真實一理也下去五百領解舉珠為譬亦是約理也以上開譬竟第二合譬先正合次舉帖合初二一合導師諸比丘如來亦復如是至應去應度如來合上導師譬汝等合上諸人衆譬知諸生死煩惱惡道險難合上險惡道譬長遠二字合上五百由旬譬應去應度者合上聰慧明達欲過險道至珍寶處譬二合將導譬有三一合於大無機若衆生但聞一佛乘者至久受勤苦乃可得成若衆生三字合所將人衆譬也但聞一佛乘不欲見佛乃至久受勤苦乃可得成合中路懈退譬也上譬本有退大接小今具合之上退大有三意但聞一佛乘者合上中路懈退無機意也不欲見佛不欲聞法合上白導師不受誡勸也便作是念者合上不能前進息化意也二合上退大接小佛知是心怯弱下劣至説二涅槃佛知是心合上導師多方便擬宜意也怯弱下劣者合上此等可愍知有小機也而於中道為止息故者合現作化城衆人入城譬也而於中道説二涅槃者三界惑盡塵沙無明未破於此兩楹判有餘無餘涅槃亦是聲聞緣覺涅槃又分段已盡變易未除二死之間判為有餘無餘故言中道三合破其住小將向寶所譬若衆生住於二地至於一佛乘分別説三一正合竟第二牒譬帖合牒接退譬來合施三牒滅化譬來合顯一如文如彼導師為止息故至此城非實我化作耳第一長行竟第二偈頌有四十九行半偈為二初二十二行半頌結緣之由次二十七行頌第二正結緣上由有近遠初頌上遠由次頌近由遠由有二初頌大通成道次頌十方梵來請轉法輪今初三行頌將成道前事爾時世尊欲重宣此義而説偈言大通智勝佛至更雨新好者二一行頌正成道過十小劫已乃得成佛道諸天及世人心皆懷踊躍三二行頌十六王子請轉法輪兼頌成道已眷屬申供養略不頌佛壽長遠也彼佛十六子至充我及一切初大通成道竟次六行頌十方梵請有二今初一行威光動耀世尊甚難值久遠時一現為覺悟羣生震動於一切二五行頌十方梵尋光而來此中前三行頌東方次二行總頌九方也東方諸世界至轉無上法輪一遠由竟第二有十行半頌近由文二初五行頌轉二乘法輪次五行半王子重請轉大乘法輪初文又三今初半行頌第一受請無量慧世尊受彼衆人請二一行半頌第二正轉二乘法輪為宣種種法至汝等應當知三有三行頌時衆聞法得道宣暢是法時至不能得其邊初五行轉小竟第二五行半王子重請轉大中有五初二句頌王子出家時十六王子出家作沙彌二一行半頌正請轉大乘皆共請彼佛至慧眼第一淨三二行頌二萬劫中間説方等般若佛知童子心至菩薩所行道四半行正頌受請説法華説是法華經如恆河沙偈五一行頌説經已入定彼佛説經已靜室入禪定一心一處坐八萬四千劫已上頌結緣之由竟第二有二十七行頌正結緣為二初八行頌法説次十九行頌譬説上法説有三初三行頌第一昔結因緣次一行頌第二中間相值三有四行頌第三今日還説法華今初是諸沙彌等至恆河沙等衆二一行頌中間相遇彼佛滅度後是諸聞法者在在諸佛土常與師俱生三有四行頌今日説法華上文二初結會古今有現在未來今初三行頌結會現在師弟也是十六沙彌至引汝趣佛慧二一行頌還説法華以是本因緣今説法華經令汝入佛道慎勿懷驚懼頌上法説竟第二有十九行頌譬説譬有開合初十一行半頌開譬後七行半頌合譬上開譬為二初三行頌五百由旬譬譬如險惡道至在險濟衆難初一行頌上第二險惡道二半行頌上第三多諸人衆三半行頌上第一五百由旬次時有一導師一句頌上第五一導師後三句頌上聰慧第二有八行半頌合將導譬又三第一行初一句頌合所將人衆次三句頌合中路懈退衆人皆疲倦而白導師言我等今頓之於此欲退還二五行作化接退有二初三行方便設化導師作是念至男女皆充滿諸舍宅者諸空觀境也園林者二乘總持無漏法林也九次第定為渠流八解為浴池重門是三空門又是重空三昧盡無生智為樓閣高出也男女是定慧也觀心解者智體周備如城隍善法圓足如郭之圍繞畢竟空為舍宅直善能成自行如男能幹家事慈悲化外如女外適重空三昧者大論云空空無相無相無願無願觀心釋化亦須約圓次兩行頌合上勸入城歡喜即作是化已至自謂已得度初一偈頌勸次一偈頌入城歡喜生安隱想三兩行半頌上滅化至寶所上文有二今初一句頌第一知息已次集衆下第二二行一句頌滅化引向寶所也導師知息已至當共至寶所上頌開譬竟第二七行半頌上合二譬初半行頌合第一五百譬次七行頌合第二將導譬今初上合五百由旬者即此半行總頌而已我亦復如是為一切導師次七行頌合將導譬有三初兩行頌合懈退譬見諸求道者至所作皆已辦初一行合中路懈退次一行頌合接退作化也二四行頌合上滅化至寶所有二初半行頌上知息化既知到涅槃皆得阿羅漢次三行半頌合滅化引向寶所也爾乃集大衆至乃是真實滅合息化偈中即有三德祕密藏義汝證一切智即是般若具三十二相即是法身乃是真實滅即是解脫三法不縱不橫即是見佛性也後一行頌帖合也諸佛之導師為息説涅槃既知是息已引入於佛慧化城喻品竟先申品目次釋經文今初妙法蓮華經五百弟子受記品第八釋五百弟子受記品此品具記千二而標五百者何五百得記名同五百口陳領解故以標品耳次釋經文此品是因緣説中受記段就得記二一本品授千二百二後品授二千千二百復二一授滿慈二授千二百滿慈復二初序默領解二如來述記初復二先敘其得解歡喜次敘其默念領解歡喜復二一敘其得解之由二敘其得解歡喜得解之由有四意初聞法譬二周開三顯一二授身子等五大弟子記三復聞宿世結緣之事四復聞諸佛如來三達無礙觀彼久遠猶若今日即是大自在神通之力斥異二乘止齊八萬也今初敘得解之由爾時富樓那至復聞諸佛有大自在神通之力若從佛聞是智慧即領方便火宅中顯實方便隨宜所説即領兩處開權諸大弟子即領開權授菩提記即領顯實宿世因緣即領顯實神通之力即領開權也二敘其得解歡喜得未曾有心淨踊躍至瞻仰尊顏目不暫捨得未曾有二句明內解歡喜即從座起下六句明外形恭敬由昔未聞開權顯實而今得聞故言得未曾有除涅槃愛斷破別惑故言心淨開佛知見是故踊躍得解由佛故起恭敬頭面禮足瞻仰不捨也第二正明默念領解有二初默念領解二明默求發迹請記今初而作是念至我等於佛功德言不能宣上二周得悟皆發言領解此何默念上為下根未悟事須彰言勸動今下根已悟無所勸動故默念不言又上來但領解不求發迹言則不嫌今則亦解亦發亦解故念避物譏嫌故默默念允宜也又默念領解是大領解如淨名默然是真入不二法門也又權實不可思議非言非念而言而念非言而言故上來口陳領解亦非念而念故今則默念領解上來何不求發迹為下根未悟是故不求發迹今下根已解權化事足也若下根發迹則知中上亦權若約上中則於下不便故也世尊甚奇特所為希有者領實智也隨順世間若干種性而為説法即領權智也是七種方便之根性也此領方便品中開權顯實意也拔出衆生處處貪著者即是領火宅中開權顯實也我等於佛功德言不能宣者領上藥草喻中如來有無量功德汝等言不能及既云言不能及則念亦所不及也二默念求發迹請記唯佛世尊能知我等深心本願我等者通念請發諸人迹也深心是本今現在是迹本願者大慈誓願也大慈下化故我為誓上求作佛故我有願請上求即是求記請下化即求發迹又從深心故明其三世助佛宣化從本願故即與授記也初敘默領解竟第二佛述而記之有長行偈頌長行有二一述本迹二與授記初有三一就釋迦世行因發迹二約過去佛世行因顯本三就三世佛所修因行滿就釋迦佛所行因發迹復三一舉示其人二總標本迹章三別釋本迹今初爾時佛告諸比丘汝等見是富樓那彌多羅尼子不標言汝等見不有二意一見其迹為小不二見其本功德不衆人但見迹為聲聞而不能知其本是大菩薩故問見不二總標本迹我常稱其於説法人中至亦常歎其種種功德我常稱其下是標其迹迹為説法人中最為第一若非法身妙本無以垂於第一勝迹此舉迹以顯本也亦常歎其下標其本地福慧萬行法門故云種種也本地既有種種功德何以迹為二乘耶此舉本以明迹也三別釋本迹精勤護持助宣我法至無能盡其言論之辨助宣我法者即是垂迹助宣半滿之法迹為下根聲聞即是護持助宣酪法迹在方等示受彈訶即是護持助宣生酥法迹領般若即是護持助宣熟酥法迹在法華得悟即是護持助宣醍醐法上總標本迹中云我常稱歎種種功德者即此意也具足權實功德而迹示五味助佛調熟實行衆生豈非精勤助宣之意也別釋本迹功德能於四衆示教者分別半字教也具足解釋者助宣滿字般若教也而大饒益者助佛饒益半滿之衆生也同梵行者是迹所化半滿弟子也自捨如來下別述本地功德自捨者等覺已降無能盡其無礙辨才故歎於説法人中最為第一也第二就過去佛世顯其本行汝等勿謂富樓那至常作佛事教化衆生二就過去佛世顯其本行非直止於我所助宣半滿之法久遠佛所亦復助宣半滿之法取今日助宣為發迹取過去助宣為顯本顯本有二一遠本二近本遠本冥邈為信良難故略而不述但舉九十億近本有宿命智能知近本故舉近而證遠就九十億文具明助佛宣揚五味之教調熟衆生護持明宣即擬助宣半字酪味法佛之正法即擬助宣方等生酥味法又於空法明了者即擬助宣熟酥味法亦如今佛轉教説於般若明六波羅蜜互相收攝旋轉無礙九十億佛所亦助宣揚如今無異彼佛世人咸皆謂之實是聲聞于時既未發迹但謂被加命轉般若不言是大菩薩也化無量衆生令立三菩提者即是助宣醍醐味法在文可解第三約三世佛所修因諸比丘富樓那至常勤精進教化衆生三約三世佛所修因如文此亦例前助宣半滿五味之法利益大小也一述本迹竟第二與授記文七一漸漸具足一句明因圓二過無量下明果滿漸漸具足菩薩之道至天人師佛世尊三明國土廣淨四明國劫名字五明佛壽量六明法住甚久七明佛滅後供養舍利就第三國土廣淨中復五一明國大嚴淨其佛以恆河沙等至兩得相見地平如掌者經直言如掌不言手掌手掌不平則非所引海底有石名掌此石無有一微塵許不平當是類如海掌石耳又賢劫經正明如佛手掌非引人掌也二明純是善道無諸惡道亦無女人一切衆生皆以化生無有淫欲純是善道者於中亦有差品不同若無女人必無惡道或時有女人亦無惡道如阿閦佛國雖有女人而無女事無量壽國二種俱無所謂諸上善人俱會一處法明如來國土亦復如是三明人天福慧具足得大神通至二者禪悅食月藏第九法食喜食禪食經文總言法喜禪悅別分應有三種差別四明菩薩聲聞衆數甚多有無量阿僧祇至及八解脫五總結也其佛國土有如是等無量功德莊嚴成就第三國土嚴淨竟第四明國劫名字劫名寶明國名善淨第五明佛壽量其佛壽命無量阿僧祇劫第六明法住甚久法住甚久第七明佛滅後供養舍利佛滅度後起七寶塔遍滿其國一長行竟二偈頌有二十一行半頌上發迹授記初有十四行頌發迹次七行半頌授記初復二前七行總發諸聲聞迹頌上我等之意也後七行頌上發滿慈迹總中有五初一行總標佛子為行難思已得垂迹之法爾時世尊欲重宣此義而説偈言初一行誡聽諸比丘諦聽佛子所行道善學方便故不可得思議二一行明垂迹之由知衆樂小法而畏於大智是故諸菩薩作聲聞緣覺三兩行明垂迹利益以無數方便至漸當令作佛小欲者示求小乘也懈怠示退大乘也四兩行明內懷大道外現小失內祕菩薩行至方便度衆生非但示為聲聞亦示作外道及三毒凡夫也身子示瞋難陀示貪調達示癡皆此類也五一行指略抑廣若我具足説種種現化事衆生聞是者心則懷疑惑初總發諸聲聞迹竟第二七行頌發滿慈迹上本文有三今略頌二初五行頌顯過去本今此富樓那至而自淨佛土二有二行頌三世佛所行因略不頌七佛及現佛也未來亦供養至成就一切智初十四行頌發迹竟第二七行半頌授記上文有七今頌其四初半行頌因圓次半行頌果圓其國名善淨下三句超頌國劫名號菩薩衆甚多下五行三句頌國土廣淨略不頌壽命法住滅後起塔也供養諸如來至我今但略説與富樓那記竟第二授千二百記有長行偈頌長行有三一念請二與記三領解今初爾時千二百阿羅漢心自在者至不亦快乎二與記有長行偈頌長行三一總許千二百記佛知此等心之所念至三菩提記二別授陳如於此衆中至天人師佛世尊陳如最初悟道居僧上座故別授記陳如等者問若其居首別記何不初周記耶答大小緣別兩初不同引物希向二意各異垂迹之法不可一準僭補曰兩初者法説初授舍利弗記因緣説初授陳如記也三別授記五百其五百阿羅漢至名曰普明佛記五百阿羅漢同名普明故須別與記而品亦依此立名也問但見五百得記不見千二百答此五百即千二百數頌中末後一行半總受七百故是千二百也又持品云我先總記一切聲聞皆已授記即指今一行半非是止授七百聲聞也二偈頌有十一行為二初九行半頌記陳如及與五百後一行半總授一切聲聞記爾時世尊欲重宣此義而説偈言憍陳如比丘至汝當為宣説二與記竟三五百領解文有長行偈頌長行二先經家敘其歡喜次自陳領解今初爾時五百阿羅漢至悔過自責次自陳領解有二一法説二譬説今初世尊我等常作是念至而便自以小智為足從世尊乃至滅度是悔責昔迷得少為足不知求大從今乃知之是責根鈍始悟不早知之如無智者下自釋知之之意二譬説有二一開譬二合譬初開譬又二一者醉酒譬譬法説自悔得少為足不知求大領前法譬宿世中施權意二者親友覺悟譬譬法説自責根鈍難悟今乃知之領前法譬宿世中顯實就初復三意一者繫珠譬領上王子結緣二者醉臥不覺譬領上遇其退大三者起已遊行譬領上接之以小今初繫珠譬世尊譬如有人至繫其衣裏與之而去譬如有人者即二乘人也親友者昔日第十六王子也家即大乘教為家也醉酒而臥者當于爾時大機暫發無明暫伏以得聞經內心微解以無明重故還復迷失醉有二義一重醉都不覺知二輕醉微覺尋忘亦名不覺雖有二義終成繫珠如毒鼓耳官事當行者明王子餘處機興逗緣應往故云當行弘法化他此非私務故云官事無價寶珠者一乘實相真如至寶也繫其衣裏者慚愧忍辱能遮瞋恚及防外惡即是外衣信樂之心內裏善根即是內衣于時聞法微信樂欲即了因智願種子也二醉臥不覺其人醉臥都不覺知醉臥不覺知者無明心重尋復不憶此領中間懈退不受大法也三起已遊行起已遊行到於他國至便以為足遊行他國者領上中間接之以小受三乘化也善根欲發厭苦求樂故云起已遊行無明覆解不知向本求大乘衣食故言向他國求於小乘衣食若魔佛相望生死魔界為他國佛法大小皆為本國就小大相望小乘未免生死猶是他國大乘永免生死乃為本土究竟還源也明背大乘國往小乘土不知從珠取給而傭作自資獲一日價得少為足也第二親友發覺譬領上以是本因緣今説法華等賜大車也於後親友會遇見之至常可如意無所乏短文三初訶責二我昔欲令汝得安樂下示珠三汝今可以此寶下勸貿訶責譬上動執生疑示珠譬宿世因緣勸貿譬得記作佛三周皆有此三意法説中我令脫苦縛即是訶責五佛章即是開示身子得記即是勸貿譬説中我先不言皆為菩提即是訶責三車一車即是示珠中根得記即是勸貿下根宿世因緣汝等善聽即是訶責覆講結緣還為説大即是示珠下根得記即是勸貿繫珠中三意望三周者始在佛樹以大擬即是繫珠無機息化即是醉臥尋施方便即是起行譬喻中二萬億佛所即是繫珠遣傍人追悶絶不受即是醉臥三車引得即是起行因緣中大通智勝佛所即是繫珠中路懈退即是醉臥接之以小即是起行此等皆名領解權也某年日月者指大通佛所也一開譬竟第二合譬有二初合繫珠譬佛亦如是至資生艱難得少為足文有三意從教化我等下合初一繫珠而尋廢忘合二醉不覺知既得羅漢下合三起遊行二合後親友覺示譬一切智願猶在不失至甚大歡喜得未曾有文三一智願不失者是合訶責二我久令汝下合示珠三我今乃知下合勸貿所須也第二偈頌有十二行半為二初一行半頌內心得解又二初一行頌慶喜次半頌悔責也爾時阿若憍陳如等欲重宣此義而説偈言我等聞無上至自悔諸過咎二有十一行頌自陳領解上文有二今初半行頌悔責得少為足於無量佛寶得少涅槃分次半行頌略舉譬便自以為足頌釋無智意如無智愚人便自以為足次十行頌譬説開合初六行頌開後四行頌合上開有二今初四行頌捨寶不知次二行頌親友覺悟後四行易見譬如貧窮人至五欲而自恣我等亦如是世尊於長夜常愍見教化令種無上願繫珠我等無智故不覺亦不知得少涅槃分自足不求餘醉臥今佛覺悟我言非實滅度得佛無上慧爾乃為真滅示珠我今從佛聞授記莊嚴事及轉次受決身心遍歡喜得珠歡喜五百弟子受記品竟先申品目次釋經文今初妙法蓮華經授學無學人記品第九釋授學無學人記品研真斷惑名為學真窮惑盡名無學又研修真理慕求勝見在三果四向得真無漏慧名為學阿羅漢果研理已窮勝見已極無所復學名無學也約教釋品者析法研真名之為學惑盡真窮名為無學三藏意也體法研真名之為學無真無惑名為無學通意也自淺之深名之為學通別惑盡權實理窮名為無學此別意也研如來藏有學與無學法性實相非學非無學而學而無學是二千人或是學或是無學人同是一流一時受記同一名號故別為一品也次釋經文此品是授記文中第二段也就此文為二一請記二授記請中復二一者二人請二者二千人請二人請記復有二一默念爾時阿難至設得授記不亦快乎二者發言請記復二一者引例亦應有分即從座起到於佛前至唯有如來我等所歸二者引望又我等為一切世間天人至我願既滿衆望亦足二人最親時衆所望羅云是佛子俗中親重阿難持佛法藏道中親勝勝重兩人不蒙別記則衆望不足也問若重若勝應同上流何意在此若如列衆二人在上數中獲記何意居下答總與千二百記二人已同上流今更索別記耳阿難是學人羅云弟子位故入學無學章也初二人請記竟第二二千請記但有默念引例二意同故言如阿難羅云願耳無發言者無重無勝等事也爾時學無學聲聞弟子二千人至住立一面一請記竟第二授記復二一先記二人後記二千阿難記中復五一長行二偈頌三八千菩薩生疑四如來發迹釋疑五阿難顯本述歎今初爾時佛告阿難至而説偈言二偈頌五行我今僧中説至種佛道因緣三八千菩薩生疑爾時會中新發意菩薩八千人至得如是決四如來發迹釋疑爾時世尊知諸菩薩心之所念至故獲斯記佛即發迹釋疑昔日與我同發大心即是同學由我精進前超得佛由彼多聞猶故持經迹為侍者本地如此今授妙記何足可疑五阿難顯本述歎阿難面於佛前至而説偈言世尊甚希有至護持諸佛法初記阿難竟次記羅睺羅爾時佛告羅睺至而説偈言我為太子時至以求無上道後記二千人爾時世尊見學無學二千人至而説偈言是二千聲聞至如甘露見灌授學無學人記品竟先申品目次釋經文今初妙法蓮華經法師品第十釋法師品此品五種法師一受持二讀三誦四解説五書寫大論明六種法師信力故受念力故持看文為讀不忘為誦宣傳為説聖人經書難解須解釋成六種法師今經合受持為一合解説為一開讀誦為二足書寫為五別論四人是自行一人是化他通論若自軌五法則自行之法師若教他五法則化他之法師自軌故通稱弟子化他故通稱法師今從通義故名法師品若束為三者受持是意業讀誦説是口業書寫是身業別論口業是化他身意是自行通論三業自軌即是自行之法師三業教詔即化他之法師故言法師品又是三門行此五法以自熏修即福德門弘宣五法廣利一切即化他門自修益彼皆順佛教即報恩門又是三法讀誦書寫是外行即如來衣受持是內行即如來座解説益他是如來室如來室別論是匠他衣座別論是自匠通論不爾慈悲覆物惠利歸己名之為室遮彼惡障己醜名之為衣安心於空方能安他安他安己名之為座此則自軌三法亦名法師又利物必以慈悲入室為首涉有以忍辱為基濟他以亡我為本能行三法大教宣通即世間依止故名法師又慈悲勝一切聲聞緣覺柔和勝一切凡夫外道空座勝析體偏等菩薩故淨名云譬如勝怨乃可為勇又慈悲破天魔柔和破陰魔空破煩惱魔死魔大品云化一切衆生觀一切空魔不得便經言一切善法慈為根本忍辱第一道無相最上若論圓行説不可盡稱法師者法軌則也師訓匠也法雖可軌體不自弘通之在人五種通經皆得稱師舉法成其自行皆以妙法為師師於妙法自行成就故言法師又五種人能以妙法訓匠於他故舉法目師故稱法師品也若自軌法若法匠他俱名法師者則因緣釋品也凡多種解皆約圓教法門釋品也前三周是迹門正説領解受記竟此下五品是迹門流通非止蔭益當時復欲津洽來世故有五品流通法師寶塔兩品明弘經功深福重流通達多一品引往弘經彼我兼益以證功德深重持品八萬大士忍力成者此土弘經新得記者他土弘經安樂行一品舊云接退流通以外凡初心欣斯勝福願末法弘經見聲聞畏憚聞菩薩擯辱僭補曰聲聞畏憚者如淨名彈折去華拜座等故佛令問疾皆答云彼上人者難為酬對皆畏憚之意也菩薩擯辱者藏通菩薩別教地前及圓外凡列為七方便不測佛智是擯辱之意也顧己力弱無益自他便生退沒佛為此人説安樂行依之弘法不慮危苦又法師品釋尊自説弘經功福命覔流通寶塔品多寶分身且證且助勸覓流通言外凡至不慮危苦者外凡五品欣弘通之福見聲聞畏憚大士被衆擯棄自顧觀力未深失二利之道意欲退者故佛為説四安樂行令無是患遠彼十惱故云不慮且證且助者寶塔證經故來分身助開故集由證由助因募流通次釋經文法師品初長行偈頌歎美五種法師能持法人後長行偈頌歎美所持之法又示通經方軌初復二一就稟道弟子門功深福重二授道師門功深福重弟子門又二一佛世弟子二滅後弟子初因藥王告八萬者因憑寄也欲以妙法憑寄藥王使其領受告語八萬皆流通也指人問見不者的示持經得福之人佛世弟子又二一揀出衆類二揀出得記之緣今初爾時世尊因藥王菩薩至如是等類若於佛前當機妙悟者是多聞深解二千五百者是也皆已現前與總別記竟今所揀類或是八部之類或是四衆三乘之類絓法華座席僭補曰絓古挂字謂暫挂法華座席非當機衆也然本不可測二揀出得記之緣咸於佛前至當得阿耨多羅三藐三菩提咸於佛前者明其時節值佛在座也一句一偈者聞法極少也乃至一念者時節最促也皆與記當得菩提者明其聞極少時極促隨喜之功遂得佛果何況具足得聞盡形受持五種流通三業供養乃至一念等者明乘此念必得菩提遠因不亡藉茲而發不同餘善是故簡之究而論之必須盡行諸佛道法二乘記已尚經劫數然曉其經旨與具足何殊但自行化他令始末耳聞一句一偈者聞少解淺之類今皆與記少者尚記況復多深以少況多普廣若此下周既爾中上亦然可以意知不俟更説見實三昧經別與四天王記同名火持三十三天同名因陀羅幢王拘翼同名無著焰天同名淨智兜率同名釋法王上兩天亦通與記不顯別名梵天名大智力此是聞多解深之類今記聞少解淺之類耳一偈一句者增一集云隨取經中要偈如四諦之流者是也十住毗婆沙云惡賤名厭不求名無欲心無垢名解脫捨擔名涅槃惡賤於集不求於苦無垢是道捨擔是滅又云佛語滿宿我有四句所謂四諦四念處等是也若取迹門中要句開示悟入乘是寶乘遊於四方四安樂行勸發四意等是也勸發四意者一諸佛護念二植衆德本三入正定聚四發救一切衆生之心下疏中亦以四法對開示悟入雖是迹要若顯本已即成本要具如下辨一念隨喜者自未有行但隨喜法及人功報尚多況行到耶隨喜心有二若聞開權顯實即於一念心中深解非權非實之理信佛知見又能雙解權實事理圓融雖具煩惱性能知如來祕密之藏此即豎論隨喜雖未得真隨喜心能如此解法既如此人亦如是此約橫論隨喜即橫而豎即豎而橫故大經云寧願少聞多解義味即此意也後當更説二明佛滅後弟子先出弟子類略舉於人例上可知次言我亦與記功報如前解也佛告藥王至我亦與授阿耨多羅三藐三菩提記一弟子門竟第二師門有長行偈頌長行有二先別後總別者人談上下時談現未總者無論下上及以現未通明逆之得罪順之得福也就別復二一明現世二明滅後就現世又二先明下品師後明上品師下品師為二初明師相次明師功報今初若復有人受持讀誦至乃至合掌恭敬師相者即是五種法師十種供養也十種供養者一華二香三瓔珞四末香五塗香六燒香七幡蓋八衣服九技樂十合掌也次明下品功報也藥王當知至廣演分別妙法華經曾供養者先因深也愍衆生故生此人間明現功大也若有人問下明未來報重也二明上品師亦二先況出上品師相次明上品功報也何況盡能受持種種供養者至廣演此經現世師竟二明滅後師亦有下上下品亦二先出下品人者即是但豎得其意若是善男子善女人至乃至一句有慧無聞止堪竊説未可處衆故是下品之師竊為一人説一句者雖得一句之解既不廣聞多學異義不可衆中而説一切問難有所不通便令正理不得弘宣如釋論明有慧無聞譬如小雨無雷若欲申此一句正言且當竊説耳二明其功報當知是人則如來使如來所遣行如來事經是如智所説説於如理今日行人秉此如教宣於如理即是如來所使也行如來事者如智照如理為事今日行人依如教行如理即是行如來事也一如智一如理化衆生為事今日行人能有大悲以此經中真如之理為衆説令他利益生亦名行如來事也觀心解如來使者智心觀境境即真如境來發智智為如所使也如來所遣者觀智從如中來也行如來事者歷一切法無不真如真如即佛事也二明上品人略不格量功報此意可知也何況於大衆中廣為人説一別明竟第二總明五種法師逆者得罪順者得福也藥王若有惡人至三菩提故此中罪福不論福田濃瘠但約初後心明其輕重初心學人既具煩惱若加障礙則所學事廢故獲罪多佛則平等惡不干逼豈能障礙故言罪輕供養亦爾此人有待若得供養所修事成故施其福勝佛則無待衆事滿足雖復獻供於佛無益故言報劣譬如王子在難供奉所須其功甚大若辱王種獲罪不輕故罪福俱重若獻大王衣食為要事微汝欲侵陵不能致損故罪福俱薄藥王下明讀誦如佛莊嚴即是順之得福佛以定慧莊嚴此人能修定慧故也為如來肩荷者在背為荷在肩為擔修非權非實法身之體即是為如來荷能權能實二智之用即是為如來擔隨所向方應向禮者上明以法為師今明堪為物師此人趣向悉與實相相應皆可敬順順即是向敬即是禮敬而順之與供養等二總明竟第二偈頌有十六行為三初二偈不頌長行別獎勸自行利他爾時世尊欲重宣此義而説偈言若欲住佛道至并供養持者次十三行頌上師門別總後一行歎經頌別總中又二初七行頌別後六行頌總上別門有現未今初四行頌現後三行頌未現未二師各有上下今初一行頌現下品上半出法師下半出功報也若有能受持妙法華經者當知佛所使愍念諸衆生次三行頌現在上品師初半行出上品師第二二行半頌功報也諸有能受持至供養説法者後三行頌未來二初二行超頌況出上品師於中初半行頌法師長行中本闕功報今偈則有二一行半明功報也吾滅後惡世至冀得須臾聞次一行結頌下品師上半行頌出人下半行頌功報也若能於後世受持是經者我遣在人中行於如來事初別頌竟第二六行頌上總門亦二初二行頌逆者得罪二四行頌順之得福也若於一劫中至我今獲大利第三一行歎經尊妙藥王今告汝我所説諸經而於此經中法華最第一上長行偈頌歎美五種法師竟第二歎所持法及弘經方軌所持法是自軌法弘經法是軌他法有長行偈頌長行初歎經法次歎方軌歎法為五一約法歎亦格量歎二約人歎三約處歎四約因歎五約果歎法妙故人貴人貴故處尊處尊因圓因圓果極也今初約法歎爾時佛復告藥王至猶多怨嫉況滅度後初歎法者已今當説此經為最言已者大品已上漸頓諸説也今者同一座席謂無量義經也當者謂涅槃也大品等漸頓皆帶方便取信為易今無量義一生無量無量未還一是亦易信今法華論法一切差別融通歸一法論人則師弟本迹俱皆久遠二門悉與昔反難信難解當鋒難事法華已説涅槃在後則易可信也當鋒者法華在前如大陳難破涅槃在後如餘黨不難初當先鋒斯為不易祕要之藏者隱而不説為祕總一切為要真如實相包蘊為藏不可分布者法妙難信深智可授無智益罪故不可妄説也從昔已來未曾顯説者於三藏中不説二乘作佛亦不明師弟本迹方等般若雖説實相之藏亦未説五乘作佛亦未發迹顯本頓漸諸經皆未融會故名為祕此經具説昔所祕法即是開祕密藏亦即是祕密藏如此祕藏未曾顯説如來在世猶多怨嫉者四十餘年不得即説今雖欲説而五千尋即退座佛世尚爾何況未來理在難化也二約人歎藥王當知至則為如來手摩其頭此法在人則人尊貴如來衣覆者即是修學大忍為衣也上文云如來莊嚴也佛護念者實相為佛實智為子尊崇實相發生實智即為諸佛所護念也四信為信力四弘為願力大智為善根力也信則信理理即法身志願是立行行即解脫善根根固難動此即般若當知三力即是三德祕密之藏初心捿此與佛不殊故名與如來共宿也又信力修畢竟空如來智如來捿畢竟空為舍此人信力亦學畢竟空故與如來共宿手摩頭者此人以願力善力自行權實以為機感機感名頭如來以化他權實二智名手開發前人自行權實之頭感應道交故名摩頭摩頭即授記也三約處歎藥王在在處處至皆近阿耨多羅三藐三菩提此法在處即處貴夫佛生處得道轉法輪入涅槃等處法王所遊皆應起塔此經是法身生處得道之場法輪正體大涅槃窟此經所在須塔供養不復安舍利者釋論云碎骨是生身舍利經卷是法身舍利此經是法身舍利不須更安生身舍利生法二身各有全碎皆可解云云引論證生法二身各有全碎云云者今釋出四相生身全碎如釋迦多寶法身二者諸方便教法身碎也法華一實法身全也四教五時委簡可見故知諸經全碎相半唯此法華法身全耳更無餘法便入實故僭補曰釋迦多寶同坐一塔生身全也諸佛火後舍利為衆生作福田者生身碎也四舉因歎藥王多有人在家出家至乃能善行菩薩之道未善行者稟前三教即是碎散法身舍利未能巧度若入圓教即是全身舍利則是巧度為善行也五舉果歎文為五一明近果二開譬三合譬四釋近五揀非今初其有衆生求佛道者至得近阿耨多羅三藐三菩提當知必得近三菩提果者安樂行中名為近處此菩提果佛眼佛智知見處為體則有二種一者初心菩提二者後心菩提今言近者正近初住菩提又望圓果而修圓因得似解者名之為近前約因歎修通別因即是未善去圓果遠也若修圓因即是善行去圓果近也今以圓如實智為因還以為果道前真如即是正因道中真如即為緣因亦名了因道後真如即是圓果故普賢觀云大乘因者即是實相大乘果者亦是實相釋論云初觀實相名因觀竟名果就理而論真如實相本無因果亦非前後若約衆生修行則有前後及以因果也二開譬藥王譬如有人渴乏須水至其心決定知水必近此譬有觀門教門二釋觀門者衆生之心具諸煩惱名高原修習觀智名穿掘方證理味如得清水依通觀乾慧地如乾土性地為溼土泥見諦為得清水別觀從假入空但見空不見不空斷四住如鑿乾土去水尚遠從空出假先知非假今知非空因是二觀得入中道能伏無明轉見濕土去水則近也圓觀中道非空非假而照空假如漸至溼泥四住已盡無明已伏已得中道相似圓解故言如泥若入初住發真中解即破無明如泥澄清得見中道如見清水法華論云佛性水當知次第次約教門者土譬經教水喻中道教詮中道如土含水三藏教門未詮中道猶如乾土方等般若帶於方便説中道義如見溼土法華教正直顯露説無上道如見泥因法華教生聞思修即悟中道真見佛性所發真慧不復依文如獲清水無復土相故華嚴云十住菩薩初發心時即得菩提知一切法即心自性成就慧身不由他悟也三合譬菩薩亦復如是至必知得近阿耨多羅三藐三菩提於法華中獲聞思修即是圓觀三慧方能近果非乾溼等教中聞思修也四釋得近意也所以者何至成就菩薩而為開示一切菩薩者明諸權因也三菩提者明一切權果也權因權果皆攝屬此經如乾溼等土悉依於水故言攝屬也開方便門示真實相者昔所不説今皆説之昔説一切世間治生産業何曾不是方便今皆開之即是實相不相違背昔説小乘方便及小乘果其小乘果尚非實相門況小方便而當是門令皆開之即是實相汝等所行是菩薩道決了聲聞法是諸經之王昔説二為方便門者今皆開之即是實相寧復是門咸令衆生開示悟入佛之知見一色一香無非佛法若門若非門悉皆開之示真實相顯佛性水若不開者則深固幽遠無人能到而今開之即得見水無乾土也又作三慧釋一切皆屬此經即圓聞慧也此經開方便即圓思慧也示真實相者即圓修慧也此三幽遠佛今開示即得覩真五揀非藥王若有菩薩至當知是為增上慢者若菩薩聞此説驚疑是新發意聲聞是上慢悉是乾土尚非溼土況見水耶上歎所持法竟第二略示弘經方法又為二一示方法二明利益今初藥王若有善男子善女人如來滅後欲為四衆説是法華經者云何應説設問徵起是善男子善女人入如來室著如來衣坐如來座爾乃應為四衆廣説斯經標三法如來室者一切衆生中大慈悲心是如來衣者柔和忍辱心是如來座者一切法空是釋三法安住是中然後以不懈怠心為諸菩薩及四衆廣説是法華經勸修三法修如來室是大慈悲若就同體即法身也若庇蔭衆生即是解脫能令衆生會於同體即是般若修如來衣是柔和忍辱若就所覆即法身也若能覆即寂滅忍也若和光利物即解脫也修如來座即諸法空若就能坐即般若若所坐即法身身座冥稱即解脫也又大慈安樂即資成軌柔和伏嗔即觀照軌坐座即真性軌安樂行中還廣此三法上文如來莊嚴者即此衣也如來肩所荷者即此座也擔者即擔運是入室也第二舉五利益勸獎流通藥王我於餘國遣化人為其集聽法衆一遣化人亦遣化比丘比丘尼優婆塞優婆夷聽其説法是諸化人聞法信受隨順不逆二遣化四衆若説法者在空間處我時廣遣天龍鬼神乾闥婆阿修羅等聽其説法三遣化八部我雖在異國時時令説法者得見我身四見佛身若於此經忘失句逗我還為説令得具足五與總持若初心未淳止可遣化人未可遣化四衆八部若見天龍倚此自高妨損其道故不可令見若心無倚著則堪見佛況復天龍以得總持自證利益也二偈頌有十八行半為三初一行總勸爾時世尊欲重宣此義而説偈言欲捨諸懈怠應當聽此經是經難得聞信受者亦難次十六行半頌上長行有四初一行半頌開譬如人渴須水至決定知近水二有二行半頌合譬藥王汝當知至近於佛智慧三有三行半頌上通經方軌若人説此經至念佛故應忍四有九行頌利益文六初一行總明如來以五事利益之意我千萬億土現淨堅固身於無量億劫為衆生説法正由應身遍滿十方能為五事守護行人五事如前列即遣化人等亦如下頌説二一行半頌遣化四衆若我滅度後至供養於法師三一行半頌遣化人引導諸衆生至為之作衛護四二行頌令得總持若説法之人至為説令通利五一行頌令得見佛若人具是德或為四衆説空處讀誦經皆得見我身六二行頌遣八部若人在空間至能令大衆喜上頌長行竟後一行結勸若親近法師速得菩薩道隨順是師學得見恆沙佛法師品竟先申品目次釋經文今初妙法蓮華經見寶塔品第十一釋見寶塔品梵言塔婆此翻方墳亦言靈廟又言支提無骨身者也此塔既有全身不散則不稱支提阿含明四支微即支提謂生處得道轉法輪入滅四處起塔今之寶塔是先佛入滅靈廟經云佛三種身從此經生諸佛於此而坐道場諸佛於此而轉法輪諸佛於此而般涅槃秪此法華即是三世諸佛之四支提先佛已居今佛並坐當佛亦然此塔出來明顯此事四衆皆覩故言見寶塔品瓔珞經善吉問生身全身碎身功德等耶佛言不等生身言教化訓三業具足清淨衆生得至道場全碎舍利正可威神光明供養得福是故不等又問頂王如來十二那術劫即那由他説法教化舍利亦爾此應是等佛言皆頂王如來神力所作耳彼經格全碎舍利皆由生身佛力今經格生身全碎舍利法身遍圓舍利皆從經出顯此經功德弘持力大從地涌來證明此事四衆皆覩故言見寶塔品北地師云佛為身子説經時寶塔已現為作證明若説經竟來證何等經家作次第安置三周後耳此乃人情則不可信今依薩雲分陀利經云即妙法蓮華佛説法華無央數偈時有七寶塔從地湧出中有金床床上有佛字袍休蘭羅梵語漢言大寶即多寶歎釋尊言我故來供養願坐我金床更為我説薩雲分陀利依此經證即是説三周後更請壽量明文聖説而不肯用人之穿鑿那可承耶此塔正為證前請後從地湧出四衆皆覩故言見寶塔品表三身者多寶表法佛釋尊表報佛分身表應佛三佛雖三而不一異應作如是説如此信解也塔出為兩一發音聲以證前開塔以起後證前者證三周説法皆是真實若略言真實者皆與實相相應也若廣言真實者離四句絶百非也若處中説者八不名真實塔從地湧示不滅分座共坐示不生入塔示不常現塔示不斷分身示不一全身示不異多寶讓座示不來釋迦坐半座示不去八不顯然故是真實又證迹門流通持經功深弘宣力大皆真實也平等大慧者與般若云何釋論七十九雲般若是三世諸佛妙法如一城門四方皆入當知般若亦稱妙法此經稱平等大慧二文相指其意可知起後者若欲開塔須集分身明玄付囑聲徹下方召本弟子論於壽量言明玄等者略舉經題玄收一部故云佛欲以此妙法等也久遠之塔從地湧出開自在神通之力顯過去世益物也發大音聲開師子奮迅之力顯現在十方開權顯實也有大誓願未來諸佛若説此經我之寶塔皆到其所為作證明開大勢威猛之力顯未來常住不滅也又塔在空中亦證前起後七方便人藏理未開無明所隱如塔在地聞三周開三顯實開佛知見顯出法身如塔湧空此即證前修得法身久已明著如塔在空無能開者表本地久成衆所不識若發迹顯本了達無疑此即起後也觀心解者依經修觀與法身相應境智必會如塔來證經境智既會則大報圓滿如釋迦與多寶同坐一座以大報圓故隨機出應如分身皆集由多寶出故則三佛得顯由持經故即具三身普賢觀雲佛三種身從方等生即此義也次釋經文此品有長行偈頌長行有三一明多寶湧現二明分身遠集三明釋迦唱募初文有六一塔現之相二諸天供養三多寶稱歎四時衆驚疑五大樂説問六如來答今初爾時佛前有七寶塔至高至四天王宮七寶為塔者明法身之地以性德七覺七聖財寶塔者實相之境法身所依處也高五百由旬者是二萬里豎明因中萬行果中萬德也廣二百五十由旬即是一萬里橫用萬善莊嚴也地者無明心地也以無所破破於無明以無所住住第一義空種種寶物者衆多定慧而莊挍也欄楯是總持也龕室千萬者無量慈悲之室亦是無量空舍幢幡是神通勝相也垂寶瓔珞者四十地功德上莊嚴法身下被衆生也寶鈴萬億者八音四辨也四面出香者四諦道風吹四德香也高至四天王宮者窮四諦理也二諸天供養三十三天雨天曼陀羅華至恭敬尊重讚歎事解可知更復約理三十心為三十十地為一等覺為一妙覺為一合為三十三同依實相境也雨天曼陀羅者初心亦具四十二地功德後心亦爾皆以四十地所有因華歸向法身也餘諸天龍下即是內凡外凡等亦依實相向果行因也三多寶稱歎正證前開權顯實不虗也爾時寶塔中出大音聲至如所説者皆是真實平等大慧者即是諸佛智慧如前行步平正義也平等有二一法等即中道理二衆生等一切衆生同得佛慧大者如前高廣義也約觀心者空觀豎等假觀橫等中觀橫豎平等平等雙照即是平等大慧也如是如是者一如法相是二如根性是皆是真實也僭補曰一如法相是者如諸法實相二如根性是者如上中下三根作三周説皆是真實故言如法相是如根性是也四時衆驚疑爾時四衆見大寶塔住在空中至却住一面五大樂説因疑請問若望下答意應為三問一問何因有此塔二問何故塔從地出三問何故發是音聲也爾時有菩薩摩訶薩至發是音聲第六佛答此三一先答第二問此佛有願為證法華故從地湧出也爾時佛告大樂説菩薩至為作證明讚言善哉二追答第一問由彼佛命令造此塔也彼佛成道已至應起一大塔三答第三為作證明故發是音聲也其佛以神通願力至讚言善哉善哉釋論明多寶佛不得説法而取滅度師解不爾彼佛告諸比丘比丘即是受化之人何謂不説當是多寶亦得開三不得顯實故釋論雲不得説法耳以是義故雖復滅度在在處處有説法華經便隨喜作證也告比丘等者驗具四衆非不説法當是多寶者問十方世界豈無一佛不得開顯不開顯者皆應發願何獨多寶若不發願佛道不同若發願者皆合聽經又諸佛化皆預照機豈成佛竟不得開顯方始發願答同與不同開與不開有願無願皆是隨緣若宜有願皆悉盡來何慮不集後方發願亦是鑑物僭補曰按經多寶如來因地行菩薩道時作大誓願若我成佛滅度之後於十方國土有説法華經處我之塔廟為聽是經故湧現其前為作證明讚言善哉似非釋論所云多寶不得説法而取滅度亦非大師釋雲當是多寶佛亦得開三不得顯實故論雲不得説法耳又非荊溪所云同與不同開與不開有願無願皆是隨緣鑒物等如上三説似與多寶佛行菩薩道時發大誓願之意不相符合所謂意者方便品偈云諸佛與出世懸遠值遇難正使出於世説是法復難無量無數劫聞是法亦難能聽是法者斯人亦復難譬如優曇華一切皆愛樂天人所希有時時乃一出聞法歡喜讚乃至發一言則為已供養一切三世佛是人甚希有過於優曇華此偈四行半前二行具四難一值佛難二説是法難三聞法難四能聽者難由此四難故多寶如來因地發願修是妙法成佛則宣是妙法滅度之後十方諸佛有説法華經處佛之塔廟從地涌出證明讚善以難遇故慶幸遭逢尊重不捨也後二行半偈前一行舉曇華喻喻時乃一出也次一行半正約法説謂聞法歡喜一言讚善其所得功德為供三世諸佛而是人希有過於優曇也過優曇即是過諸佛滅後證經十方諸佛無有一佛與多寶佛等者又滅度已來無央數劫而十方諸佛無有一佛不説法華經者其塔皆湧現聞法證明出聲讚善曷可思議耶又此證明讚善亦即是多寶佛滅度之後以全身寶塔為現前大衆二門開顯説妙法蓮華經又多寶如來法界身雲於十方國土處處誕生成佛轉妙法輪而其塔亦即十方國土諸佛説妙法華經處湧現其前聞法讚善無前無後一時並現蓋為多寶佛與十方諸佛同乘一如成最正覺三際一時十方一處尊重妙法處處證經無時暫離與虗空等與法性等無盡無盡不可思議也一多寶涌現竟第二明分身遠集就此有七一樂説請見多寶二應集分身三樂説請集四放光遠召五諸佛同來六嚴淨國界七與欲開塔今初是時大樂説菩薩至我等願欲見此佛身釋初請雲以佛神力者欲開塔須集佛集佛即付囑付囑即召下方下方出即應開近顯遠此是大事之由豈非佛神力令問也二應集分身佛告大樂説菩薩至今應當集三樂説請集大樂説白佛言世尊至禮拜供養四放光遠召爾時佛放白毫一光至亦復如是五諸佛同來爾時十方諸佛至并供養多寶如來寶塔六嚴淨國界有三一變娑婆世界時娑婆世界即變清淨至猶故未盡二八方各更變二百萬億那由他時釋迦牟尼佛至諸天寶華遍布其地三八方又各變二百萬億那由他釋迦牟尼佛至遍滿其中三變淨土者此三昧有三初變是八背捨變穢為淨二變是八勝處轉變自在三變是十一切處於境無礙又三變表破三惑僭補曰圓覺雲一世界清淨故多世界清淨乃至盡於虛空圓裹三世一切清淨平等不動經云三變者如大師所表八背捨等三種法門三周開顯後同歸圓乘與圓覺等是法華三昧也六嚴淨國界竟第七與欲開塔復五一諸佛問訊説欲二釋迦開塔三四衆皆同見聞四二佛分座而坐五四衆請加今初是時諸佛各在寶樹下至亦復如是諸佛同與欲開塔如僧中作法與欲意也大集明若干佛與欲華嚴亦説十方若干佛同説華嚴大品亦云千佛同説般若皆不雲是釋迦分身準今經者應是分身彼帶方便故時中不顯説耳今經非但數多亦直説是分身咸來與欲也如僧中與欲者不必全同僧中法事故云如耳多寶願力須諸佛集復令時會知分身多故此諸佛為開塔集集又不至但遣侍者傳問訊等狀如與欲故諸侍者但申問訊無説欲辭大集若干諸佛與欲者於欲色二界大空亭中廣集十方一切諸佛二十一雲南方有佛名曰金藏彼諸菩薩見光明已問於彼佛彼佛答雲北方世界有佛名釋迦牟尼欲為大衆説法破大憍慢遣使從我索欲我今與之餘方亦爾各令一大菩薩與十恆沙諸菩薩等來此偈讚亦無別欲詞大品亦千佛同説今已開權次欲顯遠使諸佛道同故令諸佛與欲有人問衆俱在空分身何故猶處於地今答時衆已聞迹門開權初入寂光之土故以居空表之分身示迹各有所化之土故地居以表之又釋迦不久顯本亦先居空以表之各有致不須疑也二釋迦開塔爾時釋迦牟尼佛至如却關鑰開大城門開塔者即是開權見佛者即是顯實亦是證前迹門開權顯實復將開後本門開迹顯本如却關鑰者却障機動也三四衆皆同見聞即時一切衆會至及釋迦牟尼佛上四二佛分座而坐爾時多寶佛於寶塔中至坐其半座結跏趺坐五四衆請加爾時大衆見二如來至皆在虗空二分身遠集竟第三釋迦唱募流通以大音聲普告四衆至付囑有在文有三意一大聲唱募二付囑時至三付囑有在有在者若佛在世隨機利物自説正法無待他人今佛化緣機盡欲令此法利益無窮故須付囑流通也付囑有在者此有二意一近令有在付八萬二萬舊住菩薩此土弘宣二遠令有在付本弟子下方千界微塵令觸處流通又發起壽量也八萬二萬者八萬在法師品初二萬在持品之首二偈頌有四十八行頌上三意初三行半頌多寶滅度爾時世尊欲重宣此義而説偈言聖主世尊至常為聽法二有八行半頌分身集偈頌分身佛集者上文有七今頌甚略仍不次第初三行頌第二應集義兼大樂説欲見及以請集次一行頌土淨後四行半頌諸佛同來又我分身至令法久住第三有三十六行頌釋迦付囑復二初八行半舉三佛以勸流通次有二十七行半舉難持之法以勸流通就初有三初一行半募覔其人告諸大衆至自説誓言二有三行正舉三佛以勸持經其多寶佛至令得久住三有四行能持此經即是供養三佛及見三佛以釋勸意其有能護至及諸化佛第二有二十七行半舉難持之法以勸流通為二初二十行正舉勸次七行半釋勸意就初復三初一行誡勸諸善男子各諦思惟此為難事宜發大願次十七行正舉難持以勸流通諸餘經典至是則為難三有二行釋難持意我為佛道至則持佛身若有能持即持佛身此意豈易若有能持則持佛身者體宗用三衣座室三即三身故第二七行半明能持難持能成勝德以釋勸意就此復三初一行半重募持經人諸善男子至自説誓言二一行半明能持難持則諸佛喜歎此經難持至諸佛所歎三四行半明能持難持即成勝行中具二利是則勇猛至皆應供養見寶塔品竟
