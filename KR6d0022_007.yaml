body:
  text: 隋章安尊者灌頂結集陳隋天台智者大師説唐荊溪尊者湛然述記閩鼓山私淑比丘道霈纂要先申品目次釋經文今初妙法蓮華經分別功德品第十七釋分別功德品佛説壽量二世弟子得種種益故言功德淺深不同故言分別品也二世者地涌過去靈山現在此文是本門第二授記段授法身記也論分此文有法力修行力法力者有五一證二信三供養皆如今品四聞法如隨喜品五讀誦持説讀誦如法師功德品持者追指法師安樂行勸持三品説者如神力囑纍品也修行力者苦行力如藥王教化如妙音護難如觀音陀羅尼示功德如妙莊嚴王護法如普賢品也次釋經文先長行二偈頌長行分文為三一經家總序爾時大會至無量無邊阿僧祇衆生得大饒益二如來分別於時世尊告彌勒菩薩摩訶薩阿逸多我説是如來壽命長遠時六百八十萬億那由他恆河沙衆生得無生法忍十住復有千倍菩薩摩訶薩得聞持陀羅尼門十行復有一世界微塵數菩薩摩訶薩得樂説無礙辨才十回向復有一世界微塵數菩薩摩訶薩得百千萬億無量旋陀羅尼初地復有三千大千世界微塵數菩薩摩訶薩能轉不退法輪二地復有二千中國土微塵數菩薩摩訶薩能轉清淨法輪三地復有小千國土微塵數菩薩摩訶薩八生當得阿耨多羅三藐三菩提四地復有四四天下微塵數菩薩摩訶薩四生當得阿耨多羅三藐三菩提先依經釋後依疏釋經中八生四地之後更有四三二一四位四生五六二地復有三四天下微塵數菩薩摩訶薩三生當得阿耨多羅三藐三菩提三生七八二地復有二四天下微塵數菩薩摩訶薩二生當得阿耨多羅三藐三菩提二生九十二地復有一四天下微塵數菩薩摩訶薩一生當得阿耨多羅三藐三菩提一生等覺復有八世界微塵數衆生皆發阿耨多羅三藐三菩提心發菩提心是十信信居最後者即因該果海之意如華嚴賢首品説分別者佛語圓妙不可用權位釋經故迹門開示悟入佛之知見今本門增道損生皆約圓位解釋下八世界發心者六根清淨人初入十信位也故仁王云十善菩薩發大心長別三界苦輪海即此義也得無生忍入十住位也故華嚴云初發心住一發一切發得如來一身無量身清淨妙法身湛然應一切即此義也得聞持陀羅尼入十行位也得樂説辨才入十回向位也得無量旋陀羅尼入初地也得不退入二地也得清淨入三地也八生入四地也七生入五地也六生入六地也五生入七地也四生入八地也三生入九地也二生入十地也一生入等覺金剛心僭補曰文句中從八生入四地一句次第推廣之則七生入五地六生入六地五生入七地四生入八地三生入九地二生入十地一生入等覺金剛心文理俱順也經即注注即經在得意耳若依經文八生入四地之後更有四生三生二生一生四位一位有兩地如前經下已釋不重出也若論增道損生但約智德論增謂法身生約斷德論損謂無明滅例如大經月喻從初一日至十五日光色漸增從十六日至三十日光色漸減約一月體而論增減喻然本門得道數倍衆經非但數多又熏修日久原本垂迹處處開引中間相值數數成熟今世五味節節調伏收羅結撮歸會法華譬如田家春生夏長耕種耘治秋收冬藏一時穫刈自法華已後有得道者如捃拾耳今經迹門三周及以本門得益並不與諸經同也況流通中自藥王下六品品品之中皆有結得道者皆過八萬勸發品中大千界塵人具普賢道故知捃拾今經之餘雖然爾前諸味之權文為今經之方便爾後涅槃捃拾此機乃至扶律明一乘常住得此經旨一毫行一句法無非法界十方佛法唯是一法而常分別諸佛化儀方稱斯經一乘之旨應思我等為何所依方稱此經弘宣之相三時衆供養佛説是諸菩薩摩訶薩得大法利時至讚歎諸佛時衆供養者聞深遠法得大饒益欲報佛恩而設供養亦是寄事以表領解上迹門菩薩亦悟而大事未畢所以不陳本門既竟彌勒總申領解明住行向地諸菩薩執持幡蓋次第而上至于梵天幡者轉義蓋者覆義地者始義梵者淨義智斷番番轉慈悲番番覆高下深淺不失次第際于梵天表諸菩薩增道損生鄰於妙覺極於極淨若依論解者只得初地一番豈得與此文會耶二偈頌有十九行分三初二行頌時衆得解爾時彌勒菩薩至而説偈言佛説希有法至歡喜充遍身次九行頌如來分別或住不退地至如虗空無邊得無量無漏清淨之果報者揀異二乘有量故言無量妙因所感故言清淨無障礙土故言果報異二乘無報也後八行頌時衆供養雨天曼陀羅至以助無上心第二本門正宗分竟依南師偈後屬流通第三本門流通分從偈後凡十一品半分為二一從此下至不輕三品半明弘經功德深勸流通二從神力品下至普賢八品付囑流通各復有三前三者一此半品及隨喜品明初品因功德勸流通二從法師功德明初品果功德勸流通三不輕品引信毀罪福證勸流通後三者一神力囑纍二品囑纍流通二藥王下五品約化他勸流通三普賢約自行勸流通生起者現在聞經得真似兩解益如上説若直聞一句而隨喜如現在四信格其功德未來無佛恐人疑福少故説滅後五品功德也因功德微密未若果功德彰灼故説法師功德品因果雙舉未若引證分明故説不輕雖舉往人未若現變故説神力雖示神力未若摩頂付囑故説囑纍雖通途囑纍未若示其要術棄身存道故説藥王雖誡能化未若誡其所化隨聞法處應生佛想故説妙音觀音若初心弘經既無神力當依內禁故説陀羅尼復須外護故説嚴王普賢聯翩重疊使大法弘通耳南師從此為流通者意以四信信解功德現在流通不須必至滅後五品如迹門後文殊入海教化通經豈必在於佛滅後耶故南師分判足可承用就偈後長行為二一現在四信二滅後五品四信者一一念信解未能演説二略解言趣三廣為他説四深信觀成初一念信解有長行偈頌長行有三一舉示其人二明功德三位行不退今初爾時佛告彌勒菩薩至乃至能生一念信解聞佛壽命長遠能生一念信解者則能隨所聞處豁爾開明謂隨語而入無有罣礙信一切法皆是佛法又信佛法不隔一切法不得佛法不得一切法而見一切法亦見佛法即一而三即三而一亦是行於非道通達佛道行於佛道通達一切道不得佛道一切道而通達佛道一切道無所有而有而有無所有非所有非無所有如門前路通達一切東西南北𢄶無壅礙𢄶從巾裂帛聲眼耳鼻舌身意凡有所對悉亦如是無疑曰信明了曰解是為一念信解心也若坐思惟隨所思惟豁然開悟通達三諦亦復如是如是信解名鐵輪位又一解未是具足鐵輪乃是十信之初心其人未得六根清淨故非鐵輪正位也一念信解者即是本門立行之首故文稍委二明功德二先總論無量所得功德無有限量次格量多少為二初舉五度為格量本若有善男子至除般若波羅蜜般若即是今之正慧故言除般若也問既離般若則五不名度答皆為求佛慧盡施戒邊亦得名度蓋次第意也二正格多少以是功德至乃至算數譬喻所不能知三明位行不退若善男子至無有是處別六心猶退七心不退圓初住心即不退聞壽量功德自外而資圓順信解自內而熏所以不退位行不退者文判四信得為圓十信故初信至七信為位不退八信已去為行不退七心不退者即是別教七住見思俱除名位不退故舉信位望住為下二偈頌有十九行半分三初十二行先頌格量多少又為七初一行總標爾時世尊欲重宣此義而説偈言若人求佛慧於八十萬億那由他劫數行五波羅蜜次三行明布施於是諸劫中至以回向佛道三一行明戒若復持禁戒清淨無缺漏求於無上道諸佛之所歎四二行明忍若復行忍辱至如是亦能忍五二行明進若復勤精進至除睡常攝心六二行明禪以是因緣故至盡諸禪定際七一行結是人於百千萬億劫數中行此諸功德如上之所説初十二行頌格量竟次二行追頌人相有善男女等至其福為如此後五行半頌行位不退其有諸菩薩至於此無有疑無量劫行道者久修諸度也願我於未來者起慈悲願也藉久行願聞經信解今之初品始聞此經一念信解功等久行亦乃過之也第一一念信解竟第二略解言趣為他解説前但信解未能敷説説涉法義須善辭辨今品具足故言為他解説從勝受名是第二品以説力故能起自他無上之慧文中先標人相次格量又阿逸多至能起如來無上之慧第三品廣聞廣解廣為他説廣修供養供養外資令內智疾入能生一切種智何況廣聞是經至能生一切種智第四人備上三品加修觀行入禪用慧觀成相起能見有餘實報兩土相貌阿逸多若善男子至當知是為深信解相見佛共比丘僧常在耆山者方便有餘土相也又見娑婆純諸菩薩者實報相也初二品是聞慧位廣聞廣説是思慧位觀行想成是修慧位自淺之深成六根清淨十信位也一現在四信竟第二明滅後五品文為二先列五品格量四品功德後隨喜品格量初品功德問何故爾答四品粗格量初品廣格量廣格量已況出勝者可以意得佛不煩文巧説若此也五品者一直起隨喜心二自受持讀誦三勸他受持讀誦四兼行六度五正行六度此五人者通論皆自行化他下文云五十人展轉相教也既皆有自行通稱弟子皆有化他通稱法師也別論二人但自行三人具化他有長行偈頌今初品起隨喜心又復如來滅後至當知已為深信解相初品但列名格量功德在下隨喜品中二品受持讀誦二先况出持誦何况讀誦受持之者次格量斯人則為頂戴如來至作是供養已初心畏緣紛動妨修正業直專持此經即上供養廢事存理所益弘多後心理觀若熟涉外不妨內事資於道如油多火猛若順流而揚帆又加櫓棹其勢轉疾也指經文是法身舍利不須安生身舍利能詮所詮能詮是塔不須事塔所詮能容第一義僧不須事相僧也問若爾持經即是第一義戒何故復言能持戒者答持經即順語戒亦是任運持得初篇二篇今言能持戒者第三篇去事中無虧耳三品復能教他二先標人阿逸多若我滅後至若教人書次格量則為起立僧坊至供養衆僧四品兼行六度二先標人況復有人能持是經至一心智慧次格量其德最勝無量無邊至疾至一切種智五品正行六度二先標人若人讀受誦持是經至利根智慧善答問難次格量阿逸多若我滅後至皆應供養如佛之塔結此五品前三人是聞慧位兼行六度思慧位正行六度是修慧位都是十信前耳二偈頌有十九行半初五行半頌第二品爾時世尊欲重宣此義而説偈言若我滅度後至具足諸供養次三行頌第三品若能持此經至種種皆嚴好三四行頌第四品若有信解心至不瞋不惡口阿提目多伽此云龍砥華其草形如大麻赤華青葉子堪為油亦堪為香四七行頌第五品恭敬於塔廟至經行及坐臥生心如佛想者初依人號如來也不久詣道樹者其位在鐵輪不久得入銅輪能八相作佛也此第五品與第四信齊同是修慧位若論入位同是六根清淨位也而有佛在世滅後之異耳問何故現在唯四信滅後立五品答其義既齊四五無別但是滅後加讀誦位為二品耳分別功德品竟先申品目次釋經文今初妙法蓮華經隨喜功德品第十八釋隨喜功德品隨者隨順事理無二無別事理秪是權實異名了此權實即非權實故無二無別即隨順開權顯實之事理也喜是慶己慶人聞深奧法順理有實功德順事有權功德慶己有智慧慶人有慈悲權實智斷合而説之故言隨喜功德品又順理者聞佛本地深遠深遠信順不逆無一毫之疑滯順事者聞佛三世益物橫豎該亘遍一切處亦無一毫疑滯即廣事而達深理即深理而達廣事不二而二不別而別雖二雖別無二無別如此信解名之為隨如來出世四十餘年不顯真實七方便人不語誠諦今聞法隨喜慶己慶人以凡夫心等佛所知用所生眼同如來見如此知見究竟法界廣無涯底無等無等等更無過上佛今説此我得聞此故名隨喜功德品第五十人是初品之初初但有一念理解但有一念慶己慶他未有事行恩不及人所獲功德如來巧喻功蓋無學況復最初於會聞者況復二三四五品者況復入位十住十行及至後心者誰聞如是深妙功德而不景慕如來説此令物尚之故言隨喜功德品上來稱美持經功德時衆咸謂入真因位乃致斯德於初心之初起輕弱想忽聞好堅處地芽已百圍頻伽在殼聲勝衆鳥希有奇特輕疑釋然故名隨喜功德品外道得五通者能移山竭海而不伏見愛不及暖法人二乘無學子果俱脫猶被涅槃縛不知其因果俱權通教人修因雖巧不識五百由旬得果止除四住別人雖勝二乘修因則偏其門又拙非佛所讚皆不及初隨喜人佛今舉阿以況後茶都勝諸教故言隨喜功德品問此與大品隨喜云何答此法彼人人法互舉答中此法者屐轉聞法故彼人者大品若聲聞人能發心者我亦隨喜次釋經文文有問答各長行偈頌初問前品已格四人不説初者彌勒承機問出此義如文前品已校量四人者分別功德品末於後四人經文節節自校量訖唯初品文未有校量故生此品故前品末疏云今具列五品校量四品後隨喜品校量初品乘機者由佛知機隱之未説故使彌勒乘機扣佛廣校初文方知後四功大時衆益廣故曰乘機爾時彌勒菩薩至而説偈言世尊滅度後其有聞是經若能隨喜者為得幾所福佛答為二初答內心隨喜人二直明外聽法人初為五一展轉相教爾時佛告彌勒菩薩至如是展轉至第五十五十人者今為二一橫約諸教四衆二直約圓教數之三藏有四門一一門有四衆更開沙彌沙彌尼合六人四門則二十四人約信行法行則四十八人最初最後合五十人通別四門亦如是直就圓門數者數法有小七大七大七有七七四十九皆是師弟具自行化他之德最後一人但是自解無教他德故格下以顯上耳二格量本阿逸多其第五十至皆得自在具八解脫止觀第一記四生者謂胎卵溼化其顯識論中又立四生一觸生者因交會故二嗅生者雄有欲心嗅雌者根門即便有孕三沙生者如雌雀以欲心坌沙因即有孕四者聲生雌孔雀以欲心故聞雄者鳴便即有孕此四但攝胎卵二生溼化但染香處不須此相三問於汝意云何是大施主所得功德寧為多不四答彌勒白佛言至何況令得阿羅漢果五正格量佛告彌勒至無量無邊阿僧祇不可得比僭補曰五十人聞經隨喜者前四十九展轉授受有化他德其功甚大最後第五十人獨自聞法華經一偈隨喜無化他德其功甚劣又第五十人在前是最初之初未入品者在後是第五十人無化他德者二俱是劣如來以劣况勝其劣者功德無量無邊不可思議况前四十九展轉教化殊勝功德何可較量耶此經正旨也又第五十人乃單己無眷屬者是即多之一前四十九人展轉教化是即一之多一多互融功德皆等無勝劣也又約藏通別三教四門釋者正明前得益之人頓漸不等而究竟法華開顯入於佛慧則其功德亦等無差別也格量中先與世樂拔果苦後與涅槃樂拔生死苦此是略舉梵福今更廣之滿閻浮人福不及西瞿耶尼一人福滿西瞿人福不及東弗婆提一人福滿三天下人福不及北單越一人福滿四天下人福不及一四天王四天王不及一釋乃至第六天不及一梵福梵福有定散散者無塔處作塔塔壞者治之和合僧衆請轉法輪衆散者還合之是為四福與梵天等故言梵福也聖福者謂阿羅漢住最後身得有餘涅槃者是也又有體法三乘人同學無生斷煩惱盡如燒木成炭又薩埵聖福自行化他俱以無言説道斷煩惱入無餘又薩埵福謂從初發心次第化人入大涅槃如是格量梵福不及聖福聖福不及體聖福體聖福不及小薩埵福小薩埵福不及大薩埵福大薩埵福不及聞法華經初隨喜福何以故彼非佛法故非實故非圓故雖住後果不及我初心其義如是私謂勸人聽法從與陀羅尼菩薩共生一處至人相具足各有五十功德將功德目人亦成五十但上五十論內解隨喜今唯論外相為異也一處及利根智慧不瘖啞口香舌無病口無病不垢不黑亦不黃不疏不缺落亦不差不曲唇不垂不褰不縮不粗澀不瘡亦不疹不缺亦不壞不咼亦不厚不大及不黧不黑無可惡不匾不曲戾不黑亦不狹不長及不窊不曲無不喜脣好及好舌好牙及好齒鼻修及高直面圓滿眉高眉長并額廣平正人相具見佛及聞法又此文亦有六根功德利根智慧是意功德不瘖啞舌功德鼻修高直鼻功德見佛眼功德聞法耳功德餘是身功德前是相似位功德今是相似位前功德耳前是相似位功德等者指分別功德品中云滅後五品大師有時依普賢觀判五品位在六根內故云相似今是相似位前功德正是圓外凡五品位圓伏五住與別十信等耳初答內心隨喜人竟二直明外聽經有長行偈頌初為四一自往又阿逸多至及乘天宮二分座若復有人於講法處坐至若轉輪聖王所坐之處三勸他阿逸多若復有人至見佛聞法信受教誨四具德修行阿逸多汝且觀是至為人分別如説修行二偈頌有十八行為二初九行頌隨喜次若有勸下九行頌聽經隨喜中三初一行半頌五十人二五行半頌格量本三二行頌格量略不頌福甚多如文爾時世尊欲重宣此義而説偈言若人於法會至初聞隨喜者次九行頌聽經小不次第為四初五行超頌勸聽經次二行追頌自往三一行頌分座四一行頌修行如文若有勸一人至其福不可限隨喜功德品竟先申品目次釋經文今初妙法蓮華經法師功德品第十九釋法師功德品法師義如上説功德者前謂初品之初功德今五品之上謂六根清淨內外莊嚴五根清淨名外莊嚴意根清淨名內莊嚴又從地獄已上至佛而還一切色像悉身中現者名內莊嚴從地獄已上佛已還一切色像以普賢三昧而外化者名外莊嚴身根既爾餘五根亦然受持既爾四種亦然初品既爾四品加然相似既物分真倍然初世界行者聞説此功德利喜不自勝勤求無厭信進倍增次為人明識大乘有大勢力決無疑網次對治似解之初初過二乘之極極百千萬倍指始顯終懸解究竟第一義諦不可思議此品所明備斯四意故言法師功德品也此第一義第一義中云似解初初者依普賢觀隨喜已當似解之首第五十人復在隨喜之初故云初初過二乘之極極者羅漢已極無疑又極縱是無疑亦不能及初隨喜人百千萬倍如前校量指始等者以隨喜始顯妙覺終凡夫發心尚與妙覺畢竟不二况今五品望後六根耶六根功德者按三業安樂行即有十善一善有十即百善一善中有十如即千善就自行化他為二千約如來室如來衣如來座即成六千五種法師悉具六根清淨一一根皆有一千功德也復次一心中具十法界一一界皆有十如即成一百一根通取六塵即有六百約定慧二莊嚴即是一千二百根根悉用定慧莊嚴等千二百也若論六根清淨清淨則不言功德若少若多若言莊嚴能盈能縮能等等莊嚴者根根六千若言千二顯其能盈若言八百顯其能縮若言清淨無盈無縮無等六根互用根自在故不可思議故若偏判者則失旨也相似之位若依四輪即鐵輪位若依五十二位即十信心也若依仁王即十善大心今對常精進者即十信之第二心也諸經名目雖異同是圓教相似位耳次釋經文為二初總列六根盈縮功德數爾時佛告常精進菩薩至莊嚴六根皆令清淨次別作六章解釋各有長行偈頌今初眼根是善男子善女人至而説偈言若於大衆中至肉眼力如是眠根章明父母所生名肉眼而所見過於天眼梵王報得天眼在己界遍見大千大千外有風輪與眼作障不能見外若在他界則不遍見大千非所統故小羅漢見小千大羅漢見大千辟支佛見百佛世界不以風輪為礙亦無己他界隔今經論眼能見大千內外應是天眼那名肉眼此是圓教似位因經之力有勝根用既未發真不得稱天眼猶名肉眼例如小乘方便未得神通則不稱天眼耳猶是分段之身故稱父母所生雖稱肉眼具五眼用見大千內外天眼用見一切衆生及業因緣法眼用其目甚清淨慧眼用一時悉見大千內外見業見淨又圓伏法界上惑佛眼用大經云雖有肉眼名為佛眼佛眼故名清淨具五眼故故言莊嚴能盈能縮名勝根用名根自在豈可秖作八百千二百解耶二耳根復次常精進至而説偈言父母所生耳至功德已如是耳根章遍聞大千內外十法界音聲聞六道即肉天二耳聞二乘即慧耳聞菩薩即法耳聞佛即佛耳又父母所生肉耳能聞內外即天耳聽之不著即慧耳不謬即法耳一時互聞即佛耳以耳例眼眼亦如是見人天是二眼見二乘是慧眼見菩薩是法眼見佛即佛眼三鼻根復次常精進至而説偈言是人鼻清淨至先得此鼻相鼻根章亦如是父母所生即肉鼻大千內外即天鼻不染不著即慧鼻分別不謬即法鼻一時互用即佛鼻此章明互用者鼻知好惡別貴賤覩天宮莊嚴等則鼻有眼用讀經説法聞香能知鼻有耳用諸樹華果實及蘇油香氣鼻有舌用入禪出禪禪有八觸故五欲嬉戲亦是觸法鼻有身用染欲癡恚心亦知修善者鼻有意用鼻根自在勝用若茲例五根亦如是以於鼻根最委悉故於鼻根更辨互用準例餘根亦應如是但是文略四舌根復次常精進至而説偈言是人舌根淨至或時為現身舌根章亦如是父母所生即是肉舌能作十法界語約此即是五舌義明矣能作十法界語即天舌不壞即慧舌不謬即法舌一時互用即佛舌問苦澀惡味至舌皆變成上味衆色到眼何不變成妙色舊不例味有損益損者變不損者不變諸色不壞眼故不例今解不爾一切色同佛色一切聲同佛聲等皆清淨例則無妨遍知一切色法聲法無亂無謬分別亦無妨自在之根那作頑礙之解耶五身根復次常精進至而説偈言若持法華者至一切於中現身根章亦如是世間所有皆於身中現肉身用也上至有頂於身中現天身用也二乘身中現慧身用也菩薩於身中現法身用也佛於身中現佛身用也一時圓現一時互用一時無謬一時無著身根中云無謬假也無著空也俱照名中六意根復次常精進至而説偈言是人意清淨至持法華經故意根章亦如是世間資生産業皆順正法人意淨天心所行天所動作悉知天意淨四月即四諦一歲即十二月是十二因緣與實相不相違背即慧意淨一月即一乘菩薩意淨有所思量皆是先佛經中所説即佛意淨一時圓明一時圓互一時無染一時無謬根用自在能盈能縮能等能淨然隨喜品校量初品分別功德直明四信及以五品今法師功德但明相似六根功德不輕品中明弘經人現生後報六根清淨神力囑纍果人自明弘經力用以勸流通藥王妙音觀音明鄰真人弘經功德故隨喜品已下不勞委釋但略示文相以顯傳弘則流通之功其義自了僭補曰首楞嚴經明發覺初心二決定義一者應當審觀因地發心與果地覺為同為異若因地以生滅心為本修因而求佛乘不生不滅無有是處注曰二決定義皆為耳根圓通而説反聞自性即第一不生滅心也循聲流轉即第二同為賊媒自劫家寶也第二義者應當審詳煩惱根本此無始來發業潤生誰作誰受則汝現前眼耳鼻舌及與身心六為賊媒自劫家寶由此無始衆生世界生纏縛故於器世間不能超越云何名為衆生世界世為遷流過現未三世是也界為方位東西南北是也界與世相涉三四四三宛轉十二以世涉方三四十二以方涉世四三十二故云宛轉十二流變三疊一十百千以三世流變而有三疊之義初疊一為十二二疊十為百二三疊百為千二故云流變三疊一十百千也總括始終六根之中各各功德有千二百汝復於中克定優劣眼根八百功德耳根圓滿一千二百功德鼻根八百功德舌根圓滿一千二百功德身根八百功德意根圓滿一千二百功德六根理各具千二百而復有優劣者約此方機利鈍不同耳今揀擇既明令從耳根入道以耳根圓通具三真實故也大師所釋有三一依三業安樂行具十善二依一心具十法界三依六根清淨判盈縮功德大師所釋深契經旨楞嚴如來所判三四四三宛轉十二流變三疊一十百千讀者宜合而觀之理方盡也法師功德品竟先申品目次釋經文今初妙法蓮華經常不輕菩薩品第二十釋常不輕菩薩品內懷不輕之解外敬不輕之境身立不輕之行口宣不輕之教人作不輕之目不輕之解者法華論云此菩薩知衆生有佛性不敢輕之佛性有五正因佛性通亘本當緣了佛性種子本有非適今也果性果果性定當得之決不虗也是名不輕之解將解以歷人彼亦如此是名敬不輕之境敬此境故名不輕之行宣此語故名不輕之教昔毀者以此目人今經家以此目品正因通亘等者性德通於迷悟因果故緣了云種子本有還約性德以明二因對新熏以成修德故此三為因轉因成果果中菩提及以涅槃名為果性性德本有名果果性也見實三昧云佛為父王説一切皆是佛王問一切衆生即是佛耶佛答若如實見衆生於其即是佛私類此語若不如實見佛則非佛譬初學射的少乖多當以地為的無往不著若隨妄分別生佛差殊則非佛若如實觀則無往非佛也初是因緣解後是圓教解初是因緣等者初內懷不輕之解等五文是也後是圓教者約教也從見實三昧去是也次釋經文此品引人為證證五品功德深六根報重我昔隨喜獲現生後報以募流通也我昔隨喜獲現生後報者重明來意故後文云臨欲終時具聞威音王佛先説法華經得六根淨更增壽命即現報也命終之後復值二千億佛同號日月燈明即生報也以是因緣復值二千億佛同號雲自在燈王後值千萬億佛即後報也於現報中獲六根淨是故弘經其功不淺昔時流通三報宛爾今日流通實不虗也文有長行偈頌長行為三一雙指前品罪福二雙開今品信毀三雙舉勸舉順遮逆舉持遮毀初雙指者先指罪如法師品説次指福如功德品説如文今初爾時佛告得大勢菩薩至所説眼耳鼻舌身意清淨一雙指前罪福竟第二雙開信毀有事本本事今初事本者最初威音是不輕事之本故云事本本事者像法不輕是威音本之車故云本事體用不二不可思議也事本有時節名號劫國説法等悉如文得大勢乃往古昔道成無始故稱乃往古昔至皆同一號次明本事又三初明時節二於像法中下雙標兩人名最初威音王如來至名常不輕毀者因時名增上慢信者因時名常不輕三雙明得失又三初就信者論得得大勢以何因緣至汝等皆當作佛得正説之宏宗得流通之妙益僭補曰得正説之宏宗者迹門正説三周演法開權顯實為諸弟子授記作佛本門正説開迹顯本令諸菩薩增道損生授法身記也得流通之妙益者迹門流通凡五品一法師安三軌以弘法二古佛涌寶塔以證經三達多師資授受妙經得記成道四持品二萬菩薩等發願惡世持説五文殊問末世弘經之法起安樂行是為迹門流通也本門流通凡十一品半一分別功德半品先明現在四信次明佛滅後五品二隨喜品格量最後第五十人功德但得一句一偈之益不能傳化比前甚劣而格量其功德廣大難思况最初聞經展轉教授其功德何可較量耶三法師功德品現感六根清淨之報四不輕禮拜弘法三報圓明五如來之神力莫測六囑纍之殷重叮嚀七藥王輕生重法八妙音以普現色身三昧隨類弘通九觀音普門示現十陀羅尼輔正摧邪十一嚴王之本事既明十二普賢之大願勸發流通無盡是為本門十一品半流通也如上諸品或是法身大士或是古佛垂形輔贊法化觸類流通普為法界衆生開示悟入佛之知見授記作佛而已正説流通全文不啻六萬餘言而不輕菩薩但以我深敬汝等下五句二十四言包抱殆盡有標有徵有釋真可謂得正説之大旨得流通之妙益也名常不輕者不輕己輕人是人一凡有所見是理一皆悉禮拜是行一而作是言是教一此是開權顯實之四一也從乃至遠見下是本理一故往禮拜是本行一而作是言是本教一四衆是人一此是開近顯遠之四一也文云不專讀誦經典但行禮拜者此是初隨喜人之位也隨喜一切法悉有安樂性皆一實相隨喜一切人皆有三佛性讀誦經典即了因性皆行菩薩道即緣因性不敢輕慢而復深敬者即正因性敬人敬法不起諍競即隨喜意也不輕深敬是坐如來座也忍於打罵是著如來衣也以慈悲心常行不替即入如來室也又深敬是意業不輕之説是口業故往禮拜是身業此三與慈悲俱即誓願安樂行也如此三四豈非流通之妙益而謂何耶二明毀者之失四衆之中至號之為常不輕生瞋恚心不淨者不受四一也罵言無智智知於理既言無智不受理一也比丘等不受人一也從何所來不受行一也虗妄授記不受教一也經歷多年常被罵者結不受開權顯實之四一也避走達住高聲唱言亦復不受此開近顯遠本地之四一也常作是語故結信者深信不休也四衆為作不輕名者此結毀者呰毀不止也問釋迦出世躊躇不説常不輕一見造次而言何也答本已有善釋迦以小而將護之終令入實本未有善不輕以大而強毒之下其佛種三雙明信毀果報初信者果報為二一明信果報二結會古今今初是比丘臨欲終時至功德成就當得作佛信者論三報現得六根清淨生值燈明佛後值二千億佛神通力是身業淨樂説辨力是口業淨善寂力是意業淨二結會古今二先結會得大勢於意云何至則我身是次舉信者而勸順若我於宿世至疾得阿耨多羅三藐三菩提二明毀者果報又二先明果報得大勢彼時四衆至教化阿耨多羅三藐三菩提毀者得善惡兩果謗故墮惡聞佛性名毒鼓之力獲善果報問若因謗墮苦菩薩何故為作苦因答其無善因不謗亦墮因謗墮惡必由得益如人倒地還從地起故以正謗接於邪墮二結會古今得大勢於汝意云何至不退轉者是二雙開信毀竟第三雙舉勸舉順以遮逆勸持以遮毀得大勢當知是法華經至書寫是經經有大力終感大果務當勤習五種之行五種行者五種法師一受持二讀三誦四解説五書寫法師功德品六根清淨段段如是標名也一長行竟二偈頌有十九行半初十五行半但頌信毀因果後四行頌勸持在文可見不細出也爾時世尊欲重宣此義而説偈言過去有佛至計著於法著法者是法不可示若定謂是有即是著法乃至定謂是非有非無亦名著法者佛藏云刀輪害閻浮人其罪猶小有所得心説大乘者其罪過彼也大論云執有與無諍乃至執非有非無與有無諍如牛皮龍繩俱不免患中論云諸佛説空法本為化於有若有著空者諸佛所不化若定言諸法非有非無者是名愚癡論若失四悉檀意自行化他皆名著法若得四悉檀意自他俱無著也不輕菩薩至如是經典億億萬劫至疾成佛道不輕菩薩品竟先申品目次釋經文今初妙法蓮華經如來神力品第二十一釋如來神力品如來者上釋竟見壽量品釋神名不測力名幹用不測則天然之體深幹用則轉變之力大此中為付囑深法現十種大力故名神力品次釋經文自此品下凡有八品是付囑流通今品明菩薩受命弘經次品如來摩頂付纍今品文有長行偈頌長行為三一菩薩受命二佛現神力三結要勸持初又二一經家敘敬儀爾時千世界微塵等菩薩至瞻仰尊顏二發誓弘經而白佛言至解説書寫而供養之此段為三一時節佛滅後是也二處所分身等國是也三所以下誓願僭補曰世尊滅度十方分身諸佛同時滅度如天上月落千江月同落也故涌出大士發願在彼分身諸佛滅度國中弘法自他兼利也第二現十神力為二初所對之衆爾時世尊至一切衆前於文殊等者迹化衆也舊住者下方本化衆也一切者他方來者及從分身佛來者也問但見下方發誓不見文殊等發誓何也答上文云我土自有菩薩能持此經即兼得之也二正現神力現大神力至如一佛土十神力者一吐舌相者今經所演開三顯一內祕外現廢近顯遠明三世益物皆誠諦不虗福德人舌至鼻三藏佛至髮際今至梵天出過凡聖之外極於淨天之頂相既殊常説彌可信二通身毛孔遍體放光周照十方無處不朗表智境罄也上白毫吐耀始在東方表七方便初見一理今本門既竟放一切光照一切土能令初因終于等覺究竟佛慧分身諸佛亦復如是三謦咳者將語之狀也亦是通暢之相也四十餘年隱祕真實今獲伸舒無有遺滯是我出世大事通暢是故謦咳欲以此法付諸菩薩令於後世導利衆生將語斯事是故謦咳謦咳具二義一咳咳事了一咳咳付他也四彈指者隨喜也隨喜七方便同入圓道隨喜圓道增智損生隨喜諸菩薩持真淨大法隨喜後世獲無上寶此一彈指豎徹三世橫互十方五地六種動者表初心至後心六番動無明今明復動一切人六根令得清淨也六普見大會者表諸佛道同也而今而後亦復如是上五千起去三變被移既失本心不能現益宜以非滅現惡從諸菩薩弘經得道入於佛慧如今會無異亦表未來有機一也七空中唱聲者表於未來有教一也八南無歸命為佛弟子表於未來有人一也九遙散諸物雲聚而來者表於未來有行一也十十方通同如一佛土者表理一也問何以知十相表現意復表將來意答文云我以如來神力為囑纍此經故猶不能盡表現表將其義明矣第三結要付囑文為四一稱歎付囑爾時佛告上行等菩薩大衆至猶不能盡二結要付囑以要言之至皆於此經宣示顯説結要有四句一切法者一切皆佛法也此結一切皆妙名也一切力者通達無礙具八自在此結妙用也一切祕藏者遍一切處皆是實相此結妙體也一切深事者因果是深事此結妙宗也皆於此經宣示顯説者總結一經唯四而已撮其樞柄而授與之結要有四句者本迹二門各有宗用二門之體兩處不殊名冠此三而總於三一部之要豈過於此故總攬之以成流通八自在者如止觀記三獎勸付囑如文是故汝等至是中皆應起塔供養四釋付囑所以者何至諸佛於此而般涅槃上云經卷所在之處皆應起塔經中要説要在四事道場釋上甚深之事得菩提釋上祕藏轉法輪釋上一切法入涅槃釋上神力此之四要攝經文盡故皆應起塔也所言要者得菩提是法身轉法輪是般若入涅槃是解脫三法成祕密藏佛住其中即是塔義也阿含云佛出世唯四處起塔生處得道處轉法輪入涅槃坐道場是法身生處餘悉如文一長行竟二偈頌有十六行分三初四行頌十神力但有五者闕後五也前五現見逐要存之前後二五現未異耳舉現例未是故略之爾時世尊欲重宣此義而説偈言諸佛救世者至現無量神力次有十行半頌結要又二初二行是人之功德總頌四法囑纍是經故至不可得邊際二八行半別頌四法又四初一行半頌一切法持法即持佛身能持是經者至教化諸菩薩二兩行頌神力神力令佛歡喜能持是經者至亦令得歡喜三一行頌祕要可解諸佛坐道場所得祕要法能持是經者不久亦當得四有四行頌甚深之事説法破暗入一乘是佛甚深之事也能持是經者至畢竟住一乘後一行半總頌結也是故有智者至決定無有疑如來神力品竟先申品目次釋經文今初妙法蓮華經囑纍品第二十二釋囑纍品囑是佛所付囑纍是煩爾宣傳此從聖旨得名故言囑纍囑是頂受所囑纍是甘而弗勞此從菩薩敬順得名故言囑纍囑是如來金口所囑纍是菩薩丹心頂荷此從授受合論故言囑纍品也是故如來躬從座起申手摩頂授以難得之法大衆曲躬合掌如世尊敕當具奉行殷勤授受故名囑纍品也次釋經文文為二初如來付囑次時衆歡喜初為三一付囑二菩薩領受三事畢唱散初又三一正付爾時釋迦牟尼佛至令一切衆生普得聞知正付者佛以一權智善巧之手摩無量大菩薩實智之頂如來授道化他故名權智手也菩薩自行受道故名實智頂也申手摩頂即身付囑也權智臨實智即意付囑也而作是言者即口付囑也文有四悉檀意我於無量劫修是難得之法者此從前佛受學今以付爾爾當授彼三世繼嗣即世界悉檀也一心流布即為人悉檀也廣令增者即對治悉檀也益者即第一義悉檀也二釋付所以者何至是名釋出佛意而付囑之三誡付於未來世至則為已報諸佛之恩誡付者若根深智利直説佛慧若不堪者於餘深法中示教利喜佛慧是深而非餘六方便是餘而非深別教次第是餘亦是深汝能以餘深助申佛慧者即善巧報佛之恩是名誡付囑也六方便謂兩教二乘兩教菩薩別信住行向是也別深者謂別初地與圓初住等也二菩薩領受時諸菩薩摩訶薩至唯然世尊願不有慮歡喜意領受曲躬低頭是身領受俱發聲言是口領受兼得意領受也如世尊敕者領受大施主如來室意當具奉行領受無慳吝如來衣意願不有慮領受無所畏如來座意佛既三付菩薩三受皆如文三唱散爾時釋迦牟尼佛至多寶佛塔還可如故多寶為證經故來分身為開塔故集開塔事了令分身還本故去而不現塔為聽經本門止宗已竟流通未了故塔還如故一如來付囑竟次大衆歡喜説是語時至聞佛所説皆大歡喜諸佛為化他事遂故喜菩薩為自行得法故喜又説人清淨故喜佛是也聞清淨法故喜妙經是也聞法獲證故喜現在本來得益者是也三事具足故大歡喜囑纍品竟先申品目次釋經文今初妙法蓮華經藥王菩薩本事品第二十三釋藥王菩薩本事品觀經曰昔名星光從尊者日藏聞説佛慧以雪山上藥供養衆僧願我未來能治衆生身心兩病舉世歡喜號曰藥王此文明一切衆生喜見頓捨一身復燒兩臂輕生重法命殞道存舉昔顯今故言本事品也若推此義星光應在喜見之後從捨藥發誓已來名藥王故次釋經文此下五品皆是化他流通今品明化他之師唯願大法大得弘宣大願衆生獲大饒益所以竭其神力盡其形命殷殷虔虔志猶未已庶令弟子宗法如師我傳爾明爾復傳明明明無已師之志也故知此品勗弘法之師也下如妙音觀音兩品明他方大士奉命弘經普現色身形無定準不可牛羊眼看不可以凡庸識度於所聞處勿生輕想輕想則法不染心故知下品勗受法弟子也有人言上諸品諸佛為佛事此品下菩薩為佛事此一往耳上品亦有菩薩此下品亦有諸佛今明三周開三顯一圓因已竟安樂行品明乘乘之法壽量明乘乘之果此品下明乘乘之人故十二門論云大乘者普賢文殊大人之所乘也藥王以苦行乘乘妙音觀音以三昧乘乘陀羅尼以總持乘乘妙莊嚴以誓願乘乘普賢以神通乘乘作此解者於化他流通義便也藥王至流通義便者佛囑纍已大事功畢隨物偏好故乘乘不同真如實相是所乘之體一乘因果是所乘之事苦行等是乘乘之緣隨物機宜故使弘者隨緣不等故所乘體皆妙法也以依一實立因果故乘於所乘以利物故曰乘乘文為四一宿王發問二如來為説三聞品得益四多寶種善初問有三意一問藥王遊化二問藥王苦行三請如來為説今初爾時宿王華菩薩白佛言至聞皆歡喜一宿王發問竟二如來為説二一但説苦行遊化則指色身三昧或指下二品也二歎經初説苦行中二先明事本次明本事今初爾時佛告宿王華菩薩至以為供養有時節佛菩薩聲聞國土等悉如文次本事為三一佛説法二修苦行供養三結會古今今初爾時彼佛至及衆菩薩諸聲聞衆説法華經然佛普為一切何獨喜見是其對揚須付囑流通如今之身子寄一而言諸耳二苦行供養又二一現在二未來現在又二一修行得法二作念報恩今初是一切衆生喜見菩薩至得現一切色身三昧二報恩又二一三昧力雨華雨香得此三昧已至以供養佛二亡身力燒身燒臂為三一現在燒身作是供養已至光明遍照八十億恆河沙世界經以神通力願者明依所得三昧起利他願以智觀火焚難思境故使光明遍照八十億恆沙世界二佛稱歎其中諸佛同時讚言至而各默然真法供養者當是內運智觀觀煩惱因果皆用空慧蕩之故言真法也又觀若身若火能供所供皆是實相誰燒誰然能供所供皆不可得故名真法也觀若身若火能供所供皆是實相者身火能供事也佛法所供田也境智不二能所一如苦即法界增道損生故曰乘乘苟無觀智能所熾然妄相效顰徒取業苦一失正念永劫沉淪蓋心正行正心邪行邪後學之徒不可不慎有問律制燒身得蘭燒指得吉此中讚燒其事如何今為答之大小開制教法不同小制結過大制令燒故梵網中若不燒者非出家菩薩豈獨令俗而不制道故知順小行易不燒何難從大誠難燒乃不易世以不持為大則大小俱傾信此土機緣咸迷大小但自揣己德歷境觀心與心相應當順開制今藥王久證並出開制之方重法輕生起神通之願為軌凡下思之可知僭補曰是真精進者離身心相也是名真法供養如來者能焚之火性空真火所焚之身幻化空身供養之佛法界一相所謂觀身實相觀佛亦然如是則能焚所焚能供所供一相無相是謂法供養也智者大師誦至此豁然心開親見靈山一會儼然未散乃是現量境界十方一處三際一時因果一致體用一如所云實相妙法巧喻蓮華者此之謂耳又宋四明法智尊者年五十七約同志十僧修法華懺三載限滿同焚身以供妙經期生安養楊文公億再四上書多方設難請留身住世説法師堅志不回其答文公書大意謂性火真空豈有能燒之相則所燒自亡也佛體圓妙豈有所供之田則能供亦寂矣兩重能所既泯一切功德斯成是名苦行法門又名火光正受四土淨境頓現此心諸佛道場咸彰此處是名取法門捨法門不取不捨法門亦是三毒法門經云如是三事中具一切佛法故文殊云我是貪欲尸利我是瞋恚尸利我是愚癡尸利文公知師理勝不可屈乃請甬東太守朝夕保護師志不得伸乃然三指供佛聊酬夙願而已古人重法輕生勤懇若此使後人見聞亦足以少激其頑懦矣三時節其身火然千二百歲過是已後其身乃盡一現在竟二未來燒臂又為五一生王家一切衆生喜見菩薩至而説偈言大王今當知至捨所愛之身科注云有本於此偈後更添供養於世尊為求無上慧二句乃後人擅加笈多所譯亦但六句法護所譯但只四句所添者理固無妨但原譯無有不可從也二説本事説是偈已至我今當還供養此佛三往佛所白已即坐七寶之臺至合十指爪以偈讚佛容顏甚奇妙光明照十方我適曾供養今復還親覲爾時一切衆生喜見菩薩至世尊猶故在世四如來付囑爾時日月淨明德佛至於夜後分入於涅槃五奉命任持又四一起塔爾時一切衆生喜見菩薩至懸衆寶鈴二燒臂爾時一切衆生喜見菩薩至而以供養經云七萬二千歲等者問燒身但經千二百歲燒臂何故時長七萬二千歲答前為自行身盡入滅今為弘法令物會三故云令無數等既言無數聲聞發菩提心故知喜見於佛滅後不令此等住於小果此土亦然三利益令無數求聲聞衆至皆使得住現一切色身三昧四現報爾時諸菩薩天人阿修羅等至一切人天得未曾有二修苦行供養竟三結會古今又二一結會佛告宿王華菩薩至如是無量百千萬億那由他數二勸修宿王華若有發心至諸珍寶物而供養者勸修者能然一指勝捨外身外輕內重故功福有異文云妻子者外身也國城等外財也一説苦行竟二歎經勸持三先歎能持者次歎所持法後明持經福深今初若復有人至其福最多七寶奉四聖不如持一偈法是聖師能生能養能成能榮莫過於法故人輕法重也能生等者如父母必以四護護子今發心由法為生始終隨逐為養令滿極果為成能應法界為榮雖四不同以法為本二歎所持法又二初歎法體次歎法用今初宿王華譬如一切至此經亦復如是諸經中王川流江河諸水之中海為第一者無量義云四水譬教藥草喻中一雲能雨譬説法又諸水總一切教別舉四者譬乳酪生熟四味教也此法華教譬醍醐海也説窮本地為深遍一切處為大純明佛法不説餘法為鹹最為深大其義如是十寶山名出華嚴及衆經云云土黑鐵圍故非是寶十山雖寶或一或二神龍雜居須彌四寶所成純天所住譬餘教説能依十住四十心或凡或賢或聖説所依或俗或真或中是為卑下此法華經所説諦理常樂我淨如四寶所成開示悟入者之所依是故此義最為高上星月同是陰精俱於夜現星無虧盈不及於月諸經説權智不得自在此經明權即實實即權盈虧相指不二而二如此説權智勝餘教也日是陽精獨能破暗諸經明實智破惑尚不及即實而權那得並即權而實故知此經明實智最為第一諸經説權智等者權不即實致令教法皆非自在諸機不融故教主別爾諸經明實智等者並是權外之實故破疑不遍尚不及此經説施權意已破諸疑故云即實而權况復今經本為顯實有疑皆斷故云即權而實所以權實之語非獨今經相即之言出自於此輪王號令統於四域釋領三十三梵號令總上冠下譬餘經説三諦三昧各不相收不得自在此經所説以實相入真決了聲聞法是諸經之王實相入俗一切治生産業不相違背實相入中諸法無非佛法文云一切學無學及發菩薩心者之父其義如是文云學無學等者指三教菩薩為發菩薩心者今經為彼之父能生彼故昔謂非子至此方知一切凡夫四果支佛第一者此明任運無功用也餘經要因功用乃得入流如四果人因聞思修方乃得悟此經明無作四諦不雜方便自然流入薩婆若海如大白牛肥壯多力其疾如風聲聞支佛菩薩為第一者此明因第一也餘經明因是七方便今經明因出方便外故因第一也如來第一者此明果也餘經明果近在寂場此經明果遠指本地故最第一一歎法體竟二歎法用又三初歎拔苦用宿王華此經能救一切衆生至離諸苦惱二有十二事歎與樂用此經能大饒益一切衆生至如炬除暗僭補曰燈炬二喻重出者如暗得燈是明暗不相除如炬除暗是暗時無明明時無暗喻智能破惑三結此法華經亦復如是至能解一切生死之縛二歎所持法竟三明持福深有四先舉聞全經福若人得聞此法華經至所得功德亦復無量次舉聞品福宿王華若有人至諸餘怨敵皆悉摧滅三格量善男子百千諸佛至所得功德如上所説口出香是現報餘是後報經云五百歲者大集經中有五五百具如前文經云若有女人等者此中秪云得聞是經如説修行即淨土因不須更指觀經等也問如何修行答既云如説修行即依經立行具如分別功德品中直觀此土四土具足故此佛身即三身也故此大衆即一切衆以惑未斷故故安樂行是同居淨土行之氣分也故不離同居穢見同居淨問同居類多何必極樂答教説多故由物機故是攝生故令專注故宿緣厚故約多分故下文兜率其例不同但在機感矣僭補曰淨土法門廣大無量具諸法門三根普利隨根證入故阿彌陀佛願力深故十方諸佛皆共稱讚故十方諸佛皆極樂國中出故千經萬論無不勸修故不棄惡人十念往生故八方上下無央數諸天人民及蜎飛蠕動皆得生故諸宗諸祖師皆同修故萬修萬人去故往生靈驗古今昭著人人知故人人信故其功德不可思議罄南山之竹不能殫書故只患娑婆情重極樂念輕善根不深疑信相半志不決定是自誤耳四囑纍是故宿王華至應當如是生恭敬心得聞是經不老不死者此須觀解不老是樂不死是常聞於此經得常樂之解坦然在懷無所畏忌第一第二大段問答竟第三大段聞品得益如文説是藥王菩薩本事品時八萬四千菩薩得解一切衆生語言陀羅尼第四大段多寶稱善如文多寶如來至利益無量一切衆生藥王菩薩本事品竟先申品目次釋經文今初妙法蓮華經妙音菩薩品第二十四釋妙音菩薩品文中自釋昔奉雲雷音王佛十萬種妓今遊化他土音樂自隨昔奉八萬四千寶鉢今爾許道器眷屬圍繞昔得一切衆生語言陀羅尼今以普現色身以妙音聲遍吼十方弘宣此教故名妙音品此品明菩薩以難思之力隨類通經物覩其迹莫測其本但甘其味無擇其形當卑其地自疏其流即是化他門中第二意也次釋經文為六一放光東召二奉命西來三十方弘經四二土得益五還歸本國六聞品進道今初爾時釋迦牟尼佛至遍照其國大人相者大相海也遍體毛功德不及一好功德衆好功德不及一相功德諸相從下向上展轉相勝不及白毫功德白毫功德不及肉髻功德故是大人相也此相業者從孝順師長起今放是光召本弟子使弘中道之經利益大機者也白毫從一道清淨起今放此光令弘此法也問佛一一相皆法界海何故勝負答行布圓融一體無二今約圓融之行布故作是説耳問佛有緣弟子布滿十方何故唯召東西不論八方耶答此有所表淨名云日月何意行閻浮提欲以光明除衆暗瞑東是光始西是其終有始有終其唯聖人乎未發心者令其發心未究竟者令其究竟一菩薩既爾諸衆亦然一方既爾諸方亦然聖不煩文舉一蔽諸故但言東西耳一放光東召竟二奉命發來文為二一發來緣二正發來來緣為五一經家敘其福慧爾時一切淨光莊嚴國中至諸大三昧敘福之由由值先佛多也甚深智慧即智慧莊嚴十六三昧即福德莊嚴也此十六並是法華三昧異名耳隨義説之今稱法華三昧之相二被照辭佛釋迦牟尼佛光照其身至藥上菩薩光照身辭佛悉如文三誡爾時淨華宿王智佛至生下劣想佛誡者然法身大士故不肅而成所將眷屬或未達者故寄彼而規此耳夫佛身與理相稱不得見卑小而忘其尊嚴此約如來座為誡也夫師及弟子智斷具足師既施權弟子亦隱其實此約如來衣為誡也夫依報國土皆正報所感如來以慈臨大千宜須高須下勿覩依報而忽正報也此約如來室為誡也此佛弘經亦敕三意彼尊誡約諸佛道同也四受旨妙音菩薩白其佛言至如來功德智慧莊嚴受旨者如來力是座力神通力是室力莊嚴力是衣力此受弘經之大旨利物之宗要故能不動此會遊化十方焉五現來相又為六一遣蓮華於是妙音菩薩至甄叔迦寶以為其臺二問爾時文殊師利法王子至甄叔迦寶以為其臺問若文殊位下辭不應求見若文殊位高相來那忽不識答雖同一位有始中終止此一事不知無忝高位又衆中見瑞不了發起令知故問佛耳三答爾時釋迦牟尼佛至亦欲供養聽法華經四請文殊師利白佛言至彼菩薩來令我得見五推功爾時釋迦牟尼佛至當為汝等而現其相六命來時多寶佛告彼菩薩至欲見汝身一發來緣竟二正發來文為六一與眷屬經歷于時妙音菩薩於彼國沒至百千天樂不鼓自鳴二敘相登臺是菩薩目如廣大至而來詣此娑婆世界耆闍崛山三問訊傳旨到已下七寶臺至安隱少惱堪忍久住不四請見多寶世尊我今欲見多寶佛身唯願世尊示我令見五世尊為通爾時釋迦牟尼佛語多寶佛是妙音菩薩欲得相見六塔中稱善時多寶佛告妙音言至故來至此二奉命西來竟三十方弘經有二問答初問善根神力二問住何三昧初問善根神力爾時華德菩薩白佛言至有是神力二答佛還答二意一答善根昔獻樂奉器華德於汝意云何下仍結古今悉如文佛告華德菩薩至百千萬億那由他佛二答其神力之問華德汝但見妙音菩薩其身在此至其事如是示三十四凡身四聖人身結成十法界六道耳二問住何三昧而能如此自在利益佛答如文爾時華德菩薩至能如是饒益無量衆生三十方弘經竟四二土利益説是妙音菩薩品時至亦得是三昧及陀羅尼三昧與陀羅尼體一而用異寂用為三昧持用名陀羅尼又色身變現名三昧音聲辨説名陀羅尼上品云初得一切色身三昧轉身得一切語言陀羅尼當知音聲猶是色法故言體一用異又舌根清淨名陀羅尼餘根清淨名三昧都是六根清淨法門耳五還本土爾時妙音菩薩至得現一切色身三昧動地雨華者菩薩經歷尚能傍益況佛前放光傍照東方百八萬億那由他土亦傍論利益也六聞品進道説是妙音菩薩來往品時至得法華三昧妙音菩薩品竟先申品目次釋經文今初妙法蓮華經觀世音菩薩普門品第二十五釋觀世音菩薩普門品有通有別通有十雙別有五雙十雙者一人法乃至第十智斷一人法觀世音者人也普門者法也人有多種法有多種經有二問答依前問答論觀世音人依後問答論普門法人法合題故言觀世音普門品二慈悲觀世音者依前問答大悲拔苦百千苦惱皆得解脫普門者依後問答大慈與樂應以得度而為説法也三二嚴觀世音者智慧莊嚴智能斷惑如明時無暗普門者福德莊嚴福能轉壽如珠雨寶四法應觀世音者觀冥於境即法身也普門者隨所應現即應身也五藥珠觀世音者譬藥樹王遍體愈病普門者譬如意珠王隨意所與如意珠者珠具多德具如止觀第五六冥顯觀世音者冥作利益無所見聞三毒七難皆離二求兩願皆滿也普門者顯作利益目覩三十三聖容耳聞十九尊教也七隨自他觀世音者隨自意照實智也普門者隨於他意照權智也八體用觀世音者不動本際體也普門者迹任方圓用也九緣了二因觀世音者根本是了因種子普門者根本是緣因種子也十智斷觀世音者究竟是智德如十四夜月清輝將滿也普門者究竟是斷德如二十九夜月邪輝將盡也經文兩問答含無量義略用十雙始從人法終至智斷釋品通名其義如是別論五隻者謂觀世音普門也一觀者觀有多種謂析觀體觀次第觀圓觀析觀者滅色入空也體觀者即色是空也次第觀者從析觀乃至圓觀也圓觀者即析觀是實相乃至次第觀亦實相也今簡三觀唯論圓觀文云普門觀若不圓門不稱普即此義也二世者世亦多種謂有為世無為世二邊世不思議世有為世者三界世也無為世者二涅槃也二邊世者生死涅槃也不思議世者實相境也簡却諸世但取不思議世也三音者機也機亦多種人天機二乘機菩薩機佛機人天機者諸惡莫作衆善奉行也二乘機者厭畏生死欣尚無為也菩薩機者先人後己慈悲仁讓也佛機者一切諸法中悉以等觀入一切無礙人一道出生死也揀却諸音之機唯取佛音之機而設應以此機應因緣故名觀世音也四普者周遍也諸法無量若不得普則是偏法若得普者則是圓法故思益云一切法邪一切法正略約十法明普得此意已類一切法無不是普所謂慈悲普弘誓普修行普離惑普入法門普神通普方便普説法普成就衆生普供養諸佛普一慈悲普者始自人天終至菩薩皆有慈悲然有普有不普生法兩緣慈體既偏被緣不廣不得稱普無緣與實相體同其理既圓慈靡不遍如磁石吸鐵任運相應如此慈悲遍熏一切名慈悲普二弘誓普者弘廣也誓制也廣制要心故言弘誓弘誓約四諦起若約有作無生無量四諦者收法不盡不名為普若約無作四諦者名弘誓普也三修行普者例如佛未值定光佛前凡有所修不與理合從得記已觸事即理理智歷法而修行者無行而不普也四斷惑普者若用一切智道種智斷四住塵沙等惑如却枝條不名斷惑普若用一切種智斷無明者五住皆盡如除根本名斷惑普五入法門普者道前名修方便道後所入名入法門若二乘以一心入一定一心作一不得衆多又為定所縛故不名普若歷別諸地淺深階差亦不名普若入王三昧一切三昧悉入其中不起滅定現諸威儀故名法門普六神通普者大羅漢天眼照大千支佛照百佛世界菩薩照恆沙世界皆緣境狹發通亦偏若緣實相修者一發一切發相似神通如上説況真神通而非普耶七方便普者二種道前方便修行中攝道後又二一者法體如入法門中説二者化用如今説逗機利物稱道緣宜一時圓遍雖復種種運為於法性實際而無損減是名方便普八説法普者能以一妙音稱十法界機隨其宜類俱令解脫如修羅琴故名説法普九成就衆生普者一切世間及出世間所有事業皆菩薩所為鑿井造舟神農嘗藥雲蔭日照利益衆生乃至利益一切賢聖示教利喜令入三菩提是名成就衆生普鑿井等者如華嚴云若有世界初成時衆生所須資生具菩薩爾時為工匠終不造作殺生器十供養諸佛普者若作外事供養以一時一食一華一香普供養一切佛無前無後一時等供於一塵中出種種塵亦復如是若作內觀者圓智導衆行圓智名為佛衆行資圓智即是供養佛若行資餘智不名供養普衆行資圓智是名供養普五門者從假入空空通而假壅從空入假假通而空壅偏通則非普壅故非門中道非空非假正通實相雙照二諦故名普正通故名門普門圓通義則無量略舉其十類則可知次釋經文此品猶是普現色身三昧化他流通也文二先長行次偈頌長行為三一問二答三聞品得益問答兩番今初番問為三初經家敘請儀爾時無盡意菩薩至而作是言時者説東方菩薩竟次説西方菩薩時也世界悉説東方生善竟次説西方生善時為人悉説東方斷疑竟次説西方斷疑時對治悉説東方得道竟次説西方得道時第一義無盡意者大品明空則無盡大集明八十無盡門淨名云夫無盡者非盡非無盡故名無盡初引大品空大集假淨名中大品明空則無盡大集八十無盡門既多門不同即是假也淨名夫無盡者無有盡與不盡雙非故中也總三經用三觀三智釋無盡也意者智也無盡者境也智契於境單從於境應言無盡單從於智應言於意境智合稱故言無盡意又意者世出世之本又意即法界中道故言能觀心性名為上定此約三智三觀釋名也二無盡以持名緣問世尊觀世音菩薩以何因緣名觀世音問者大經云具二莊嚴能問能答無盡意前以慧莊嚴問觀世音慧莊嚴佛以慧莊嚴答觀世音慧莊嚴也三如來以尋聲救苦答為三一總答二別答三勸持名答總答為三一多人遭苦二聞名稱號三得解脫今初佛告無盡意菩薩至受諸苦惱受苦者自有多苦苦一人多人受一苦多人受多苦一人受一苦今文百千萬億衆生多人也受諸苦惱多苦也舉多顯少多尚能救況少苦耶多苦苦一人等四句一一句中有苦皆救咸可持名以有五隻十雙普故故念念咸益圓菩薩皆然但隨緣耳二聞名稱號聞是觀世音菩薩一心稱名遭苦是惡稱名是善善惡合為機義也三得解脫觀世音菩薩即時觀其音聲皆得解脫皆得解脫是應也此是機感因緣名觀世音亦是人法因緣乃至智斷因緣名觀世音後去例如此結名不煩文僭補曰不云聞其音聲而云觀者以菩薩六根是即體之用根根皆圓一根一切根一切根一根故云真觀清淨觀廣大智慧觀悲觀及慈觀常願常瞻仰六根既爾六塵亦然一塵一切塵一切塵一塵故云妙音觀世音梵音海潮音勝彼世間音是故須常念蓋由菩薩根塵皆是妙色妙心全體實相彌滿法界普應群機尋聲救苦不特六根互用而已一總答竟二別答為三一口機應二意機應三身機應別答三業機者七難是口機以稱名故三毒是意機令常念故二求是身機常禮拜故口機又二初明七難次結一火難若有持是觀世音菩薩名者至由是菩薩威神力故火難有四一持名是善二遭火是惡三應四結於一難中例為三番一果報火地獄已上初禪已還皆論機應二惡業火地獄已上非想已還皆論機應三煩惱火地獄已上等覺已還皆論機應七難三毒二求例皆如此如空谷音呼應不爽也二水難若為大水所漂稱其名號即得淺處三羅剎難若有百千萬億衆生至以是因緣名觀世音四王難若復有人臨當被害至而得解脫五鬼難若三千大千國土至況復加害六枷鎖難設復有人至皆悉斷壞即得解脫七怨賊難若三千大千國土至稱其名故即解脫次結無盡意觀世音菩薩摩訶薩威神之力巍巍如是二意機應若有衆生多淫欲至便得離癡次結無盡意至是故衆生常應心念三身機為二初二求若有女人設欲求男至衆人愛敬求男有立願修行德業求女文略修行德業蓋以禮拜供養是同故略之又願各異故重出也次結無盡意至福不唐捐結如文二別答三業機竟三勸持名為三一勸持二格量三結歎今初是故衆生皆應受持觀世音菩薩名號上述聖名妙德不辨形質若欲歸崇宜持名字是故勸持也二格量無盡意若有人至於百千萬億劫不可窮盡入大乘論云法身唯一應色則多格六十二億應等一法身也智者云圓人唯一偏人則多格六十二億偏菩薩等一圓菩薩也三結歎無盡意至得如是無量無邊福德之利第一番問答竟第二番問答有二初無盡以遊化娑婆問無盡意菩薩白佛言世尊至方便之力其事云何問意有三云何遊問身云何説問口方便問意此菩薩三密無謀之權隨機適應也二如來以普門示現答亦三一別答二總答三勸供養今初佛告無盡意菩薩善男子至而為説法應以者答方便力也現身答其問遊也説法答其問口也凡有三十三身十九説法云云三十三身十九説法云云者應具指離合結説少故但十九如八部四衆但結一説二總答無盡意至遊諸國土度脫衆生結別開總別文廣意狹總答文狹意廣三勸供養此中見形聞法故勸供養也二初勸是故汝等至皆號之為施無畏者次受旨無盡意菩薩白佛言至遊於娑婆世界受旨有六一奉命二不受三重奉四佛勸五即受六結皆如文僭補曰即受者觀世音以悲故受以智故分作二分是受而不受也又無盡意施法施瓔珞此施是實相真因觀世音分供釋迦多寶此受是實相真果因果不二法輪一相也二偈頌續僧傳云偈是闍那掘多所譯秦譯無文故文句亦無釋今按會義引科注依慈雲懺主所分之科而消釋之大科分三初雙頌兩問二雙頌兩答三雙頌兩勸今初爾時無盡菩薩以偈問曰世尊妙相具我今重問彼佛子何因緣名為觀世音初句歎佛德次句雙含二問後二句別頌初問也二雙頌兩答二初加頌總歎行願二別頌兩答今初具足妙相尊至發大清淨願初二句經家敘辭次六句佛正歎也二別頌兩答二初頌前答二頌後答初中二初頌總答二頌別答今初我為汝略説聞名及見身心念不空過能滅諸有苦略説者舉要而言也聞名故稱口業機也見身故禮身業機也心念意業機也僭補曰聞名答前問見身答後問二頌別答二初頌七難二頌三毒二求初中十二初頌第一火難至十二加頌雷雨難今初假使興害意至火坑變成池火難若事須約果報惡業煩惱釋之諸難皆爾念彼觀音者若就佛説觀音為彼即約師弟假分彼此若就衆生念彼觀音即約感應暫分彼此師弟感應無非法界能所宛然能所斯絶衆生念自心中之彼觀音觀音應自心中之彼衆生感應道交不可思議二頌第二水難或漂流巨海龍魚諸鬼難念彼觀音力波浪不能沒三加頌墮須彌難或在須彌峯為人所推墮念彼觀音力如日虗空住約事即是假設之辭設使從須彌墮尚不損傷況餘山耶約觀解者本在中道實相性德須彌山王無明惡人推墮二死海中念彼觀音三智三德便同諸佛住無所住四加頌墮金剛山難例須彌難可解或被惡人逐墮落金剛山念彼觀音力不能損一毛五超頌第七冤賊難或值冤賊繞各執刀加害念彼觀音力咸即起慈心六追頌第四刀杖難或遭王難苦臨刑欲壽終念彼觀音力刀尋段段壞七追頌第六枷鎖難或囚禁枷鎖手足被杻械念彼觀音力釋然得解脫八加頌呪詛毒藥難呪詛諸毒藥所欲害身者念彼觀音力還著於本人呪使鬼神往殺前人若前人有種種福德所護不可殺者法須還著本人密部明之甚詳須知還著本人亦復具有四悉檀益昔人改云兩家俱沒事者見識單淺未知折攝之妙也九追頌第五鬼難或遇惡羅剎毒龍諸鬼等念彼觀音力時悉不敢害十加頌惡獸難若惡獸圍繞利牙爪可怖念彼觀音力疾走無邊方十一加頌蛇蠍難蚖蛇及蝮蠍氣毒煙火然念彼觀音力尋聲自回去十二加頌雷雨難雲雷鼓掣電降雹大雨念彼觀音力應時得消散正頌七難加頌有五共為十二以要言之菩薩衆生同一法性衆生一切諸難皆是觀音妙色妙心一切衆生于聖色心而自為難如暗中觸寶自傷其身又衆生於聖妙色心中三業求救而菩薩於衆生身心中慈悲映現即得解脫如鼓應桴無前後也初頌七難竟二頌三毒二求衆生被困厄無量苦逼身觀音妙智力能救世間苦三界火宅其苦無量欲界三毒現行苦人間無子苦尤切己身若能至心稱名與大士無緣慈力相應則即時解脫即時如願初頌前答竟二頌後答二初正頌示現二加頌顯機顯應初正頌示現長文有別有總別明三十二應總明身多境多今不分總別但通明三輪不思議化即分為三初明身業普應二明意業普觀三明口業普説今初具足神通力至以漸悉令滅具足神通力者百界千如全體之妙用也廣修智方便者權實二智照性以發通也上文但以非人二字含三惡趣今具出之故知具十法界身也二明意業普觀真觀清淨觀至普明照世間二偈中初一偈明所證體次一偈明所起用也真觀者證不思議空也清淨觀者證不思議假也廣大智慧觀者證不思議中也悲觀者以不思議三觀與諸衆生同一悲仰也慈觀者以不思議三觀與佛如來同一慈力也同慈力故云常願同悲仰故云常瞻仰由深證此一心三觀故發無垢清淨光明名為慧日能破十界三惑暗之集諦能伏十界二死災風火之苦諦能與十界道滅而普明照世間也三明口業普説悲體戒雷震慈意妙大雲甘露法雨滅除煩惱𦦨僭補曰悲體慈意者一切佛法起慈悲也戒雷者嚴淨毗尼震動三界也妙大雲者雨滅𦦨説法破惑也二加頌顯機顯應諍訟經官處怖畏軍陳中念彼觀音力衆冤悉退散二雙頌兩答竟三雙頌兩勸二初頌前番勸持名二頌後番勸供養初中又二初明境智深妙以勸常念二明感應難測以勸勿疑今初妙音觀世音梵音海潮音勝彼世間音是故須常念此明菩薩有種種德具種種名一一名字並詮法界圓融不思議德故須念也即權而實名為妙音即實而權名觀世音契本淨性名為梵音契十界機名海潮音權實不二自他不二故勝彼十法界世間音也所以觀音一名即與六十二億名號功德正等二明感應難測以勸勿疑念念勿生疑觀世音淨聖於苦惱死厄能為作依怙二頌後番勸供養具一切功德慈眼視衆生福聚海無量是故應頂禮二番問答竟三聞品功德二初持地歎證二經家述益今初爾時持地菩薩至當知是人功德不少自在之業謂於七難三毒二求皆得大自在也普門示現謂現十法界身方便説法也聞者功德已自不少況受持讀誦解説書寫如説修行者乎大佛頂經持地菩薩云時國大王延佛設齋我於爾時平地待佛毗舍浮佛摩頂謂我當平心地則世界地一切皆平我即心開見身微塵與造世界所有微塵等無差別悟無生忍聞諸如來宣妙蓮華佛知見地我先證明而為上首即今日事也二經家述益佛説是普門品時至三菩提心發心有三一觀行發心二相似發心三分證發心今必是分證也約化他勸流通中二勗受法弟子也釋普門品竟先申品目次釋經文今初妙法蓮華經陀羅尼品第二十六釋陀羅尼品此翻總持總持惡不起善不失其一又翻能遮能持能持善能遮惡其二其三此能遮邊惡能持中善其四初文者善惡異故即世界次一番具二悉故注其二三者能持善邊即為人能遮惡邊即對治中善即第一義故秪遮持二字四悉具足衆經開遮不同或專用治病如那達居士或專護法如此文或專用滅罪如方等或通用治病滅罪護經如請觀音又呪者是鬼神王名稱其王名部落敬主不敢為非故能降伏一切鬼魅其一或云呪者如軍中之密號唱號相應無所訶問若不相應即執治罪若不順呪者頭破七分若順呪者則無過失其二或云呪者密默治惡惡自休息譬如微賤從此國逃彼國訛稱王子彼國以公主妻之多瞋難事有一明人從其國來主令往説之其人語主若當瞋時説偈偈云無親遊他國欺誑一切人粗食是常食何勞復作瞋説是偈時默然瞋歇後不復瞋是主及一切人但聞斯偈皆不知意呪亦如是密默遮惡餘無識者其三或云呪者是諸佛密語如王索先陀婆一切羣下無有能識唯有智臣乃能知之其四呪亦如是秖是一法遍有諸力病愈罪除善生道合為此義故皆存本音譯人不翻意在此也次釋經文文為四一問持經功德二答甚多三請以呪護四聞品得益一問爾時藥王菩薩至得幾所福二問多不答甚多格出功德如文佛告藥王至如説修行功德甚多三請説呪有五番一藥王二勇施三毗沙門四持國五十女藥王又為四一請二説三歎四印下例有三如文一請爾時藥王菩薩白佛言至以守護之二説即説呪曰安爾至那多夜四十三三歎世尊是陀羅尼神呪至則為侵毀是諸佛已四印時釋迦牟尼佛至多所饒益二勇施爾時勇施菩薩白佛言至伺求其短無能得便即於佛前而説呪曰痤誓纍切𨽻至涅犁墀婆底十三世尊是陀羅尼神呪至則為侵毀是諸佛已三毗沙門爾時毗沙門天王護世者至説是陀羅尼即説呪曰阿梨至拘那履六世尊以是神呪擁護法師至無諸衰患四持國爾時持國天王至擁護持法華經者即説呪曰阿伽禰至頞音遏底九世尊是陀羅尼神呪至則為侵毀是諸佛已五十女五一列名二請説三歎四誓五印如文爾時有羅剎女等至俱詣佛所同聲白佛言至而説呪曰伊提履至䨲醯十九寧上我頭上至而説偈言若不順我呪至當獲如是殃夜叉翻捷疾鬼羅剎翻食人鬼二部是北方所領者富單那熱病鬼吉蔗起尸鬼若人若夜叉俱有此鬼毗陀羅赤色鬼犍陀羅黃色鬼未詳烏摩勒烏色鬼未詳阿跋摩羅青色鬼阿黎樹枝墮地法爾破為七片弒父母破僧是三逆罪外國油者搗麻使生蟲合壓之規多汁益肥此過尤也斗稱輕出重入欺盜之尤近世有小斗出大斗入震銘其背斯罪亦不輕也諸羅剎女至消衆毒藥佛告諸羅剎女至應當擁護如是法師三請説呪五段竟四聞品得益説是陀羅尼品時六萬八千人得無生法忍釋陀羅尼品竟先申品目次釋經文今初妙法蓮華經妙莊嚴王本事品第二十七釋妙莊嚴王本事品此因緣出他經昔佛末法有四比丘於法華經極生殷重雖卷舒祕教甘露未霑日夜翹誠晷刻無間歎云苟非其人乎地非其處乎世間紛愀靜散相乖直爾求間尚須厭棄況崇道乎於是結契山林志欣佛慧幽居日積衣糧殫罄有待多煩無時不乏一餐喀喀廢萬里之行十旬九飯屈雲霄之志可得言哉其一人云吾等四窮尚不存身法當安寄君三人者但以命奉道莫慮朝中我一人者捨此身力誓給所須於是振錫門閭以求供給自春至冬周而復始如僕奉大家甘苦無喜慍三人得展其誠功圓事辦一世之益當無量生其一人者數涉人間屢逢聲色坯器未火難可護持偶逢王出車馬駢闐旌旗吸赫生心動念愛彼光榮功德熏修隨念受報人中天上常得為王福雖不資亦有限也三人得道會而議云我免樊籠功由此王其耽果報增長有為從此死已不復為王方沉火坑良難可救幸其未苦正可開化其一人云此王著欲而復邪見若非愛鈎無由可拔一人可為端正婦二作聰明兒兒婦之言必當從順如宜設化果獲改邪婦者妙音菩薩是昔二子者今藥王藥上二菩薩是昔時王者今華德菩薩是所以白毫東召升紫臺而西引妙音神呪護經使流通而大益藥王説四聖之前緣故名妙莊嚴王本事品又妙莊嚴者妙法功德莊嚴諸根也此王往日於妙法有緣道熏時熟諸根應淨生雖未獲其理必臻靈瑞感通嘉名早立例如善吉雖未無諍已號空生故下文云得清淨功德莊嚴三昧以是義故名妙莊嚴王也次釋經文前品説呪護今品説人護人護尚爾呪護彌良普勸流通也文為六一明事本二雙標能所三能化方便四所化得益五結會古今六聞品悟道今初如文爾時佛告諸大衆至劫名喜見二雙標能所彼佛法中有王名妙莊嚴至於此三昧亦悉通達所化一人能化三人俱出其名別顯二子福慧六度四等餘經指此為十波羅蜜橫法門正道也三十七道品豎法門助道也此經指十度為正三昧是助禪度中具有三昧道品中節節有三昧更標七三昧者廣顯法門耳道品中節節有三昧者七科之中唯念處屬慧正勤屬進餘五科內皆有定名復別列名者當知隨用立名其理不異第三能化方便文為三一時至二論議三現化今初爾時彼佛至説是法華經初時至者彼佛出世常宣正法於王緣弱則非其時若説法華則其時矣文云彼佛將欲引導説法華經即其義也二論議文中子白母時至母讓令化父子怨生邪見家母責令憂念悉如文時淨藏淨眼二子至或聽我等往至佛所三現化於是二子至令其父王心淨信解現化應十八變可具釋之第四所化得益文為十一信子伏師時父見子神力如是至可共俱往王覩邪變或一或二狹而且漏見子所作歎未曾有信其子而伏其師問師是誰我亦願見二父王已信宮中八萬四千又熟白母稱慶願放出家母亦聽之於是二子從空中下至以偈白母願母放我等至願聽我出家母即告言聽汝出家所以者何佛難值故三重催父母今正是時佛難值故於是二子白父母言至時亦難遇譬一眼之龜者約事秖是譬佛法難值此正意也若作所表凡龜魚之眼兩向看之既云一眼所見非正在生死海而又邪見何可值於佛法浮木實諦之孔四化功已著佛歎功德彼時妙莊嚴王至令心信解好樂佛法法華三昧者攝一切法歸一實相如前説離惡趣者一往以三途為惡趣具論二十五有皆乖真起妄悉是惡趣今皆離之即二十五三昧破二十五有也佛集三昧者即祕密之藏佛集其中唯佛行處非餘人也五俱詣佛所聞法供養見瑞歡喜於是妙莊嚴王至成就第一微妙之色六佛與授記時雲雷音宿王華智佛至功德如是七出家修行其王即時以國付弟至得一切淨功德莊嚴三昧八稱歎二子即升虗空至饒益我故來生我家九佛述行高爾時雲雷音宿王華智佛至令住正見佛讚善知識大有義善知識能作佛事此則外護善知識示教利喜者此則教授善知識所謂化導令得見佛者此則同行善知識令入菩提此則實際實相善知識雜阿含云善知識者若貞良妻此即外護義又善知識者如宗親財此即同行義又善知識如商主導此即教授義又善知識如子臥父懷此即實際義也十歎佛自誓妙莊嚴王至説是語已禮佛而出第五結會古今先結會佛告大衆至今藥王菩薩藥上菩薩是僭補曰前釋品目中云母是妙音菩薩今結會古今云淨德夫人是佛前光照莊嚴相菩薩前後不同何也答曰大士影響元無定迹在淨華宿王智佛所名曰妙音在釋尊會中名光照莊嚴相蓋由得現一切色身三昧隨緣映現假名不同不可泥迹也次結歎二菩薩是藥王藥上菩薩至一切世間諸天人民亦應禮拜第六聞品得道如文佛説是妙莊嚴王本事品時至得法眼淨僭補曰聞品得益中法眼淨者當是五品以上六根清淨位舉眼攝餘也釋妙莊嚴王本事品竟先申品目次釋文今初妙法蓮華經普賢菩薩勸發品第二十八釋普賢菩薩勸發品大論觀經同名遍吉此經稱普賢皆漢語梵音邲輸陀此云普賢悲華云我誓於穢惡世界行菩薩道使得嚴淨稱法界性修行普行行行遍滿法界寶藏佛言以是因緣今故字汝名為普賢今論等覺之位居衆伏之頂伏道周遍故名為普斷道才盡所較無幾鄰終際極故名為賢釋論引十四夜月如十五夜月斯義明矣此且約圓教位前普賢故作是釋此菩薩實是果後行因位後普賢不可以常途釋之言勸發者戀法之辭也遙在彼國具聞此經始末既周欲令自行化他永永無已故自東向西而來勸發具四悉檀意文云我為供養法華經故自現其身若見我身甚大歡喜世界以見我故轉復精進即得三昧及陀羅尼為人得是陀羅尼故無有非人能破壞者亦復不為女人之所惑亂對治三千大千世界微塵菩薩具普賢道第一義此乘四悉檀而來勸發也上判流通為三從十九行偈已後隨喜法師不輕三品半舉經力大以勸流通神力囑纍二品囑纍流通藥王品下五品舉菩薩化導力大以勸流通此一品舉普賢誓願力大以勸流通分文為四一發來二勸發三述發四發益初經家敘發來為三一上供二下化三修敬今初爾時普賢菩薩至作無量百千萬億種種伎樂自在者理一也神通者行一也威德者人一也名聞者教一也又自在者常也神通者樂也威德者我也名聞者淨也言説如此即一而四德無不備自在義焉淨力故雨華樂力故奏伎神通力故動地自在力故隨意而雨隨去隨雨隨動隨奏譬如大龍飛行不息身邊雲雨流起無窮普賢及眷屬以菩薩身用四德力來勸發四一所經歷處自行上供其事如此隨去等者去動秪是表來去也隨者非先積而後雨非先畜而後奏故以龍雨譬之此是心力法力衆生力應化力不思議力之所致也二下化又與無數諸天至各現威德神通之力從又與諸天龍下所經歷處下化利益隨他所宜現八部像略用二力隨所堪任其事如此略用二力者威德神通前已具列自在等四以表四德今略無自在及以名聞但二兼二故也經文既云與無數等各現二力者當知所隨皆法身也主伴並具四德故云各也三修敬到娑婆世界至右繞七匝修敬身旋面禮如文一發來竟二勸發為二一請問勸發二誓願勸發今初有問有答先問白佛言世尊至云何能得是法華經問者遙聞經竟戀法無已遠來之志志在勸發是故更請正説勸發自行更請流通勸發化他如來若許二途再演光光無極是故雙請也僭補曰雙請者從白佛言下至當為説之是請為現前諸來衆説正從若善男子下至如來滅後云何得是法華經是請為未來説流通也二佛答三初標次釋三結今初佛告普賢菩薩至於如來滅後當得是法華經次釋一者為諸佛護念至四者發救一切衆生之心別列四法名如文其既雙請如來巧答略舉四以蔽諸良由四法之要該括正通何者佛雖無偏若能遠惡從善反迷還正開權知見顯佛知見者則稱可聖心諸佛護念若佛知見開則般若現前是植衆德本亦是入正定聚不亂不味不取不捨亦是發救衆生又當知此四與開權顯實名異體同無二無別佛護念者是開佛知見植衆德本是示佛知見發救衆生是悟佛知見入正定聚是入佛知見迹門之要此四備矣又迹則有本從本開示悟入故有迹中開示悟入今開迹即顯本本迹無二無別以四法答其請正於義明矣又以四法答請流通流通之方唯三唯四發救衆生是入如來室入正定聚佛所護念是著如來衣植衆德本是坐如來座是弘宣之要即三而四發救衆生是誓願安樂行入正定聚是意安樂行植衆德本是口安樂行護念是身安樂行當知後四即前四行也一答酬其兩請舉四冠一經法華之重演斯經之再宣遠來之勸發其義如此唯三唯四者四秖是四安樂行三秖是三德及座衣室三前文釋衣等三皆通兩句各有能所今從一邊則以空座為般若所覆為法身能覆為解脫三結善男子善女人至必得是經問請既雙請如來答中標結皆言成就四法於如來滅後當得是經不言現前説正何也此是以後況前能成就四法如來滅後尚得此經況如來現在為衆説法耶故上文云諸法實相義已為汝等説又云咸令衆生開示悟入佛之知見蓋法華之正體能行四法必得此解名解為經此結其請正之問若能運此解行傳與他人他人得斯信解成初依人能得真解成第二第三第四依人此結其請流通之問此意不見浪作餘解耶浪作餘解者設若有人不許此解則為不許自行化他則為不許開示悟入則為不許室衣座三若言非是不許但是無文若謂經無即是不許逐要重説若不爾者將何以攬今經正宗至此為重説耶僭補曰行此四法者亦是發菩提心起四弘誓願云發救一切衆生心者是衆生無邊誓願度也云入正定聚者是煩惱無盡誓願斷也云植衆德本者是法門無量誓願學也云為諸佛護念者是佛道無上誓願成也蓋菩提心佛心也得佛之心即得聞開權顯實開迹顯本二門開顯既明正説已竟又以此四法傳明與人明明相繼如來滅後有衆生得此四法者無有不得法華經即是流通於無盡也第一請問勸發竟第二誓願勸發文為二一護人二護法護人為六一攘其外難有二初總攘其難故言使無伺求得其便者是也爾時普賢菩薩白佛言至得其便者次別攘其難舉十二種若魔若魔子至諸惱人者皆不得便二護其內法凡三番教訓初行立讀誦乘六牙白象安慰其心是人若行若立至亦為供養法華經故次坐思惟復乘六牙教示其經與其三昧是人若坐思惟此經至得如是等陀羅尼旋陀羅尼旋假入空也百千旋者旋空出假也方便者二為方便道得入中道第一義諦也後三七日一心精進復乘六牙示教利喜説呪世尊若後世後五百歲至即於佛前而説呪曰阿檀地至辛阿毗吉利地帝二十三覆以神力世尊若有菩薩至皆是普賢威神之力若聞若持莫非神力四示勝因若有受持讀誦至為諸如來手摩其頭若有受持乃至解其義趣如説修行具五種法師德即于三世佛所為種為熟為脫此人同未來諸佛得脫故言同普賢行此人已於先佛植善故言深種善根此人為現佛所熟故言手摩其頭五示近果若但書寫至有如是等功德利益但能書寫近在忉利具五法師次兜在率如文僭補曰若人但書寫不能受持讀誦乃至解其義趣如説修行但生忉利不離欲界若具五種法師之德即生兜率親覲慈氏與諸大菩薩所共圍繞同聞妙法然亦有百千萬億天女眷屬同生者乃是同見同行預入聖流者非忉利天女也六總結二一結護人是故智者至如説修行僭補曰護人者謂但恃書寫承福力生忉利天受五欲樂福盡沉淪非是智者若能解其義趣如説修行具法師德始稱智者也二結誓願護法世尊我今以神通力故至廣令流布使不斷絶第二勸發竟第三述發六先述護法爾時釋迦牟尼佛至守護能受持普賢菩薩名者云汝能如是外多利益內積慈悲又久劫已來作如此護我亦以神通之力守護能受持普賢名者亦如普賢之護法也二述其護人普賢若有受持讀誦至為釋迦牟尼佛衣之所覆僭補曰二述護人者若人具法師之德則為從佛口聞經則為親供養佛為佛讚善手摩其頭衣覆其體以法性功德與如來等與普賢等是為同體智悲周流法界天性相關感應自然不因心念也三述其舉因如是之人至能修普賢之行廣舉因中無諸過惡少欲知足修普賢行故能受持讀誦憶念修行及書寫是法華經四述其近果普賢若如來滅後至亦於現世得其福報其人當詣道場必成遠果況近果耶亦於現世得其近果受用自然無貪著也五述其能攘外難若有人輕毀之言至諸惡重病佛廣示毀者之罪令知過必改不相惱亂非但持經者不受其毀亦令毀者福生無毀無譽彼此安樂曠濟無偏慈之至也六述其結信者功德是故普賢若見受持是經典者當起遠迎當如敬佛第三述發竟第四發益二一聞品益説是普賢勸發品時至具普賢道旋陀羅尼是初地位具普賢道是十地位二聞經益大衆歡喜佛説是經時至受持佛語作禮而去皆大歡喜者靈山一會聞法已竟皆得如來四無量心之大喜遍滿法身周流法界流通終古永永無盡也問此中云何猶稱聲聞答乃是經家存其外現之名蓋其意謂是大乘聲聞以佛道聲令一切聞斯義彌顯也荊溪尊者曰天台教迹竺國欣慕欲求之震旦不可得而此方少有識者如魯人耳唯夙植德本者始知趣向敬願學者隨力稱讚應知自行兼人曠劫一遇若説若聽境智存焉若冥若顯種熟可期並由弘經者有方故也若直爾講説是弘經者何須衣座室三之誡如來所遣豈可聊爾余省躬揣見自覺多慚迫以衆緣強復疏出縱有立破為樹圓乘使同志者開佛知見終無偏黨而順臆度冀諸覽者悉鑑愚誠一句染神永為佛種思惟修習深契佛心隨喜見聞恆為主伴若取若捨經耳成緣或順或違終因斯脫願解脫之日依報正報常宣妙經一剎一塵無非利物唯願諸佛冥熏加被一切菩薩密借威靈在在未説皆為勸請凡有説處親承供養一句一偈一色一香增進菩提永無退轉
