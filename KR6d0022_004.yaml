body:
  text: 隋章安尊者灌頂結集陳隋天台智者大師說唐荊溪尊者湛然述記閩鼓山私淑比丘道霈纂要先申品目次釋經文今初玅法蓮華經信解品第四釋品者夫根有利鈍惑有厚薄說有法譬悟有前後法華座前猶如豌豆文云如來說法既久我時在座身體疲懈但念空無相無作於菩薩法都無一念好樂之心初聞略說動執生疑廣聞五佛朧未曉今聞譬喻歡喜踊躍信發解生疑去理明歡喜是世界信生是為人疑去是對治理明是第一義以是因緣故名信解品豌豆豆名夏收者謂聲聞中間取證不等待所因也又中根之人聞說譬喻初破疑惑入大乘見道故名為信進入大乘修道故名為解文云無上寶聚不求自得我等今日真是聲聞以佛道聲令一切聞聞圓教入圓位故名信解品本迹者四大弟子久入大乘成就佛法迹引中根示初信解故名信解品次釋經文此是領解段近領火宅遠領方便文為二一經家敘歡喜二白佛自陳初又二先敘內喜爾時慧命須菩提至歡喜踊躍善吉獨稱慧命三人摩訶者通論皆大皆慧別論善吉解空空慧為命此約行也諸慧人中佛慧第一佛於般若命其轉教其為慧人所命故云慧命三弟子被命少不以空為行宗此約教也摩訶如前說得喜之由遠聞方便五段法說經家但敘聞希有法聞授記二種或可聞法敘四段見授記是第五段也如此聞見昔未曾有歡喜之由也發希有心者敘近聞譬喻四番之說希有心發心發故名之為信以信故入入歡喜位即信解品意也譬喻四番者長行偈頌各有總別亦復各有開譬合譬重重聞之希有心發也次敘外儀即從座起整衣服至曲躬恭敬瞻仰尊顏如文例身子亦應三業領解準前可知具如身子領偈二白佛自陳文為二初長行二偈頌長行又二初法略說領解二譬廣說領解略又二一法說二略舉譬法說又二一明昔稟三故不求二明今會一故自得不求中有標有釋初標而白佛言我等居僧之首至心不喜樂初居僧首者法臘既高晚學以我為軌忽改途易轍棄小求大為後來所嫌自固護彼所以不求二俗年已邁若作菩薩當專任大道廣度眾生今既朽老無所堪任是故不求三已得涅槃無為正位不能發大心高原陸地不生蓮華盡無生智已立無所依求也次釋三不求所以者何世尊令我等至不生一念好樂之心先釋得涅槃不求次釋年邁不求既言在座復道年朽釋僧首不求也二明今會一故自得即領解也我等今於佛前至深自慶幸獲大善利我等今於佛前下陳得解之由由遠聞五章略廣開三顯實是故慶幸獲大善利者正陳得解是近聞四番譬喻希有之法而獲開悟開悟善利也第二略舉譬無量珍寶不求自得譬昔不求而今自得希有法寶也無量珍寶者昔般若領教謂為菩薩豈圖於今全蒙等賜初法略說領解竟第二譬廣說領解有二一開譬二合譬今初開譬又二先諮發世尊我等今者樂說譬喻以明斯義二正立譬為五一父子相失譬近領火宅總譬遠領方便略頌二父子相見譬近領火宅見火遠領方便我以佛眼觀見三追誘譬近領火宅捨几用車遠領方便寢大施小四委知家業譬乃追領方等彈呵大品轉教意五付家業譬近領火宅等賜大車遠領法說正直捨方便但說無上道又合第四第五共為一領付譬在下更明其意也今依文附義若釋窮子取二乘人半字法門銷文若釋長者取盧舍那佛滿字法門銷文何者宅內長者脫瓔珞著垢衣衣瓔有異人秪是一譬盧舍那佛隱無量佛德示丈六金輝執持糞器設三乘教隱顯有殊何關體別初父子相失譬又為四一子背父去二父求子中止三子遇到父城四其父憂喜四段各兩初兩者一捨父逃逝領總譬中五百人昔結大乘子父尋復失解流浪五道故言或十二十至五十歲通是佛子子義微弱故言幼稚非結緣己界故言久住他國二者向本而還領總譬三十子此緣有微著之義故言長大緣既經苦關佛大悲故言遇到本國非結緣己界等者本結大緣寂光為土期心所契法界為機退大已來機土全失流浪五道望本為他方便有餘尚非己界況寂光土耶今窮子所居現處五濁且以所住望本為他自爾已來常在三界故云久住此緣至長大者機中稍厚且與著名仍未復初但云三十緣既下以苦為機故知猶在小化前也到而不識故名為遇是昔曾見故名為本二父求子中止為兩者一父求子不得領總譬中長者從眾生退大之後伺其大機未得其會故言不得二中止一城其家者領總譬中宅大富者領總譬中長者德業內外財富意耳三子到父城為二一到城之由領火起苦惱之相從退大已後處處遊歷備嬰辛苦二遂到父城者以苦為機扣於大悲故言遂到父城四其父憂喜為兩者一念失子苦二念得子樂領總譬中一門子既幼稚取門不當動父之憂元以此門通之故動父之喜初子背父去有二一捨父逃逝譬若有人年既幼稚至或十二十至五十歲初譬若有人譬二乘人菩薩位行難知且齊已領耳年既幼稚者以無明厚重覆障解心解心無力故言幼稚善根被熏稍稍欲著名為長大捨父逃逝者退大為捨無明自覆曰逃趣向生死為逝問佛捨應後眾生起惑是父離子非是子捨父答由眾生不感佛則去世還成子捨父義久住他國者涅槃法界是佛自國生死五欲是為他國本求出離而退墮不反故云久住或十是天道二十人道五十是五道約於一人備輪諸道二向本而還年既長大加復窮困至漸漸遊行遇向本國上云幼稚者幼有二義一癡小故二未遭苦故則不知還譬結緣已後大解未濃如癡不反尚有殘福耽迷不反今云長大者以習業冥熏微知向道遭苦失樂思求出要此二為機扣佛名為漸向父國上文云若人遭苦為說涅槃若以人天二善非感佛緣在三界中不見佛父不得出要之術為窮八苦火燒故為困馳騁四方以求衣食者佛既未出諸凡夫人身受心法起於四見於中求正道如求食求助道如求衣以厭苦求理為可化之緣佛初出時諸外道等皆先得度即此意也大經云諦觀四方喻於四諦準此可知漸漸遊行遇向本國者明其厭苦希脫邪求涅槃雖非本意亦蒙值佛故云遇向也本國如上說下文明城舍云何分別以斷德涅槃防非禦惡為城舍語又親同體大悲為舍也第二求子中止二者一求子不得其父先來求子不得初從退大已後求機不會不會故名不得二中止一城中止一城其家大富至商估買客亦甚眾多中止一城者不為一子而廢家業譬佛不以一處無機而廢餘方施化今取方便有餘土為國在同居實報兩間為中有餘涅槃為城住此涅槃名止處此為家起勝劣兩應劣應應聲聞勝應應菩薩五人斷通惑者同生其土皆為菩薩佛以勝應應之純以大乘家業訓令修學中止於此伺覓同居子機非但中義得合國城家業皆悉分明大富者實相境為家具足萬德名為富五度福德名為財般若智慧名為寶導一切悉摩訶衍名無量金銀珠等是大乘三十七道品也此即領上長者大富義也倉庫盈溢者在內為盈在外為溢盛米為倉盛物為庫倉譬禪定禪生百八三昧故庫譬實相能發十八空智慧故自資為盈外化為溢領上多有田宅義也僮僕者方便知見波羅蜜皆悉具足屈曲隨機稱事稱理此領上又多僕從就位為語二乘及通教菩薩別教三十心悉如僮僕別教圓教十地如臣向十如佐十行如吏十住為民初入佛境界率土之濵無非王民雖得為民比吏佐等猶為疎遠十行歷別修習諸法種種驅馳如吏十迴向事理稍深職近王邊如佐十地輔佛行化降魔制敵故如臣也一心三觀如象運圓教大乘次第三觀如馬運別教大乘即空析空觀如水牛運兩教大乘析法觀自行如鹿羊等運二乘之法無數者權實諸法皆名車乘權實智觀名象馬牛羊非但教法甚多觀智亦復無數也出入者二而不二是入不二而二是出又不二而二是入二而不二是出無量還一是入一中無量是出化他用為出自行用為入出法益眾生為息化功歸己為利乃徧他國者徧於三土行於非道通達佛道即其義也唯法性是己國耳商估賈客亦甚眾多者諸菩薩是商人又徧入三土以求法利故云眾多此土菩薩往他方聽法他方大士來此聞經往還採利也又應化二身如賈客將實法徧入三土化益眾生而歸法身故云甚多如世間人令他捉財興生亦自興生也第三子到父城二者一求衣食時貧窮子遊諸聚落經歷國邑初內合退大乘已備遭諸苦深起厭患欲求出離取理不中致成邪僻因邪慧歷心易可入正以求出世為感佛由也觀察五陰為聚落十二入為邑十八界為國歷此求理名求衣食二到父城遂到其父所止之城此是正向其父所止之城者苦境為機感佛大悲名為到城城即涅槃涅槃通半滿眾生習解可有得涅槃之義故言到城第四其父憂喜二者一念失子之苦父每念子至是以慇懃每憶其子如來自昔至今恒思子大機故言每念五十餘年者五道也鬼道攝修羅故言餘也未曾說者未曾向方便有餘土中臣佐吏人說有此子機緣也又應世已來自昔華嚴方等大品諸座未曾向諸大士說此聲聞本是大乘之子既非佛子不解佛法或如聾啞或華著拜座或棄鉢茫然種種不逮也心懷悔恨者悔昔不勤教詔致令無訓逃逝恨子不惟恩義疎我親他內合如來悔不殷勤令入內凡遂退失本解恨子無心不能精進固志逃迷不返故言悔恨也自念老朽者化期將畢無傳大法之人如老朽而無子也問法身所化諸菩薩等悉堪補處何遽此憂答法身所化本無興廢誰譚老朽此非所論今明化身眷屬則有二種一法身大士共相影響迹雖弟子本或是師亦不約此自念老朽也二者同居凡夫始從化佛初發道心者名此為子也子繼父業令胤族不斷若身子受決作華光佛則一方佛種相續不斷大乘家業遞相傳付若身子無可化之機則大乘法財現無付囑後來眾生佛種安寄老朽興歎正為此也二念得子為樂復作是念我若得子委付財物坦然快樂無復憂慮可度之機名為得子與受佛記名付法財稱於本心復言快樂第一父子相失譬竟第二父子相見譬為二一子見父窮子傭賃領火宅所見之火法說所見五濁二父見子領火宅長者見法說中佛眼見也法譬竝明火前見子此中明子前見父就佛則靈智先知機成赴應故言父先見子若約眾生必先感而後應故言子先見父機應不可思議不後不前故前後互舉也文中一子見父二父見子此兩段中各復為四初子見父四者一見父之由由求衣食二見父之處處在門側三見父之相踞師子牀四生畏避悔來至此今初世尊爾時窮子傭賃展轉遇到父舍見父之由由厭苦欣樂推求理味漸漸積習遂成出世善根故言傭賃展轉以此善根能扣佛慈悲故言遇到父舍父喻道後法身舍喻無緣慈悲大小二機雙扣此舍有大機故故言遙見其父有小機故住在門側若唯小無大則應不見尊特之身父不應言我財物庫藏今有所付若唯大無小不應住立門側子不應言非我傭力得物之處也二見父之處住立門側遙見其父見父之處者即是門側二觀為方便即門二邊圓中之機當門正見二乘偏真故言門側但空三昧偏真慧眼傍窺法身耳遙見其父者正見有二種一近見二遠見今言大機始發扣召事遠是故言遙又機微非堪應赴名之為遙也三見父之相踞師子牀至種種嚴飾威德特尊踞師子牀者圓報法身安處空理無復通別二惑八魔等畏故云踞師子牀也華嚴說第一義空四無所畏為牀也寶几承足者定慧為足實諦為几無生定慧依真如境也婆羅門舊云高良大姓八地已上也剎利者七地已還也居士內凡夫等今明勝應應菩薩即盧舍那尊特身大機所扣者也劣應應小乘丈六弊衣小機所扣者也今經明常住醍醐與涅槃等法身圓頓與華嚴等所譬長者威德及侍衛剎利婆羅門等恭敬圍繞悉指華嚴中眷屬皆無異也所說法相如彼所明亦復無別婆羅門名淨行貴族高潔即等覺離垢菩薩也剎利即是王種九地已下初地已上也居士富而不貴即三十心也真珠瓔珞者即戒定慧陀羅尼三昧也價直千萬者即四十地功德以嚴法身也吏民僮僕者異門明義即是稟方便教斷通惑者名為民稟別教斷通惑者名為吏若同門明義者還是方便波羅蜜也內與實智同外與機緣同喻如吏民有內奉外役之義也白拂者即是權智之用也左右者右即入空智用拂四住塵左即入假智用拂無知塵此二為中道方便故言侍立覆以寶帳者真實慈悲也垂諸華旛者華即四攝旛即神通香水灑地者降注法水灑諸菩薩心地以淹惑塵亦是定水灑散心地也散眾名華者布以七淨華謂戒定慧斷疑道非道知見淨斷知淨也戒者攝律儀等三種戒也定者首楞嚴等也慧者實智慧也斷疑者已度二諦之疑也道非道淨者行於非道通達佛道也知見淨者智德圓滿了了見佛性也斷知淨者斷德成就無明永盡也羅列寶物者羅列諸地真實功德也出內如前釋威德特尊者光明無邊色相無邊相海巍巍堂堂此華藏舍那光明徧照之尊豈可不識而作他釋耶四見父畏避窮子見父有大力勢至作是念已疾走而去窮子見父有大力勢者智大故名大力神通大故名大勢如上身手有力義也恐怖者小機劣弱怯懼大道也悔來至此者佛本欲以大法擬之應不稱機但有退大之意故言悔來至此也竊作是念者機中潛密冥有此事非是顯對見勝應身也或是王王等者波旬是王徒輩為等小機灰斷無言說道絕於色像既見勝應之像非天人所及所說法相迥異二乘小智薄德未曾見聞便謂是魔是魔所說略開三顯一身子狐疑將非魔作佛惱亂我心耶若初用大逗小疑佛為魔有過今日也復次勝應譬長者長者即表報身佛故是王等法身是報師師即如王諸經多名是經王智契於法即是智與法等故名報佛為等此乃大乘法報非是小乘得益之處故或是王王等也非我傭力得物之處者小機不能受大化也不如往至貧里乃至衣食易得者淨名云能以貧所得法度斯下劣也但空之理不含萬德非如來藏故言貧里偏空稱於小智故言肆力有地也衣食易得者能得有餘涅槃無漏衣食也若久住此或見逼迫強使我作者行大乘道經無量劫故言久住我本厭怖生死若修大乘必入生死廣學萬行故言逼迫我本樂小而今令我發大乘菩提心是為強使捨大取小故言疾走也第二父見子譬亦有四一父見子處二見子便識三見子歡喜四見子適願今初時富長者於師子座見子處者即師子牀也如來法身居第一義空無畏之境明照機也二見子便識見子便識見子便識者知是往日結緣眾生也三見子歡喜心大歡喜心大歡喜者佛恒伺子機今機來稱慈是故歡喜即是領法說而起大悲火宅即大驚怖彼明拔苦故言驚怖此明與樂故言歡喜四見子適願即作是念至我雖年朽猶故貪惜即作是念庫藏今有所付者是見子適願昔見眾生退大取小貧里求食資生艱難常欲與財無機不得今日機來稱大慈心故言庫藏今有所付我常思念者明其非但貧無大財又流轉生死眾苦所逼為大悲所痛故言常思念之雖欲救拔無機叵濟故云無由見之今有可度機生故云而忽自來稱大悲心故云甚適我願我雖年朽猶故貪惜者釋於適願之由由一期化訖故言年朽未見大機法無委付將來之徒從誰得脫為求可度者故言貪惜今機自來無此憂念故我云甚適我願也第二父子相見譬竟第三明追誘譬近領火宅捨几用車遠領法說寢大施小此文為二初遣傍人追次遣二人誘前追領上身手有力而不用之又三一用勸門擬宜無機即遣傍人急追將還至我不相犯何為見捉即遣傍人下四句勸門擬宜也智是能遣教是所遣理義為正教義為傍從佛出大乘十二部擬宜眾生無機不受於其如乳故言遣傍人也又傍人者傍臣佐等也即是遣法身菩薩為說大乘如華嚴中令四菩薩說四十地法慧菩薩說十住功德林菩薩說十行金剛幢菩薩說十迴向金剛藏菩薩說十地即是遣傍人也疾走往捉者大乘明義顯露正直用此赴機疾趣菩提故大車中云其疾如風且菩薩自有神力又被佛加亦能令彼疾入菩提窮子驚愕下四句即勸門無機既現無機縱昔曾發廢久不憶卒聞大教乖心故驚不識故愕稱怨大喚者小乘以煩惱為怨生死為苦若勸煩惱即菩提即大喚稱怨枉若聞生死即涅槃即大喚稱苦痛無機不受勸門也我不相犯者我不干求何意用大化我此領勸門二意也二用誡門擬宜不受使者執之逾急至轉更惶怖悶絕躃地使者執之逾急強牽將還二句誡門擬宜前明勸善猶是容與我當為說怖畏之事即是急切強牽將還誡以苦言令其遠惡內既無機外逼大化即是強牽將還也于時窮子自念無罪六句不受誡門也眾生罪故入生死獄菩薩以慈悲故亦同罪入獄二乘人無大悲名為無罪令入生死即是無罪而被囚執也無大方便而入生死必永失三乘慧命故言必死思此等事故言轉更惶怖也強以大乘小智不解故言悶絕即起誹謗必墮三途故言躃地亦是迷悶溺無明地三放捨勸誡息大乘化就此為四一思惟息化二釋息化三正息化四息化得宜今初父遙見之而語使言至莫復與語初有兩意一知大志弱二知小志強大志弱者父遙見小去大遠故名為遙是結緣子故言為見而語使言者約教為使者智本說教智知無機智息故教息約人為使者語諸菩薩不須現汝尊玅之身令二乘見淨名中攝汝身香無令彼諸眾生而起惑著普賢入此娑婆促身令小皆是其義也勿強將來者既無大機恐傷其善根故言勿強也私謂不須此人者思惟息勸門擬宜勿強將來者思惟息誡門擬宜也冷水灑面三句知有小志宜以灰斷理水除見思之熱面也厭生死名背向涅槃如面言醒悟者開小逗機得離煩悶悟四真諦也莫復與語者決定應息大乘教也二釋息化意所以者何父知其子至不語他人云是我子釋息化意者正厭苦欣空親狎下劣無慈悲心即畏難大法且任其小志抑佛本懷所以息化也審知二萬億佛所曾發道心非都無大機且息大化佛意未已更俟後期也不語他人者於昔小乘教中隨他意語方便覆護稱是聲聞不說隨自意語云是菩薩也三正息化使者語之我今放汝隨意所趣我今放汝即是知大機弱隨意所趣即是知小善強以此二緣故息大化也四息化得宜窮子歡喜得未曾有從地而起往至貧里以求衣食息化稱機不為大教所逼是故歡喜無謗大罪得免三途故言從地有小善生故言而起又前擬宜大法迷悶不解臥無明地今逗以小可得醒悟故言從地而起於四諦中欲求道法故言往至貧里以求衣食也初遣傍人追竟第二密遣二人誘引此為二一齊教近領三車救子遠領波羅奈施權二從又以他日下取意領法身地久照方便非道樹始知用小早鑑眾生故隱尊特親狎垢衣此追領往前以成今解問四大弟子何因能知法身久照答推近知遠若始道樹知無大機不應兜率降神正慧託胎乃至現有煩惱納妃生子三十四心後身斷結驗知脫大小相海微玅瓔珞更著麤弊丈六垢衣其已久矣今初且釋齊教領者譬喻品文有四一用方便擬宜二知先心三歎三車四適其所願爭出火宅也方便品亦然今初領上擬宜爾時長者將欲誘引其子至我等二人亦共汝作將欲誘引者既息大化不容孤棄欲設方便故言將欲密遣二人者四弟子齊己分領不涉菩薩故言二人約法是因緣四諦約理是有作真俗約人是聲聞緣覺初擬大乘云即遣傍人表一實諦一大乘教一菩薩人今明方便隱實為密指偏真為遣約教隱滿字為密指半字言遣約人內秘菩薩行故言密外現是聲聞故言遣形色者二乘教中不修相好但說苦無常不淨即是形色憔悴也約人則諸菩薩隱其本色示以迹形非了義說無有十力無畏名無威德也汝可詣彼者即以小教擬小機也大教明理直實故言疾走往捉小教明理迂隱故云徐語此有作處者見修兩道是斷惑作處也倍與汝直者五戒十善止出三途今四諦十二因緣能出生死是為一倍又外道六行但能伏惑今修四諦斷惑得至涅槃是為二倍也窮子若許者有機是許即設教無機是不許不設教欲何所作者二乘唯欲除惑取證不論淨佛國土成就眾生所以言僱汝除糞我等二人亦共作者二乘鈍根憑教行行方能修業約理者即是智諦相資也約人即權人共實人修行也二領上先心時二使人即求窮子既已得之即求窮子審知有機故言已得領上知先心也三領上歎三車具陳上事陳說僱作領上歎三車除苦集之糞取道滅之價四領上適願爭出火宅爾時窮子先取其價尋與除糞其父見子愍而怪之先取其價者領上適願爭出火宅二乘慕果行因所以先取也其父見子愍而怪之者怪不求佛道愍其取阿羅漢所失者大所得者寡故言怪也齊此領法譬中意其文竟自此文後法說但有施權譬說唯有等賜略中間二味也一齊教領竟第二取意領靈智先照久設權謀崎嶇隨逐非止樹下始見因緣已如上說此文為四一領先以權智久欲擬宜二久知方便是其玩好三領久知須歎三車四親教子作適願受行今初又以他日於牕牖中遙見子身又者鄭重辭也將欲取意領法身之地久知大小之機一三施化重述佛意故標章稱又也他日者二乘自謂方便為己非二乘法為他即擬法身也日者時也亦智也依法身之時用智照機故言他日若從此義實智照實為自權智照方便為他齊教領領化身用事為己日非化身用事為他日若就如來自行權實之智皆名為己如來化他權實之照皆名為他如來自他權實之照照實為己照權為他此之探領法身之時用化他之權智照於權機若有若無照用權事若可若否皆是權智所照故言他日若從此義齊教領領化他之權事故二乘稱己事探領領法身自他之權此權非二乘事故稱為他雖有兩意他日俱成今依二乘所領又逐他日之文以探領領法身中照機也牕牖者偏見則小表權智照彼偏機也遙者小去大懸故名為遙見子者昔曾種大稱之為子以大擬之故言為見牕牖偏狹未宜大化故息大而施小也二領知方便是玩好羸瘦憔悴糞土塵坌污穢不淨羸瘦等者修因智力少為羸修因福力少為瘦內怖無常為憔外遭八苦為悴四住為糞土無知為塵坌也三領知須歎三車即脫纓珞細輭上服嚴飾之具至狀有所畏即脫玅服者譬隱報身無量功德四十二地戒定慧陀羅尼等纓珞寂滅忍細輭上服大小相海嚴飾之具容服若盛子則驚畏二乘不宜見此相好是故脫之更著麤弊者現丈六形是麤生忍法忍是弊也塵土坌身者現有煩惱有為有漏也執除糞下但治見思有漏之法不論諸地清淨智慧也左手喻實右手喻權權用便易自以此法斷結成佛又用此化人狀有所畏者示同怖生死又有寒風馬麥之報也又有寒風等者大論第九佛有十惱謂六年苦行孫陀利謗金鏘馬麥瑠璃殺釋乞食空鉢旃遮女謗調達推山寒風索衣加雙樹背痛為十四親教子作適願受行即是道品中七科法門以顯除糞之相領上諸子心各勇銳互相推排競共馳走爭出火宅也七者一語作人譬譬四念處是外凡位二令勤作勿得懈息譬譬四正勤三咄男子勿復餘去譬譬四如意足四好自安意下名安慰譬譬五根五所以者何下名無五過譬譬五力此前四句是第二內凡位六即時長者字以為子譬譬八正七雖欣此遇下名教常令除糞譬譬七覺此二句是第三聖位也今初語作人譬語諸作人語諸作人者即是說三藏示四念處是除糞之器斷結之境故遺教云常依念處行道能破四倒領火宅中適願勇銳即是聞慧也二領勤作譬汝等勤作勿得懈息以方便故得近其子勿得懈息者即是正勤令勤修四念處也若起懈息不能滅二惡不能生二善以二勤故能發煖火對火宅互相推排入修慧煖位也以方便故得近其子者念處未得理火溫心猶為疎外不可附近以初得煖方便則可附近也三汝常此作譬後復告言咄男子至亦有老弊使人須者相給咄男子者咄是驚覺亦是責數上正勤中紛動即是智法如男子是陽性如意足是定法如女人是陰性良以正勤䇿動不得與真相應故咄驚責數令捨散入靜故咄男子也汝常此作勿復餘去者念處正勤動不專一不名為常四如意中定不異緣思惟則定思惟則斷定斷專一故常不紛動故勿餘去此猶在互相推排中即是頂法之位也當加汝價者煖法觀中不能發真如意觀中能發無漏故言加價若有所須者漏無漏善助道正道皆從如意觀求欲須即得四禪體含支林如盆器生空麤如米法空細如麵此即正道四諦下十六諦觀無常如鹽苦如醋此即助道如米麵難食須鹽酢和之正道難顯須助道助之莫自疑難者結上正助審在如意觀中故令勿疑決定可辦如己物想故言勿難亦有老弊使人者若欲直取通以代手足如使人驅役者如意觀中亦有此通但通劣弱事同老弊雖不丁壯亦堪運役又以正道求理正道弱未能發真欲須助道九想十想八背捨等助道使人如意觀中亦有此法若得助助正即成共解脫人也九想十想八背捨等具於法數四好自安意譬好自安意我如汝父勿復憂慮好自安意者得五根安固難壞也我如汝父者忍解隣真似像未實故言如父亦是如子勿復憂慮者令其安意破壞見思也五無五過譬所以者何我年老大至自今已後如所生子我老汝少者佛居道終已具智斷故言老大汝居道始未有智斷故名為少壯此即忍法位也無五過者得五力離五惡法也得信力故不欺精進力故不怠念力故不瞋定力故不恨慧力故不怨言餘作人者遠指外道諸見求理名餘作人近指煖等四位未免五過亦名餘作人此文無五過即五力也自今已後如所生子者下忍十六剎那時節猶長中忍雖復縮觀亦未是一剎那若上忍世間最後一剎那心隣真逼聖故名此位為如所生子即世第一法位也下忍十六剎那下至世第一法位者忍應上下各十六行乃成三十二觀今文且以四諦言之於三十二漸減緣行二十四周減行七周減緣乃至最後唯留一行觀一剎那入世第一具如玄文釋籤略引俱舍文也六更與作字譬即時長者更與作字名之為兒與作字名之為兒者得八正入見道中競共馳走故言名之為兒世第一法與真不久故言即時阿含說四果支佛名佛真子菩薩不斷結子義未成僭補曰四果支佛務於斷結齊教取證菩薩不務斷結志求佛道是真佛子也七常令傭作譬爾時窮子雖欣此遇至常令除糞譬雖為子思惑未盡猶居學位未得無難故二十年常令除糞亦復自知不任紹大正是依教修行盡苦耳故云猶故自謂客作賤人若得初果厭小樂大大乘機發者即應授以大乘又不須進斷其餘殘結正由不捨小志大機不發以是且令依教盡漏故言由是之故二十年中常令除糞二十年者見諦一解脫一無礙思惟九無礙九解脫故言二十年指此一句即是爭出三界火宅位也第三追誘譬竟第四領付家業譬近領火宅等賜大車遠領法說中但說無上道就此為二初領後付領付二章各二初領二者一心相體信即領上免難二委以家業漸以通泰成就大志即領上索車後付二者一付家業即領等賜大車二得付欣悅即領上得車歡喜也由心相體信故得委以家業家業既諳悉備知見則成就大志由意志通泰故得付與家業與家業故是則歡喜由有遠近若不先教傭作與一日之價豈得相體委業付財內合由三藏斷結堪竝聞大集受折淨名轉教般若而致付財耳當知傭作取價即是遠由體信委業即是近由又前誘引譬中有齊教領始自道樹終訖出宅又有探領始自法身終訖思盡今領亦二始探領慈悲四味調熟終領付財究竟一味遠近始終合論五味何者即遣傍人傍人所說乃譬華嚴圓頓此教最初傍人譬牛所說譬乳內合從佛出十二部經即初味也以此擬二乘人無機不受迷悶躃地於其全生如乳味也次明密遣二人說除糞法此譬息大之後鹿苑說三於小即信革凡成聖如轉乳為酪內合從十二部出修多羅即第二味也次明心相體信入出無難譬三藏之後說方等淨名揚大折小二乘聞大不謗折小不退良以三藏斷結取一日價故得恣其褒貶若未斷結不堪聞揚大如前不受勸門亦不堪聞折小如前不受誡門而今不謗不退者心相體信故也親既證小則信大不虗得涅槃價故彈折不嗔雖非己事而不疑謗此心淳熟如從酪出生酥內合從修多羅出方等經第三味也次明長者自知將死不久下譬方等心相體信入出無難已後委以家業使其領教為大菩薩說摩訶般若既領知眾物貫統法門心明口辯彌益慕樂但恨住小非是己分脫更開許豈不樂哉於是心漸通泰成就大志如從生酥出於熟酥是從方等出摩訶般若第四味也次臨欲終時而命其子者此譬般若之後判天性定父子會三歸一付財與記說法華之教開佛知見示真實相菩薩疑除聲聞作佛悉以如來滅度而滅度之如從熟酥出於醍醐是從摩訶般若出法華涅槃即第五味也四大弟子深得佛意探領一化五味之教始終次第其文出此也領家業文為二一相體信二命領業就體信復二先明體信過是已後心相體信入出無難相體信者是互相信也謂於三藏中得涅槃價此既不虗今為菩薩說此大乘亦復非虗此即子信父也佛知此等見思已斷聞必不謗無漏根利聞大生信此即父信子也由此見尊特身聞大乘教名此為入復被呵折猶見丈六說小乘法名此為出大小出入而無疑難也二猶居本位然其所止猶在本處猶在本處者雖復入出無難得聞大乘而謂是菩薩之事非己智分猶居羅漢不言未來當得作佛此領大集淨名生酥之教也第二領家業此領大品佛命轉教般若熟酥之教也就此為二一命知家事二受命領知二章各為四初四者一明時節世尊爾時長者有疾自知將死不久初將死不久者有機則應在為生機盡則應謝為死今化機將畢應謝非久也二正命知家事語窮子言我今多有金銀珍寶至汝悉知之命知家事者金即別教理銀即通教理大品所明真諦不出此二而云多有者理則非多約種種門亦得言多例如空非十八約破十八法名十八空也勸學中明一切法門皆是珍寶也倉是定門即百八三昧庫是慧門十八空境也通別兩種定慧倉庫包藏一切禪定智慧無所闕少內充外溢故云盈溢金即別教等者問大品有圓何故但云不出通別答一者但語通別理已攝餘二論能詮教必須具四今且從理故云不出此二本為二乘至此多成通別亦且言之通別倉庫準此可知其中多少者說於般若有廣略二門菩薩行般若應知略廣相略則為少廣則為多自行為取化他為與大品中云汝當為菩薩說故云汝悉知之三誡體我心我心如是當體此意所以者何今我與汝便為不異誡體我心者佛以般若為心汝今傳燈當隨佛意說也又二乘人本解是析法空命當體此意者命轉教用誡令同我體法空也昔時被命謂傳燈與他今乃知佛令我識體之門故言當體此意今我與汝便為不異者釋此有三一被加令說與佛不異二就理以諸法皆如故得不異善吉如如來如一如無二如故言便為不異三就今時始悟父子天性本來不異而二乘人自謂被加異耳四敕無令漏失宜加用心無令漏失無令漏失者汝為菩薩說般若教無令漏失二者就理此即汝法後時當用是故無令漏失也一命知家事四意竟第二受命領知為四一正受命爾時窮子即受教敕領知眾物金銀珍寶及諸庫藏二無悕取而無悕取一䬸之意無悕取者善吉雖說般若自謂我無其分也三未捨劣心然其所止故在本處下劣之心亦未能捨猶居本處者住羅漢位雖復慕大亦未定言欲作菩薩也未捨下劣心者雖復恥小亦未定言捨於小證也四父知子意漸以通泰復經少時父知子意漸以通泰成就大志自鄙先心復經少時父知子意下即是領上索車譬鄙棄先心欲求大道大機發也問何時名少時答一云說般若竟於異處遊觀尋思所領大乘法門生心貪樂為失為不失如此等尋思即是大乘機發時也此時去法華未遠故言少時又當說無量義時大乘機發何以知然無量義中明七種方便無量漸頓從一法生既聞此說思惟昔之三藏三乘悉從一法生如是三乘亦應入一如是思時漸已通泰大心即發故言成就大志也第四領付家業中二初領竟第二正付家業又二一付業二歡喜初有四一付業時臨欲終時臨欲終者是明時節化緣將訖靈山八載說法華經唱入涅槃時也二命子聚眾而命其子并會親族國王大臣剎利居士皆悉已集聚眾者即是二萬億佛所受化之徒名之為子大機熟人十方雲集即上四眾圍遶者是也并會親族者明十方法身菩薩影響者為親族影響之眾多是釋迦昔日同業竝共如來於二萬億佛所共開化之輩於其悉是伯叔之行故用此為親族國王者一切漸頓諸經無不稱所詮之處為經王當機益物興廢有時部部不同名之為國皆言第一即是王義又此經會通諸教豈非聚集國王故無量義中先已收集彼云初說四諦十二緣生次說方等十二部經次說摩訶般若華嚴海空此則普集諸經融通漸頓會入此典故名會國王也彌勒等諸大菩薩皆是等覺為大臣初地至九地為剎利法王種性中生三十心為居士此等皆從釋迦受化三會父子即自宣言諸君當知至此實我子我實其父結會父子實從我受學實是我子從我起解是我所生我實曾於二萬億佛所嘗教大法故我實是父於某城中者此經西國文多度此甚少或可說昔名字國土如大通智勝因緣今簡略名字直言某甲是諸眾生背此大乘起無明闇遯入生死故言捨吾逃走備經五道故云五十餘年昔在本城懷憂推覔者自昔法身地中常以二智觀覔可化之機也始於今日感應道交故云忽於是間會遇見之四正付家業今我所有一切財物皆是子有先所出內是子所知付家業者一切大乘萬行萬德故云一切所有也先所出內是子所知者追指昔日大品領教所委有廣略般若共不共法是汝所知即是汝有故法華但明佛之知見不更廣說一切行相也一付業四段竟第二得付歡喜世尊是時窮子至今此寶藏自然而至歡喜者領上各乘大車得未曾有自顧無心希望佛道而今忽聞得記作佛故云不求自得也三藏中本心不求方等中恥小望絕故不求般若中雖領非己分故不求如此不求而今自得也第四領付家業譬竟第一開譬竟第二合譬合文甚略譬中已委但合父子餘皆義含貴在得意耳文四初合父子相失世尊大富長者則是如來我等皆似佛子如來合父似則合子似有二義一取大機為子昔未逃逝既非真位猶居外凡故云似也取小機為子者小機似像大乘根性耳子既逃父貶之言似問初釋品云已得入真此那言似答此合子逃父時是故言似品初明子開悟時汝問非也二合父子相見如來常說我等為子三合追誘二初合傍人追二合二人誘今初世尊我等以三苦故至迷惑無知樂著小法三苦者欲界苦苦色界壞苦無色界行苦也受諸熱惱即五濁障重迷惑無知即不受勸誡樂著小法即但有小志不堪大化也二合二人誘上有齊教探領今合二意初合齊教領今日世尊令我等思惟至勤精進故所得弘多從蠲除下正合齊教具陳上事從我等於中勤加精進下合上尋與除糞得至涅槃下合上先取一日之價歡喜自足也二合探領然世尊先知我等至汝等有如來知見寶藏之分上言遙見今言先知上言羸瘦憔悴今言心著弊欲上言即脫瓔珞更如麤弊今言便見棄捨不為分別寶藏之分三合追誘譬竟四合領付家業有四一合心相體信世尊以方便力說如來智慧以方便力說如來智慧者明帶三乘方便說大乘實相故言以方便力於我等前說大乘法亦是合出入無難以方便力出辨二乘以佛智力入明實相若不體信豈於我前明佛慧耶二合猶在本處我等從佛得涅槃一日之價至無有志求三合領家業二初合受命領業我等又因如來智慧為諸菩薩開示演說二合無希取兼得諸也二一合無希取而自於此無有志願無志願者明佛加威力令如佛心而說故我不志願也二釋無希取意所以者何佛知我等至而我等不知真是佛子佛知我等心樂小法隨小乘心帶方便力以實相法共二乘說我等不知不共之意故非佛子僭補曰前云似佛子不知真是佛子今日知之復何疑乎第四合付家業上有二有付有喜今合亦二一合付與無悋今我等方知世尊至然佛實以大乘教化所以者何下釋無悋之意正由樂小不早付大耳於此經中下舉今證昔今理唯一故知昔三非實但為未堪故於大眾前毀訾小心欲令捨偽取真定知非悋然佛之毀小時實以大乘而教化也二合歡喜亦是合於三不求之意也是故我等說本無心至皆已得之僭補曰佛子所應得者佛子是諸大菩薩所應得是火宅大車及法說無上道謂彼得者我皆得之歡喜自慶也第二偈頌有八十六行半初七十三行半頌長行次十三行歎佛恩深初又二初二行頌法說後七十一行半頌譬說法說中不頌不求但頌自得爾時摩訶迦葉欲重宣此義而說偈言我等今日至不求自得如文二頌譬說又二初四十一偈頌開譬次三十偈半頌合譬上開有四父子相失相見委業付財今皆頌初十三行頌父子相失有四第一子背父去第二求子不得第三超頌第四憂念轉深第四漸還近父今初一行半頌子背父去譬如童子至五十餘年火宅中明長者所王國邑聚落語寬此中明窮子輪迴三界名諸國五道名五十餘年也二七行是頌父求子不得上文有二今頌亦二初半行頌覔子不得其父憂念四方推求四方推求者不同於上上四方是約四諦推理今四方是觀四生中覔可度之機也次六偈半頌不以失一子廢家業事求之既疲至有大力勢造立舍宅者有餘國中有餘涅槃也起慈悲舍依性空宅也往來者眾者諸土菩薩來往聽法也三二行超頌憂念轉深而年朽邁至當如之何無所委付是故憂耳四二行半追頌上漸還向父有二初二行頌近父之由爾時窮子至體生瘡癬初近父之由由求衣食也從邑至邑者根塵相涉如邑十八界如國修有漏善如有所得修二乘善如無所得不得大乘法食為饑餓無大力用為羸無大功德為瘦有無善上起見思如瘡癬有無善上等者雖復時緣無所得善未能斷結故此體上仍有見思次半行頌正近父城漸次經歷到父住城初頌父子相失竟第二七行半偈頌父子相見上文有二今頌亦二初六行半頌子見父次一行頌父見子上子見父文有四今頌三初半行頌見父之由由傭賃遂至父舍也傭賃展轉遂至父舍次二行半頌見父之相也上明見父之處處是門側今言長者於其門內者兼得處也爾時長者至注記券疏施大寶帳等正見父相處踞師子座也法身是師是王報應是長者注記券疏即是授記明修行也私謂以廣顯略為注授決為記四弘誓為券修行為疏三有三行半頌生畏避之心窮子見父至欲往傭作如文後一行頌第二父見子長者是時在師子座遙見其子默而識之上半行頌見子之處下半行頌見子即識也二父子相見譬竟第三有十行半頌上追誘譬有二初三行頌傍追又二初偈三句頌初喚無機不來次迷悶一句頌再喚不來即敕使者追捉將來窮子驚喚迷悶躃地次二行頌無機即是上釋放捨意也是人執我至不信是父第二七行半頌密遣二人誘引有二初三行頌僱作譬次四行半頌教作譬初又二初二行頌設方便即以方便至倍與汝價眇目是偏空矬者豎短不窮實相之源陋者橫狹無摩訶衍眾善莊嚴也非四無畏名無威異常樂我淨名無德次一行頌取價淨六根房五陰舍也窮子聞之歡喜隨來為除糞穢淨諸房舍第二四行半頌上教作上文有四今頌亦四初半行頌牖中長者於牖常見其子二半行頌羸瘦念子愚劣樂為鄙事三一行頌脫玅著麤於是長者著弊垢衣執除糞器往到子所四二行半頌正教作方便附近至若如吾子上有七科法門語者即合四念處也令勤作者即四正勤也既益汝價下一行頌四如意足也油塗足能履深水如神通又油能除風定是無亂也飲食充足即上米麵也薦席厚暖即是觀練熏修定能除散動也如是苦言汝當勤作半行總頌上第四安慰第五無五過根力既成乃堪苦言又以輭語半行總頌第六作字第七令常作竝是子位也第三頌追誘譬竟第四有十行頌上領付家業為二初三行半頌付業之由次六行半頌正付業初由中半行總頌心相體信即入出也長者有智漸令入出二三行頌委領家業三初一行半頌受命經二十年至皆使令知初二十年者不得同上上除見思名二十此明執作家事或言轉大乘教教諸菩薩斷大乘別惑或言說般若時長凡二十年或言住二乘位轉大乘教為二十年仁王般若云二十八年說摩訶般若二一行頌猶居本位未捨劣心猶處門外止宿草菴自念貧事我無此物三半行頌通泰大志大乘機動父知子心漸已曠大第二六行半頌正付家業有二初四行半頌正付業次二行頌得付歡喜今初欲與財物至恣其所用正付業中有三初一行頌上集親族第二有二行半頌上定父子天性第三一行頌上正付與也次二行頌得付歡喜子念昔貧至得未曾有已上頌開譬竟次三十偈半頌合譬為二初二行合頌三譬佛亦如是至聲聞弟子初一行中佛亦如是一句合第一父子相失譬知我樂小一句合第二父子相見譬未曾說下六句合第三追誘譬初未曾說言二句合上即遣傍人追譬次而說我等一行合上密遣二人誘譬上合有齊教探意二章今此一行總頌其意耳次二十八行半頌合第四領家業上合有二相信委業今初十八行半但頌合委業次十行頌合正付初又二今初一行長頌命領知上領所無也佛敕我等說最上道修習此者當得成佛最上道即是空般若更無過其上也次下十七行半正領受命及無希取等又二初五行頌正受命我承佛教至說斯真要佛子聞法得記者明轉教益他也爾時謂轉教教化菩薩不言為我次十二行半頌第二無希取此文廣上也於中又二初一行牒前譬帖合如彼窮子得近其父雖知諸物心不希取次十一行半正合無希取又為三初一行正頌無希取我等雖說佛法寶藏自無志願亦復如是二九行半具智斷故無希取又為三謂標釋結初為二初一行標斷德具故無希取我等內滅自謂為足唯了此事更無餘事內即惑體三界惑盡故云內滅故屬斷德也次一行標智德具故無希取我等若聞淨佛國土教化眾生都無欣樂次標智德者既云若聞聞教屬智故云智德以小智具故不欣大智此二竝舉失顯過第二六行雙釋智斷二章門此二章中初二行釋斷次一行半釋智次一行半重釋斷次一行重釋智所以者何至報佛之恩第三一行半結釋自無希取我等雖為至永無願樂二九行半竟第三一行明佛見捨我合無希取也導師見捨觀我心故初不勸進說有實利合頌領家業竟次十行頌正付業上合有二一正付業二得付歡喜亦頌亦二初三行頌正付次七行頌得歡喜初三行中初一行半牒譬帖合次一行半正頌合也如富長者至乃教大智次七行頌第二得付歡喜也我等今日至應受供養得道者得實相道也得果者分得大乘習果也此二句明開佛知也於無漏法得清淨眼者此二句明開佛見見實相理也昔日見無漏不落凡夫今日見無漏不落二乘也昔日慧眼見空今淨眼見中持戒報者昔持戒梵行共顯無漏灰身滅智無人受此果報者今日梵行能得無漏即了因取果義持戒即緣因義清淨眼所見理即正因義我等真是聲聞者即大乘真位也十信以一音徧滿三千界似道非真入十住即是真也真阿羅漢有三義此中但舉應供一義也若不生變易殺通別惑是不生殺賊二義堪為十法界福田即應供義應供殺賊互相顯也分得大乘習果也者得初住時破一品無明名為習果合頌正付歡喜竟初七十三行半頌長行竟次下十三行歎佛恩深分四初一行半總標世尊大恩希有無能報者世尊大恩至誰能報者僭補曰大恩希有者如來居法身地寂照法界五乘根性以同體大悲垂形雨法各得隨宜受用無量億劫曾無厭倦此恩此德孰能報耶次五行明供養莫報手足供給至亦不能報供養凡十有二一供給二禮敬三頂戴四肩荷五美膳六寶衣七臥具八湯藥九旃檀十珍寶十一滅後起塔十二寶衣布地以如是等種種供養經恒沙劫亦莫能報何者以諸供養中法供養最唯法供養能報佛恩以諸如來尊重法故以如說行出生諸佛故三二行半為凡夫說人天乘諸佛希有至隨宜為說我佛為不思議大神通諸法之王不於法性土中受常寂光樂而垂形三界為凡夫人忍於斯事說人天戒善令不落三塗漸入聖城此恩此德何能報耶四有四行知根授法為實施權諸佛於法至隨宜說三我佛為諸法之王於法自在知眾生欲樂志力以無量喻而為說法又知眾生宿世善根生熟既籌量已於一乘道隨宜說三既已隱實施權而復開權顯實一句一偈皆為授記究竟成佛此恩此德誰能報者唯有弘傳玅法壽佛慧命庶幾仰報耳私章安自稱謂世尊大恩者一如來始建慈悲拔六道苦與四聖樂普十法界入四弘中此如來室恩二如來行菩薩道示教利喜曾教我大乘雖復中忘智願不失葢如來室清涼溫煖大慈與樂恩三眾生遭苦視父而已佛伺其宜如犢逐母備行六度以利眾生葢如來室遮寒障熱大悲拔苦恩四佛成道已應受無為寂滅之樂而隱其神德用貧所樂法五戒十善冷水灑面令得醒悟葢是佛衣遮貪欲熱恩五示老比丘像方便附近與一日價葢是佛衣除見寒愛熱恩六過是已後心相體信彈呵貶斥令恥小慕大葢佛衣遮醜陋恩七命領家業金銀庫藏皆悉令知葢是佛衣與我莊嚴恩八會親族定父子付以家業無上寶聚不求自得葢如來座恩九十既坐座已身意泰然快得安隱以佛道聲令一切聞一切天人普於其中應受供養葢如來座令我具足自行化他恩世尊大恩兩肩荷負所不能報此之謂也十恩文者文中自對室衣座三初室有三恩次衣有四恩第八是授記恩九十令我能利物恩所以室得衣故有覆育之恩室有座故成與拔之用座假衣室令自他行成衣假座室令初後理顯是故三義合成大恩此始終恩將何以報注家但云物不答施於天地子不謝生於父母以感報斯亡今意正論荷恩難報何得以亡報釋之況復祗緣令我報亡不得直以亡報釋之凡言亡者治彼不亡今非領亡但領難報二時既別且釋荷恩信解品竟先申品目次釋經文今初玅法蓮華經藥草喻品第五釋藥草喻品此中具山川雲雨獨以藥草標名者土地是能生雲雨是能潤草木是所生所潤所生所潤通皆有用而藥草用強有漏諸善悉能除惡無漏為最無漏眾中四大弟子以譬領佛譬深會聖心佛讚善哉甚為希有述其得解以喻其人故稱藥草喻品夫藥草叢育日久一蒙雲雨扶疏暐曄芽莖豐蔚於外力用充潤於內譬諸無漏住最後身有餘涅槃更不願求無上佛道今得聞經自乘佛乘兼以運人文云我等今者真是聲聞以佛道聲令一切聞內外自他具勝力用故稱藥草喻品夫藥草者能除四大風冷補養五臟還年駐色昔除四住病但養五分身還真理年駐變易色今蒙雲雨忽成藥王餌之徧治眾病變體成僊今蔭以無緣慈雲灑以無私法雨使其遠種獲益無偏使無常微草乃成常住藥王自行兼人悉除三惑故云徧治當知自他竝成常身佛大仙也譬諸無漏聞經破無明惑開佛知見文云我等今日真是佛子無上寶聚不求自得佛子所應得者皆已得之面於佛前得受記莂嘉著而稱微故言藥草喻品言嘉著等者嘉善也著滿也稱字去聲善始令終名為嘉著聞經契理故曰稱微且寄二乘領解以說故皆云無漏此竝成於佛乘前一番是師弟領述世界悉檀意也次一番生善為人意也次一番是對治第一義兩悉檀意也是名因緣釋品餘約教本迹觀心準例可知不復記僭補曰準例可知者始結緣中追誘終付財即是約教威音是本中間大通等皆迹即是本迹三惑是病三德是藥直觀三道即是三德是觀心也此品是譬說中第三述成段今言都述其周徧領解始天性結緣中間追誘終於付財自微至著無量無邊諸恩德也始天性等者天性即指大通佛所如十恩中初恩意也中間下具如已下九恩意也天性猶通結緣自微等者從小之大至第十恩故云諸也豈止一代教耶僭補曰記釋疏中述其周徧領解始天性結緣之語指大通智勝佛十六王子釋迦牟尼結緣之事竊謂若論周徧領解大通猶是迹中之本最初威音王佛始是遠本何以知之夫大通成佛已來劫數久遠只一三千界微塵之數釋迦成道以來已經五百千萬億那由他阿僧祇三千界微塵之數塵之多寡劫之久近何可比量耶是知常不輕大通智勝及然燈等皆迹中之本而威音王遠本不可不知若知此本始是周徧領解天性結緣其中間追誘付財等皆迹中事也次釋經文為二一略述成二廣述成略述又二一雙述善哉二領所不及今初爾時世尊告摩訶迦葉至誠如所言雙述者一善哉述其兩處領實一善哉述其兩處領權善說如來真實功德者真實是述實功德是述權又華嚴之擬宜領實也三藏之誘引領權也方等之體信般若之領教俱領權實也法華之付財專論實也辭致曲巧故言善說皆是佛法故言真實誠如所言者印定之詞也雙述等者兩處謂方便火宅也以信解中雙領兩處今亦雙述二處所領若不爾者徒述何益二領所不及如來復有無量無邊阿僧祇功德至說不能盡領所不及者謂退進橫豎亦橫亦豎非橫非豎皆不及也所以者何大雲普覆徧荷清涼大雨俱霑無不蒙澤咸令世間皆得知見未曾有法那忽齊教止領二乘得益不道人天小草是為退所不及菩薩名上草亦名小樹大樹敷榮茂自他饒益而復不領是為進所不及又十法界同成佛法界那忽止領二乘餘八法界都不涉言是為橫所不及又七方便從淺至深皆入真實餘五方便都未嘗言是為豎所不及又三世利益未曾暫廢是為亦橫亦豎所不及那忽下責其齊教通貫諸句不道下正述不及退進等者以二乘位望上為進望下為退十界各各自有因果不由次第故名為橫一人漸起亦得為豎又三世名亦橫亦豎者世世徧於十方十界亦名為橫如是品類皆從諸味八教調熟方於今日與迦葉等或同或別亦名為豎未聞徧領故佛示之夫山川谿谷總言一地一地能生未嘗揀擇攘彼受此草木種子皆依於地更無餘依一雲靉靆無處不密一雨一味不隔枯榮普潤既同普得增長如來平等不可思議實不先頓後漸初三末一如龍興慶雲普雨於一切身心不降雨除熱得清凉是為五乘七方便十方三世平等廣大甚深博遠不可思議無有差別是為非橫非豎領所不及此非橫非豎不及如下諸文結差無差無差即差差即無差今從無差名非橫豎從而差邊如前橫等不及之旨非都頓奪特以初心望後心未窮極地故云不盡耳又始悟初阿亦具後茶功德但齊教之領未暇進領橫豎周徧耳又權行大士宜應如此也一略述成竟二廣述成二長行偈頌長行又二初述成開三顯一二結歎初有法譬合法中又二初舉法王勸信二正述開三顯一今初迦葉當知如來是諸法之王若有所說皆不虗也夫人王外無所畏內不二言何況法王眾惡已盡萬德皆圓凡有所說真實不虗也佛法雖多不出權實權實之外更無別法而言無量者此意難信故舉法王勸信又為下大雲譬作本二正述開三顯一又二一約教明開權顯實二約智明開權顯實由二教顯二智由二智說二教智教相成也今初於一切法至皆悉到於一切智地一切法者謂七方便橫也對一實為豎也若言不爾何故二萬億佛所初發大心中間取小又流轉五趣又十法界一人尚具況七方便耶此法雖多方便波羅蜜照之罄無不盡以隨其類音說之無不逗會為人天說戒善為二乘說諦緣為三藏說事度為通教說無生為別教說次第開如來藏是名述其領開三也從其所說法下約教述其顯實也地者實相也究竟非二故名一其性廣博故名為切寂而常照故名為智無住之本立一切法故名為地此圓教實說也凡有所說皆令眾生到此智地顯實之文灼然如日云何闇寱作餘解耶例大品廣歷諸法皆摩訶衍衍即大乘乘即實相實相即一切智地上文云唯此一事實指此地也餘二則非真指七方便也此約漸頓二教述其開權顯實也二約智開權顯實如來觀知一切諸法之所歸趣至一切智慧約智開權顯實者如來觀知一切諸法乃至通達無礙二句是能照權也又於諸法究盡明了乃至智慧二句是能照實也二智所照偏圓兩境通達無礙故能說權實二教此舉智釋教也開權中知所歸趣是識藥深心所行是知病病藥俱是權法權法各有歸趣戒善等近趣人天若作緣因低頭舉手遠趣佛果念處道品等近趣涅槃若作了因汝等所行是菩薩道遠趣寶所乃至六度通別等法近遠歸趣途轍不同亦復如是又戒善是人天藥諦緣度是三乘人藥乃至通別等法門是通別菩薩藥又深心所行有二種一深心著於依正二深心著所執之法著依正者起深重十惡障人天乘著所執法起四倒三道六蔽四住五住等障諸聖乘當知深心病相不同權智照之通達無礙顯實中又於諸法究盡明了者實智所照也一切權法無不入實故言究盡實智所知故言了佛眼所見故言明若此智照此藥此病不照彼藥彼病彼智照彼不能照此種別不同者權智照也一智徧照一切藥一切病實智照也能示眾生如此圓境智故言一切智慧也一法說竟第二譬說文為二初譬說後齊教稱述譬有開合開為二一差別譬譬上述權教權智二無差別譬譬上述實教實智也三草二木纖濃不等故言差別一地一雨普生普潤故無差別若觀其末派謂各各不同若究其根榮莫非地雨內合方便智照七五各異實智往照終歸一實一實七五七五一實差別無差別無差別差別也一差別譬有六一土地二卉木三密雲四注雨五受潤六增長今初土地譬迦葉譬如三千大千世界山川谿谷大地大千世界譬眾生世間山川谿谷土地譬五陰世間世界無別法為山川谿谷土地所成眾生無別法為五陰所成僭補曰山川谿谷土地等配五陰取其名數而已不須一一局定此是色此是受等借使配得十分相似其如情無情異何下又云如山雖高峻亦有洿隆等五相乃至土地雖平亦有丘池等五相可見只取其名數不煩一一局定貴在得意而已譬草木雖依土地等土地等非即草木草木質榦但名草木草木種子更無別名但取能生之功名種子所生質榦名草木皆植根於地地則本也內合習因習果雖依五陰五陰非即因果要依於陰得有習因增長成辦名習果果因依陰而起譬草木種子受潤增長依山川谿谷土地而成也別譬者山雖高峻亦有洿隆等五相乃至土地雖平亦有丘池等五相即譬五乘五陰山高譬菩薩五陰川譬支佛谿譬聲聞土地譬天谷下譬人一一五陰皆有習因習果所依猶如山川谿谷土地皆為種子質榦等所依也又用三千大千世界譬正因之理通為一切所依也山川谿谷土地譬眾生陰界入界報色心也草木叢林譬眾生習因此三法不相離習依陰入陰入不出法性如草木依山川山川依大千世界二所生卉木譬所生卉木叢林及諸藥草種類若干名色各異卉是草之都名木是樹之總稱眾草成叢眾樹成林治病力用勝者稱為藥如善法中皆能治惡而無漏善治惑義勝下卉木中樹林枝幹覆陰廣器用大故喻二菩薩種類若干者五乘七善因果種子故言若干即是種類各有稱謂即是名也各有體相即是色也三密雲譬密雲彌布徧覆三千大千世界雲有形色覆陰下文有雷聲遠震覆蔭譬佛慈悲形色譬佛應世雷聲譬佛言教密雲即三密也慈悲即意密形色即身密雷聲即口密彌布者徧也既密又徧故言彌布也以慈悲熏應身說法徧十法界故言彌布也四注雨譬一時等譬用口密八音四辯宣注法雨利潤眾生五沾潤譬其澤普洽至大枝大葉法寶普雨七種眾生心地所有習因種子即生聞慧名為沾洽枝葉根莖者信為根戒為莖定為枝慧為葉次第相資故譬此四也小根莖等即人天信戒中根莖等即二乘信戒大根莖等即菩薩信戒也六生長譬諸樹大小至華果敷實更復略牒明其草木隨分受潤習報兩因善法既蒙法雨習報兩果各得生長稱其種性者明施權稱機小者不過分大者不減少即是七種習報兩因也華果敷實者習報二果也又生長即三義稱其種性即是生長之由由設教稱機也各得增長正明生長華果敷榮即生長之相也一差別譬竟第二無差別譬顯於一實也有三初一地所生雖一地生道前心地所生終因道後智地道前心地至智地者此道前後之名名有通別道後定在果後道前通至凡夫故方便品中亦以等覺以前為道前此中須以博地凡夫無戒善者為道前以五乘為道中所以道前道後真如之理等皆是地地體無別然皆能生故知眾生道前心地奚嘗不有能生性耶而不能生不能成者必假道後極果智地令生令成發心已後究竟已前皆假智地而成熟之二一雲所雨一雨所潤一音所宣一乘法門開發道中五種善根終是一音平等之教開發道中者且以初望後五乘居中非謂五乘即有真如五種善根即五乘也竝如來化意邊說故云終是一音言終是者終無定五故云也被物雖五化意唯一從權宜邊須名四味三三草二木稟益不自覺知而諸草木各有差別五種善根蒙佛法雨隨分增長而不自知五種之因皆依一佛性亦不自知五乘之教為如來一音所演皆是大乘亦不自知究竟同歸佛慧唯有如來能知也一開譬竟第二合譬二初合差別譬有二初正合二提譬帖合今初正合六第一合上密雲譬兼合世界第二合上注雨譬第三合上世界山川谿谷譬第四合上草木譬第五合上沾潤譬第六合上增長譬今初第一合上密雲譬迦葉當知至如彼大雲徧覆三千國土先舉佛身密合雲有形後舉佛口密合雲有聲如來亦復如是出現於世即是正合應身出世也如大雲起即舉譬帖合明如來大慈現身覆育一切也以大音聲即是舉佛口密合雲有聲也天人阿修羅別舉三善道即是三十子三乘根性別稟聲益也第二合上注雨譬二先標章門次勸聽受章門有六一十號於大眾中至天人師佛世尊十號具舍利弗受記章中略釋二四弘未度者令度眾生無邊未解者令解法門無量未安者令安煩惱無盡未涅槃者令得涅槃佛道無上四弘者肇云發僧那弘誓於始心終大悲以赴難本業瓔珞具對四諦然彼屬別今須在圓三三達今世後世如實知之四一心三智我是一切知者五五眼一切見者六三不護知道謂意不護開道謂身不護說道謂口不護知道者開道者說道者僭補曰三不護者凡夫隨識分別不護三業二乘有智護之尤謹如來三業當體是三密三輪三德秘藏徧周法界隨機應現故云知道開道說道不可思議無護不護是謂三不護法門六種法門始自十號終至三業諸教所明一切果地神用法門此六攝足故略舉之先標章門竟次勸聽受汝等天人阿修羅眾皆應到此為聽法故佛八音詮吐六種法門從多為論勸三善道宜應往聽法也第二注雨譬竟第三合上山川譬爾時無數千萬億種眾生來至佛所而聽法攬果報而有眾生如依山川得有世界等百千萬億者即是十法界眾生也今正語七方便眾生差別配如上說即上山川谿谷土地譬七方便五陰第四合上卉木譬如來于時觀是眾生諸根利鈍精進懈怠于時者若論漸初即是鹿苑初說三乘時若論中間處處得論于時利鈍者總判三途因惡果苦不能受道名為鈍七種方便聞教得益名為利別判人天但受果報不肎受道名為鈍三乘根性斷惑出界名為利又聲聞觀生滅名為鈍菩薩觀不生滅名為利通別圓云云僭補曰通別圓云云者通體諸法緣生本無生滅別從空出假三假聚集離諸生滅圓觀諸法即空假中一色一香無非中道皆實相也利鈍可知精進懈怠者三途放逸名怠人天持五戒十善為精人天不厭苦為怠二乘怖畏無常為精二乘貪證不求作佛為怠菩薩志求佛道為進第五合上受潤譬隨其所堪而為說法種種無量皆令歡喜快得善利隨其所堪即是稱會機宜無增減之失歡喜得善利即是各蒙法潤受益也隨其至無增減之失者稱五乘機故無增減如人機授以十善為增天機授以五戒為減如是乃至菩薩展轉相望亦然歡喜得善利下隨其所宜得四悉益也第六合上增長譬是諸眾生至於諸法中三乘一乘任力所能漸得入道現世安隱後生善處者即是報因感報果合華敷增長亦得聞法乃至入道者即是習因牽習果合上果實增長既聞法已離諸障礙二句合上增長之由現世安隱正合增長後生善處是合增長之相也佛如大雲普覆一切三途亦得沾潤增長如說般若方等明地獄得益也又諸經中亦說龍鳥鬼神等聞法得道若火滅湯冷即是現世安隱或生天上人中即是後生善處於天人中修道即是以道受樂若人天聞法持戒福德扶身鬼龍不犯即是現世安隱或天還生天人還生人或天人互生即是後生善處生能悟解即是以道受樂二乘聞法得有餘涅槃是現世安隱如下文云是人於所得功德生滅度想我於餘國作佛更有異名此人于彼國得聞是經指方便有餘之土是善處於彼聞經是得道受樂若生身菩薩聞盧舍那佛說法得無生忍即現世安隱後生淨滿世界為法身眷屬即是善處以道受樂離諸障礙者即是現世安隱任力所堪漸得入道即後世以道受樂初正合竟第二提譬帖合六意如彼大雲至各得生長六意者大雲帖合第一形聲兩益雨於一切帖合第二六章法門卉木叢林帖合第四受化眾生利鈍怠進習因深淺如其種性具足蒙潤帖合第五受潤得法利各得生長帖合第六現世安隱增長也帖合六章門者六章正出注雨相故一合差別譬竟第二合無差別譬為二一正合二提譬帖合正合有三一無差別意合上一地一雨二差別意合上草木差別三如來能知釋成兩意今初如來說法一相一味至究竟至於一切種智無差別者謂一相一味一相合上一地也又一相即無住本立一切法無住無相即無差別也立一切法即有差別差別如卉木無差別如一地地雖無差別而能生桃梅卉木等差別桃李卉木雖差同稟地之四微若知四微桃李即識實中有權解無差別即是差別若知桃李四微即識權中有實解差別即是無差別以是義故以一相合上一地譬也一味即是實教純一無雜例一相可解解脫者無分段變易二邊業縛故名解脫相離相者得中道智慧此慧能遠離二邊無所著故名離相滅相者二邊因滅得有餘涅槃二邊果滅得無餘涅槃故名滅相究竟至於一切種智者若得二邊滅相即是通別二惑盡入佛知見以一切種智心中行般若初發畢竟二不別故言究竟此即佛之智慧故言一切種智也第二差別意合上草木差別其有眾生聞如來法至所得功德不自覺知眾生是山川假實之差別亦是種子之差別如來即是雲聞法即是雨讀誦修行即是潤功德即增長如此等差別皆不能知也第三如來能知釋成兩意以無差即差差即無差也所知之境略舉十種合為四意一約四法知二約三法知三約二法知四約一法知今初約四法知所以者何唯有如來知此眾生種相體性一約四法者謂種相體性種者三道是三德種淨名云一切煩惱之儔為如來種此明煩惱道即般若也又云五無間皆解脫相此明不善法即善法解脫也又云一切眾生即涅槃相不可復滅此即生死是法身也直觀三道為法身般若解脫三德眾生不知如來能知也又相體性者約十法界十如中釋若論差別即十法界相體性若論無差別即佛法界相體性差別及無差別如來能知差即無差無差即差如來亦能知二約三法明如來能知三法者即是三慧仍有三重一三慧境二三慧體三三慧因緣念何事思何事至以何法修初三句明三慧境念即聞慧謂念取所聞之事二云何念三句是三慧體謂返觀能聞等即體也三以何法念三句即是三慧取境聞法是其因緣也如此三乘三慧昔謂境體因緣有異即是差別若入圓玅三慧即無差別此有差別無差別如來能知又差即無差無差即差如來亦能知三約二法明如來能知以何法得何法以何法即是因得何法即是果五乘之因各得其果即是差別眾生如佛如一如無二唯是一因一果即無差別無差即差差即無差如來能知四約一法如來能知眾生住於種種之地唯有如來如實見之明了無礙七方便住於七位故言種種之地此即差別如來用如實佛眼見之如眾流入海失於本味則無差別隨他意語以智方便而演說之則如來能知差別其所說法皆悉到於一切智地則如來能知無差別一正合無差別譬竟第二舉譬帖合眾生不知有二初正帖合二牒前結歎如來能知今初如彼卉木叢林諸藥草等而不自知上中下性會義云未開顯時七方便人皆同卉木但能受潤增長不能自知既開顯後方知三草二木若根若莖枝葉華果等無非地之四微則能全悟眾生性德理地而為諸佛究竟一切智地從此智地興大悲雲注權實雨化化無盡如來所以說法華經欲人悟此性修秘要而已二牒前結歎如來能知有二一正明如來能知如來知是一相一味之法至終歸於空僭補曰如來能知者知三乘五乘七方便人於性德理地蒙如來一雲一雨之潤各得隨根增長而不自知唯佛能知此一句標也所謂解脫相下五句是釋上一相一味之詞其解脫離滅已如上釋究竟涅槃常寂滅相者所謂諸法從本來常自寂滅相終歸於空者中道第一義空此事向已釋竟今復釋者葢慇懃珍重指掌叮嚀令不知者知也二釋疑佛知是已至是故不即為說一切種智佛昔已知始末皆一何不鹿苑即為說實釋云觀眾生心欲隨三悉檀而將護之恐其誹謗故不務速說欲識佛性義當觀時節因緣今日方說也一譬說竟第二齊教稱述疑者聞佛無量功德謂四弟子齊教領解何云是實故佛稱述雖未及徧領齊教領開顯不虗亦是引發下根令同得悟文為二一稱述汝等迦葉甚為希有能知如來隨宜說法能信能受先歎希有者凡夫有反復聞能得益菩薩是己事解不多奇二乘入無為正位又能捨證入實甚為希有能知隨宜說法述能領開三次言能信受即述其領顯一也二釋疑所以者何諸佛世尊隨宜說法難解難知明佛於一道說三深玄難解而汝能信也私謂前文云如來復有無量功德汝等說不能盡後文云汝等甚為希有者佛恩普被猶如雲雨靡不覆潤佛恩普載猶如大地靡不生成豈有為一機一方而已故言汝等說不能盡佛恩雖普眾生日用不自覺知如三草二木植根乎地稟潤乎雨而不能知汝等能知甚為希有一長行竟二偈頌有五十四行半頌上開顯有法譬今皆頌初四行頌法說次五十行半頌譬說法說復二一舉法王二明開顯今初半偈頌法王不虗爾時世尊欲重宣此義而說偈言破有法王出現世間次三行半頌開顯上文二教二智今亦具頌初一行半頌二教後二行頌二智初半行頌權教隨眾生欲種種說法二一行頌實教如來尊重智慧深遠久默斯要不務速說後二行頌二智今初一行頌釋權智有智若聞則能信解無智疑悔則為永失僭補曰如來久默不說而今日為舍利弗四大弟子等作法譬雨說述迦葉等能聞能信能解而歎其有智其無智者雖聞而反生疑悔則永失法利無智指前五千退席及末世眾生聞經而不生信解者其失甚大也次一行頌釋實智是故迦葉隨力為說以種種緣令得正見隨種種緣說種種教悉為令得大乘正見此頌是如來四悉檀意破有法王即對治意隨眾生欲即世界意智聞信解疑悔永失是為人意令得正見第一義意三悉檀即頌上以智方便而為演說令得正見頌上到一切智地初頌法說竟第二五十行半頌上譬說初十行半頌開譬次四十行頌合譬上開有差別無差別二譬今初九偈半頌差別譬次一行頌無差別譬上差別有六今亦頌六初三行頌上雲譬迦葉當知至如可承攬雲譬應身應身隨智慧行故言慧雲能具十二部法故言含潤也若應身不說法如須扇多佛等者此雲不含潤也身放大光如電曜口震四辯如雷聲也九十五種邪光不現故言掩蔽除九十八種惱熱如地上清涼也如可承攬者應身降世似同三有有心往取實不可得也二一行頌上注雨譬其雨普等四方俱下流注無量率土充洽八音四辯宣注法雨四方俱下一時俱聞亦云四等也凡有心者皆蒙利潤故言率土充洽也此則成上又成下山川譬也三一句頌上土地山川譬山川險谷即是七方便眾生五陰今蒙法雨身口柔輭如土地得澤也四二句頌上卉木譬幽邃所生卉木藥草幽邃所生者譬眾生久遠所植習因隱在陰界入內故言幽邃今蒙法雨悉得開發故言所生五兩行三句頌上受潤譬大小諸樹至隨分受潤百穀語通取五穀譬五乘能生百善也甘蔗蒲萄譬定慧乾地普洽譬未信者令信餘譬如文六兩行頌上生長譬一切諸樹至皆得鮮澤次一行頌上無差別譬上文有三此中略不頌一地而所生兼之如其體相性分大小所潤是一而各滋茂初二句二字頌所生所潤次是一二字頌能潤則是頌無差別也而各滋茂頌差別不自知也一頌開譬竟第二四十行頌上合譬有二初三十五偈頌合差別次如是迦葉下五行頌合無差別上合差別譬前正合後舉譬帖今頌亦先合次便舉譬帖初一行頌合雲譬上兩句以身合雲下兩句舉譬帖合佛亦如是出現於世譬如大雲普覆一切二有八行半頌上合注雨譬初三行略頌十號既出于世至猶如大雲此三行頌十號者文略義含出世即無上士及佛為說即正徧知明行足世尊即第十號於天人中即調御丈夫及天人師如來即第一號來善去善兼於善逝又出于世即世間解二六章門中但頌二章初一行半是頌四弘誓充潤一切至及涅槃樂四弘者充潤眾生即初弘誓皆令離苦即第二誓皆令離於因果苦故得安隱樂即第三誓及涅槃樂即第四誓五乘咸有世間之樂皆令得於第一之樂二四行頌勸聽受於中初二行先歎佛次為大眾下二行以能說人尊故所說法玅七善無不皆歸一乘故勸聽受此舉無差以釋於差諸天人眾至而作因緣第二合注雨譬竟第三有四行頌合上山川譬我觀一切至如雨普潤山川譬七種五陰眾生如雨注不擇谿谷佛平等說故無彼此有機為此無機為彼植善為愛行逆為憎佛事為自魔事為他機感而來機盡而去入實為坐出權為立佛觀眾生為若此即是等雨山川之意頌上無數億種眾生來至佛所而聽法也第四二行頌上如來于時觀是眾生於中初行半頌合上所生草木叢林後半行頌合上能生等雨法雨貴賤上下至而無懈倦貴賤乃至利鈍約七方便傳傳作之也貴賤上下約位持戒毀戒約行利根鈍根約習亦須具歷五乘七善展轉說之第五有十一行頌上種種無量皆令歡喜合受潤譬文為三初一行總明受潤次七行別明受潤後三行結今初一切眾生聞我法者隨力所受住於諸地次七行別明受潤文為五初一行人天俱未斷惑合為小草或處人天轉輪聖王釋梵諸王是小藥草二二行明二乘俱有斷證合為中草知無漏法至是中藥草三有一行明六度志求作佛度生勝於二乘為上草求世尊處我當作佛行精進定是上藥草四一行半明通教已斷通惑誓扶餘習涉有化他望下為優比上為劣故名小樹又諸佛子至是名小樹五有一行半明別教自行化他高廣為勝故名大樹安住神通至名為大樹草既有三約三教菩薩樹亦可作三六度約三僧祇通教約七八九地別教約三十心次七行明別受潤竟後三行結所潤能潤又二初一行半舉譬帖釋所受潤雖明七種七種為少如海一滴佛平等說至所稟各異二一行半明能潤佛智多如海也佛以此喻至如海一滴第五合受潤譬竟第六八行半頌諸眾生聞此法已合歡喜增長譬又二前兩行總頌增長我雨法雨至漸增茂好初偈總頌增長次偈舉譬帖釋二有六行半別明增長為四初一行半明人天增長諸佛之法至皆得道果普得具足是頌現世安隱漸次修行是頌後世以道受樂二一行半頌二乘增長聲聞緣覺至各得增長住最後身有二解一云二乘已斷通惑住最後身若不值佛聞法滅壽取證則增長義不成二云二乘得有餘涅槃住最後身得佛五味調熟得入法華聞大乘得解即是增長也三一行半是通教增長若諸菩薩至而得增長堅固是體法慧了達三界是斷惑盡四二行是別教增長復有住禪至而得增長問一雲一雨與一音同異答下地以一音令他聞一法佛以一音隨類各解今一雲一雨正是隨類之一音也毗婆沙言佛以一音說四諦五人聞人語八萬諸天聞天語地獄夜叉各聞同其語唱告至梵天是為梵音亦是佛報得清淨音聲最玅號為梵音若報得梵音則人所不聞聞亦不解初頌合上差別譬竟第二五行頌合上無差別譬又為二前一行半頌無差別之差別如是迦葉至各得成實譬如大雲以一味雨即頌合上一味雨無差別也潤於人華各得成實即是頌上差別也二三行半頌差別無差別迦葉當知至悉當成佛次迦葉當知以諸因緣下即是明權權即差別合上所生也今為汝等者即是顯實實即無差別合上一地也非滅度者未度變易也獨言二乘者為其保證強也人天不許果為涅槃菩薩不中間取證也是菩薩道者菩薩行道亦須斷通惑汝已斷盡即是菩薩道法華論謂發心退已還發前所修善不滅同後得果二乘智斷是菩薩道者二乘執其果故斥言是菩薩道道即因也問菩薩亦有果信解云得道得果大品云有法是菩薩道無法是菩薩果何故不言是菩薩果答此義亦應得今言若道若果皆是佛因因即是道也有本此文後更有長行偈頌一段乃隋朝笈多所譯名添品法華又移囑累安勸發品後其餘仍舊無所改也藥草喻品竟先申品目次釋經文今初玅法蓮華經授記品第六釋授記品梵音和伽羅此云授記諸經破授記淨名云從如生得記從如滅得記如無生滅則知無記思益云願不聞記名大品云受記是戲論今經云何答若見有記記人此見須破菩薩誓記此記須與世諦故記第一義故無四悉適時如下說若通途記如法師品初若別與記如三周後說若正因記如常不輕若緣因記如法師品十種供養若了因記如授三根人若正因記則廣若緣了記則狹或遲記或速記或佛記如此文或菩薩記如不輕雖無劫國之定亦得是記復懸記如化城品未來弟子是也或遲如聲聞或速如龍女他經但記菩薩不記二乘但記善不記惡但記男不記女但記人天不記畜今經皆記若首楞嚴有四種記今經具之未發心與記如常不輕品發心現前無生三周記是也又諸經為對菩薩多授法身究竟果記今此品中秪記八相如前後說原諸佛本為大事因緣出世令眾生開示悟入佛之知見今大事已顯佛已說竟眾生已入暢佛本懷眾生願滿法應與記如父遇子豈不付財又無生現前必由實解開佛知見不謬又明了佛性故與授記小乘入實決定作佛故記受記亦云受決受莂授是與義受是得義記是記事決是決定莂是了莂中根人聞法譬二周開三顯一具足領解如來述成雖自知作佛而時事未審若蒙佛誠言授其當果劫國決定近遠了莂則大歡喜今從佛授與得名故言授記品此文是譬說第四段上三段皆以譬喻說之此中授記亦用譬喻論記無第五段指上指下略不論耳又藥草喻中明一切受潤各得增長審知四眾皆獲利益經家略不出耳次釋經文為二一正與中根授記二許為下根宿世之說初又二先授迦葉次授三人竝有長行偈頌迦葉長行中有六一行因爾時世尊說是偈已至廣宣諸佛無量大法二得果於最後身得成為佛至天人師佛世尊三劫國名字國名光德劫名大莊嚴四壽命佛壽十二小劫五正像久近正法住世二十小劫像法亦住二十小劫六國淨國界嚴飾無諸穢惡至雖有魔及魔民皆護佛法二偈頌中初四行行因爾時世尊欲重宣此義而說偈言告諸比丘至無上之慧次半行得果於最後身得成為佛三六行國淨其土清淨至不能數知四半行佛壽其佛當壽十二小劫五一行正像正法住世二十小劫像法亦住二十小劫六半行總結略劫國名光明世尊其事如是第二授三弟子記中復二一請記二與記請記中七偈初一行正請爾時大目犍連至而說偈言大雄猛世尊諸釋之法王哀愍我等故而賜佛音聲次二行半開譬若知我深心至然後乃敢食三二行半合譬我等亦如是至爾乃快安樂四一行結大雄猛世尊常欲安世間願賜我等記如饑須教食第二與三人記各有行因得果劫國壽命法住數量悉如文初須菩提爾時世尊知諸大弟子心之所念至及聲聞眾偈中初一行誡聽爾時世尊欲重宣此義而說偈言諸比丘眾今告汝等皆當一心聽我所說次二行行因我大弟子至漸具大道三一行得果最後身得三十二相端正姝妙猶如寶山四六行半國淨其佛國土至聽受佛語五半行佛壽其佛當壽十二小劫六一行正像闕劫國正法住世二十小劫像法亦住二十小劫第二大迦旃延爾時世尊復告諸比丘眾至像法亦住二十小劫偈中初一行誡聽爾時世尊欲重宣此義而說偈言諸比丘眾皆一心聽如我所說真實無異次二行行因是迦旃延至供養舍利三三句得果其最後身得佛智慧成等正覺四三行一句國淨闕佛壽正像國土清淨至莊嚴其國第三大目犍連爾時世尊復告大眾至像法亦住四十小劫偈中初四行半行因爾時世尊欲重宣此義而說偈言我此弟子至諸佛塔廟次一行半得果兼國名漸漸具足至栴檀之香三半行佛壽其佛壽命二十四劫四二行半國淨常為天人至皆不退轉五一行正像佛滅度後正法當住四十小劫像法亦爾第二有二行半許為下根更說宿世我諸弟子至汝等善聽此人已聞法譬復見上中受記而猶疑不了深生愧恥欲增進其道先許總記更說宿緣云云授記品竟
