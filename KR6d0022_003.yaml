body:
  text: 隋章安尊者灌頂結集陳隋天台智者大師説唐荊溪尊者湛然述記閩鼓山私淑比丘道霈纂要先申品目次釋經文今初妙法蓮華經譬喻品第三釋譬喻品先總釋譬者比況也喻者曉訓也託此譬彼寄淺訓深前品廣明五佛長行偈頌上根利智圓聞獲悟中下之流抱迷未遣大悲不已巧智無邊動樹訓風舉扇類月使其悟解故言譬喻別釋者以世法比出世法因於曾有聞未會有踊躍歡喜如經世間父子譬出世師弟世界悉又以世生法比出世生法使蒙佛音教不失大乘如經父知諸子先心各有所好珍元之具為人悉世生法者即三車也故云珍玩出世生法三乘法引歸一乘故云不失又以世滅比出世滅我已得漏盡聞亦除憂惱如經我為其父應拔其苦難令免燒煮對治悉世滅法者三界業火滅報身喻引實相火滅無明也又以世不生不滅比出世不生不滅令其安住實智中我定當作佛如經乘是寶乘直至道場當知佛以一音説於譬喻巧令中下得四悉檀益故言譬喻品也第一義悉世不生滅者即大車也父之本有故不生至處不壞故不滅出世不生不滅者性德本有故不生修德果常故不滅以信解中聞譬歡喜等是故四悉俱譬父子然前之三悉寄以施權第一義悉方約顯實當知三悉即第一義之弄引也約教解者佛意本讚佛乘為物不堪尋念先佛大悲方便趣於鹿苑稱讚三車二乘以中下自濟恩不及人菩薩駕牛運他出火故名摩訶薩此三藏教中譬喻也又三人同畏燒煮聲聞如麞直去不回緣覺如鹿母並馳立顧菩薩如大象身扞刀箭全群而出涅槃云兔馬象此通教中譬喻也又三乘發心近緣理淺智慧弱斷通惑不能盡邊到底非波羅蜜菩薩發心久達理深智強斷別惑窮源盡性大品云二乘如螢火菩薩如日光此別教中譬喻也又始見我身聞我所説即皆信受入如來慧如斯之人易可化度不令如來生於疲苦如華嚴中即事而真不須譬喻為未入者四十餘年更以異方便助顯第一義今日王城決定説大乘普令一切開示悟入佛之智慧不令一人獨得滅度如今如始法華即華嚴如始如今華嚴即法華無二無別上根利智聞即能解不令如來生於疲苦亦不須譬喻秪為中下動執生疑躊躇岐道故須今日大車譬喻而得利益是名圓教中譬喻也僭補曰華嚴即事而真法華世相常住同明佛慧但化儀有始終之異恐惑者不了故大師自會云如今如始如始如今無二無別如是則華嚴法華為如來一朝大化之始終關鍵究竟平等故後文云若華嚴中能受不俟鹿苑開一為三後代有於二經分優劣者不唯不明佛心抑亦不明智者之心也本迹觀心例可解不復記本迹譬具釋名中本迹蓮華三喻觀心譬者空如白牛假如具度中如車體及至三一圓融是圓觀心也先申品目竟次釋經文前品法説有五段一法説二領解三述成四授記五四衆歡喜法説一段始竟四猶未了以前品文多寄於譬喻品題之後耳今初第二身子領解段領其所聞述其所解長行隨與解合説偈中領與解各陳故言領解段文有二初經家敘二身子自陳初為二初內解爾時舍利弗踊躍歡喜內解在心名喜喜動於形名踊躍從妙佛聞妙法得妙解若值一喜尚復欣忭況三喜具足寧不踊躍文云今從世尊聞此法音心懷踊躍內外和合致此歡喜即世界釋也又改小學大棄貧事草菴受富豪家業文云今日乃知真是佛子是故歡喜此為人釋也又憂悔雙遣疑難並除內外妨障廓然大朗文云我已得漏盡聞亦除憂惱是故歡喜此對治釋也又佛子所應得者皆已得之文云安住實智中我定當作佛此第一義釋也本迹釋者身子久成佛號金龍陀迹助釋迦為右面智慧弟子始從外道拔邪歸正示乳味歡喜利益凡夫次示酪味歡喜利益賢聖次示生酥熟酥歡喜利益菩薩今作醍醐入佛知見歡喜利益學佛道者如此等歡喜皆迹所為也二外儀即起合掌瞻仰尊顏敘外儀者即起合掌名身領解昔權實為二如掌不合今解權即實如二掌合向佛者昔權非佛因實非佛果今解權即實成大圓因因必趣果故言合掌向佛瞻仰尊顏者表其解實實即佛境非方便法瞻仰尊顏無餘思念表開佛知見意解於實亦即解權身領於權亦解於實互舉一邊二身子自陳文為二初長行二偈頌初文為三一標三喜章二釋三結成今初而白佛言今從世尊聞此法音心懷踊躍得未曾有今從世尊標我身見佛身故名身喜聞此法音依於佛口聞而歡喜故言口喜得未曾有是我意解佛意故名意喜是標三喜也第二釋者提昔之失顯今之得有三初明昔不見佛失所以者何至失於如來無量知見昔佛為菩薩授記我不預斯事見佛義遠既不見佛故無身喜聞如是法者若日照高山時密有聞義顯如聾啞不得道聞如是法也秖是方等教中聞大乘實慧與今不殊故言聞如是法也受記者亦是方等中與菩薩記二乘不預斯事甚自感傷思益淨名中聞褒大折小內疑而外鄙名為感傷失一切知見者失佛眼之見失佛智之知也二明昔不聞法失世尊我常獨處山林樹下至是我等咎非世尊也良以身處山林心執小道則不聞法故無口喜我常獨處者思過之所也同入法性者正出其過執所入之一理疑於三教之能門一理既同而我失知見三教既異而菩薩受莂受莂則如來有偏所以成過今述此失故言悔過是我等咎者由我迷權何關理教由我惑實何關佛偏追述昔非仰謝如來是為引過自歸也僭補曰同入法性者華嚴經云法性真常離心念二乘於此亦能得不以此故為世尊但以甚深無礙智此偈前二句明二乘同入法性後二句明二乘保證偏真不得無礙智從空出假淨佛國土教化衆生圓滿菩提也身子至此始知自悔引咎耳三明意無解之失所以者何至終日竟夜每自尅責良以不待説所因則無實解又不識方便故無權解解無故故無意喜昔失既彰今得自顯不待説所因者自責不解實也不解方便者自責不解權也所因二義一不受待對於前華嚴二不停待於後法華初照高山明三諦之慧是得佛因以此待對於我而我不受失之於前釋不受華嚴世尊法久後要當説真實我不停待於此釋不待法華兩楹問匆匆取小不解實權僭補曰初聞佛法遇便信受思惟取證者是身子自述其過謂中途取證猶如豌豆收之太早也維摩詰經云若見無為入正位者不能復發菩提心譬如高原陸地不生蓮華𢍉溼淤泥乃生此華如是見無為法入正位者終不能生於佛法煩惱泥中乃有衆生起佛法耳何者以此是學位非證位也華嚴第八不動地菩薩證無生忍以此菩薩本願力故諸佛世尊親現其前三加七勸與無量起智門若諸佛不與此菩薩起智門者彼時即入究竟涅槃棄捨一切利衆生業以諸佛與如是等無量無邊起智門故於一念頃所生智業從初發心乃至第七地所修諸行百分不及一乃至百千億那由他分不及一等政與此同但華嚴圓頓鹿苑三藏異耳第三結成三喜二先結而今從佛聞所未聞未曾有法至快得安隱從佛結身喜聞法結口喜斷諸疑悔結意喜也二成今日乃知真是佛子從佛口生從法化生得佛法分乃知真是佛子是近佛結身成也從佛口生結口成也從法化生是結意成如此消文文盡理彰也初長行竟二偈頌有二十五行半為三一標三喜二釋三喜三結成今初一行頌標三喜爾時舍利弗欲重宣此義而説偈言我聞是法音得所未曾有心懷大歡喜疑網皆已除舉我聞兼得佛謂親從佛聞也第二二十二行頌釋三喜又為三今初一行半頌見佛喜昔來蒙佛教至聞亦除憂惱長行明失知見頌中明不失大乘上論失論遠頌論近論得互現耳第二有十一行頌上不聞法又為二初九行頌上身遠故不聞我處於山谷至令衆至道場我常於日夜者生死為夜涅槃為日為生死中有涅槃為生死外有耶若得悟時二疑雙遣又生死涅槃俱為夜此疑得除名為日日出時二疑雙遣又世人二種一草創學大二習小入大捔其事相直入者劣例如從阿毗曇中入者勝菩薩亦應爾於華嚴中入者化道應弱五味洮汰入者勝第二兩行頌著邪保證故不聞法邪見是凡人著保證是二乘著俱不聞法我本著邪見至得至於滅度第三九行半頌上心得妙解喜而今乃自覺至謂是魔所為上明不待所因不解方便頌中明得所因又解方便聞當作佛是所因聞五佛道同是解方便互顯一邊五佛章即是領文也二釋三喜竟第三二行半頌上結成聞佛柔軟音至教化諸菩薩第二領解段竟第三述成段上身子自陳得悟今如來述解非虗文有三一昔曾教大二中忘取小三還為説大所以引昔曾教述其見佛之緣若中忘取小述其憂悔聞法之緣還為説大述其悟解不虗成上三意也今初爾時佛告舍利弗至我以方便引導汝故生我法中無上道者十住毗婆沙論有七無上兩重釋之初釋者一身無上謂相好二受持無上謂自利利他三具足無上謂命見戒四智慧無上謂四無礙五不思議無上謂六波羅蜜六解脫無上能壞二障七行無上謂聖行梵行次釋者謂身無上名大丈夫受持無上名大慈悲具足無上名到彼岸智無上名一切智不思議無上名阿羅訶解脫無上名大涅槃行無上名三藐三佛陀菩薩瓔珞十三云道當清淨穢濁非道道當一心多想非道道當知足多欲非道道當恭敬憍慢非道道當檢意放逸非道道當顯曜自隱非道道當連屬無行非道道當覺悟愚惑非道道當教化矜吝非道道近善友習惡非道如是等種種明無上道今經以圓通為無上道若偏若次皆他經所論今經以圓通為無上道者即是圓無上家之道名無上道一一無上皆具諸道之無上也若偏若次者偏是藏通次是別教也長夜隨我受學者昔雖大化未破無明惑暗心中隨佛受學了因雖遠猶尚不滅況今真悟寧虗故舉曾教述見佛不謬也昔雖大化等者界內無明亦未曾破故云惑暗若初心圓修縱未破見思所聞一句納種在識永劫不失以暗望明暗尚非謬真悟寧慮惑暗者指六根已前六根雖即未破無明似位不退且名不暗我以方便生我法中者此義有兩牽若昔以大化今生大解此屬初意若令免惡道權以小引此是第二意二中忘取小舍利弗我昔教汝志願佛道至而便自謂已得滅度從我昔教汝志願佛道汝今悉忘者自有中途廢大習小名中途悉忘而便自謂已得滅度亦是而今悉忘由汝忘大願即習小致有憂悔而得聞法不虗也三還為説大我今還欲令汝憶念至教菩薩法佛所護念我今還欲令汝憶念本願即是述其得解不虗先施權教成其中途小善後顯真實遂其本願大心也第三述成段竟第四授記段前自陳佛印竟是故與記若得大解自知得佛何俟須記記有四意一昔未記二乘而今須記二中下未悟以記勉勵之三令聞者結緣四滿其本願是故記也有長行偈頌長行為十一時節舍利弗汝於未來世過無量無邊不可思議劫二行因供養若干千萬億佛奉持正法具足菩薩所行之道三得果當得作佛號曰華光如來至天人師佛世尊釋十號甚多且記一種無虗妄名如來良福田名應供知法界名正遍知具三明名明行足不還來名善逝知衆生國土名世間解無與等名無上士調他心名丈夫為衆生眼名天人師知三聚名為佛一正定聚二邪定聚三不定聚具十號名婆伽婆此云世尊四國土國名離垢至其傍各有七寶行樹常有華果五説法華光如來至以本願故説三乘法會義云準同釋迦故云亦以舍利弗下釋疑也疑曰如上所明佛出五濁事不獲已方便説三今華光佛土清淨若此胡亦以三乘化耶釋曰以本願故本願者據大悲空藏經云舍利弗曾於六十劫行菩薩道因婆羅門乞眼退時願成佛日開三乘法也又極樂國土彌陀亦以三乘施化良由悲願深重攝取帶業往生之人非藉三乘不能漸入大約凡聖同居土中不論是淨是穢施三者多純一者少也六劫名其劫名大寶莊嚴至其國中以菩薩為大寶故七衆數彼諸菩薩無量無邊不可思議至充滿其國八壽量舍利弗華光佛壽至其國人民壽八小劫九補處華光如來至其佛國土亦復如是十法住久近舍利弗是華光佛滅度之後至亦三十二小劫大論四十八云舍利弗正法三十二小劫者三災飢病刀滅衆生者名小劫又直是時節名小劫如説法華經六十小劫亦是時節數耳非三災滅外物為小劫也初長行竟二偈頌有十一行半為二初十行頌上九意略不頌補處長有供養舍利後一行半結歎初一行超頌得果爾時世尊欲重宣此義而説偈言舍利弗來世成佛普智尊號名曰華光當度無量衆第二一行追頌行因供養無數佛具足菩薩行十力等功德證於無上道十力等者即指佛果方名為力初住分得名為功德所言等者非唯供佛兼淨土行或可由得十力功德分故成初住記若引大論菩薩有十種力分者此明入住菩薩具足十力因耳第三半行超頌劫名過無量劫已劫名大寶嚴第四一行半頌國淨世界名離垢至常有華果實第五一行半頌菩薩衆數彼國諸菩薩至善學菩薩道第六半行頌説法如是等大士華光佛所化第七二行頌壽量佛為王子時至壽命八小劫第八一行半頌法住久近佛滅度之後至像法三十二第九半行供養舍利舍利廣流布天人普供養第二一行半結歎華光佛所為至宜應自欣慶宜應自欣慶者成初入歡喜位之解也初住能百佛世界作佛行地倍是第四授記段竟第五四衆領解段有長行偈頌長行三初經家敘衆喜爾時四部衆至心大歡喜踊躍無量次陳供養各各脫身所著上衣至雨衆天華云各各脫衣等者通語四衆八部言上衣者即出家二衆大衣也若論三衣俱不可捨以西方法多但三衣如大品中三百比丘聞般若已皆以僧伽黎而用供養論中或云亡相為法或云當日更得經云而自回轉者表聞身子得記法性自然而轉因果依正自他悉轉三正領解二初領開權而作是言佛昔於波羅奈初轉法輪次領顯實今乃復轉無上最大法輪經言最大法輪者最是今經圓中開也大是人等四種妙也四一或境等十十妙或佛等三二軌妙法之輪名妙法輪此略對初後不述中間方等般若具如玄文初長行竟二偈頌有六行半為二初二行頌上開權顯實爾時諸天子欲重宣此義而説偈言昔於波羅奈至少有能信者後四行半自述得解隨喜回向我等從昔來至盡回向佛道我等亦如是者如身子之領解如身子被述成如身子得記也問迦葉善吉諸大聲聞尚未得解四衆何人而先獲悟答四衆天人亦具三品上根同身子中下可知又解身子迦葉並是權行中下未開故迦葉滿願示同不解淨名云衆生未愈菩薩亦未愈也法説周竟僭補曰譬喻品題應立在此譯師立前者所謂調卷是也第二大段為中根譬説周文有四品此一品正是譬喻開三顯一信解明四大弟子等中根得解藥草如來述成授記與決此四番皆約譬説下三品皆約因緣陳如明繫珠緣而領解阿難引空王緣而獲記又例法説應有中根四衆歡喜而今無者一謂經家存略二例前後可知後文在法師品中云云譬説文為二一請二答請為三一自述無疑二述同輩有惑三普為四衆自述如文同輩是同行四衆是化境今新運大悲則普為請今初自述爾時舍利弗至得受阿耨多羅三藐三菩提記二述同輩是諸千二百心自在者至皆墮疑惑佛常教化下執昔三教三乘也而今於世尊前下執昔一理也昔説三是究竟今又説一是真實矛盾致迷故言皆墮疑惑三為四衆普請善哉世尊願為四衆説其因緣令離疑悔因緣者前三後一之因緣也第一請竟第二佛答文為二一發起二譬喻發起為二一抑二引抑令憤勇引令速進今初抑爾時佛告舍利弗至是諸所説皆為化菩薩故我先不言下指上明權皆為菩提指上顯實皆為化菩薩無有二乘若權若實皆入佛道無住涅槃上已明言云何執教迷暗不解如此責是抑也二引復立譬喻發明前義以引接之然舍利弗至諸有智者以譬喻得解然舍利弗今當下是引接安慰前斥既切恐鄙懟自沉今許其譬喻更明此義若能解者猶稱智也第一發起竟二正譬説有長行偈頌長行有開譬合譬開譬為二一總二別總譬譬釋迦章中今我亦如是兩行偈略頌上開權顯實為此總譬作本別譬譬釋迦章中我以佛眼觀見下四十一行半偈廣頌上開權顯實六意為此別譬作本總譬有六一長者二舍宅三一門四五百人五火起六三十子長者譬於我即釋迦一化之主也舍宅譬上處所安隱對上三界不定隱也一門譬上宣示佛道門也五百人譬上五道衆生也火起譬上對不安隱法五濁八苦也三十子譬上知衆生性欲三乘行人也初長者譬有三一名行二位號三德業今初舍利弗若國邑聚落名如賓行如主行有親疏名有近遠故舉處所以顯名行也封疆為國最遠宰治為邑居中聚落是鄰閭最近長者名行遍此三處近不見其細陋遠但挹其高風口無擇言身無擇行意無擇法名行相稱真實大人內合如來三業隨智慧行稱機施化名稱普聞德周法界也又國邑聚落皆如來果德實報土為國有餘土為邑同居土為聚落從本垂迹攝迹反本名行相稱無賓主之異彪炳洋溢遍三土也二位號有大長者位號為三一世長者二出世長者三引經帖文世長者備十德一姓貴二位高三大富四威猛五智深六年耆七行淨八禮備九上歎十下歸姓則三皇五帝之裔左貂右插之家位則輔弼丞相鹽梅阿衡富則銅陵金谷豐饒侈靡威則嚴霜隆重不肅而成智則胸如武庫權奇超拔年則蒼蒼稜稜物儀所伏行則白圭無玷所行如言禮則節度庠序世所式瞻上則一人所敬下則四海所歸十德具名大長者二出世長者如來性則從真如實際中生位則功成道著十號無極富則法財萬德悉皆具滿威則十力雄猛降魔制外智則一心三智無不通達年則早成正覺久遠若斯行則三業隨智運動無失禮則具佛威儀心如大海上則十方諸佛所共稱譽下則七種方便而來依止是名出世佛大長者三以十德帖經義足而闕一文國邑聚落有大長者三處稱譽為大豈非姓貴長者豈非位高衰邁豈非耆老財富無量豈非豐足多有田宅即分略周瞻豈非智深多有僮僕豈非勢大其家廣大豈非德行師之唯有一門豈非禮節訓人一路多諸人衆即下人所歸但闕上人所敬一文今以大字兼之大人所知故稱大也三歎德業其年衰邁財富無量多有田宅及諸僮僕德業有內外內則智略外則資財年高博達古今譬佛智德衰邁根志純熟譬佛斷德財富譬外德無量總譬萬德也田宅別譬也田能養命譬禪定資般若宅可棲身譬實境為智所託略則十八空門廣則無量空門若論福德無行而不修若論智慧無境而不照故云多有田宅也僮僕者給侍使人譬方便知見皆已具足和光六道曲順萬機即實智之僮僕也一長者譬竟二舍宅其家廣大衆生穴穴宅於三界如來應化統而家之故言廣大也三一門者譬上種種法門宣示於佛道也唯有一門光宅雲曰三界雖曠九十雖多論於出要唯是佛教故言一門九十者文語從略即九十六也九十六者衆路也若欲出宅唯有一門九十六道雖各謂道真如交橫馳走經云唯有一道是正餘者悉邪今明若單理為門理無通塞何門之謂單教為門得經者衆何意不出今取理為教所詮文云以佛教門出三界苦得涅槃證門又二宅門車門宅者生死也門者出要路也此方便教之詮也車者大乘法也門者圓教之詮也若宅門是車門初三車救子亦應即是等賜大車若所出門非所入門驗車宅異也宅是所出車是所入宅門是所出之路車門是所入之路四五百人者譬上衆生即五道也多諸人衆一百二百乃至五百人止住其中五火起譬上安隱對不安隱法五濁也有二先出所燒之宅相譬六道果報次明能燒之火譬八苦五濁今初堂閣朽故牆壁隤落柱根腐敗梁棟傾危堂譬欲界閣譬色無色界牆壁譬四大隤落譬減損傾危譬遷變柱根譬命梁棟譬意識腐敗譬危殆不久欲令易解作觀釋之堂譬身之下分閣譬頭等上分牆壁譬皮肉隤落譬老朽柱根譬兩足腐敗譬無常梁棟譬脊骨傾危譬大期周障屈曲譬大小腸又云譬心次明能燒之火周匝俱時欻然火起焚燒舍宅周匝者八苦遍在四大四生故言周匝並皆無常故云俱時欻然譬本無今有本無此苦無明故有六三十子譬長者諸子若十二十或至三十在此宅中上知衆生性欲曾習佛法天性相關則子義成性欲有異若十是菩薩子二十中乘子三十小乘子此機俱得出宅故名為子無此機是五百人或者支佛或小乘攝出沒不同皆言十者悉有十智之性故云內有智性但無如實智性耳上譬本二偈先頌實後頌權今總譬中大意亦然言十智者謂世智他心智菩集滅道智法比智盡無生智略如玄文妙智中説總譬六義竟第二別譬更為四初長者見火譬譬上佛眼觀見五濁四行偈為本二捨几用車譬譬上釋迦為五濁寢大施小始坐道場下十七行半偈為本三等賜諸子大車譬譬上釋迦示真實相我見佛子等志求佛道者無量千萬億六行偈為本四長者無虗妄譬譬上我為諸法王二行半偈為本就初見火其文有四其意但三一能見譬上我以佛眼觀見也長者見二所見譬上所見六道衆生也是大火從四面起衆生身受心法即宅之四邊從此四邊起淨樂等四倒則八苦之火衆苦皆集若知身不淨苦無常等即煩惱火滅三驚怖譬上為是衆生故而起大悲心也即大驚怖而作是念至安隱得出即大驚怖者念其退大善故驚憂其將起重惡故怖驚即對慈念其無樂怖即對悲憂其有苦我雖能於此所燒之門安隱得出者即是釋成驚怖慈悲之義雖是未盡之辭明佛以智慧力能尋正教見所詮諦不為五濁八苦所危故名安四倒暴風所不能動故名隱蕭然纍外故名得出而衆生不爾為火所燒如來慈悲猶為憂火所熾故言雖也經言所燒之門者今問教為門者此教為燒為不燒救云教門不燒佛教為門能通所燒之人所通之人被燒則能通門名燒如門內人死名門為衰門實不衰又問若爾教是常住非有為法若不爾何故不燒今解不爾夫門有件有空非件無以標門非空無以通致件可灰燼空不可燒教有能詮所詮若非能詮無以為教若非所詮何以得出能詮可是無常所詮非復無常得教下所詮故名安隱得出能詮磨滅故言所燒之門不從所燒之門何由安隱得出藉於言教契於所詮大經云因無常故而果是常如此釋者如經於所燒之門也若小乘無常教門此從所燒門出若大乘常住教門文字即解脫者此教即理體達燒無燒而安隱得出若就如來權智即是從所燒門出若就實智體於所燒安隱得出故先作衣裓几案出之不得後以無常出之即此意也四廣前所見之火還是釋成驚怖之意而諸子等於火宅內至心不厭患無求出意此總明衆生無知於火宅內樂著嬉戲者著見名嬉著愛名戲又耽湎四見名嬉唐喪其功名戲著愛亦爾耽湎五塵名嬉空無所獲名戲空生徒死而無厭離如彼兒戲也不覺不知者都不言有火名不覺不解火是熱法名不知既不知火熱不畏傷身名不驚不慮斷命故不怖衆生全不覺五陰八苦不知四倒三毒既不識惑云何憂慮惑侵法身傷於慧命如是不覺於苦不知於集不驚傷道不怖失滅以不聞四諦教則無聞慧名不覺不得思慧名不知不得見解名不覺不得思惟解名不知見諦即驚悟思惟即厭怖又不覺現在苦不知未來苦故下文云現受衆苦後受地獄等苦即此義逼身者前五識身也心者第六意識心王也以六七八三識以心為根故第六識亦得稱心謂身為八苦所逼而心不厭患也心不厭患者不厭無常之苦不患煩惱之集也無求出意者不修道求滅也今謂火宅本譬五濁嬉譬見濁戲譬煩惱濁不覺不知不驚不怖譬衆生濁火來逼身苦痛切已譬命濁心不厭患無求出意譬劫濁此與五濁相當第一長者見火譬竟第二捨几用車譬譬上寢大施小上譬本我始坐道場下十七行半偈分二初六行半用大擬不得後尋念過去佛下十一行偈用小擬得初用大擬不得為二初用勸門擬宜二用誡門擬宜就勸誡各三一擬宜二不受三放捨勸門三者一譬上念用大乘勸門於三七日思惟是事二明諸子不受譬上無機衆生諸根鈍云何而可度三放捨譬上無機息化我寧不説法疾入於涅槃今初舍利弗是長者作是思惟至若以几案從舍出之身手等者引下合譬云但以神力及智慧力以釋此譬身譬神通荷負手譬智慧提拔依三昧斷德則有神通依智慧智德則有説法智斷之力能成法身此之智斷還從勸誡兩門入勸即為人悉檀誡即對治悉檀此二悉檀為第一義悉檀而作方便如來初欲勸門擬宜衆生令衆善奉行成就十力無畏一切種智而衆生不堪次欲以誡門擬宜令諸惡莫作證大涅槃而衆生不堪無機息化故知念用大乘秪是勸誡兩悉檀定慧智斷耳四教善惡各有勸誡今約圓説故上文云定慧力莊嚴以此度衆生即其義也前歎長者其年衰邁即譬智斷智斷即是身手力也衣裓几案者三藏法師云衣裓是外國盛華之器貢上貴人用此貯之今取合譬文若我但以神力及智慧力讚如來知見力無所畏者衆生不能以此得度神力即是身慧力即是手如前説知見譬衣裓無畏譬几十力譬案如來以神通發動此三法以智慧宣説此三法無機息化僭補曰衣械几案約事是避火出宅之具約法是一乘實相法門身手有力約事能用衣械几案之人約法即如來神力智慧所以不用者以一乘法門微妙難知故言狹小謂難出也又諸子幼稚無知戀著嬉處不肯出故捨之用三車誘引稱機得宜也二明諸子不受譬上無機復更思惟是舍唯有一門至戀著戲處唯有一門而復狹小門義如上説今更明一謂一理一道清淨華嚴經云文殊法常爾法王唯一法一切無礙人一道出生死門謂正教通於所通以理純無雜故言一即理能通故言門微妙難知故言狹小教者十方諦求更無餘乘唯一佛乘故言一此教能通故言門此教微妙凡夫不知出處是不知權不知入處是不知實二乘因聞少知出要永不知入菩薩雖自知出亦不知入奪七方便皆不知入出上文云若但讚佛乘衆生沒在苦不能以教自通將談無機故言狹小然上根圓因自修行大直道無留難故故名為一善行菩薩道直至道場故名為門但以妙行難行方便無機故言狹小耳明二萬億佛所教無上道大乘善根微弱名幼稚若聞大乘乃生謗毀名未有所識也戀著戲處者前明善弱此明惡強即是因時深著見愛果時深著依正欲界著六塵色界著禪味無色界著定上文云衆生諸根鈍著樂癡所盲不堪聞大乘也三放捨指此二句為放捨善誘也或當墮落為火所燒墮落有二一者幼稚憶本戲處故墮落二都無識執物不堅故墮落一譬著五欲墮在三途二譬善弱無識謗毀大乘亦墮落三途故放捨也初用勸門竟第二用誡有三一用大乘誡門怖之令出我當為説怖畏之事至具告諸子汝等速出對治之相如大品中説四念是摩訶衍以不可得故異於小乘也既著戲處故説怖事令得免五濁火燒五陰舍宜應捨離若久住著必斷善根故云無令為火之所燒害二不肯信受父雖憐愍善言誘諭至何者為舍云何為失不驚不畏者不生聞思如上説不識八苦五濁能燒善根如不知火不識陰界入法是諸苦器如不識舍不知喪失法身之由如不知何者為失三放捨指此二句為放捨也但東西走戲視父而已背明向暗如東西生死住還速疾如馳走於中起見愛如戲雖用大乘勸誡二門擬之不受故言視父而已第一捨几竟第二用車譬譬上尋念過去佛所行方便力下十一行偈用小擬得上文有四今譬亦四一者擬宜三車譬譬上尋念過去佛亦作三乘化也二者父知先心所好譬譬上作是思惟時十方佛皆現三者歎三車譬譬上正施三乘思惟是事已即趣波羅奈四者適子所願譬譬上受行悟入是名轉法輪也今初爾時長者即作是念至令諸子等得免斯害大乘化功為父命衆生大善為子命大善若盡即子命斷子命斷則化功亦廢即父命斷前言苦痛切已猶是未死今云必為所焚即有死義也上文於所燒之門安隱得出今云若不時出必為所燒此義云何前得出者即是法身出今言若不時出即是應身同疾衆生有善與應身時出衆生善斷不與應身時出即是俱為所焚也今欲應身擬宜令其時出從我今當設方便欲設權也二父知先心所好譬父知諸子先心至情必樂著其昔曾習小是知先心性欲不同是知各有所好又知衆生昔曾習大習大未濃是為大弱如舍利弗六心中退厭老病死故以小接是為小強本曾習大名知先心中厭老死名各有所好六心退者準瓔珞意身子於十住第六心因婆羅門乞眼退菩提心是為大弱證阿羅漢果是為小強也三歎三車希有譬譬上三轉法輪謂勸示證而告之言汝等所可玩好希有難得汝若不取後必憂悔一勸轉如此種種羊車鹿車牛車今在門外可以遊戲二示轉汝等於此火宅宜速出來隨汝所欲皆當與汝三證轉示應居初隨經次第先勸後示亦應無失證中皆與之言正當己證亦令他證故名為與淨名經云三轉法輪於大千其輪本來常清淨第四適子所願譬譬上受行悟入諸法寂滅相不可以言宣以方便力故為五比丘説是名轉法輪爾時諸子聞父所説珍玩之物至爭出火宅前偈本略今譬事廣廣明修因至果依六句解義言前偈本略者譬本但云是名轉法輪等也廣明至六句者賢合為四見修為二賢所以合者四念法同故為一暖頂同退故為一忍不出觀故為一世第一無上故自為一見修道異故各為一廣如俱舍賢聖品中此但略明一適願者四念機教相稱此聞慧也勇鋭者即是思慧思心動慮正勤方便也二互相推排者推四真理排伏見惑邪正未決名為互相此入修慧屬暖頂位也三競者競取勝理也此是忍法位競取勝理初觀三十二諦競趣真道後縮觀趣苦法忍也忍法位初觀三十二諦者上下各有十六行相上下合論故三十二欲界苦諦下觀苦空無常無我集諦下觀集因緣生滅諦下觀滅盡妙離道諦下觀道正迹乘共十六諦上二界同一定地共一四諦亦觀十六諦是為上下共觀三十二諦也其觀法在忍位中有下中上三忍不同下忍初觀欲界四諦修十六行又類觀上二界四諦修十六行共三十二行名下忍位中忍所觀三界上下八諦三十二行與下忍同但其中有減緣減行之別所謂減緣必減行減行未必減緣行即十六行緣是所緣四諦之境也共有七周減緣二十四周減行名中忍位唯留欲界一行并所緣苦諦名上忍位故云縮觀苦諦趣苦法忍是也略如四教儀集注廣如玄文釋籤四共者是世第一法位同觀一諦苦諦與苦法忍四觀不別也五馳走者入見道十五心速疾見理入見道十五心速疾見理者世第一後心苦忍真智於八諦下發八忍八智總十六心有門以十五心名見道為初果至十六心去是修道二三果位也譬上便有涅槃音見道之中分得涅槃也六爭出者思惟道也爭出三界成無學果斷思惟盡方出火宅即譬上偈及以阿羅漢法僧差別名也觀心解者中道正觀直觀實相心法相稱名適所願境無邊故觀亦無邊名勇境研心利名鋭心境相研名互相推排心王心數緣境速疾名競共馳走遍歷一切陰界入等無非實相名為出火宅也第二捨几用車譬竟第三等賜諸子大車譬譬上顯真實相此文為四一父見子免難歡喜譬譬上我即作是念如來所以出至今我喜無畏兩行一句偈為本二諸子索車譬譬上大乘機發我見佛子等志求佛道者無量千萬億皆來至我所兩行偈為本三等賜諸子大車譬譬上於諸菩薩中正直捨方便但説無上道三句為本四諸子得車歡喜譬譬上菩薩聞是法疑網皆已除千二百羅漢悉亦當作佛一偈為本上法説中先明機發次説障除佛喜無畏今譬中先明免難後明索車若具足論應作四句有先障除後機發如四大聲聞等於三藏中障除大品末法華初大機始發二障未除大乘機發如華嚴中及法華中諸凡夫衆得入佛慧者餘兩句如上説上説者自有障即除機即發如説無量義時證二乘果大機即發自有障未除大乘機未發如五千退席者方便品明佛喜無畏此中諸子歡喜以子喜故其父亦喜共成一意今初父見子免難歡喜譬是時長者見諸子等安隱得出至歡喜踊躍就免難中具二義謂免難歡喜若子未免難父則憂念若得離火心即泰然故免難歡喜得為一譬以子歡喜其父亦喜得譬佛喜也四衢道中者正譬四諦四諦觀異名為四衢四諦同會見諦如交路頭見惑雖除思惟猶在不名露地三界思盡名露地住果不進故云而坐不為見思所局故云泰然生滅度安隱想故言歡喜也第二諸子索車譬時諸子等各白父言至願時賜與後偈云願賜我等三種寶車文無索字義者依此請辭明索車耳譬上大乘機發會義云三車以譬三乘果位為求三乘果所以出三界既出三界已實無三乘果證可得而又方等彈訶般若淘汰今經彰言方便非實所以殷勤三請名為索車指昔所許三權正是請今一實故名大乘機發也須知在方等時屢被挫折不知所云便有機索至般若時轉教付財但自未知得與不得便有情索今法華會發言三請更加口索也第三等賜大車譬有二一標兩章門二廣兩章問今初標舍利弗爾時長者各賜諸子等一大車各賜諸子者標等子也等一大車者標等車也何者以子等故則心等譬一切衆生等有佛性佛性同故等是子也第二車等者以法等故無非佛法譬一切法皆摩訶衍摩訶衍同故等是大車而言各賜者各隨本習四諦六度無量諸法各於舊習開示真實舊習不同故言各皆摩訶衍故言大車而言下却以子等釋車等疑既云車等何以各賜昔習不同諸位不一至此所説無非一乘何以故若一人不遍不名子等且云本習應遍諸法一物不與不名賜等所以色心逆順依正行理因果自他解惑小大慧福故知等賜秪是開彼三乘六道無非一如故一一如無不遍攝遍具遍入一切衆生誰無四方道場之分誰不理有大車具度待時待緣是故爾耳故至今日方云各賜二廣兩章門有二一廣車二廣心廣車又二一廣車體二釋有車之由敘車體中三先敘高廣次明白牛後明儐從今初其車高廣衆寶莊校至安置丹枕假名車有高廣相譬如來知見深遠橫周法界之邊際豎徹三諦之源底故言高廣也衆寶莊校者譬萬行修飾也周匝欄楯者譬總持持萬善遮衆惡四面懸鈴者譬四辨下化也張設幰蓋者譬四無量衆德之中慈悲最高普覆一切也珍奇雜寶而嚴飾之者真實萬善嚴此慈悲大經云慈若具足十力無畏名如來慈慈中行布施等寶繩交絡者譬四弘誓堅固大慈心也垂諸華纓者譬四攝神通悅動衆生亦譬七覺妙鬘也重敷婉筵者譬觀練熏修一切諸禪重沓柔軟也安置丹枕者若車外枕車若駕運隨所到處須此支昂譬即動而靜即靜而動若車內枕者休息身首譬一行三昧息一切智一切行也丹赤光譬無分別法也次明白牛駕以白牛膚色充潔至其疾如風駕以白牛者譬無漏般若能導諦緣度一切萬行到薩婆若白是色本即與本淨無漏相應體具萬德如膚充煩惱不染如色潔又四念處為白牛四正勤中二世善滿如膚充二世惡盡如色潔四如意足稱行者心如形體姝好筋譬五根住立能生義也力譬五力摧伏幹用義也行步平正以譬定慧均等又譬七覺調平其疾如風者八正道中行速疾到薩婆若後明儐從又多僕從而侍衛之僕從者譬方便波羅蜜能屈曲隨人給侍使令衆魔外道二乘小行皆隨方便智用故淨名云皆吾侍也又果地神通運役隨意即僕從也二釋有車之由所以者何是大長者財富無量種種諸藏悉皆充溢由如來果地福慧圓滿名財富無量種種諸藏充溢者行藏理藏一切法趣檀尸忍等是趣不過者是約行為如來藏一切法趣陰入界根塵等是趣不過即是約理明如來藏自行此行理名充化他名溢實智滿名充權智滿名溢入中道名充雙照故名溢非但藏多又皆充溢何法不是摩訶衍故大乘法財無量也一廣車等竟二廣心等文二一廣心二釋今初而作是念我財物無極至各各與之不宜差別廣心等者財富無量是子無偏是故心等若富而非子是子而貧則不得等今七寶大車其數無量若教若行皆摩訶衍即財多也各各與之不宜差別者不移本習而示真實如身子於智慧開佛知見具一切佛法目連於禪定開佛知見具一切佛法餘人例爾又方等般若念處正勤根力覺道種種異名皆開示實相歷一切法亦復如是故言無量也二釋所以者何以我此物周給一國猶尚不匱何況諸子初釋財多尚周一國況復諸子譬大圓因遍該善惡況佛知見耶次釋子等者非子尚充況是子耶譬佛無緣者尚度況有緣子耶二廣心等竟第四諸子得車歡喜譬譬上受行悟入也是時諸子各乘大車得未曾有非本所望本求羊鹿水牛期出分段今得白牛盡於變易過本所望豈不歡喜僭補曰棗柏李長者頌云一切衆生金色界白淨無垢智無壞智珠自在內衣中只欲長貧住門外廣大寶乘住四衢文殊引導普賢扶肥壯白牛甚多力一念遍遊無卷舒如是寶乘不能入但樂勤苦門前立不覺自身常住中遺上恆言我不及第三等賜大車譬竟第四長者無虗譬譬法王不妄文三一問二答三述歎今初舍利弗於汝意云何至寧有虗妄不佛問者本但許三而今與一非虗妄不欲令身子領實故以虗妄問之第二答為二一免難不虗二不乖本心不虗各為三今初免難不虗三一標舍利弗言不也世尊至全其軀命非為虗妄二釋何以故若全身命便為已得玩好之具釋者命重身輕全身免火已得大寶濟於重命豈應有虗全於小乘五分法身入空慧命則為已得昔來所玩況於火宅方便濟苦本在大耶三結況況復方便於彼火宅而拔濟之結免八苦之火全五分之身已是大寶況二萬億佛所大乘慧命圓因成就佛知見開寧是虗妄第二不乖本心三一標世尊若是長者乃至不與最小一車猶不虗妄初標不乖本心章本知無三意令不謗不謗者已不乖本心不乖本心意者此述長者本意若小若大俱有本心大本為本小本非本許小不與尚無所乖況更與大寧乖本意如許少財與少非妄況與大位得過於昔寧乖本心信知如來本非小化所以財但免於分段之貧位則超於二死之賤二義兼備何乖之有二釋何以故是長者先作是意至以是因緣無虗妄也本知無小意令不毀既無毀因不墮惡果不與小車不乖本意三結況何況長者自知財富無量欲饒益諸子等與大車自知財富無量欲饒益其子等與大車過本所望是故不虗結前章云方便拔濟譬於斷德神通之力結後章云財富無量譬於智德辨説之力前是子等故不虗後是財等故不虗第三述歎佛告舍利弗善哉善哉如汝所言有二善哉者述其二不虗也問佛何不自説不虗答佛許三與一自説為難身子説不虗取信為易第四長者無虗妄譬竟第一開譬竟第二合譬合上總別二譬先合總譬中有六今文皆合小不次第今初第一合上第一長者名行位號德業等故云如來亦復如是舍利弗如來亦復如是至具足方便智慧波羅蜜無量德號略舉十義如上説一切世間將處所以定名行上云國邑聚落今合直云一切世間通指同居有餘實報自體皆是佛妙色妙心果報之處而遍應彼三處也於諸怖畏等合上歎內外德內是年高衰邁識達則多譬如來智斷於諸怖畏無明永盡合上衰邁顯斷德也成就無量知見合其年高顯智德也力無畏等合上外德財富無量也神力者深修禪定能得神通合上田也智慧力智必照境如身之託處合上宅也具足方便波羅蜜合上諸僕從也二合上五百人上云今我亦如是安隱衆生故安隱即慈悲也大慈大悲常無懈倦恆求善事利益一切慈悲是施化之本一切是五道恆為慈悲所被合上五百人也三合上其家以慈悲故而生三界火宅而生三界朽故火宅四合上第六衆生有緣親者前度合上三十子有三乘根欲也為度衆生五合上安隱對不安隱法欻然火起生老病死憂悲苦惱愚癡暗蔽三毒之火六合上第三一門以種種法門宣示於佛道也教化令得阿耨多羅三藐三菩提教能詮理尋理起行即得菩提故知教理共用合上唯有一門譬也若講説令前後可解一一須提方便品譬本來勘合之後去例爾合總譬六段竟第二合別譬別譬有四初合見火譬二合捨几用車譬三合等賜大車譬四合無虗妄譬初合見火譬有四一合上我以佛眼觀見見今以一見字合上第一能見之眼即是如來寂照智眼能見也二合上所見之火從四面起諸衆生為生老病死至如是等種種諸苦此中明八苦為火四苦如文貪著追求求不得苦後受地獄天上人間是五陰苦愛離怨會如文此之八苦從四倒四面起也三合上所見火譬諸子不覺不知衆生沒在其中至雖遭大苦不以為患不觀苦集故不厭不觀道滅故不求解脫雖遭大苦不以為患合上心不厭患無求出意也四合上起驚怖舍利弗佛見此已至令其遊戲第四合上第三起驚怖我雖能於此所燒之門安隱得出意也應拔其苦難者即大悲之力與無量樂者即大慈之力也一合長者見火譬竟第二合上捨几用車譬二先合捨几次合用車今初捨几上文有勸誡今但合勸不合誡以勸善即誡惡誡惡即勸善上勸文有三謂擬宜無機息化今初舍利弗如來復作是念至衆生不能以是得度擬宜有身手衣裓等但以神力者合上身力智慧力者合上手力也讚如來知見合衣裓也力無所畏合几案也若佛初出即用此擬衆生不能以此得度也二無機不受勸所以者何是諸衆生至何由能解佛之智慧正由五濁障重未免生死等火大乘微妙不能得入故言何由能解佛之智慧此一句即合上唯有一門而復狹小也三合上放捨無機息化不然或當墮落為火所燒也此文無放捨語而息化意甚分明也息化文二先牒前後三譬帖合舍利弗如彼長者至然後各與珍寶大車牒前一譬正帖合息化牒後兩譬傍成息化也雖復身手有力而不用之此牒前身手救子不得譬以合如來亦寢大化也但以殷勤下牒施三之譬也就然後各與下牒第三等賜大車譬也二正合息化如來亦復如是雖有力無所畏而不用之此十六字正合息化一合捨几譬竟第二合用車救得譬上文有四此中亦四第一合上擬宜三車也但以智慧方便於三界火宅拔濟衆生二合上知子先心也為説三乘聲聞辟支佛佛乘三合上歎三車希有上有勸示證今亦具合但不次第先示而作是言汝等莫得樂住三界火宅苦諦勿貪粗弊色聲香味觸也若貪著生愛則為所燒集諦汝速出三界當得三乘聲聞辟支佛佛乘滅道二諦合上三車今在門外汝等於此火宅宜速出來三界是示苦諦勿貪粗弊乃至生愛等示其集諦速出三界示其滅道滅道即是示其三界外有智斷三乘之果故令速出三界當得三乘三乘正取滅道為體也二證我今為汝保任此事至如來以是方便誘進衆生第二合上必與證得不虗也三合上歎車希有即勸也復作是言汝等當知至便得無量安隱快樂此三乘是諸佛方便引物儀式故衆聖所稱得無生智為自在得盡智為無繫我生已盡不受後有名無所依所作已辦梵行已立名無所求也無漏根力覺道等者根五根力五力覺七覺支道八正道禪四禪四空定滅受想定解脫八解脫三昧三三昧以上法門通漏無漏此三乘果法皆是無漏根力覺道等也無量安隱快樂者證真空涅槃離我見有無等見諸患永息故云得無量安樂也四合上適子所願譬上有真似等四位今合亦四但上總今別三乘各為四皆引上譬來帖合舍利弗若有衆生至為求牛車出於火宅內有智性者宿習三乘樂欲成三乘智性故佛施三乘之教也內有智乃至從佛聞法信受合上聞父所説玩好之物適其願故合上聞慧也殷勤精進者殷勤合上心各勇鋭思慧也精進合上第二推排推是推理排是排惡惡去故精理明故進合上修慧也欲速出下合上第三競共馳走是名聲聞乘合上第四爭出火宅三乘修行皆有此四而辟支佛求自然慧者辟支是法行人從他聞法少自推義多故取譬鹿鹿不依人自然者從十二緣門入此門本自有之非佛天人所作名自然慧不從他聞復名自然慧也菩薩稱一切智者不同二乘乃是佛智菩薩望此修因即是大乘兼運之意也已上合第二捨几用車譬竟第三合等賜大車譬上文有四一免難二索車三等賜四歡喜今略不合索車歡喜但合免難義兼索車合等賜義兼歡喜今雙牒免難等賜二譬然後雙合二譬初雙牒舍利弗如彼長者至等以大車而賜諸子如彼長者下牒免難自惟財富下牒等賜次雙合二先合免難如來亦復如是至得涅槃樂門有入義出義若三界為宅五陰為舍由迷色心而入色心即是入宅生死之門若作出者今言以佛教門出三界苦正是稟藏通二教教下之理共為門起三乘聖行出三界苦得涅槃樂也次合等賜上等賜先標二章次廣二章後釋出有車之由今文闕略小不次第略分為五一合上釋有車之由如來爾時便作是念至力無畏等諸佛法藏上云財富無量庫藏充溢也二合上廣等心是諸衆生皆是我子至皆以如來滅度而滅度之上云我財物無極不應以下劣小車今云不令有人獨得滅度皆以如來滅度而滅度之豈非合等心義三合上標等心章門是諸衆生脫三界者上云各賜諸子等也四合上標等車章門悉與諸佛禪定解脫等娛樂之具五正合上廣大車皆是一相一種聖所稱歎能生淨妙第一之樂通合上高廣乃至僕從等一相是實相即法身德一種是種智般若即般若德能生淨妙之樂樂即無苦名解脫德三德高廣具足莊嚴收羅衆德名摩訶衍合上大車譬也第三合等賜諸子大車竟第四合上不虗譬上答文有二一全身命二不乖本心今但合不乖本心兼得全身命又為三先牒譬舍利弗如彼長者至無虗妄之咎次合釋不乖本心如來亦復如是至然後但以大乘而度脫之三合況合上況出不虗也何以故如來有無量智慧至分別説三即是長者自知財富無量欲饒益諸子故許三與一非是虗也此釋小異於前前意為令諸子得出意不在三既出不與亦不虗妄今明如來出世本欲説大但為小智樂著三界故以方便誘引既已得出還與大乘即稱本心故言能與衆生大乘之法但不盡能受也若華嚴中能受即已與竟不俟鹿苑開一為三由不能受故以方便力於一佛乘分別説三三由衆生非佛本意故用此釋成不乖本心不虗也前舍利弗問云願為四衆説其因緣今故答云以是不盡能受因緣分別説三初長行竟第二偈頌有一百六十五行分為二前有一百行頌上長行文中第二譬喻後有六十五行廣明通經方法勸信流通上長行有開譬合譬偈頌亦二初有六十五行半頌開譬次有三十四行半頌合譬初亦二初有三十三行頌總譬次有三十二行半頌別譬總頌六意六意中止頌其四兼得其二頌家宅兼得一門頌五百人兼得三十子今初一句明長者佛欲重宣此義而説偈言譬如長者頌上位號即兼得名行歎德既有長人之德即知名行遍為國邑所崇亦知內外年德俱高也內合婆伽婆即位號則知具足智斷慈悲萬德也第二三行一句頌家宅譬為二初句頌家宅有一大宅一大宅者且指一方三界故云一二三行廣出宅體其宅久故至雜穢充遍明所燒之相故知此頌宅體也三界無始為久非今所造為故無常卑鄙名頓弊亦云頭殿腹堂背為舍念念相續無常為高危一云色界為堂欲界為舍不免墮落名高危命根支持為柱過去行業為基陛也亦云兩足為柱根三相所遷名摧朽也意識綱維以為梁棟諸苦所壞如傾斜亦云脊骨為梁棟髂為基陛衰老之時為頽毀牆壁者一云四大為牆壁皮膚為泥塗四威儀不正為亂墜五識不聰不相主境為差脫亦云牆壁圮坼如皮膚皴朽壯色鮮淨如初泥塗老色枯悴如後褫落髮髭朽老則皆脫落如覆苫亂墜筋骨老弱支節不援如椽梠差脫周障屈曲者印師云三十六物更相隔障故云周障䐗腸盤回故云屈曲非但無常所遷亦有不淨苦等故云雜穢充遍也今云周障是六識屈曲是六根六識緣六根取境艱關故言屈曲六塵遍染六根故言雜穢充遍因緣觀心兩番釋因緣觀心兩釋者如云頭殿腹堂即觀心也如云色堂欲舍等即因緣也命根已下文並觀心也第三半行頌五百人有五百人止住其中譬三乘根性為五道所攝兼得三十子譬也第四有二十九行偈正頌三界火起就此分四初有二十二偈明地上事譬欲界火起次有三偈半明穴中事譬色界火起三有二行半偈明空中事譬無色界火起四有一偈總結三界衆難非一就欲界火起復為四初十七偈半明所燒之類譬衆生十使次有一偈明火起之由譬起五濁所由三有二行正明火起之勢譬正起五濁四有一行半明被燒之相譬受八苦五濁就十七行半為二初十六行正明所燒後一行半總結就所燒中又二初六行明禽獸被燒譬五鈍使衆生後十行明鬼神被燒譬五利使衆生初五鈍使為二初五行半明五鈍二半行結初分五初半行譬慢使鴟梟雕鷲烏鵲鳩鴿衆生慢使自舉輕他如鳥為性陵高下視八鳥譬八慢文殊問經明八憍今用配八鳥盛壯憍如鴟性憍如梟富憍如雕自在憍如鷲壽命憍如烏聰明憍如鵲行善憍如鳩色憍如鴿陵他為慢自貴為憍自愛為貪愛他為淫自忿為恚忿他為瞋自惑為愚惑他為癡二半行譬瞋使蚖蛇蝮蝎蜈蚣蚰蜒瞋有三蚖毒盛不觸而吸譬非理生瞋蝮蝎觸則螫譬執理瞋蜈蚣譬戲論瞋世人云赤頸者是蜈蚣不赤者是蚰蜒三有二行譬癡使守宮百足至而集其上癡有獨起相應起守宮百足等兀然譬獨頭無明鼬貍鼷鼠等譬相應也諸惡蟲輩下從癡根本備起諸結也明諸使相緣或緣三界如交橫起之速疾如馳走屎尿下一行明癡心所著之境皆無常苦無我不淨由癡不了於中計淨等而生染著故云𧏙蜋諸蟲而集其上僭補曰著男女是屎尿臭處不淨計淨是𧏙蜋輥丸四有二行明貪使狐狼野干至處處求食貪有二種一有力二無力有力者以威勢取如狐狼等無力者但能從他乞索粗弊如野干等咀嚼下明貪取境引物向己如咀嚼不以道理如踐踏貪心取境或取一城或取一國其有齊畔如嚌齧也亦云貪心取境有用不用有用而取如咀嚼不用而取如踐踏又少則咀嚼多則踐踏也骨肉狼藉者積聚五塵不知止足也由是群狗競來搏撮者此有力貪搏撮無力之者謂王威也飢羸慞惶者常不知足如飢求不能得如羸種種營覔如慞惶多欲之人雖富而貧也愛心貪貪五塵之肉見心貪貪道理之骨推求知見遂多所解即是多骨須骨之狗競來撮之諸見心中未得正法之食名飢不能伏斷見名羸處處求解名為慞惶一云即是貪人希求念望也五半譬疑使鬬諍摣掣啀喍嘷吠猶豫二邊名疑未決是非云鬬諍意謂為是名掣復謂為非名摣啀喍嘷吠者發言論決是非之理也摣者叉也謂五指俱取也掣牽也亦云向前𢳛向後掣啀喍者喍字亦作齧張唇露齒也嘷吠者出聲大吼也第二半行結上五鈍使其舍恐怖變狀如是初六行明五鈍使竟第二有十行明五利使為二初半行總明利使處處皆有魑魅魍魎利使遍緣三界五陰四諦故言處處皆有夫鬼神有通有智禽獸則無故以利使譬鬼神鈍使喻蟲獸魑魅者物之精也通俗文云山澤之怪謂之魑也西京賦云山神虎形曰魑宅神豬頭人形曰魅魍魎者木石變怪玉篇云水神二九行半別明五利使文為五初三行譬邪見夜叉惡鬼至甚可怖畏邪見者夜叉是捷疾鬼譬邪見撥無因果人是善報譬出世因果不雜煩惱撥無此理如食人肉毒蟲之屬是惡報如世間因果雜諸煩惱撥無此理如噉毒蟲之屬也孚乳産生者世間之法從自類因生自類果也各自藏護者因能有果名藏必得不失名護也又人肉是善毒蟲是惡邪見之心撥無善惡因果事如噉食也孚乳産生總説善惡並有因果相生之用也食之既飽者見心成就也惡心熾盛者見心增廣也鬬諍之聲者內心成就外彰言教宣於無因無果之法能令聞者墮落三塗故言怖畏鳥生曰孚獸生曰乳言自類等者即同類因得等流果以子似父故以喻之二兩行二句譬戒取鳩槃茶鬼至怖狗自樂戒取者鳩槃茶是鬼勝者如有漏善能勝諸蟲也蹲踞土埵者修十善戒能生六天六天是欲界高處事如土埵也又外道持戒能修禪定初得欲界定或得未來定未來定未脫欲界欲界之頂如土埵也或離一尺二尺者得色界定如一尺得無色處定如二尺得升上界為往退墮為返起見蓋如縱逸嬉戲捉狗兩足一云謗無苦因如捉狗足撥無苦果如腳加頸集本得果如狗之聲利見撥言無集無得苦之理令其失聲也鳩槃茶者可畏鬼也蹲虗坐也踞實坐也次捉狗等者有此一釋故曰一云狗足如因捉之如謗捉足撲之如令絶聲故云令其失聲復以狗腳加於狗頸謗無苦因之上復更撥無苦果如腳加頸三一行半譬身見復有諸鬼至呌呼求食身見者豎入三世計我名長橫遍五陰計我名大計我自在不修善法即無慚愧故言裸形以惡莊嚴故言黑無功德資故言瘦計我者不出三界故言常住其中計我在心發言宣説有我之相故言發大惡聲冀因此説望得道果故言呌呼求食也四半行譬見取復有諸鬼其咽如針見取者咽細命危而保其壽非想無常而計涅槃故言其咽如針言見取者非果計果非想非是涅槃之果計之為常五兩行譬邊見復有諸鬼至呌喚馳走邊見者推我斷常斷常二邊如牛頭二角為身是我為我是身依我見起邊見如頭兩角也計常斷之過能斷出世善如食人肉能斷世善根如或時噉狗或時計常或復計斷前後回轉如頭髮蓬亂計常即破斷計斷即破常如殘害凶險無有智定食飲自資如飢渴所逼初十六行明所燒竟第二一行半總結夜叉餓鬼至恐畏無量總結欲界煩惱之相亦是結利鈍衆生之相並是有漏之心常無道味故云飢急窺看窗牖者明其邪觀空理慕仰道味雖復觀察而滯著心多不會正理如窺窗見空不得無礙也初十七行半偈譬十使竟第二一行明火起之由譬五濁由起也是朽故宅屬于一人其人近出未久之間三界是佛化應之處發心已來誓願度脫故云屬于一人長者在宅能令慎火由出去後諸子無知故令火起內合正由如來大通佛時常化是等令伏五濁衆生感盡如來捨應此等於後便起五濁他土赴緣非是永去故言近出又云從得無生已不生三界故名出不久應來故名近壽量品云數現涅槃即是出宅意也第三二行正明火起之勢勢有二種一者勢分二者威勢勢分通至非想威勢燒無不壞今當界二勢亦復如是於後舍宅至牆壁崩倒四面即是處所身受心法等起四倒五濁八苦故云一時相續漸增為熾命根斷為𪹼風刀解體為裂又云受苦悲痛呻吟之聲為𪹼諸根破壞為裂氣斷骨離筋絶為摧折墮落四大解散為牆壁崩倒也第四一行半明被燒之相諸鬼神等至不能自出或云親屬為鬼神哭泣為揚聲今例上利使以譬神鬼利使之人或計斷常若計常者謂法定空已有還無無即常計斷之人謂法定斷唯此一死更無復續皆唱言定説其事已顯故云揚聲大呌也若是鈍使及諸戒取本不計斷今見無常但生疑怖不知出離之方故言慞惶不能自出初二十二偈頌欲界竟第二有三行半明穴中事譬色界火起諸部解義瞋通三界即此文也文為四初一行明所燒之類惡獸毒蟲藏竄孔穴毗舍闍鬼亦住其中四禪之定譬如孔穴也雖復不及門外敞豁猶得免於猛炎入禪定中猶得免於欲界粗惡也利使衆生亦得禪定如毗舍闍鬼亦住其中二一句是火起之由薄福德故由少福故近惡遇苦三一句明火起之勢為火所逼孔穴之中雖無猛炎猶有熱惱四禪雖無欲界惡亦有愛味細苦故言為火所逼四二行明被燒之相共相殘害至四面充塞明利鈍相奪諸使衆生得禪是同所計各異異故互相是非如相殘害也既於禪中起諸見則不能生無漏定慧但著默然如飲血又著支林如噉肉野干是欲界貪未來定已斷故言並已前死亦名食噉禪定之貪如大惡獸能吞欲界貪也欲界四倒八苦如猛炎色界四倒八苦如臭煙亦通身受心法四大皮肉等故言四面充塞也二色界竟第三二行半偈明空中事譬無色界火起為二初一行明所燒之類明空中事者前云藏穴以譬色界今乃出穴故譬無色言空中者非謂虗空既以舍內譬欲入穴譬色今以穴外空地為空譬以無色蜈蚣蚰蜒毒蛇之類為火所燒爭走出穴厭色界定出向無色厭色粗境觀無色法如毒蛇類火燒出穴若爾瞋通三界也次一行半明所燒之相鳩槃茶鬼至周障悶走若得無色定必滅下緣故云隨取而食也非想最頂猶尚不免顛倒諸苦如頭上火然非想亦有八苦之火心生異念名生苦念念不住名老苦行心擾擾妨定名病苦退定是死苦求定不得是求不得苦求定不得必有於障即怨憎會苦四陰心即五盛陰苦不能即斷有頂種故頭上火然也無無漏故飢渴所惱猶是輪回周障悶走也三無色界竟第四一行總結三界衆難非一其宅如是甚可怖畏毒害火災衆難非一第一總譬竟第二有三十二行半偈頌別譬別譬有四今頌但三初有二行半頌長者見火第二有十三行頌捨几用車寢大施小譬第三有十七行頌等賜大車譬初頌見火有三一能見二所見三起驚怖此中具頌也初三句頌能見人是時宅主在門外立聞有人言上明見今云聞以聞代見也聞必從他門外立者正頌上我雖能於所燒之門安隱得出也立者在法身地常懷大悲欲救衆生不處第一義空之座也不處第一空座者第一義空為智理合與悲同體今言不住無悲之智恆居有智之悲故云不處故知無緣慈悲方可與智同體二一行一句頌所見之火汝諸子等先因遊戲來入此宅稚小無知歡娛樂著問子本未出云何因戲來入答或曾發心名出三界而復退還名之為入如人舉足欲出至門側而反亦名為出亦名還入也又理性本淨非三界法因無明故而起戲論便有生死故云先因遊戲來入也大善未著為稚小無明所覆為無知三二句頌上即大驚怖而起大悲心長者聞已驚入火宅一長者見火譬竟第二有十三行頌捨几用車為二初有五行半頌上救子不得上開譬中有勸誡上合中但合勸今但頌誡誡文有三初四偈半頌上我當説怖畏擬宜方宜救濟至況復大火方宜者擬宜大教也告喻即是説衆患難誡教之義惡鬼毒蟲下皆患難之事已如上釋飢渴惱急者由無定慧是故飢渴已可怖畏況復更為濁火所燒如得上界有漏定時無無漏定已為小火之所焚燒況墜下欲大火所燒即指飢渴惱急以為此苦是故應求大乘永離二三句頌不受誡諸子無知雖聞父誨猶故樂著不受誡是稚小無知雖聞父誨猶故樂著既無大志復不習小大小俱忘必著三界三一句正頌無知息化嬉戲不已指不已一句頌上視父而已放捨苦言之義也第三一句正息化者見思不已故息大化若見思不已尚有大機如來於時亦不吝大以有小機且令出濁先施小耳初五行半救子不得竟第二七行半偈頌上用車上文有四一者擬宜三車二知子先心三歎三車希有四適子所願今頌中但有三義略不頌知子先心今初三行頌擬宜是時長者至設諸方便初一行明擬宜意次一行用小之由由著見思故唯施小次半行用小之意若不用小則大小並亡故云將為火害害故喪身喪身故失命次半行正思用小故云即便思惟設諸方便二有三偈頌勸歎三車希有上明勸示證三義今頌亦三重頌勸成有四初一行頌勸告諸子等我有種種珍玩之具妙寶好車二三句頌示羊車鹿車大牛之車今在門外示轉中云在門外者如示四諦令知出世三一句又頌勸汝等出來四一偈頌證吾為汝等造作此車隨意所樂可以遊戲三一行半偈頌適子所願諸子聞説至離諸苦難今總頌上長行適子所願六句馳走頌上見諦空地頌上無學也二捨几用車譬竟第三有十七行偈頌上長行等賜大車譬文有四一免難二索車三等賜大車四得車歡喜今頌亦四初五行頌免難歡喜第二三行頌索車第三七行半頌等賜第四一行半頌得車歡喜就初五行頌上諸子免難又二初一行頌免難長者見子得出火宅住於四衢坐師子座坐師子座者有二釋一云諸子坐座得出三界故無畏也二云是長者坐座長者見子免難即得無畏初在門外猶有憂畏故云立今得出門方坐無畏故方便品云今我喜無畏初在門外者初子猶在內是故父立今子既出是故安坐又大機未會是故云立小化已周是故安坐故知立者冥利坐者顯益二四行頌長者歡喜而自慶言至我今快樂一免難歡喜竟第二三行頌索車爾時諸子至惟垂給與二索車竟第三七行半頌上等賜大車有三初一行超頌釋大車長者大富庫藏衆多金銀琉璃硨磲碼瑙屋盛稱庫地盛曰藏行具一切法名藏眼耳六根具一切法名庫行具一切法約修六根具一切法約性庫藏皆含藏義亦可互論也二六行頌廣大車以衆寶物至而侍衛之經大車中意者因果所有總名衆寶約教修得義之如造性修不同權宜名造行多子多故車非一是故所造諸而復大又須示方知子修名造以性泯修造還本有即車體也莊校下即具度也三二句頌二章門結顯等賜之義以是妙車等賜諸子上句頌大車章門下句頌等心章門三等賜竟第四一行半頌得車歡喜諸子是時至自在無礙遊於四方者乘中道慧橫遊四種四門四種四諦豎遊四十一位究竟常樂我淨之德故言嬉戲自在也四得車歡喜竟已上六十五行半頌開譬竟第二三十四行半頌合譬分二初四行頌合總譬為四初一行頌合長者告舍利弗我亦如是衆聖中尊世間之父上半行頌合位號下半行頌合名行兼歎德義謂七種方便賢聖中尊九種世間之父次一行頌合五道義兼三十子一切衆生皆是吾子深著世樂無有慧心正合五百人兼三十子三十子是緣因子一切衆生即是正因子也經云一切衆生皆吾子者如大經中一切衆生無不皆至大般涅槃子義在因涅槃在果大乘宗要莫逾此二皆悉云有三一行頌合家宅兼得一門義三界無安猶如火宅衆苦充滿甚可怖畏四一行頌合火起常有生老病死憂患如是等火熾然不息於中初二句總標次二句釋初四行合總譬竟第二三十行半頌合別譬又分四初三偈合見火譬上文有三今合亦三初一偈合頌上如來能見正由寂然間居能見五濁諸子也即合聞有人言如來已離三界火宅寂然間居安處林野經云寂然等者在王三昧用智即是安處故也二一行半合頌上所見諸衆生為生老病死之所燒煮今此三界至多諸患難三半偈合頌上佛見此已驚入火宅唯我一人能為救護初三偈合見火譬竟第二四行頌合捨几用車譬為二初一行頌合捨几等上開譬有三擬宜無機息化今此一偈亦有三意雖復教詔而不信受於諸欲染貪著深故雖復教詔一句頌擬宜不信受一句頌無機下二句頌息大化貪著深故頌上未免生老病死憂悲苦惱等也二三偈頌合用車救子得譬有二初一行半合上欲擬宜及歎車希有以是方便至出世間道以是方便一句頌合上但以智慧方便欲擬宜從為説三乘下一行一句頌合上歎三車希有二一行半頌合第四適子所願是諸子等至不退菩薩上合三乘各有四句今則總頌若心決定者從苦法忍已上是真決定此之一句總頌三乘馳走之位後具足下一行各頌三乘爭出之位也不退菩薩者不退義通正明三藏第二頌合上捨几用車竟第三有八行頌合第三等賜大車譬文二初五行頌合等賜後三行頌合歡喜初又四今初一行頌合等車章門上文諸佛禪定等汝舍利弗我為衆生以此譬喻説一佛乘次一行是頌合等心章門上云是諸衆生脫三界者汝等若能信受是語一切皆當成得佛道三二行正頌合廣大車上云皆是一相一種等是乘微妙至供養禮拜四一行是頌上有車之由無量億千諸力解脫禪定智慧及佛餘法初五行頌等賜竟第二三偈頌合得車歡喜得如是乘至除佛方便初二偈頌各得大車日夜者初得佛知見中道智光如日分無明在如夜自得中道智如日慈悲入生死如夜常行二法故言遊戲三乘之人同入佛智故云與諸菩薩及聲聞衆又此明自行化他自獲是乘故言日夜遊戲以此化他故言與諸菩薩及聲聞衆能化三乘同乘寶乘也後一偈結勸信所説一乘無三因緣於十方土審實而求唯一無二除佛方便則不在言耳他云菩薩不索車若不索車何因乘車歡喜第三合等賜大車譬八行竟第四有十五行半頌合上不虗譬文為二初三行半正頌合不虗章門第二有十二行頌合釋不虗今初頌合不虗章門為三初一行先定父子明本欲與大故文云皆是吾子理應平等與大也告舍利弗汝諸人等皆是吾子我則是父二一偈明乃説三乘意為除障汝等纍劫衆苦所燒我皆濟拔令出三界三一行半既已除障還遂本心與大乘法故云今所應作唯佛智慧也我雖先説至唯佛智慧第一三行半合頌不虗章門竟第二有十二行頌合釋還釋前三意初二偈釋同皆是子理應平等第二七偈釋不能受故乃説三乘第三有三偈釋後若堪能還與其大今初若有菩薩至皆是菩薩若有菩薩者方便三乘所化衆生皆是昔日結緣佛子亦皆同有真如佛性故云皆是菩薩也二七行以不受大故説三乘此文具足四諦初二行苦諦次二行集諦次一行滅諦次半行正明道諦後一行半明得解脫但離見思虗妄明非究竟解脫也若人小智至名為解脫此七行明小智障重不即信受一乘方便説三接引小智為説苦諦者聲聞於三乘中最小復以苦諦為初門衆生心喜者稱其本習則喜本厭生死自求涅槃今聞出離即會宿習故歡喜此中正明有作四諦但離虗妄者無明已是不實通惑附無明起故呼之為虗妄有作四諦但除此惑名為解脫脫於分段未脫變易故非自在三有三偈釋者初一行半以無上道法斥次一行半出佛本心還與其大其實未得至故現於世第三三偈釋障既除情根又利還遂本心與大乘法佛本欲與一切解脫今汝始斷分段非大涅槃以其未得一切智終是未稱本心故言我意不欲令至滅度今則還令得無上道入大涅槃乃是究竟稱佛本心一切解脫即是無作滅諦無上道即是無作道諦用二諦破有作苦集昔欲説此而此衆生不堪障既已除還説此也佛為法王於權實法已得自在開三權顯一實豈當有虗也第四十五行半合不虗譬竟已上一百行偈頌長行第二譬喻竟後六十五行偈中廣明通經方法勸信流通信者信佛説不説也勸者勸可通不可通也有此二義故言勸信文為二一標兩章二釋今初一行半標汝舍利弗至勿妄宣傳初一行標説不説者如來説此法印為利益世間故説也不説者四十餘年未是説時五千未去是故不説也次在所遊方下半行標可通不可通章者勿妄宣傳也惡者強説令其墮苦善者不説誤其失樂若大悲愍惡則不為通若大慈念善則應為通是名標可通不可通章也二釋又為二初八行釋可説不可説次五十五行半釋可通不可通今初若有聞者至非己智分今初八行明如來利益世間之相也通論三世利益別論令二乘入信阿跋致是觀現在益曾見者觀過去善為説也信汝見我者觀未來善為説也下文云若深信解者見佛常住靈鷲即其義也斯法華經一行是結上開下如來觀知三世利益是故為説淺智不解則不為説此釋如來説不説章也僭補曰舍利弗以信得入者信一乘實相究竟佛慧也圓十信滿心即入初住初發心時即得菩提成就慧身不由他悟也其餘聲聞信佛語者以圓住別地已前依法力熏習不離教法故云信佛語故隨順此經非己智分也行者未起圓信與信位未滿者未起應令起未滿應令滿總由信佛語故不離聖教量依法力熏習至住地已上始得亡筌行起解絶也初八行竟次五十五行半釋行人可通不可通章又二初三十六行半明若用大悲門莫為惡説若引惡數必起惡謗獲惡果報是故大悲不可為説又舍利弗至莫説此經斷世間佛種者淨名以煩惱為如來種此取境界性也大品以一切種智學般若此取了因性為佛種涅槃用心性理不斷此取正因性為佛種今經明小善成佛此取緣因為佛種若不信小善成佛即斷世間佛種也初三十六行半竟第二有十九行釋弘經時用大慈門善人應為宣説令不失樂夫弘通之要諧和兩門令其得所是善流傳若不得所是妄宣傳文為二初十七行有五雙十隻善人之相可令宣説後二行總結應可説也初三行過現為一雙若有利根至乃可為説利根是現在植善是過去強識是現在見百千是過去也二兩行半上下為一雙若人精進至乃可為説修慈是愍下恭敬是尊上也三有三行內外為一雙又舍利弗至乃可為説捨惡親善是外求持戒如珠是內護四三行半自行化他為一雙若人無瞋至乃可為説質直敬佛是自行譬喻説法是化他五有五行始終為一雙若有比丘至乃可為説四方求法請益之始頂受專修是歸憑之終次十七行竟後兩行總結告舍利弗至妙法華經善信甚多略舉十相五雙十隻示流通方法顯慈悲兩門可通不可通之大要也譬喻品竟
