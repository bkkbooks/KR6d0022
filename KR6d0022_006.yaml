body:
  text: 隋章安尊者灌頂結集陳隋天台智者大師說唐荊溪尊者湛然述記閩鼓山私淑比丘道霈纂要先申品目次釋經文今初妙法蓮華經提婆達多品第十二提婆達多此云天熱生時人天心熱因此立名即因緣釋名也應行逆而理順即圓教之意非餘教意也本地清涼迹示天熱同衆生病耳寶唱經目雲法華凡四譯兩存兩沒曇摩羅剎此言法護西晉長安譯名正法華法護仍敷演安汰所承者是也鳩摩羅什此翻童壽是龜茲國人以姚秦弘始五年四月二十三日於長安逍遙園譯大品竟至八年夏於草堂寺譯此妙法蓮華命僧睿講之睿開為九轍當時二十八品長安宮人請此品淹留在內江東所傳止得二十七品梁有滿法師講經一百遍於長沙郡燒身仍以此品安持品之前彼自私安未聞天下陳有南嶽禪師次此品在寶塔之後晚以正法華勘之甚相應今四瀆混和見長安舊本故知二師深得經意提婆達多亦言達兜此翻天熱其破僧將五百比丘去身子厭之眠熟目連擎衆將還眠起發誓誓報此怨捧三十肘石廣十五肘擲佛山神手遮小石迸傷佛足血出教闍王放醉象踏佛拳華色比丘尼死安毒十爪欲禮佛足中傷於佛是為五逆罪以其應行逆生時人天心熱從是得名故言天熱此迹也若作本解者衆生煩惱故菩薩示熱同其病行而度脫之此品來意引古弘經傳益非謬明今宣化事驗不虗舉往勸今使流通也文為二一從爾時佛告諸菩薩下訖生佛前蓮華化生明昔日達多通經釋迦成道二從於時下方多寶所從菩薩下明今日文殊通經龍女作佛稟教尚然宣通之功豈不大矣故提婆達多受記文殊可以意知意知者應重敘雲文殊是遊方大士十方弘經乃至入海唯常宣說妙法華經為發起之衆不在受記之例也初中有三一明往昔師弟持經之相二結會古今三勸信初有長行偈頌長行有四一明求法時節爾時佛告諸菩薩至求法華經無有懈倦二正明求法二一明發願於多劫中常作國王發願求於無上菩提心不退轉次明修行於中復二一明欲滿檀那勤行布施如文為欲滿足六波羅蜜至身肉手足不惜軀命二明為滿般若推求妙法時世人民壽命無量至吾當終身供給走使第三明求得法師時有仙人來白王言至若不違我當為宣說第四明受法奉行王聞仙言歡喜踴躍至精勤給侍令無所乏二偈頌有七行半頌上長行初二句頌第一求法時節爾時世尊欲重宣此義而說偈言我念過去劫為求大法故二一行半頌第二正求法雖作世國王至身當為奴僕三一行半頌第三得說法師時有阿私仙至吾當為汝說四二行半頌受法奉行時王聞仙言至勤求於大法五一行半結證勸信亦不為己身至今故為汝說一師弟持經之相竟第二結會古今復二一正結會古今佛告諸比丘至時仙人者今提婆達多是二明師弟功報俱滿於中復二先明弟子因報已滿第二明法師妙果當成弟子中復三先明因滿次明果圓後結證由通經者益今初由提婆達多善知識故至慈悲喜捨初具足六波羅蜜者度義甚多如大論說捨依正名檀防止七支名戒打罵不報名忍為事始終名精進四禪八定名禪分地息諍名般若施報富戒報善道忍報端正進報神通禪報生天智報破煩惱如是等例皆是三藏明六度相也若施受財物三事皆空名檀不見持犯名戒能忍所忍不可得名忍身心不動名精進不亂不味名禪非智非愚名般若如此流例即通教中六度相若言檀有十利伏慳煩惱捨心相續與衆生同資産生豪富家生生施心現前四衆愛樂處衆不怯畏勝名遍布手足柔軟乃至詣道場恆值善知識戒有十利者滿一切智如佛所學智者不毀誓願不退安住於行棄捨生死慕樂涅槃得無纏心得勝三昧不乏信財忍有十利者火刀毒水皆不能害非人所護身相莊嚴閉惡道生梵天晝夜常安身不離喜樂精進有十利者他不能折伏佛所攝非人所護聞法不忘未聞能聞增長辨才得三昧性少病惱隨食能消如優鉢華增長禪有十利者安住儀式行慈境界無悔熱守護諸根得無食喜離愛欲修禪不空解脫魔羂安住佛境解脫成熟般若有十利者不取施相不依戒不住忍力不離身心精進禪無所住魔不能擾他言論不能動達生死底起增上慈不樂二乘地如此流例是別教明六度相也月藏第一雲何者是第一義謂造一切福事若修身修心修慧以第一義熏修則速滿六波羅蜜若行若坐捨攀緣想是檀捨攀緣不犯是尸於境界不生瘡疣是羼不捨於離是精進於事中不放逸是禪於諸法體性無生是般若復次於陰捨是檀不計念陰是尸於陰無我想是羼於陰起怨想是進於陰不熾然是禪於陰畢竟空是般若華嚴七地方明念念具十波羅蜜修習一切佛法以求佛道善根與一切衆生是檀能滅一切煩惱熱是尸於一切衆生無所傷是忍求善無厭是進修道心不散常向一切智是禪忍諸法不生門是般若能起無量智門是方便求轉勝智是願魔邪不能阻是力於一切法相如實說是智是十波羅蜜具故四攝道品三解脫一切助菩提法於念念中皆具足諸地皆念念具足此地勝故如此例是圓教六度相也次明果圓三十二相至廣度衆生三十二相者足平如奩底足趺隆如龜背兩相共一修堅固布施千輻輪但一修安慰恐怖者足跟長手足指長圓直身三相共一修謂不殺戒七處滿肩頸臂腳一修謂恆作施主手足合縵及柔軟兩相一修謂四攝足跟直踝不現毛右旋三相共一修恆以善法饒益衆生鹿膞腸相一修以經書教人不吝皮膚不受塵垢相一修如問而答黃金色相一修忍辱好衣施陰馬藏相一修和合諍訟梵身圓等相手摩膝相共一修慈等心教導肩圓頂光師子臆三相共一修恆令施得增長萬字相一修不惱衆生紺眼牛王𥇒與睫同目旁毛也二相共一修不恚愛視衆生頂髻青髮二相共一修諸功德在人前一孔一毛白毫二相共一修不妄語四十齒白齊二相共一修不兩舌廣長舌梵音聲二相共一修不粗惡語師子頰一修不綺語四牙一修離邪命一切衆生功德等佛一毛佛諸毛功德等一好諸好等一相諸相等白毫肉髻白毫肉髻百千萬億乃成梵音聲三十二相因雖各各論其真因者持戒精進精進無戒尚不得人天身況餘相耶此則三藏教相本也空無生是通教相本道種智是別教相本實相是圓教相本八十種好者二十指手足表裏八處平滿踝膝䏶六處好踝洛上聲脛下兩旁足骨䏶音披胃脘也妙肩肘腕六處滿兩髂奇中三處好骼音恰腰骨奇音基有八脉髖尻二處髖音寬兩股間尻考平聲脊骨盡處馬藏一兩膊二膊音博兩肩腰臍二脅腋乳六腹胸背頃四上下牙上下唇齶兩頰兩鬢兩目兩眉兩鼻孔額兩𮌋音詣未考兩耳頭圓若分別四種好義準相可知後結由通經者益皆因提婆達多善知識故一弟子因報已滿竟第二明師妙果當成於中復三初明正果成告諸四衆至世界名天道分陀利經云調達作佛號提和羅耶漢言天王國名提和越漢言天地二明化度時天王佛住世二十中劫至得無生忍至不退轉三明滅後利益時天王佛般涅槃後至至不退轉二結會古今竟第三勸信佛告諸比丘至若在佛前蓮華化生蓮華化生者胎經云蓮華化生者非胎卵溼化之化生也非化而言化是法性虗無寂滅之身耳一明昔日達多通經釋迦成道竟第二今日文殊通經龍女作佛有二初明文殊通經二明通經利益初又五第一智積請退於時下方多寶世尊所從菩薩至當還本土分陀利經云菩薩名般若拘羅漢言智積第二釋尊止之令待通經利益之證智積謂多寶為證經故出勸物流通既訖是故請還釋迦止者雖迹門事訖本門未彰故託在文殊以留多寶佛之密意非菩薩所知釋迦牟尼佛告智積曰至可還本土第三文殊尋來爾時文殊師利至共相慰問却坐一面第四智積問所化幾如智積菩薩問文殊師利至其數幾何第五文殊答非口所宣也有七一答利益甚衆文殊師利言至且待須臾自當證知二蒙益者集證所言未竟至詣靈鷲山住在虗空三皆是文殊所化此諸菩薩至皆其論說六波羅蜜四本聲聞人先稟權教住二乘道本聲聞人在虗空中說聲聞行分陀利經云蓮華從海出者本發菩薩心其華在空中說摩訶衍事本發聲聞心者華在空中但說斷生死事五今聞實教悉住大乘法今皆修行大乘空義六文殊結益文殊師利謂智積曰於海教化其事如是七智積偈歎爾時智積菩薩以偈讚曰大智德勇健至令速成菩提一文殊通經竟第二明通經利益龍女成佛文九一文殊自敘文殊師利言我於海中唯常宣說妙法華經二智積問智積問文殊師利言至速得佛不三答文殊師利言至能至菩提四智積執別教為疑智積菩薩言至於須臾頃便成正覺第五龍女明圓釋疑有二初敘申敬言論未訖時龍王女忽現於前至以偈讚曰次有三行半偈為三初半行明持經得解深達罪福相遍照於十方罪福者約七方便傳作今偈深達無罪無福入一實相名為深達也十方即十法界同以實慧朗之故言遍照也次二行明成就二身微妙淨法身至無不宗奉者具三十二相者深得法身之理即備相好如大品明欲得一切法當學般若如得如意珠也二乘但得空空無相好也後一行引佛為證又聞成菩提唯佛當證知我闡大乘教度脫苦衆生第五龍女明圓釋疑竟第六身子復難二先總難信時舍利弗語龍女言至具修諸度然後乃成後釋出五障又女人身猶有五障至云何女身速得成佛第七龍女現成明證復二一者獻珠表得圓解爾時龍女有一寶珠至復速於此圓珠表其修得圓因奉佛是將因尅果佛受疾者獲果速也此即一念坐道場成佛不虗也二正示因圓果滿當時衆會皆見龍女至演說妙法胎經云魔梵釋女皆不捨身不受身悉於現身得成佛故偈言法性如大海不說有是非凡夫賢聖人平等無高下唯在心垢滅取證如反掌第八明時衆見聞心大歡喜爾時娑婆世界至而得受記南方緣熟宜以八相成道此土緣薄秖以龍女教化此是方便力得一身一切身普現色身三昧第九智積默然信受智積菩薩及舍利弗一切衆會默然信受二今日文殊通經龍女作佛竟提婆達多品竟先申品目次釋經文今初妙法蓮華經持品第十三釋持品二萬菩薩奉命弘經故名持品重勸八十萬億那由他弘經故名勸持品問何故爾答二萬是法師品初別命之數故奉旨受持八十萬億那由他等前無別命止是通覔今佛眼視令其發誓此土通經通經證驗深重佛意殷勤是故蒙勸而弘故有二意也次釋經文就文為二先明受持後明勸持初文復三一二萬菩薩奉命此土持經二五百八千聲聞發誓他國流通三諸尼請記今初爾時藥王菩薩至種種供養不惜身命二五百八千聲聞發誓他國流通爾時衆中五百阿羅漢得受記者至心不實故問此諸聲聞已成大士何故不能此土弘經答為引初心始行菩薩未能惡世苦行通經復欲開於安樂行品也三諸尼請記爾時佛姨母摩訶波闍波提至三菩提經云姨母者本行集雲釋種善覺生於八女時淨飯王兄弟四人各納二女淨飯王妃即摩耶愛道摩耶生太子已七日命終生忉利天愛道是姨故云姨母也爾時羅睺羅母耶輸陀羅至而說偈言世尊導師安隱天人我等聞記心安具足諸比丘尼說是偈已至廣宣此經一明受持竟第二勸持有長行偈頌長行有五一佛眼視二菩薩請告三佛默然四菩薩知意五發誓通經今初爾時世尊視八十萬億那由他諸菩薩摩訶薩眼視默勸而不告言者上來雖不別命而舉持經功德深厚引證分明多寶分身遠來勸發此之殷勤事義已足有欲應命宜即發誓無煩復言又將護聲聞他方之願故不稱揚也二菩薩請告是諸菩薩皆是阿惟越致至廣宣斯法三佛默然復作是念佛今默然不見告敕我當云何四菩薩知意知默不告之意也時諸菩薩敬順佛意并欲自滿本願五發誓通經便於佛前作師子吼至遙見守護第二偈頌有二十行請護持經不復細分尋文可解前十七行被忍衣弘經次一行入室弘經三一行坐座弘經四一行總結請知次偈頌者是孤起偈諸菩薩等請護弘經即是自述弘經方軌以由佛於法師品中說方軌竟寶塔慕覔用方軌人達多引往用方軌者釋迦即是稟方軌衆故云以身為床座等持品即是惡世方軌安樂行是始行方軌故云住忍辱地等具如後品若不爾者則弘經無軌無軌弘經斯無是處如赤身入陳自損不虛被鎧之言應不徒設初文三初一行總論時節即時諸菩薩俱同發聲而說偈言唯願不為慮於佛滅度後恐怖惡世中我等當廣說次九行別明所忍之境文三初一行通明邪人即俗衆也次一行明道門增上慢者三七行明僭聖增上慢者故此三中初者可忍次者過前第三最甚以後後者轉難識故初二如文有諸無智人至說外道論義三七行中阿含第六雲阿蘭若此翻無事頭陀此翻抖擻寶雲經第六雲阿練兒處比丘見王王子婆羅門及一切人來比丘唱善來可就此坐彼即共坐彼不坐比丘亦不坐當為說法令歡喜佛滅後末惡世不應式比丘雖說戒法而得活而於戒法不樂行歷五分法身餘一切道法亦如是說如齆鼻人說栴檀自既無香亦不自聞天人龍神鳩槃茶終不供養無戒人餘四分定慧解脫解脫知見亦如是說無有能將妙法來必由淨戒之所起餘四亦如是偈云若遇垂死最重病痛惱逼迫極無憀念佛三昧常不捨一切苦切奪其心彼人自解是法故則知一切諸法空三七行明著衣意我等敬佛故至皆當忍是事忍辱鎧者中阿含第五雲黑齒比丘訴佛雲舍利弗罵我說我佛疾喚舍利弗實罵說不舍利弗言心不定者或說罵我心已定云何說罵如折角牛不觸嬈人我心如地水火風淨與不淨大小便利涕唾受而不罵心如掃帚淨與不淨俱掃又如破器盛脂置之日中渧渧恆漏自觀九孔常漏不淨云何罵說於他又如死蛇狗等繫淨童子頸慚恥自愧不罵說他佛問如是惡人汝云何觀答人有五一身善口意不善但念其善不念不善如納衣比丘見糞掃幣帛左捉右舒截棄不淨而取於淨念用其身淨以規我身棄其口意以誡我口意又口行淨身意不淨亦念其口棄其身意如熱渴者值多草池披草掬水涼身止渴又意淨身口不淨亦念其意不用其身口如行路熱渴唯牛蹟少水我若用手掬水則渾濁應兩膝跪兩手憑口就吸之以除熱渴又三業皆不淨者雖無可用當痛念之如路見病人安置使穩念此不淨使得值善知識治其三業勿令墮落三途又三種皆淨常念是人以自訓況念齊願齊如清涼池多諸華草熱渴入中以自蘇息常念境界以去我惡此是三藏教中用苦無常不淨無我空為鎧也毗婆沙第八雲罵是一字一字不成罵二字成罵無有一時稱二字者若稱後字前字已滅又能罵所罵一時同一剎那俱滅於我何為如是等通教為鎧也此方語亦有顛倒即成讚罵如見客去命雲去早即名為留若雲早去即名發遣發是罵留即是讚如正食遇客若雲來早即是罵也若雲早來即是讚也十七雲聖凡俱有三受云何差別凡夫於苦受有二一身受苦二心受憂悲如三毒箭失樂則瞋得樂則喜不苦不樂則癡聖人但有身受而無心受於苦不瞋於樂不愛於不苦不樂不癡三使不能使於使得解脫故有凡聖之異如此等有無差降者此用別教為鎧也今經明鎧者以念佛為鎧是念法佛第一義佛佛即是法故文雲念佛告敕即法也佛即是僧僧即事理俱和毗盧遮那遍一切處也如此之鎧一鎧一切鎧即圓教鎧也初十七行被衣弘經竟第二一行入室弘經諸聚落城邑其有求法者我皆到其所說佛所囑法僭補曰有來學毋住教今鑒知有機親到其所說佛所囑之法以同體慈悲入室弘經也第三一行坐座弘經我是世尊使處衆無所畏我當善說法願佛安隱住僭補曰如幻人為幻人說法能所叵得何畏之有如是說法是坐座弘經稱善說法能令佛法安隱住世也第四一行總結請知我於世尊前諸來十方佛發如是誓言佛自知我心持品竟先申品目次釋經文今初妙法蓮華經安樂行品第十四釋安樂行品釋此品為三一依事二附文三法門一依事者身無危險故安心無憂惱故樂身安心樂故能進行二附文者著如來衣故則法身安入如來室故解脫心樂坐如來座故般若導行進此附上品文釋三軌附法師品文又住忍辱地故身安而不卒暴故心樂觀諸法實相故行進附本品文三法門者安名不動樂名無受行名無行不動者六道生死二聖涅槃所不能動既不緣二邊則身無動搖上文雲身體及手足靜然安不動其心常憺怕未曾有散亂則安住不動如須彌山常住不動法門也樂者名無受不受三昧廣大之用不受凡夫之五受憂喜苦樂捨乃至圓教中五受生見亦皆不受五受生見者圓中四門及一絶言若未證實而生著見亦名五受體教入理理無所受方名不受不受亦不受有受則有苦無受則無苦也行名無行者若有所受即有所行無受則無行不行凡夫行不行賢聖行故言無行而行中道是故名行即法門也問大經明親附國王持弓帶箭摧伏惡人此經遠離豪勢謙下慈善剛柔碩異云何會通答大經偏論折伏住一子地何曾無攝受此經偏明攝受頭破七分非無折伏各舉一端適時而已理必具四何者適時稱宜即世界意攝受即為人意折伏即對治意悟道即第一義意也此品是迹門流通第四意即接退流通若二萬八十億那由他受命弘經深識權實廣知漸頓又達機緣神力自在濁世惱亂不障通經不俟更示方法若初依始心欲修圓行入濁弘經為濁所惱自行不立亦無化功為是人故須示方法明安樂行故有此品來也此安樂行有何次第然法華圓行一行無量行不可思議何定前後今且一敘法師品略示弘經則以益他為本先明入室此中辨惡世弘經安諸逼惱先著如來衣前後互現耳若約行次者諸法從本來常自寂滅相若乖寂起相應先以般若蕩纍則初坐座諸法不生而般若生同體慈悲愍衆故行道次入如來室既以慈悲化世必涉違從決須安忍次著如來衣雖作此次說非行時行時入空即具一切法況慈忍耶四安樂行者止觀慈悲導三業及誓願身業有止故離身粗業有觀故不得身不得身業不得能離無所得故不墮凡夫有慈悲故勤修身業廣利一切不墮二乘地有止行故著忍辱衣有觀行故坐如來座有慈悲故入如來室止行離過即成斷德觀行無著即成智德慈悲利他即成恩德恩德資成智德智德資成斷德是名身業安樂行餘口意誓願亦如是三業誓願皆具止觀慈悲四行例同次釋經文有問有答初問爾時文殊師利法王子至云何能說是經問中先歎前品深行菩薩能如此弘經後問淺行菩薩云何惡世宣說是經二答中分三一總標四法二別釋四法三總結行成感徵之相以歡修行此科在願安樂行頌後今初佛告文殊師利至當安住四法四法者一身安樂行二口安樂行三意安樂行四誓願安樂行僭補曰四安樂行三業及願大師從其多分一往配合意實互具一中有三讀者毋泥第二別釋四法即為四別初身安樂行又二一長行二偈頌長行二初釋方法二結行成初又二初標行近次釋行近今初一者安住菩薩行處親近處能為衆生演說是經次釋中又二一釋行處二釋近處今初文殊師利至是名菩薩摩訶薩行處行處者即不思議三諦也住忍辱地總論三諦如有地可據方能忍辱也柔和善順者善順真諦能忍虗妄見愛寒熱等故言善順也而不卒暴心不驚者安於俗諦忍衆根緣稱適機宜故云不卒暴體忍違從故心不驚也於法無所行等者即安中諦能忍二邊故云無所行正住中道故云觀實相亦不得中實故云不分別此則據三諦之地名處忍五住之辱名行行亦為三謂止行即行不行觀行即非行非不行慈悲行即不行行合上衣座室等是為約不思議三諦明行處辨弘經方軌也第二釋近處文為三一遠十惱亂即遠故論近亦是附戒門助觀二修攝其心即近故論近亦是附定門助觀也三觀一切法空即非遠非近論近亦是附慧門助觀就初有十種應遠者一豪勢二邪人法三險戲四旃陀羅五二乘衆六遠欲想七遠不男八遠危害九遠譏嫌十遠畜養等今初遠豪貴云何名菩薩摩訶薩親近處至大臣官長二遠邪人法不親近諸外道梵志至逆路伽耶陀者路伽耶此雲惡論亦云破論逆路者逆君父之論又路名為善論亦名師破弟子逆路名惡論亦名弟子破師三遠險戲亦不親近諸有戲至種種變現之戲那羅延者上伎戲亦云綵畫其身作變異又云緣幢擲倒之屬也近𠒋戲者恐散逸故那羅此云力即是捔力戲亦是設筋力戲也四遠旃陀羅又不親近旃陀羅至則為說法無所希望旃陀羅此雲殺者近則染其惡習令人無慈五遠二乘衆又不親近求聲聞比丘至無所希求近二乘人令人遠菩提故西方不雜故云或來既未受大無妨小志故云隨宜六遠欲想文殊師利至不與小女處女寡女等共語欲想殺害菩提心故欲想如止觀第八記七遠不男亦復不近五種不男之人以為親厚不男壞亂菩提志故五不男者謂生劇妒變半生謂胎中或初生時劇謂截等妒謂因他變謂根變半謂半月餘即不能廣如論釋八遠危害不獨入他家若有因緣須獨入時但一心念佛危害難處不合入故九遠譏嫌若為女人說法至況復餘事譏嫌增他不善心故十遠畜養不樂畜年少弟子沙彌小兒亦不樂與同師畜年少弟子等妨行人正業令修遠離行也十種惱亂九是生死凡夫著生死一是涅槃二乘求涅槃二俱遠離即寂滅之異名耳觀心可知觀心可知者今總說之一切處無非法界何所可離何所不離非離非不離而論離耳還同非遠非近而論近初心雖了一切本無而須數數近於遠離一即遠論近竟二即近故論近常好坐禪至是名初親近處僭補曰坐禪之法具如摩訶止觀略言之不出大涅槃所云能觀心性名為上定文殊般若雲法界一相繫緣法界本經云諸法從本來常自寂滅相又云諸佛兩足尊知法常無性佛種從緣起是故說一乘是法住法位世間相常住皆其注腳也此一乘實相苟無真信真解何由得入智者勉旃三非遠非近論近文為三一正標二反釋三總結今初復次菩薩摩訶薩觀一切法空如實相觀中道觀智一切法十法界境若單論智智無所觀故舉一切以顯皆空僭補曰空者十界依正染淨緣生性相皆空無所得也如者二邊中諦無一異名如實相者非七方便故名實以實為相故言實相也二反釋上正標中雲空雲如雲實相此反釋者以顛倒等法反顯空等不顛倒法也不顛倒至無礙無障不顛倒者無八倒也不動者不為二死所動也不退者心心寂滅入薩婆若海也不轉者不如凡夫轉生死不如二乘轉凡聖如虗空者但有名字字不可得中道觀智亦但有字求不可得無所有性者無自他共無因等性一切言語道斷者不可思議也不生者惑智理皆不生也不出者如來所治畢竟不復發也不起者諸方便皆寂滅也無名者名不能名也無相者相不能相也無所有者無二邊之有也無量者非數法也無邊者無方所也無礙無障者遍一切處也三總結總結正反之意也但以因緣有至是名菩薩摩訶薩第二親近處但以因緣有者結也上直明中道觀慧今明雙照二邊理性畢竟清淨如上所說非解非惑而從惑因緣生生死從解因緣生涅槃又因緣有有於涅槃從顛倒生者生於生死此則雙照意顯也常樂觀如是等法者即三諦等法也即以初句而為空邊照於緣生緣生故空空名涅槃即以次句而為有邊故云顛倒僭補曰問現前身心器界一切諸法熾然生滅何以雲觀一切法空如實相等耶答一切諸法但以因緣有緣生無性當體寂滅即是實相以不達緣起無性而認為實法起我法二見如繩上見蛇故云從顛倒生若如實達得一念緣起無生了無一法可得皆是實相不生顛倒故經說觀一切法空如實相不顛倒不動不退等也二偈頌有二十八行三句為三初一行頌標章爾時世尊欲重宣此義而說偈言若有菩薩於後惡世無怖畏心欲說是經次二十二行頌修行後五行三句明行成長行行近別釋偈中合頌不復次第初十四行頌即遠論近應入行處至能安樂說小乘三藏學者佛在波羅奈最初為五人說契經修多羅藏佛在羅閲祗最初為須那提說毗尼藏佛在毗舍離獼猴池最初為跋耆子說阿毗曇藏五百羅漢初夜集阿毗曇藏相續解脫經此為三藏學也初為跋耆子說阿毗曇者故知別有阿毗曇藏是佛自說人不見者諍計云云或謂是十二部中論議部者不然言相續解脫經者是佛自說故且名經當佛滅後阿難所結集者名修多羅五百集者初名解脫後廣集法相乃名為論深著五欲欲相者龍須輪四天王皆同人間忉利天以風為事炎天相近為事兜率相牽為事化樂天相視為事他化自在心念為事上天皆離欲欲相者頌中雖無欲相之言以長行有故今略釋俱舍云六受欲交抱執手笑視淫今依舊名目須輪修羅耳如中阿含云有一異學問薄拘羅云汝於正法中已八十年頗曾行欲事不薄拘羅言莫作是語更有別事何不問耶異學又問汝於八十年起欲想不答不應作如是問我八十年未曾起欲想尚未曾起一念貢高未曾受居士衣未曾割截衣未曾倩他作衣未曾用針縫衣未曾受請未曾從大家乞食未曾倚壁未曾視女人面未曾入尼寺未曾與尼相問訊乃至道路亦不共語八十年長坐故知衣食等欲想一切尚無況復染欲想耶弘法之徒觀斯龜鏡況今弘經息機為本寡女處女者阿難問佛如來滅後見女人云何佛言勿與相見設見勿共語當專心念佛及諸不男者彼名般吒此翻黃門黃門者有男女形不能男女入里乞食者雜阿含云有一羊往糞聚飽食還羣貢高我得好食比丘亦如是得四事已起染著欲想不知出要設不得恆生想設得向諸比丘貢高毀蔑他人我得彼不能得是為羊比丘乞食師子王遇大獸即噉不味不著得小獸即噉不鄙不薄比丘亦爾得四事供養不起染著無有欲想自知出要設不得利養不起亂念無增減心是為師子王比丘乞食寶雲經明乞食作四分一分奉同梵行一分與丐人一分施鬼神一分自食二八行頌非遠非近論近處又復不行至是名近處又復不行上中等者約廢權說故前三教名上中下或指三乘或三菩薩三五行三句明行成又三初一行半標行成若有比丘至無有怯弱事成外儀無失理成內心無滯故云無怯弱也次三行頌行成而得安樂菩薩有時至無有怯弱菩薩入靜室下釋安樂之因因修禪定止於過惡得人無我外則不損因修智慧離諸取著得法無我內無顛倒是則心不怯弱不怯弱名安樂也後一行一句頌長行總結文殊師利是名菩薩安住初法能於後世說法華經一身安樂行竟第二口安樂行亦有長行偈頌長行為二一標章二釋行法長行無行成偈中有也今初又文殊師利至應住安樂行二釋行法又二一止行二觀行止為四一不說過二不輕慢三不歎毀四不怨嫌今初若口宣說若讀經時不樂說人及經典過初不樂說人經過者人聽有過法有何過七方便法是佛隨他意語名不了義若過其法則惱其人非安樂行相也二不輕慢亦不輕慢諸餘法師不倚圓蔑偏重實輕權也三不歎毀不說他人好惡長短至亦不稱名讚歎其美不說長短者初不說一切人次別舉聲聞人惡聞其失故不談短面譽對背毀故不稱長又不說長短者日藏第一云初中後夜減損睡眠精進坐禪誦經修道背捨生死向涅槃路不稱他短不說己長謙下卑遜不自憍高衣食知足頭陀精進不放逸行繫念思惟心不馳散於一切衆生起慈悲心又聲聞人根性不定若歎二乘或令彼退大取小若毀呰二乘或令其大小俱失兩無所取也四不怨嫌又亦不生怨嫌之心怨嫌心者若謂其人法妨害我道即是怨心謂其鄙劣即是嫌心心機一動聲說即發杜說過之源故不生怨嫌也大集云過去世時有羅剎王於拘留孫佛法中出家發菩提心誦持大小乘法聚各八萬四千由意嫌頭陀比丘云不誦經典猶如株杌由此墮獄受大苦惱從獄出已受羅剎身於賢劫末樓至佛所方脫羅剎身常人尚爾況安樂行為弘大法將護小行又怨怪嫌責怨深嫌淺淺深俱捨方稱正行此口安樂行中所言心者為制口故一止行竟二觀行善修如是安樂心故至令得一切種智觀諸法空無所取著心不苟執不逆人意不違實相則不以小乘法答但以大乘答者若見無大機而說小得方便益若不見無大而說小妨其大緣二俱不見但說大無咎第二偈頌有十六行半為三初二行頌標章次九行半頌前行法後五行明行成今初爾時世尊欲重宣此義而說偈言菩薩常樂至內外俱淨上總稱應住頌中別出行相行相者有三安隱說法者半行欲令前人得安隱道及果即入室義於清淨地等半行即坐座義油塗身等一行即著衣義三法導口業名安樂行次九行半頌行法為二初五行半頌止行次四行頌觀行上止行有四今具頌初半行頌隨問為說及不輕慢慢則不隨安處法座隨問為說二有二行半頌不說長短若有比丘至隨義而答但依義不談人好惡若有難問隨義答者有二一可答二不可答問答相難詰相上下若勝負則自知是為智者語自放恣敢有違者誅之是為王者語長短是非皆不知唯覓勝而已是為愚者語答有三智者語即可答王者語愚者語即不可答三一行半追頌不樂說人法過因緣譬喻至入於佛道若說人過生人毒念今不說過故使發心入佛道佛道從喜生也四一行頌無怨嫌除懶惰意及懈怠想離諸憂惱慈心說法怨嫌心起則懈怠憂惱今以慈心說法無怨嫌者精進無憂上長行皆約止善說頌中皆約行善也初五行半頌止行竟次四行頌上觀行晝夜常說至安樂供養上云但以大乘答頌云說無上道上云令得一切種智頌云願成佛道二九行半頌前行法竟第三五行偈明口安樂行成初一行標行成我滅度後若有比丘能演說斯妙法華經次二行明內無過則外難不生如無臭物蠅則不來心無嫉恚至安住忍故三一行明內有善法所以行成智者如是善修其心能住安樂如我上說如我上說者若內無過如長行中說若內有善如偈中說四一行頌格量功德其人功德千萬億劫算數譬喻說不能盡二口安樂行竟第三意安樂行亦有長行偈頌長行為三一標章二釋行三結成今初又文殊師利至受持讀誦斯經典者二釋中二先止後觀止中有四一不嫉諂無懷嫉妒諂誑之心夫二乘欲速出生死先除貪欲菩薩為度生先除瞋恨嫉是瞋垢諂是見垢嫉忌違慈悲之心非化他法諂誑乖智慧之道非自行行智慧被障將何上求慈悲苟妨將何下化安樂行菩薩當淨其心嫉妒諂誑不可懷也二不輕罵亦勿輕罵學佛道者求其長短亦勿輕罵下不應以圓行呵別知機可誡不知勿罵恐退善根三不惱亂若比丘比丘尼至於道懈怠故不應以圓呵三乘人其本無大機強以圓呵乖心成惱圓復未解前疑後悔大小俱失四不諍競又亦不應戲論諸法有所諍競僭補曰一形戲論即落諍競第二明觀行亦為四約前四惡而起於行善一於一切起大悲違於嫉諂當於一切衆生起大悲想二於如來起慈父心違於輕罵於諸如來起慈父想凡求佛道即是學人敬學如佛不得輕罵諸者通三世此即未來如來也三於菩薩起大師想違於惱亂於諸菩薩起大師想至常應深心恭敬禮拜理論三乘皆是菩薩有化訓德皆衆生師應起師想勿言其短四平等說法違於諍論於一切衆生平等說法至亦不為多說平等破偏執諍也不多不少量器利鈍也二釋行竟三結行成又二一由止惡惡不能加故云無能惱亂文殊師利至說是法時無能惱亂二由觀行故勝人來集得好同學也得好同學至恭敬尊重讚歎第二偈頌有六行初五行頌上止觀二行各有四意後一行頌行成止觀二行各四者此中初二行頌止四爾時世尊欲重宣此義而說偈言若欲說是經至云汝不得佛初止四者初一行頌第一離嫉諂次一句頌第二離輕罵三一句頌第四離諍競四半行頌第三離惱亂次三行頌觀四是佛子說法至說法無障礙二觀四者初一行頌第一大悲次一行頌第三大師三二句頌第二慈父四二句頌第四等說後一行頌行成第三法如是智者應守護一心安樂行無量衆所敬三意安樂行竟第四誓願安樂行有二初長行二偈頌長行又二初明行法次歎經難聞就行法為三一標章二行法三結成今初又文殊師利至有持是法華經者二行法為三初明標誓願境二明起誓願之由三正立誓願今初於在家出家人中至生大悲心初明慈誓境通取曾發方便心者而未世三界名在家斷通惑盡名出家此攝得兩種二乘三種菩薩此輩亦具無明亦應是大悲境但其皆曾發心與慈誓相應須與其圓道圓果之樂故言生大慈心耳悲境者非菩薩人通取未曾發方便心者名非菩薩全不歸向方便況復真實此悲境攝得一切三界內者此等亦須與樂但其流轉無際正與悲誓相應宜拔其罪因罪果故言生大悲心耳二起誓願之由應作是念至不問不信不解即起慈之由由諸樂小執佛方便以為真實不會圓道故言大失大失是慈誓之由不聞不知是悲誓之由由未發偏圓心不聞偏圓二道不聞偏道故無聞慧不知故無思慧不覺故無修慧又無圓三慧何者不問故不聞不信故不知不解故不修偏圓三慧權實皆無甚可憐愍起悲之由也三正立誓願其人雖不問不信不解是經至引之令得住是法中第三結行成為三初總結無過失則是行成文殊師利至說是法時無有過失行云何成以其立大誓願故入如來室行成以其知四衆失圓道故即如來座行成以其誓制其心不懈怠故如來衣行成三行具立故言行成無過失者慈悲成故無瞋垢失如來衣成故無懈怠失如來座成故無諂曲失也二別結慈悲行成常為比丘比丘尼至能令聽者皆得歡喜以慈成故攝得四衆人天供養聽法誓願成故感得諸天聞法作護如來座成故聽者歡喜三釋誓行成所以者何至諸佛神力所護故三世佛尚守護況諸天耶初行法竟第二歎經難聞又二一法說二譬說法說又二一昔未曾顯說故昔不得文殊師利至不可得聞二今日乃得何況得見受持讀誦二譬說亦二一不與珠譬譬昔未曾顯說二與珠譬譬今日得聞二譬各有開合不與珠譬為六一威伏諸國二小王不順三起兵往罰四有功歡喜五隨功賞賜六而不與珠今初文殊師利譬如強力轉輪聖王欲以威勢降伏諸國輪王譬如來化世降伏諸國譬陰界入諸境二小王不順而諸小王不順其命小王譬煩惱等未得無漏調伏名不順其命三起兵往罰時轉輪王起種種兵而往討伐王起種種兵譬七賢中方法為前軍須陀斯陀中方法為次軍阿那阿羅漢中方法為後軍所破者是三毒等分八萬四千之冦盜能破者是八萬四千法門之官兵四有功歡喜王見兵衆戰有功者即大歡喜五隨功賞賜隨功賞賜至象馬車乘奴婢人民田即三昧宅即智慧聚落初果二果邑即三果城即涅槃四果衣服即慚忍善法嚴身之具助道善法也種種七寶即七覺等象馬車乘即二乘盡無生智也奴婢即神通得有漏善法如人民六不與珠唯髻中明珠不以與之至王諸眷屬必大驚怪有出分段機為小功勳有出變易之機為大功勳驚怪者未有大勳忽賜髻珠諸臣皆怪譬衆生大機未動忽說此經二乘疑惑菩薩驚怪二合六譬如文文殊師利至而不為說是法華經六合譬中次第合六初合初威伏諸國而諸下合第二小王不順如來下合第三起兵往罰其有下合第四有功王喜於四下合第五有功賞賜而不下合第六不與珠一不與珠譬竟二與珠譬二一與珠二合與珠又二一有大勳文殊師利如轉輪王見諸兵衆有大功者心甚歡喜二與珠以此難信之珠久在髻中不妄與人而今與之珠有圓明二義明譬中道智圓譬於常在頂者極果所宗髻中者實為權所隱解髻即開權與珠即顯實次合亦二一合如來法王見賢聖軍有大功勳心大歡喜如來亦復如是至爾時如來亦大歡喜合與珠中經云見賢聖等者大集云知苦壞陰魔斷集離煩惱魔證滅離死魔修道壞天魔今不云天魔者以小乘多斷三魔未壞天魔故然有壞義經云有大等者如來見此小乘賢聖已除界內因果名與陰戰至般若後名大功勳故三毒等且在小中爾後時長通云歡喜二合如來昔未說之法華經今乃說之此法華經至乃與汝等而敷演之能令至於一切智智即果名是行一也第一之說是教一祕藏是理一兼得人一也初長行竟第二偈頌有十四行半頌上行法歎經為二初四行頌上行法二有十行半頌上歎經難聞初又二初一行超頌行成爾時世尊欲重宣此義而說偈言常行忍辱哀愍一切乃能演說佛所讚經上總明行成今頌別顯常行忍辱頌著衣行成哀愍一切頌入室行成乃能演說頌坐座行成次三行頌修行法後末世時至令住其中第二有十行半頌上歎經難聞上有法譬合今但頌譬合頌譬有二初三行頌不與珠譬如強力至歡喜賜與二一行頌與珠如有勇健能為難事王解髻中明珠賜之第二合譬二初三行半頌合不與珠如來亦爾至說此諸經二三行頌合與珠既知衆生至為汝等說四誓願安樂行竟第二別釋四法竟第三長行大科總結行成感徵之相以勸修行二十三行頌文三初一行半勸修四法我滅度後至如是四法次二十行半舉三報以勸亦名三障清淨後一行總結也三障淨轉現生後世惡業盡即得現生後世勝報初一行無憂惱病痛等是報障轉轉現報也讀是經者常無憂惱又無病痛顏色鮮白二半行不生貧賤醜陋是業障轉轉生報也不生貧窮卑賤醜陋三有十九行明後報轉轉三毒煩惱障為二初三行別明三煩惱障轉次有十六行總明一切障轉也今初衆生樂見至如日之照文三初一行明貪障轉多欲者則人忽慢又障生梵天欲障轉故人所樂見天童給使也次一行明瞋障轉捨瞋則除內刀箭入陳則外刃不傷後一行明癡障轉無畏如師王遊行自在智慧如日遍照四天下也第二有十六行總明一切煩惱障轉亦是後報轉持經現感此相當知過去久已成就今藉緣而發耳又有成佛因果等相竝是後報故於夢中見未來後報之相百千萬劫事在一念夢中用表妙法不可思議一中無量無量中一是相前現後當尅果安樂既是如來之行故弘經者預彰果成故知弘功其力不小問何以至此即歎教耶答此在迹門流通之末前已明佛去世後弘經功深古佛證經今佛成道二萬八十萬億此土他方宣通之益不可測量人獲妙功良由法實故流通末重辨所通所通者何三周開顯故舉輪王威伏兵衆獲勳勳有大小故所賜不同此四行後復結成者顯四行功成能行此行兼弘經力化功歸己果相先彰故使大士剎那夢逾億世表一生弘教功超纍劫又為六從初信心乃至妙覺八相成佛皆如來莊嚴而自莊嚴即忍辱報約初三行夢入十信又二初二行半慈悲報若於夢中至恭敬合掌次半行正見無癡報自見其身而為說法二六行半夢入十住又見諸佛至合掌聽法既云證不退智即為授記者當知得入初住無生得記之位也三三句夢修十行又見自身在山林中修習善法又見自身在山林知是十行修習善法也四一句夢證十向證諸實相證諸實相知是十回向正觀中道位也五二句夢入十地深入禪定見十方佛深入禪定即第十地中無垢三昧入金剛定諸佛皆現摩頂受職也言無垢者初住已得若云入金剛定義當等覺合在第十地中六五行寄談妙覺諸佛身金色至如煙盡燈滅夢八相佛以知妙覺此中或是初住能八相成佛之相仍前次位寄談極覺耳夢者從須陀洹至支佛悉有夢唯佛不夢無疑無習氣故不夢從五事故有夢如偈說以疑心分別學習因現事非人來相語因此五事夢又是所更聞見及諸患為七事故有夢現在意識尚不見色云何夢中意地見色答皆是曾見曾聞故想耳又是吉不吉相耳夢中無通無宿命智云何能見未來世事答此非願智境界乃是比知諸人曾有如是夢如是果今以比知耳問誰眠答五道及中陰皆有眠在胎諸根具者亦是眠乃至佛亦眠問眠是愚是蓋此云何通答佛起現前欲調身故眠非蓋非愚眠也次二十行半舉三報以勸竟後一行總結行成也若後惡世中說是第一法是人得大利如上諸功德第三總結行成感徵之相竟安樂行品竟先申品目次釋經文今初妙法蓮華經從地涌出品第十五釋涌出品師嚴道尊鞠躬祇奉如來一命四方奔涌故言從地涌出品世界三世化導惠利無疆一月萬影孰能思議召過以示現弘經以益當故言從地涌出品為人虗空湛然無早無晚惑者執迹而暗其本召昔示今破近顯遠故言從地涌出品虛空等為對治悉檀約所表也虛空理也本迹事也事有本迹理無早晚惑者迷理而暗本迹故執近迹以失遠本本迹尚迷況不思議一故本之弟子居下虛空本地之師經久虛空今之師弟在今虛空久空今空下空體一雖則體一然本弟子元知近迹今之弟子猶迷遠本破執近故召昔示今今弟子因疑致請聞說方破破執近惡故云對治寂場少父寂光老兒示其藥力咸令得知故言從地涌出寂場去第一義悉檀何者寂場舍那示始成故父少寂光菩薩行久著故兒老譬藥力者父何以少子何以老準下父子譬意父久先服種智還年之藥父老而若少子亦久稟常住不死之方子少而若老雖各有服餌之功而父子久定此之四悉雖通釋今文竝意兼後品然初一悉文在今品第二意兼後品三四二悉探用後品皆是助後以成顯遠善生惡破見本故也故知世界即是三悉之由故涌出品專在世界文云是從何所來以何因緣集今以諸義釋品顯四悉檀因緣之解故言從地涌出品次釋經文此下是大段第二本門開迹顯本開師門之近迹顯佛地之遠本其文為三一從此下至汝等自當因是得聞序段也二從爾時釋迦告彌勒下至分別功德品彌勒說十九行偈正說段也三從偈後下十一品半流通段序文為二一涌出序二疑問序涌出為三一他方菩薩請弘經二如來不許三下方涌出今初爾時他方國土至當於此土而廣說之他方菩薩聞通經福大咸欲發願住此弘宣故請為之二如來不許爾時佛告諸菩薩摩訶薩衆至廣說此經如來止之凡有三義汝等各各自有己任若住此土廢彼利益一也又他方此土結緣之事雖欲宣授有益有妨二也又若許之則不得召下下若不來迹不得破遠不得顯是為三義如來止之召下方來亦有三義是久弟子召弘妙法以緣深廣能遍此土益遍分身土益遍他方土益又得開近顯遠是故止彼而召下也第三下方涌出為二一經家敘相二明問訊兩段各五初五者一涌出佛說是時娑婆世界至同時涌出二身相是諸菩薩身皆金色三十二相無量光明三住處先盡在此娑婆世界之下此界虗空中住住處者常寂光土也常即常德寂即樂德光即淨我是為四德祕密之藏是其住處以不住法住祕藏中下方者法性之淵底玄宗之極地故言下方在下不屬此空中不屬彼非此非彼即中道也出此不在上不在此下不上不下住在空中亦是中道也四聞命故來是諸菩薩聞釋迦牟尼佛所說音聲從下發來來之由者聞命故來弘法故來破執故來顯本故來皆如上說五眷屬一一菩薩至算數譬喻所不能知所將眷屬者若人情往望謂領六萬五萬恆沙者為多領三二一者為少單己者隻獨若依文往尋六萬五萬者為少單己者為多文云單己獨處者其數轉過上若依法門者一一皆是導師德能引衆人至於寶所當知一己非獨六萬非多一即一道清淨二即定慧三即戒定慧四即四諦五即五眼六即六度一一度具十法界一一界各有十十即有百百即具千千界即有萬一度具萬六度即六萬法門多不為多一不為少非多非少而多而少初經家敘相五段竟第二問訊為五一三業供養二陳問訊之辭三佛答安樂四偈頌隨喜五如來述歎今初是諸菩薩至遍滿無量百千萬億國土虗空就初三業供養經五十小劫謂如半日四衆遍見此乃隱長而現短借其神力令狹而見廣俱是不可思議也拜繞是身讚法是口瞻仰是意五十小劫與半日者此是時節不可思議如來所見不以二相下方菩薩常面稱揚如來默然常受其讚解者即短而長謂五十小劫惑者即長而短謂如半日斯為本迹而作弄引如來未說暗本而執迹佛若開顯悟近而達遠亦知不思議一也四衆遍見菩薩者亦是不思議也夫肉眼天眼所見不遠而今所覩充滿虗空見雨猛知龍大見華盛知池深見菩薩滿虗空則知法性彌滿法界也二陳問訊之辭是菩薩衆中有四導師至而說偈言世尊安樂至生疲勞耶文三初標四導師次陳問辭又重說偈但舉四人者欲擬開示悟入四十位如華嚴但舉法慧德林金幢金藏說四十位也三佛答安樂爾時世尊於菩薩大衆中至入於佛慧如來具答安樂易度兩事相成易度則安樂安樂則易度易度為兩一根利德厚世世已來常受大化始見我身即稟華嚴入如來慧果熱易零是衆生易度二根鈍德薄世世已來不受大化為是人故須開頓說漸三藏方等般若而調伏之亦令此人今聞法華入於佛慧比前華嚴雖難於佛甚易佛識其宜方便得所薄須塗尉慧悟是同薄須塗尉者猶如嬰兒為病服藥暫須斷乳權以毒塗藥勢歇已洗乳令服初乳後乳乳體不殊中間為病進否權設亦如癰瘡熱氣正盛且須冷尉熱休冷息初身後身其體不異為熱暫尉熱退如初此入彼入二處不異但根鈍者入時未至如癰如嬰尚須塗尉以酪等三暫時調熟故云薄耳四說偈隨喜爾時諸大菩薩而說偈言善哉善哉至我等隨喜領解隨喜能問者即是華嚴中四大士法華中身子三請俱是能問也所問者即是問佛智慧也五如來述歎於時世尊至汝等能於如來發隨喜心如來述歎者述前上行無邊行四大導師等能隨喜華嚴中諸大士於如來所能問能信能行佛之所說發隨喜心佛意顯能問大士皆是古佛垂迹四導師等隨喜其迹如來稱歎其本亦是密顯壽量也涌出序竟第二疑問序為二一此土菩薩疑二他土菩薩疑此土又二初長行疑念爾時彌勒菩薩至并欲自決所疑次偈頌有十九行半正問為五初一行一句問何處來合掌向佛以偈問曰無量千萬億至是從何所來二一行三句問何因緣來以何因緣集至為從何所來僭補曰以何因緣集者為開壽量是其來緣後不答來緣故但云雙答三九行敘其數量一一諸菩薩至猶不能盡知四兩行問其師誰是諸大威德至修習何佛道五五行半結請又五初兩句結歎如是諸菩薩神通大智力次兩行請答來處四方地振裂至未曾見是衆三一行請答來緣我於此衆中乃不識一人忽然從地出願說其因緣四一行半大會同請今此之大會至本末之因緣五二句請決衆疑無量德世尊唯願決衆疑二他土菩薩疑爾時釋迦牟尼分身諸佛至汝等自當因是得聞他土菩薩疑者分身眷屬橫在十方與彌勒同疑二土俱不知本地欲顯成道甚久各各陳疑己佛佛皆抑待彌勒云云抑待彌勒云云者答問之益不存於我故不為答抑待釋迦答彌勒問故云待彌勒耳本門序分竟第二本門正宗分文為三先長行次偈頌誡許後正說長行四先述讚爾時釋迦牟尼佛至乃能問佛如是大事二誡誡勿亂勿怠勿退汝等當共一心被精進鎧發堅固意三許標果智果智者如來知見如來今欲顯發宣示諸佛智慧四開化宣示也諸佛自在神通之力至諸佛威猛大勢之力自在神力者過去益物也師子奮迅者現在十方分身所被之處也大勢威猛者未來益物也僭補曰諸佛自在神通之力者稱體大用周流法界非古非今無障無礙隨機利物令歸實相也諸佛師子奮迅之力者降伏天魔及九十六種外道歸於正法同成佛道也諸佛威猛大勢之力者開五乘三乘七方便同歸一實無二無三此如來自行權實究竟圓滿即體即用不謀而應我佛既爾諸佛亦然故三句皆云諸佛獨尊九界無能屈服故皆云力也如來三世益物功德一一具三不可思議也次偈頌四行為二初一行誡聽許說爾時世尊欲重宣此義而說偈言當精進一心我欲說此事勿得有疑悔佛智叵思議僭補曰佛智叵思議者如來成道遠本非口所宣非心所測初發意菩薩未能頓契唯在抑信而已勿得疑悔也次三行勸慰信受汝今出信力至汝等一心聽僭補曰如來遠本無師之智既不可思議上智之士當於實相出生信力安住於忍善之中言忍善者如律中羯磨文云忍者默然不忍者說今云忍善猶受善也此經四十年來所未曾說今當說之前迹門既已開權顯實是約法門說今本門當開迹顯本是約遠成佛果說故云所得第一法如是今當說佛語真實當一心聽勿得懷疑此乃如來同體大慈安慰勸信叮嚀再四也第三正說文為三此去盡壽量品正開近顯遠二分別品初總授法身記三隨喜品彌勒總申領解初又二先涌出品略開近顯遠動執生疑次壽量品廣開近顯遠斷疑生信略又二一略開二因疑更請就略開有長行偈頌初長行雙答雙釋雙答雙釋者一師誰二從來先雙答爾時世尊說此偈已至此界虗空中住下方空中住者釋論明有底散三昧以下方空為底不是上界不是下界表中道為底僭補曰我於娑婆得三菩提已教化示導是諸菩薩者乃是威音王本地娑婆得菩提時非今日釋迦現生得菩提時也以威音即釋迦釋迦即威音雖有本迹之殊實無兩人只一體也若以重玄門言之十世古今不離當念則今日始得菩提即久遠本得菩提時非古非今無前無後下壽量中舉塵點劫數挍量顯其久遠令人領悟究竟無始不可思議也次雙釋二初釋修證二釋住處初修證者師知弟子備智斷功德為二初雙修智斷次雙證智斷今初於諸經典讀誦通利思惟分別正憶念於經典分別是修智正憶念是修斷次雙證阿逸多是諸善男子等至未曾休息不樂在衆是證斷勤行精進是證智二釋住處亦不依止人天而住至一心精進求無上慧人天是凡夫界不住不著也深智無礙者依不思議智也樂於佛法者樂不思議境也境智甚微非近行菩薩也僭補曰不依止人天是下方虗空中住即境智不思議地也二偈頌有八行半為二初五行半頌答兩問又二初四行答師弟爾時世尊欲重宣此義而說偈言阿逸汝當知至為求佛道故次一行半答處所於中又二初半行正答處次一行歎菩薩德在娑婆世界至其心無所畏下三行頌雙釋頌雙釋者於中又二初二行半頌釋師弟次半行頌釋處所經不云處但云久遠教化之者前正答中已云處竟故但以時而釋處也我於伽耶城至教化是等衆僭補曰我從久遠來教化是等衆者久指威音遠指大通十六王子結緣所謂令初發道心今皆住不退是也所疑伽耶成佛者前伽耶後伽耶三際一時古今一處何疑之有一略開竟第二因疑更請有長行偈頌長行為二一疑二請今初爾時彌勒菩薩至令住阿耨多羅三藐三菩提聞上菩提樹下乃教化之今皆住不退又云我從久遠來教化是等衆聞此二說動執生疑二請問又二一法二譬法說為三初疑成道近所化甚多執近而疑遠也即白佛言至當成阿耨多羅三藐三菩提二所化既多行位深妙執遠而疑近也世尊此大菩薩衆至成就菩薩道常修梵行三結請世尊如此之事世所難信結請中經但舉難信者託物不信拒而難佛令必有答初法說竟二譬說有開合開為三一色美髮黑譬上成道近意也譬如有人色美髮黑年二十五二指百歲人去譬上所化甚多意也指百歲人言是我子至言是我父生育我等准北諸師以譬釋譬父服還年藥貌同二十五子不服藥形如百歲若知藥力不疑子父不知者怪之如來服一切種智藥示伽耶始生諸菩薩直論本地久發道心今住不退若佛及佛快知此事自下不達不得不疑三結譬是事難信二合又三初合近譬佛亦如是得道已來其實未久二合遠譬而此大衆諸菩薩等至一切世間甚為希有觀此菩薩久種善根非止伽耶發心善入出住者九次第定是善入師子奮迅是善出超越是善住藏通意也從初地至十地名善入十地入重玄門倒修凡夫事名善出妙覺遍滿名善住別意也畢法性三昧名善入首楞嚴名善出王三昧名善住圓意也次第習諸善法據因為善習就果為善入善答難問者具二莊嚴也七方便之尊故云寶也三請答又三一舉佛語今日世尊至乃能作此大功德事二明請意請意為二一為現在我等雖復信佛隨宜所說至佛所知者皆悉通達二為未來然諸新發意菩薩至而起破法罪業因緣淺行喜生誹謗新發意者謗墮惡道不退者雖信不謗不能增道若為分別令謗者生信信者增道三正請答唯然世尊至亦不生疑一長行竟二偈頌有十四行頌上法譬為二初五行頌法說次九行頌譬說法說中三初一行頌執近爾時彌勒菩薩欲重宣此義而說偈言佛昔從釋種出家近伽耶坐於菩提樹爾來尚未久二二行三句頌疑遠此諸佛子等至是事難思議三一行一句頌結請云何而可信至如實分別說次頌譬說為二初二行頌開譬譬如少壯人至舉世所不信次七行頌合譬亦三就初二句頌合近世尊亦如是得道來甚近二三行半頌合遠是諸菩薩等至於下空中住三三行頌合請答我等從佛聞至而住不退地從地涌出品竟僭補曰下壽量一品正答上彌勒疑近疑遠之問故分身諸佛各告侍者佛今答之自當得聞是也先申品目次釋經文今初妙法蓮華經如來壽量品第十六釋如來壽量品如來者十方三世諸佛之二佛三佛本佛迹佛之通號也壽量者詮量也詮量十方三世二佛三佛本佛迹佛之功德也今正明本地二三佛功德故言如來壽量品如來義甚多且明二三如來餘例可解二如來者一真身二應身真身者成論云乘如實道來成正覺故名如來乘是法如如智實是法如如境道是因覺是果若單論乘者無所知單明實者無能知境智和合則有因果照境未窮名因盡源為果道覺義成即是乘如實道來成正覺此真身如來也二應身者以如實智乘如實道來生三有示成正覺者即應身如來也三如來者法報化也大論云如法相解如法相說故名如來論文二句三身具足如法相解一句具法報二身如法相說一句是應身初句如法相者如謂法如如實相之境非因非果有佛無佛性相常然遍一切處而無有異為如不動而至為來此法身如來也次解者謂法如如智乘於如如真實之道來成妙覺智稱如理從理名如從智名來即報身如來故論云如法相解名如來也如法相說者以如如境智合故即能處處示成正覺楞伽云水銀和真金能塗諸色像功德和法身處處應現住八相成道轉妙法輪即應身如來故論云如法相說名如來也法身如來名毗盧遮那此翻遍一切處報身如來名盧舍那此翻淨滿應身如來名釋迦文此翻度沃焦沃焦者舊華嚴經名號品中及十住婆沙中所列大海有石其名曰焦萬流沃之至石皆竭所以大海水不增長衆生流轉猶如焦石五欲沃之而無厭足唯佛能度是故云也是三如來若單取者則不可也大經云法身亦非般若亦非解脫亦非三法具足稱祕密藏名大涅槃如新伊三點不可一異縱橫竝別圓覽三法稱假名如來也梵網經結成華嚴教華臺為本華葉為末別為一緣作如此說而本末不得相離像法決疑經結成涅槃文云或見釋迦為毗盧遮那或為盧舍那蓋前緣異見非佛三也普賢觀結成法華文云釋迦牟尼名毗盧遮那乃是異名非別體也總衆經之意當知三佛非一異明矣問此品無三佛名那作此釋答雖不標名而具其義文云非如非異不如三界見於三界此非偏如顯於圓如即法身如來義也又云如來如實知見三界之相即是如如智稱如如境一切種智是知佛眼是見此是報身如來義也又云或示己身己事或示他身他事此即應身如來義也若但性德三如來者是橫但修德三如來者是縱先法次報後應亦是縱今經圓說不縱不橫三如來也揀縱橫如來尚非今義況三藏通教如來耶又法華之前亦明圓如來者皆是迹中所說耳發迹顯本三如來者永異諸經論云示現成大菩提無上故有三種菩提一應化菩提隨所應現如經出釋氏宮故二報佛菩提十地滿足得常涅槃如經我實成佛已來無量無邊劫故三法佛菩提謂如來藏性淨涅槃不變如經如來如實知見三界之相故經具其義論出其名不作上釋寧會經論耶次明壽量者壽者受義真如不隔諸法故名為受又境智相應故名受又一期報得百年不斷故名受量者詮量也詮量法如來以如理為命報如來以智慧為命應如來同緣理為命法身如來如理命者有佛無佛性相常然不論相應與不相續相應報身相續應身亦無有量及無量文云非如非異非虗非實蓋是詮量法身如理命也詮量報身如來者以如如智契如如境境發智為報智冥境為受境既無量無邊常住不滅智亦如是函大蓋大文云我智力如是久修業所得慧光照無量壽命無數劫此是詮量報身如來智慧命也詮量應身者應身同緣緣長同長緣促同促云云自彼於我何為文云數數現生數數現滅或復自說名字不同年紀大小此是詮量應佛同緣命也復次法身非量非無量報身金剛前有量金剛後無量應身隨緣則有量應用不斷則無量通途詮量三句在聖一句屬凡謂有量無常都非佛義僭補曰言有量無常者以凡夫在迷法身隨緣流轉五道是有量非無量是無常非真常故云都非佛義雖非佛義而法身性淨煩惱不能染與如來法身體同為報化本故得為一句成四句也二乘見佛壽命猶如冬日菩薩所見猶如春日唯佛見佛壽命無量猶如夏日以凡夫博地翳障朧藏通二乘雖斷四住不見中道若捨分段受法性身未破無明彼土所奉猶是勝應是故二乘祇見冬日若諸菩薩未登地住所見同前若破無明乃至受分法身與而為語得見報身壽命奪而為語猶是勝應未窮報身之源未盡法性之極所見佛壽猶是春日唯佛與佛窮性盡源見法身壽猶如夏日大經舉三譬譬之於諸常中虗空第一一切壽命如來第一此譬法身壽命無始無終性相凝湛不同應報也二譬如四河皆歸大海此譬報身所修萬善皆感佛城壽命海中也三阿耨達池出四大河此譬應身壽命從法報出同他長短也此品詮量通明三身若從別意正在報身何以故義便文會義便者報身智慧上冥下契三身宛足故言義便文會者我成佛以來甚大久遠故能三世利益衆生所成即法身能成即報身法報合故能益物故言文會以此推之正意是論報身佛功德也復次如是三身種種功德悉是本時道場樹下先久成就名之為本中間今日寂滅道場所成就者名之為迹諸經所說本迹者即寂滅道場所成法報為本從本所起勝劣兩應為迹今經所明取寂場及中間所成三身皆名為迹取本昔道場所得三身名之為本故與諸經為異也非本無以垂迹非迹無以顯本本迹雖殊不思議一也問近成是方便遠成是真實者華嚴寂滅道場大經超前九劫皆成方便若爾本佛法華開遠已常不輕那更近答當知法華已復方便以開三顯一諸佛道同開近顯遠亦諸佛道同故知寄無始久成之本實無始無終不可挍量其有始有終有近有遠者乃論其應迹耳先申品目竟次釋經文前品略開近顯遠動執生疑此品廣開近顯遠斷疑生信文為二先誡信次正答誡信者佛旨論誡衆受為信此文有三誡三請重請重誡迹門三請一誡此中四請四誡前後合五誡七請奇特大事殷勤鄭重也今初誡信有四初三誡爾時佛告諸菩薩至汝等當信解如來誠諦之語三誡是叮嚀告誡誠是忠誠諦是審實不欺於物言則詣真昔七方便隨他意語非告誠實今隨自意語示之以要故言誠諦二三請是時菩薩大衆彌勒為首至如是三白已三重請復言唯願說之我等當信受佛語四重誡爾時世尊知諸菩薩三請不止而告之言汝等諦聽先誡信竟第二正答有長行偈頌長行為二一破近顯遠二三世益物初又二一出執近之情二正破近顯遠今初如來祕密神通之力至得阿耨多羅三藐三菩提經文有三節初如來祕密神通一句出所迷法乃如來久遠成道之本一身即三身名為祕三身即一身名為密又昔所不說名為祕唯佛自知名為密神通之力者三身之用也神是天然不動之理即法性身也通是無壅不思議慧即報身也力是幹用自在即應身也次言一切世間天人阿修羅等是能迷衆三皆謂釋迦牟尼出釋氏宮去伽耶城不遠坐於道場得三菩提是迷遠之情此本說中不復言及二乘但對菩薩菩薩攝在天人修羅三善道內菩薩有三種下方他方舊住下方即本日所化故無執近之謂他方舊住俱有二種一從法身應生者往世先得無生或已先聞發迹顯本設未得聞報盡受法性身於法身地自應得聞長遠之說是故應生菩薩多無執近之謂二者今生始得無生忍及未得者咸有此謂也二正破近顯遠破執近之迷以顯久遠之本上文如來三番殷勤告誡汝等當信解如來誠諦之語即為此也文為二初正明顯遠二設譬格量今初然善男子至無量無邊百千萬億那由他劫僭補曰然者乃暫時然諾縱之之意善男子下即奪謂不但伽耶我實成佛已來無量無邊百千萬億那由他劫此如來如實而說故云實也二設譬格量三一舉譬問二答三合今初譬如五百千萬億那由他阿僧祇至知其數不二答中舉三人不知也彌勒菩薩等俱白佛言至如是諸世界無量無邊三合譬爾時佛告大菩薩衆至百千萬億那由他阿僧祇劫但下塵被點之界已不可說況不下塵界寧當可說下塵不下塵界尚不可說下塵不下塵塵豈可說耶況復過是寧可說耶僭補曰經中抹塵之譬格量本師釋迦成佛以來壽量遠本其本佛之名古今未有的指是何佛者有以法身為遠成之本則法身無久近亦無成與不成大師直指是報身上冥下契三身宛足如是功德悉是本時道場樹下修德圓滿久遠成就名之為本餘皆迹也本佛之名試以管見僭論之仰惟曠古無佛唯最初威音王如來以真如內熏之力圓覺教授之力無師智自然智自悟自修自致成佛此段因緣有經所出恐智者時此經未至未曾指出唯禪宗諸祖每舉威音王前事令人達本遍於禪書六祖法寶壇經云威音王已前即得威音王已後無師自悟乃是天然外道昔黃蘗在南泉為首座一日持鉢過堂在南泉位上坐南泉云長老何年行道黃蘗云威音王已前南泉云猶是王老師兒孫黃蘗便過位鼓山神晏國師常問學者如何是威音王佛師又曹山云威音猶未曉彌勒豈惺惺威音因緣雖未檢經而有禪宗諸祖提唱之語亦可憑之以明威音古佛是我本師遠成之本亦與當經常不輕菩薩品中最初威音王如來冥然契會經云乃往古昔過無量無邊不可思議阿僧祇劫有佛名威音王住世說法壽四十萬億那由他恆河沙劫其佛饒益衆生已然後滅度於此國土復有二萬億佛出現於世皆同一號名威音王乃最初威音王如來四十萬億那由他恆河沙劫一期所教化者其中又有菩薩比丘名常不輕於佛像法出家是比丘不專讀誦經典但行禮拜為四衆授記乃至臨欲終時於虗空中具聞威音王佛先所說法華經二十千萬億偈悉能受持即得如上六根清淨更增壽命二百萬億那由他歲廣為四衆宣說是法華經前釋品題中有問近成是方便遠成是真實者華嚴寂滅道場大經超前九劫皆成方便若爾本佛法華開遠已常不輕那更近答當知法華已復方便據此明文不輕乃是威音果後行因之迹今格量本師釋迦成道遠本即常不輕即威音王乃是一人雖有本迹之殊而體本無異也佛經祖語互相印證章明較著如指諸掌復何疑乎何者法性無始最初威音王如來成道亦無始常不輕比丘於佛像法出家成道雖若有始而實鄰於無始也即常不輕壽量亦不可較量況威音王耶所以無始壽量縱以五百千萬億那由他阿僧祇三千大千世界抹為微塵過東方五百千萬億等世界下一塵如是東行盡是微塵其下塵之界已不可說況不下塵界寧當可說其下塵不下塵界既不可說況下塵不下塵之塵何可說耶況復過是寧當可說雖則如來設如是不可思議廣大譬喻令知本師無始成道遠本究竟如一毛比于太虗總不能格量其萬一何者蓋壽量無始何可較量耶然本既如是迹胡不然何者從本垂迹本即迹也開迹顯本迹即本也體用一如古今一際如來三世益物功德曷可思議問威音王無師自悟之理世所難明懷疑者衆更請解其惑答曰威音之後雖是師師相受而究竟悟明乃是當人真如內熏之力無師自然之智其師之教授但作增上緣譬如穀種藉水土之力而發芽結子竟從穀出所謂親因緣也不從水土出以是增上緣復何疑乎又問何以分別功德品中佛剎微塵數等諸菩薩聞如來壽量即得證入住行向地乃至一生補處增道損生授法身記耶答此乃積劫久修之大菩薩姑置勿論即今末法有初發意行人尅志修學一乘圓法如實信解威音本迹功德與我本迹平等無二亦得損生授記何者以威音與諸佛及三乘聖賢一切凡夫同一真如體周法界始於無始盡於未來一念回機便同本得何差別之有耶一破近顯久遠之本竟二明三世益物僭補曰三世益物者乃威音成道已從本垂迹之用迹迹中皆有三世望前為過去望後為未來中間可知迹本本迹互現無盡如然燈大通及第十六王子等當日結緣今日成佛所謂處處自說名字不同年紀大小亦復現入涅槃皆是威音迹中三世益物功德無有盡時也文為二一法說二譬說初又二初明三世益物二總結不虗初又三一明過去益物二明現在益物三明未來益物初過去又三一益物處二拂中間疑迹三正明益物今初自從是來至導利衆生須顯處者上引譬甚久久居何處故云常在此土及於他國而作佛事僭補曰自從是來我常在此娑婆世界說法教化者可見娑婆衆生與我本師有大因緣始自威音至於今日為釋迦牟尼生生不捨我等常隨教化此恩此德何由能報唯有於此經中得一句一偈即之於心深生信解如說修行自他兼利庶幾仰報萬一如或徒耕於空言棄於實踐自誑誑人其害匪細不唯違悖佛心抑亦孤負己靈也二拂中間疑迹諸善男子至如是皆以方便分別於是中間下拂報迹上之疑疑因疑果昔教所說處處行因又處處得記今拂除此疑指然燈佛即拂因疑又復言其入於涅槃即拂果疑如此因果非復一條皆我方便非實說也僭補曰經中拂中間疑迹云我說然燈佛等者但舉然燈一佛而於諸佛會中垂迹行因之事無量無邊不可備舉故以等字等之諸佛名字既不可考唯本經中常不輕菩薩是威音王佛果後行因之迹如上已明又大通智勝如來第十六王子是釋迦牟尼其中格量大通遠本以一三千世界地種磨以為墨過於東方千國土乃下一點如是展轉盡地種墨其所經國土若點不點盡抹為塵一塵一劫彼佛滅度以來復過是數可謂遠矣若與彼威音五百千萬億那由他三千大千世界抹為微塵格量之則日劫相倍何可較量耶是知大通亦是威音之方便如然燈佛等不特十六子而已所謂處處自說名字不同年紀大小舉一例諸令識其大槩而已三正明益物又二一機感二施化今初諸善男子至隨所應度至我所者即是過去衆生漸頓兩機冥扣法身也佛眼觀者即是久已成佛用佛眼鑑照無有差遺將欲起於劣勝兩應而利益之善機凡有二力一感人天華報二感佛道果報若以法眼觀知萬善重輕各得華報不能究竟知其終得種智果報若以佛眼圓照萬善知其始末此經一向明佛眼觀知衆生萬善究竟得佛一大事出世之正意也信等諸根者五根也慧根即了因餘根即緣因此二善根各有利鈍通攝頓漸機緣頓機利鈍即是圓別根機漸機利鈍即是藏通機緣又小乘根名鈍大乘根名利又小乘根名利人天乘名鈍十法界衆生所有善根利鈍為機不用惡法以惡法是所治非緣了二因也如來悉照十界善機隨所應度而現形聲兩益也二施化為二先形聲益次得益歡喜形聲中二先形益明非生現生非滅現滅處處自說名字不同年紀大小亦復現言當入涅槃自說名字不同者機有優劣形有勝負其形既異名則不同年紀大小者即形勝負勝者即勝應負者即劣應也名不同者即二佛現壽有量無量也處處者豎論則過去之處處行因國土也橫論即十方國土也名字不同約豎處所亦有生法名字不同如今之應身望過去然燈佛等約橫國土亦有生法名字如今之望分身亦如華嚴名號中所列釋迦異名若干不同年紀大小者此明壽命長短逐上所現應身或說壽二萬如迦葉佛時或說壽八萬如彌勒佛時互明大小縱橫可知就法報應壽命大小此皆隨所應度為其現身及壽長短耳亦復現言當入涅槃者應以滅度而得度者即現滅度也令其戀仰而得解脫此義現下譬說中次聲益又以種種方便說微妙法小身短壽即是說於漸教故言種種方便也大身長壽即是說頓教故言說微妙法二得益歡喜能令衆生發歡喜心雖初以漸終令入大故言皆令得歡喜仍此歡喜即是施化得益佛依四悉檀施形聲兩益衆生獲於四利稱機則喜下文云皆實不虗即此義也一過去益物竟第二明現在益物非生現生此是如來師子奮迅三昧此三昧有十功德一知衆生諸根熟不熟清淨不清淨二以如來法輪教未度者悉入法律三弘誓遍滿十方音聲亦爾或一音遍滿百千萬音音音遍法界普教衆類四轉無上輪化衆生皆取滅度五能示出家剃髮持淨戒六性行合空七放光示滅或存或亡或示相好或隱相好八降伏四魔九令他得入至要增長止觀十具上十善之本身三口四等此第十功德秪是三業隨智慧行及三密等佛果地以師子三昧奮他塵垢佛佛皆然文為二一明機感二明應化今初諸善男子如來見諸衆生樂於小法德薄垢重者如來見者即佛眼照也諸衆生樂小法者所見之機也華嚴云大衆雖清淨其餘樂小法者或生疑悔長夜衰惱愍此故默偈云其餘不久行智慧未明了依識不依智聞已生憂悔彼將墮惡道念此故不說按彼經無聲聞二乘但指不久行者為樂小法人耳師云樂小者非小乘人也乃是樂近說者為小耳今當通說之所謂貪愛二十五有即人天之機來至我所名小法也貪樂涅槃求自解脫即二乘之機來至我所亦名樂小法也樂於漸次紆回佛道即三菩薩機藏通別來至我所亦名樂小法也德薄者緣了二善功用微劣下文云諸子幼稚也垢重者見思未除也問非生現生備施頓漸二化七方便等可是樂小法者圓頓赴機是應樂大法者云何通判為樂小法耶答向略其意今廣釋凡為四義一約往日雖發大心不能專精多著弊欲不得出世名弊欲為小法也二約現在如佛未出世諸天人等雖有大機而心染世樂著於邪見故名樂小法此二義與下譬宛轉於地意同也三約修行雖不樂於三界弊欲小法而樂三乘灰斷亦名小法雖不樂於三乘近果而樂歷別修於一乘不能於一心圓頓普修故名樂小此三意約因門明樂小法也四約果門樂聞近成之小出釋氏宮始得菩提不欲樂聞長遠大久之道故言樂小此等小心非始今日若先樂大佛即不說始成說始成者皆為樂小法者耳第二明應化非生現生有二一現生二利益現生又二一現生二非生現生者迹現於生非生者非始爾生也今初現生為是人說我少出家得阿耨多羅三藐三菩提為是人說我始得菩提前明利鈍二機來感法身今即現勝劣兩應劣應應鈍根勝應應利根此兩應竝有生法二身生劣應二身生者以正慧託胎出生行七步如迦旃延子所述乃至六年苦行已還是名生身生也法身生者即三十四心斷結習盡所得五分法身是也勝應生身生者如華嚴大經等說與諸菩薩處摩耶胎常說大乘出行十方各各七步是名生身生法身生者於寂滅道場金剛後心斷無明盡得妙覺相應慧窮照法性萬德種智圓明普備是名法身生出家者劣應出分段家勝應出二死家得菩提者劣應得有作四諦所發無漏盡無生智名為菩提勝應即照三諦一實之道一切種智為菩提也二非生非始爾生也然我實成佛已來久遠若斯至作如是說然我實成下明本實不生但天人修羅見此二種生法二身謂言始生此則不然然我久已得此生法二身今日之生非實生也故云久遠若斯若斯者如上譬之長久也但以方便下明既非實生何故現生為利樂小法人德薄垢重者使得佛道故言但以方便教化衆生作如是說者非生而現生故云作如是說也餘經破劣應生身生非生尚不破劣應法身生非生今經正破勝應法身生非生何者我實成佛已來久遠若斯故知今日劣勝兩法身生皆被破故生非生與餘經永異也文中雖云兩應各有生法二身然劣應之上五分法身義同生身勝應之上雖云生身義同於法二明利益二先明形聲次明不虗今初諸善男子至或示他事說即聲教示即形現形聲不出自他若說法身是說己身若說應身是說他身言值然燈佛是說己身然燈是我師是說他身示正報是示己事示依報是示他事隨他意語是說他身隨自意語是說己身示己他事亦類如此次明不虗又二初偏明聲益不虗二釋則雙釋不虗今初諸所言說皆實不虗初不虗者漸頓二機稟此二種形聲皆益不虗上過去章明皆歡喜似世界之益今明皆不虗勝劣形聲逗於二機獲四悉檀益皆不虗也二雙釋二益不虗有二一開示佛知見以顯二益二稱機施化以顯二益今初此中有六句初如來去二亦無在世去三非實非虗四非如非異五不如三界去六如斯去所以者何至如來明見無有錯謬所以者何者意問何以如來二益不虗耶故釋云如來如實知見三界之相無有生死等如實知見者即是實智如理而照三界之實實則無三界之因相也三惑是因無有生死者無有二死之果相也分段變易若退若出者起集名退集即見思謂集因集果退落三界也無常果現名出也聲聞從苦入道觀四念處等是因證阿羅漢出三界外是果名無常果者從苦諦從名也無在世滅度者亦無在生死之世及入涅槃之滅此二俱滅故云亦無在世及滅度者非實非虗者非於滅度之實非於生死之虗故云非實非虗也非如非異者非於世間之隔異非於出世之真如故云非如非異此四明中道也不如三界見於三界者不如二種三界衆生所見三界之相二種三界者三界之名通界內外界外三界者以外準內故也中理未窮通名三界見惑變易土中勝妙六塵通名三界思惑古淨名疏中委出其相唯佛一人如實窮照三界之實內具實智之用亦是隨自意語亦是或說己身之事故大品云第一義中無所分別也又如來權智如量知見三界之相於無二死中而隨他意示二死身說有二死無退無出而隨他意說有退有出亦無在世及滅度者而隨他意示生世間示入涅槃說有在世有得滅者無實而說涅槃之實無虗而說三界之虗無三世之異而說有異無真諦之如而說有如同於三界見於三界皆是隨他意語名為或說他身事示他身事如斯之事如來二智明審二諦無有錯謬所以形言兩益皆實不虗也僭補曰如來於迹門方便品中開權顯實為令衆生開示悟入佛之知見但標其目而無釋文大師一一以四義釋之理無不窮事無不悉蓋大師之說即是佛說無二無別也今本門壽量品中開迹顯本久遠劫來以一切種智知以佛眼見為諸衆生開示佛之知見有六句之義佛自解釋令其當機自悟自入耳所謂如來如實知見三界之相無有生死若退若出如實知見亦無在世及滅度者如實知見非實非虗如實知見非如非異如實知見不如三界見於三界如實知見如斯之事無有錯謬良以十界聖凡因果染淨差別之法皆是真如實相無一法可得華嚴經云一切諸法無有餘悉入於如無體性是也故一一以雙非非之歸於法身中道無始劫來迹本本迹互現無涯本本皆迹迹迹是本行者若能如實究竟悟明究竟證入庶母負如來今日為諸衆生開迹顯本開示佛之知見也二稱機施化以顯二益有二先明機感以諸衆生有種種性至種種憶想分別故漸頓根性各有種種此須用為人悉檀為人悉檀正為生諸善根善根猶是性習欲成性今何故先性後欲釋云因有本日根性能起今日之欲樂如因煩惱故有五陰復因五陰更有煩惱不前不後性欲亦爾要因習欲而成性也如因下舉例者如大經云善男子一切衆生身與煩惱俱無先後雖無先後要因煩惱而得有身終不因身而有煩惱性欲亦然雖無先後必因習欲方乃成性結同者今雖性前欲後終須欲義居先故云習欲成性欲者漸頓二機種種欲樂不同此須用世界悉檀行者所作業行隨樂欲而修諸行此須用為人悉檀行中好多愛著致有妨障此須用對治悉檀憶想者是智慧即相似解由修行故能得解生此是方便猶未稱理故是念想之觀漸頓衆生居在內外凡位有諸善根欲樂欲樂故修行修行故得似解此須用第一義悉檀由三悉故第一義來於諸內外凡位亦得名第一義也但想慧名須在因位如五品前修行五悔初入隨喜尚乃得名為第一義況入內凡位耶又隨喜前獲少定心尚亦得名入第一義況入初品隨其所得憶想之解更為說法即得朗悟第一義乃至初地欲樂修行二地時亦憶想二地之境若發生二地真解即念想觀除言語法滅乃至佛地方得究竟離於憶想獲常寂照耳次對機施化欲令生諸善根至未曾暫廢正對機施己他聲益於漸頓種種根機令生種種善根故現若干己他身事若干自他聲教若干因緣譬喻若對漸機以三藏中四門若干因緣譬喻於一一門中復有若干如為懈怠者說苦忍為我慢者說無常忍等通教四門亦如是若對頓機如別圓等亦各四門若干種種如三十二菩薩各說入不二法門華嚴中種種行類相貌皆為種種根機施若干譬喻言辭說法也所作佛事未曾暫廢者總結不虗如上若干己他形聲皆令衆生入佛知見不為人天二乘小事故云所作佛事也若一人獨得滅度餘人不得者所作佛事即為有廢廢即令衆不得實益豈得會皆實不虗云何皆實昔云我坐道場不得一法實七方便竝非究竟滅二涅槃者方便空拳故知唯虗未見皆實若昔施七權遂不得入一實者可言其虗虗引得出無有虗出而不入實者故知昔虗為實故也皆實不虗佛事無廢即此義矣二現在益物非生現生竟第三未來益物非滅現滅有二初明非滅現滅二明現滅利益初又二先明本實不滅次明迹中唱滅初又二一明果常本實不滅如是我成佛已來至阿僧祇劫常住不滅常住不滅者寄此四字明未來大勢威猛常住益物盡於未來也次舉因況果以明常住諸善男子至復倍上數舉因況果者佛修圓因登初住時已得常壽常壽叵盡已倍上數況復果耶譬如太子時祿已不可盡況登尊極祿用寧可盡乎二迹中唱滅然今非實滅度而便唱言當取滅度三身竝有非滅唱滅義如淨名云法本不生今則無滅即是法身非滅又云是寂滅義即是唱滅也何者若已了達不唱寂滅為未了者唱耳若言照寂即是唱滅若言寂照即是唱生夫法身者雖非生非滅亦有生滅若迷心執著即煩惱生而智慧滅若解心無染即智慧生而煩惱滅滅惑生解此是無常滅若解生惑滅即是寂滅此之生滅悉約法性而辨若無迷解二緣則不唱有此生滅也報身非滅唱滅者誰有智慧誰有煩惱而言智慧能破煩惱惑智本無生滅以為報身無生滅體此即明暗不相除即報身不滅義明即是智暗即無明體性全是故無相除既無相除即不滅也衆生未了聞此便謂其即是佛而生憍恣不復修道故復唱言道能滅惑有煩惱時則無智慧有智慧時則無煩惱豈非智慧能滅煩惱耶應身非滅唱滅者應是法報之用體既無滅用豈有窮即應身不滅但為衆生若常見佛則生憍恣故唱我於今夜當取滅度又法身當體明不滅報身說不滅必約法身應身說不滅須約法報法報常然應用不絶衆生不盡即不滅度又法身當體論不生滅報身了達無能生滅應身相續不生滅初約非滅現滅竟第二明現滅益物為二一不滅衆生有損二唱滅於物有益初又二初不滅有損次廣釋不滅之意今初如來以是方便至入於憶想妄見網中有損者如前樂小法人見佛常在不種善根貧窮下賤不生二善故無益見思不斷不斷二惡則是有損貪著五欲入於憶想憶想即是見惑五欲即是思惑也由此衆生垢重故須唱滅不唱滅則二惡生而不滅二善損而不生若依四悉檀現滅則二惡滅二善生為滅二惡故用對治第一義第一義滅未生惡對治滅已生惡世界為人生二善世界生未生善為人生已生善又世界滅已生惡對治滅未生惡如禪五陰滅欲界惡即是世界滅已生惡為人生已生善第一義生未生無為之善二廣釋不滅之意若見如來常在不滅至恭敬之心若見佛常在便起憍恣心等故有損不能生恭敬故無益憍恣即增見惑厭怠即生思惑不生難遭想即不能生見諦解不恭敬即不能生思惟道為是義故宜應現滅若見聞三佛不滅悉有憍恣義便謂衆生如彌勒如一如無二如平等即真由是生於憍心上慢謂一切煩惱本自不生今亦無滅何須修道即便恣情放逸為是唱言是寂滅義又聞一切衆生即菩提相菩提相即煩惱相明暗不相除顯出佛菩提衆生聞此復起慢恣不復修善懈怠放逸為是等故唱言報身智慧能滅煩惱無明力大佛菩提智之所能滅應身非滅現滅易解初約法身者法身本無寂滅之名為上慢者計如不殊須唱寂滅具如下釋若唱言法本不生今亦不滅何故要須滅惑方乃寂滅經云智慧不滅煩惱然明時無暗汝今具足煩惱何能有慧當知智慧能滅障惑衆生聞是唱滅便於三佛生難遭想起恭敬心一不滅衆生有損竟二明唱滅有益是故如來以方便說至而言滅度先標三佛難值衆生樂著小法見思障重聞佛不滅則生憍恣而不修道次所以下釋也諸薄德人過百千劫或有見佛或不見者若見三佛其人多善少惡不為其人唱滅是人見佛常在靈山也或不見佛其人障重善輕為說三身難會衆生聞之便作是念三佛雖復非生非滅必須生善滅惑乃得證見此事不易故云難遭也心懷戀慕渴仰者此明現滅無損以戀慕於佛故能以智慧明滅諸癡暗究竟悟入諸法實相不特斷見思出三界二十五有而已故云有益也一三世益物竟二總結不虗又善男子諸佛如來法皆如是為度衆生皆實不虗三世益物諸佛皆然令得實益故不虗也第一法說竟第二譬說有開譬合譬開譬為二一良醫治子譬譬上三世益物二治子實益譬譬上總結不虗初又三一醫遠行譬譬過去益物二還來譬譬現在應化三復去譬譬未來應化今初譬如良醫智慧聰達至遠至餘國初良醫者醫有十種一治病病增無損或時致死譬空見外道恣意行惡教人起邪斷善根法身既亡慧命亦死二治病不增不損譬有見苦行外道投巖赴火苦行行善不得禪定不能斷結即是無損亦不能進善即是不增也三治病損而無增但世醫所治差已還復生即是修定斷結外道也四治病能令差已不復發而所治不遍即二乘人止治一兩種有緣者不能遍治一切也五雖能兼遍而無巧術用治苦痛釋論呼為拙度即是六度菩薩慈悲廣治也六治病妙術治無痛惱而不能治必死之人譬通教菩薩體法但治有反覆凡夫不治焦種二乘也七雖治難愈之病而不一時治一切病即是別教菩薩也阿含云良醫有四一善知病相二知病因起三善知方治四畢竟不發然此醫知病相不出界內知病因起不出依正方治不逾生滅無常不發秖是住二涅槃望今但成第四五醫八能一時治一切病而不能令平復如本即圓教初心十信也九能遍治一切亦能平復如本而不能令過本即圓教後心也十一時治一切病即能平復又使過本即是如來僭補曰等覺治能復本而不能過佛則過本原無病無藥也良以如來為衆生治惑皆令至於一切智地故稱究竟良醫也前三種醫即大經中之舊醫用乳藥也後六竝客醫無術者但用無常苦等法如用辛苦酢藥也有術遠來還令服乳最後究竟良醫也良者善也內有三達五眼即是八術妙得藥性善治者外識病源能用藥也八術者經中舉譬有八復次治八種病今此且明八數而已智慧者權實二智深知二諦也聰達者五眼鑑機頓漸不差也十二部教文理甚深如明鍊方藥依四悉檀治衆生病如善治衆病也無量義云醫王大醫王以大醫王稱為良醫多諸子息若十是聲聞子二十是支佛子一是聲聞一中具十故云若十二是支佛二中具十故云二十各具十者明圓數也百數是菩薩子菩薩之子凡有三種子義一就一切衆生皆有三種性德佛性即是佛子故云其中衆生悉是吾子此文云多諸子息也約十心數法即有百子心王為正因佛性慧是了因性餘九相扶起屬緣因性一數起時九數扶助如是成百也十心數者心數甚多且約十善數謂信進念定慧喜猗捨覺戒此十數扶心王能改惡就善革凡成聖解一切法門一數具十故成百數也是以性德三因悉屬正因佛子二就昔結緣為佛子如十六王子覆講法華時聞法者亦生微解即成了因性昔微能修行為緣因性正性為本此三因竝屬緣因資發今日一實之解故以昔日結緣為緣因佛子即火宅中三十子也三者了因之子即是今日聞法華經安住實智中我定當作佛決了聲聞法是諸經之王從佛口生得佛法分故名真子也以有事緣遠至餘國者譬過去應化中現滅也一譬過去益物竟第二還來譬譬現世益物二初譬機感二譬應化今初諸子於後飲他毒藥藥發悶亂宛轉于地衆生於佛滅後樂著三界邪師之法故云飲他毒藥即是遊行他國輪轉諸趣墮在三界故云宛轉于地宛轉于地者望出世法故且云地二譬應化二初譬現形二譬說法今初是時其父還來歸家至願見救療更賜壽命信受邪師之法名為飲毒失心是無大小機感生不失心是有大小機感生又失心者貪著三界失先所種三乘善根也為是人非滅唱滅不失心者雖著五欲而不失三乘善根為是人故非生現生善強惡輕見佛即能修道斷結如子見父求藥病愈善輕惡重得見佛亦求護而不修道如子見父求救不肯服藥父為此子唱言應死遙見者明佛出世時衆生亦見色身而為見思障隔五分不得親奉法身故云遙也見聞佛出皆有喜敬之事見諸經文梵王請等例是求救之辭也二譬說法三初譬佛受請轉頓漸法輪二譬勸誡三譬得益今初父見子等苦惱如是至搗篩和合與子令服經方者即十二部教也藥草即教所詮八萬法門也從佛出十二部乃至出小乘涅槃此出頓漸藥草也直從佛出十二部此出頓藥草也從佛出九部修多羅此出漸藥草也色者譬戒戒防身口事相彰顯也香者譬定功德香熏一切也味者譬慧能得理味也此戒定慧即八正道修八正道能見佛性又色是般若照了法性之色分明無礙香是解脫斷德離臭也味是法身理味也三法不縱不橫名祕密藏依教修行得入此藏也說三乘空三昧力如搗無相如篩無作如合一一三昧具戒定慧也又空觀如搗假觀如篩中觀如合此三觀各不離戒定慧將此法與漸頓衆生令修行名服也二譬勸誡而作是言至速除苦惱無復衆患從而作是言乃至可服即是勸門也從速除苦惱乃至無復衆患即是誡門也將勸誡二教令諸衆生服法藥也三譬得益其諸子中不失心者至即便服之病盡除愈二現在益物竟三明唱滅復去譬未來益物有四一明唱滅之由由衆生薄德見佛不修行即是不肯服藥也二唱應死譬非滅現滅三子醒服藥譬唱滅有益四追譬本實不滅今初餘失心者見其父來至如是好藥而不肯服二唱應死譬非滅現滅我今當設方便至遣使還告汝父已死死時已至者當入涅槃也留經教在故云是好良藥今留在此復至餘國者即是此方現滅他方現生上文云願在他方遙見守護即其義也遣使者或取涅槃中大聲普告為使人或用神通或用舍利或用經教等為使人今用四依菩薩語衆生云佛已滅後但留此法我今宣弘汝當受行也後時衆生若無四依傳述經法豈能自知佛已滅度今法現在故用四依是使人也僭補曰末法弘經允屬四依菩薩南嶽天台章安荊溪至於四明詎非其人耶於此娑婆世界五濁惡世傳弘此經以其昔日靈山親聞得佛心法故一句一偈一字一義無不從佛心中流出今日聞師所說宛如現在靈山親聞如來耳提面命天台與佛是一是二不可辨也自幸夙植微善逢茲大法又得聖師注釋法海汪洋恣其飲噉纂要流通不啻優曇出現得一親見法乳之恩即粉身碎骨何能報其萬一耶唯誓在生生弘揚妙法與法界衆生同增道損生授法身記究竟成佛庶幾遂其𢍉志耳三醒悟服藥譬唱滅有益是時諸子聞父背喪至即取服之毒病皆愈良由滅後衆生醒悟服藥修行以作因緣能感未來應化如遺教云其未度者作得度因緣亦有現得感見普賢觀云精進苦到得見釋迦分身多寶東方善德等及七佛世尊四追譬本實不滅其父聞子悉已得差尋便來歸咸使見之其父聞子得差者得差之言不全惑斷但有三乘機及堪會者不論斷與不斷皆名得差譬三世益物竟二治子實益譬譬上總結不虛諸善男子至不也世尊上開譬竟二明合譬佛言我亦如是至亦無有能如法說我虗妄過者一長行竟二偈頌有二十五行半頌上法譬初二十行半頌法說次五行頌譬說上法說有二今頌亦二初十九行半頌三世益物次一行頌皆實不虗今初四行頌過去世益物爾時世尊欲重宣此義而說偈言自我得佛來至雖近而不見文為三初一行頌上成道已久次一行頌上中間益物三二行頌上住處二五行頌現在上文有二初二行半頌非生現生次二行半頌非滅現滅衆見我滅度至但謂我滅度三有十行半頌上未來上但寄常住不滅四字今頌則廣文為四初一行半明未來機應我見諸衆生至乃出為說法二四行頌上常住不滅神通力如是至散佛及大衆常在靈鷲山此謂實報土也及餘諸住處者謂方便有餘土也即上餘國義也天人充滿者三十心是人十地是天擊天鼓者無問自說也曼陀羅華者說賢聖位也三二行明不見因緣我淨土不毀至不聞三寶名四三行明得見因緣諸有修功德至久修業所得諸有修功德等者即指緣了具足者也經云則皆見我身實報土也經云或時為此衆等者亦初地初住也經云久乃見佛者即指五濁重者經云我智力如是總結大勢力也第二一行頌上利益不虗也汝等有智者勿於此生疑當斷令永盡佛語實不虗初頌法說竟次五行頌譬為二初一行頌開譬如醫善方便為治狂子故實在而言死無能說虗妄初一句頌過去次二句頌現在不頌未來也無能說虗妄一句頌不虗也二四行頌合譬上合中本不合未來今初半行頌合過去我亦為世父救諸苦患者二有二行半頌合現在為凡夫顛倒至為說種種法三一行頌合不虗每自作是意以何令衆生得入無上慧速成就佛身開三顯一開近顯遠欲令衆生速入佛道此事必得不虗也如來壽量品竟
