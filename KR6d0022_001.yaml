body:
  text: 隋章安尊者灌頂結集陳隋天台智者大師說唐荊溪尊者湛然述記閩鼓山私淑比丘道霈纂要經前有三段初略釋五重玄義妙法蓮華經智者大師將釋此經先於經前立五重玄義申明首題發揚一經大旨所謂九旬談妙是也言五重者謂名體宗用教相也因名詮體因體會宗依宗有用仍須教相區以別之令權實有歸粗妙無爽此經以法喻為名實相為體一乘因果為宗斷疑生信為用醍醐為教相一法喻為名者夫妙名不可思議也所言法者十界十如權實之法也此法即妙此妙即法無二無別故言妙也所謂妙名一舉待絶竝彰相待論判出前三教四時之上絶待論開開前三教四時俱成一實也蓮華者喻喻權實法也蓮譬於實華譬於權良以妙法難解假喻易彰況意乃多略擬本迹合成六喻也初迹門三喻一為蓮故華譬為實施權經云知第一寂滅以方便力故雖示種種道其實為佛乘二華開蓮現譬開權顯實經云開方便門示真實相三華落蓮成譬廢權立實經云正直捨方便但說無上道也次本門三喻一為蓮故華蓮譬於本華喻於迹從本垂迹迹依於本經云我實成佛以來久遠若斯但教化衆生作如是說我少出家得三菩提二華開蓮現譬開迹顯本經云一切世間皆謂今始得道我成佛以來無量無邊那由他劫三華落蓮成譬廢迹立本經云諸佛如來法皆如是為度衆生皆實不虗是以先標妙法次喻蓮華蕩化城之執教廢草菴之滯情開方便之權門示真實之妙理會衆善之小行歸廣大之一乘上中下根皆與記莂結迹門意又發伽耶之權巧顯本地之幽微增道損生位鄰大覺一期化導事理俱圓蓮華之譬意在斯矣結本門意經者西國稱修多羅此云契經謂契理契機也具貫攝善法四義謂貫穿所應說義攝受所化衆生三世不易千聖同遵也一釋名竟二實相為體者一切諸法不出法性正指實相以為正體也故壽量品云不如三界見於三界非如非異若三界人見三界為異二乘人見三界為如菩薩見三界亦如亦異佛見三界非如非異雙照如異今取佛所見為實相正體也體化他之權實即是自行之權實如垢衣內身實是長者體自行化他之權實即是自行之權實如衣內繫珠即無價寶也自行之權即自行之實知一切世間治生産業皆與實相不相違背一色一香無非中道況自行之權而非實耶二辨體竟三者一乘因果為宗宗者要也云何為要無量衆善言因則攝無量證得言果則攝如提綱維無目而不動牽衣一角謂戒衣也無縷而不來故言宗要然諸因果善須明識尚不取別教因果況餘因果諸經明佛往昔所行因果咸是方便非今經宗要取意為言因窮久遠之實修果窮久遠之實證如此之因豎高七種方便橫包十法界法初修此實相之行名為佛因道場所證名為佛果但可以智知不可言具略舉如此因果以為宗要耳三明宗竟四斷疑生信為用用者力用也三種權實二智皆是力用於力用中更分別自行二智照理理周名為力二種化他二智鑒機機遍名為用秪自行二智即是化他二智化他二智即是自行二智照理即鑒機鑒機即照理如薩婆悉達彎祖王弓滿名為力中七鐵鼓貫一鐵圍山洞地徹水輪名為用諸方便教力用微弱如凡人弓箭何者昔機稟化他二智照理不遍生信不深除疑不盡今機稟自行二智極佛境界起法界信增圓妙道斷根本惑損變易生非但生身及生身得忍兩種菩薩俱益法身法身後心兩種菩薩亦俱益化功廣大利潤弘深蓋茲經之力用也四論用竟五醍醐為教相教者聖人被下之言也相者分別同異也云何分別如日初出先照高山厚植善根感斯頓說頓說本不為小小雖在座如聾如啞良由小不堪大亦是大隔於小此即華嚴約法被機機得大益名頓教相約說次第名從牛出乳味相次照幽谷淺行偏明當分漸解此如三藏三藏本不為大大雖在座多跢婆和小所不識此乃小隔於大大隱於小約法被機名漸教相約說次第名酪味相次照平地影臨萬水逐器方圓隨波動靜示一佛土令淨穢不同示現一身巨細各異一音說法隨類各解恐畏歡喜厭離斷疑神力不共故見有淨穢聞有褒貶嗅有薝蔔不薝蔔華有著身不著身慧有若干不若干此如淨名方等約法被機猶是漸教約說次第生酥味相復有義大人蒙其光用嬰兒喪其睛明夜遊者伏匿作務者興成故文云但為菩薩說其實事而不為我說斯真要雖三人俱學二乘取證具如大品若約法被機猶是漸教約說次第名熟酥味相復有義日光普照高下悉均平土圭測影不縮不盈若低頭若小音若散亂若微善皆成佛道不令有人獨得滅度皆以如來滅度而滅度之具如今經若約法被機名漸圓教約說次第醍醐味相當知華嚴之譬與涅槃義同三子三田三馬等譬皆先菩薩次及二乘後則闡提聖凡平等三子三田三馬等譬者涅槃迦葉菩薩白佛如來憐愍一切衆生不調能調未脫能脫善星是佛菩薩時子斷欲界結證得四禪如來何故說是一闡提地獄劫住不可治人何不先為演說正法後為菩薩若不能救善星比丘云何得名大慈悲有大方便佛言善男子譬如有人唯有三子一者有信順心恭敬父母利根智慧於世間事悉能了知其第二子無信順心不敬父母利根智慧於世間事能悉了知其第三子不敬父母無信順心鈍根無智父母教告應先教誰迦葉白佛應先初次及第二後及第三而彼二子雖無信順恭敬之心以慈念故次復教之如來亦爾其三子者先譬菩薩次譬聲聞後譬闡提如修多羅中微細之義我先已為諸菩薩說淺近之義為聲聞說世間之義為闡提說今雖無益作後世因善男子譬如三田一者渠流便易無諸沙鹵瓦石棘刺種一得百二者雖無沙鹵瓦石棘刺渠流嶮難收實減半三者渠流嶮難多諸沙鹵種一得一又有三馬一者調壯大力二者不調大力三者羸老王若行時先乘何馬合譬如前善男子如大師子若殺香象則盡其力乃至殺兔亦盡其力如來亦爾為諸菩薩及一闡提功用無二故今文中初說華嚴先為菩薩次在鹿苑為聲聞方等已後大小普被乃至涅槃名為平等故涅槃云功用無二經文雖列多種三譬譬意不別重引來耳日光無私高者先照後及平地涅槃亦爾佛智無偏大機先被後及闡提通前後說故云平等問既以五味分別那同稱漸答約漸得明五味耳又若小不聞大大一向是頓若大不用小小一向是漸若以大破小是漸頓竝陳若帶小明大是漸頓相資若會小歸大是漸頓泯合故無量義云漸頓二法三道四果不合今時則合即此義也問云何相資答小聞於大恥小而慕大是為頓資漸佛命善吉轉教大益菩薩是為漸資頓如前分別但約顯露明漸頓五味之相若論不定義則不然雖高山頓說不動寂場而遊化鹿苑雖說四諦生滅而不妨不生不滅雖為菩薩說佛境界而有二乘智斷雖五人證果不妨八萬諸天獲無生忍當知即頓而漸即漸而頓大經云或時說深或時說淺應問即遮應遮即問一時一說一念之中備有不定不同舊義專判一部味味中悉如此此乃顯露不定祕密不定其義不然如來於法得最自在若智若機若時若處三密四門無妨無礙此座說頓十方說漸說不定頓座不聞十方十方不聞頓座或十方說頓說不定此座說漸各各不相知聞於此是顯於彼是密或為一人說頓或為多人說漸說不定或為一人說漸為多人說頓各各不相知互為顯密或一座默十方說十方默一座說或俱默俱說各各不相知互為顯密雖復如此未盡如來於法自在之力但可智知不可言辨雖復甚多亦不出漸頓不定祕密今法華是顯露非祕密是漸頓非漸漸是合非不合是醍醐非四味是定非不定如此分別此經與衆經相異也又異者餘教當機益物不說如來施化之意此經明佛設教元始巧為衆生作漸頓不定顯密種子中間以漸頓五味調伏長養而成熟之又以頓漸五味而度脫之竝脫竝熟竝種番番不息大勢威猛三世益物具如信解品中說與餘經異也又衆經咸云道樹師實智始滿起道樹始施權智今經明師之權智在道樹前久久已滿諸經明二乘弟子不得入實智亦不能施權智今經明弟子入實甚久亦先解行權又衆經尚不論道樹之前師之與弟近近權實況復遠遠今經明道樹之前權實長遠補處數世界不知況其塵數經云昔所未曾說今皆當得聞殷勤稱歎良有以也當知此經異諸教也上來所明五時五味及頓等化儀四教然後出藏通別圓化法四教化儀乃如來一代化物之儀式如世藥方化法乃化物之方法如世用藥詳如玄義略如四教儀此但提其綱要云爾五明教竟初五重玄義竟次明翻譯弘傳之師姚秦三藏法師鳩摩羅什譯師中天竺國人父鳩摩羅琰家世相國棄榮出遊龜茲王以女妻之生師名鳩摩羅什此云童壽師生而神靈七歲隨母入寺見大鐵鉢即取頂戴俄念此鉢甚巨我何能頂即不勝重將壓焉遂悟萬法唯心博學強記人莫能及以冲齡高德故云童壽出家博通三藏龜茲王以金師子座處之符堅據秦見異星現於西域太史奏當有大德智人入輔中國遣將呂光伐龜茲迎羅什中途聞堅為姚萇所害萇欲迎之不果萇亡子姚興立迎師入關奉為國師師閲舊經譯多參差不與梵本相應乃集沙門生肇融睿等八百餘人於逍遙園新譯經論凡三百九十餘部竝暢神源發揮幽致姚秦弘始五年四月二十三日譯大品竟至八年夏於草堂寺譯此妙法蓮華經命僧睿講之睿開為九轍世不傳師將終集衆曰願所宣譯傳之後世咸共流通今於衆前發誠實誓若所傳無謬當使焚身之後舌不焦爛以弘始十一年八月二十日卒于長安闍維薪盡形滅舌根儼然不壞如紅蓮華色南山感應傳云師位證三賢七佛以來譯經之師也譯者翻字翻音易梵語為華言也其巨功茂德詳本傳陳隋國師天台智者大師傳天台智者大師諱智顗字德安姓陳氏世為穎川人晉朝避亂止於荊州之華容父諱起祖梁元帝時為散騎常侍封益陽侯母徐氏夢香煙五彩縈回入懷遂覺體重誕靈之夕神光發屋旦有二僧過門曰此兒道德所鍾必當出家證果言畢而隱師眉分八彩目耀重瞳有古帝者之相父母每藏護之不令人見在襁褓中臥即合掌坐即面西七歲喜往伽藍蒙僧授普門品一遍成誦師於佛前誓為沙門夜夢瑞像舒金色手從窗而入三摩其頂由是深厭家獄每求出家二親不許乃刻旃檀像披藏尋經當拜時恍焉如夢見高山頂有僧舉手招之須臾伸臂接至山麓入伽藍見所造像在焉即悲泣自陳願學得三世佛法對千部論師說之無礙用報四恩僧復指像謂曰汝當居此汝當終此是年父母相繼傾喪年十八即辭兄依本郡果願寺舅氏法緒出家二十進具初從慧曠學律兼通方等復詣大賢山誦法華無量義普賢觀歷涉二旬誦通三部進修方等勝相現前見道場廣博莊嚴而諸經像縱橫紛錯身在高座足躡繩床口誦法華手正經像既精通經律常樂禪悅怏怏湘東無足可問陳文帝天嘉元年時思大禪師止光州大蘇山即往頂拜思一見即曰昔日靈山同聽法華宿緣所追今復來矣即示以普賢道場四安樂行昏曉苦倒如教研心切柏為香柏盡繼之以栗捲簾進月月沒繼之以松經二七日誦經至藥王本事品是真精進是名真法供養如來身心豁然寂而入定親見靈山一會儼然未散照了法華若高輝之臨幽谷達諸法相如長風之避太虗將證白師南嶽更為開演凡自心所悟及從師咨受四夜加進功逾百年南嶽歎曰非汝莫證非我莫識所入定者法華三昧前方便所發持者初旋陀羅尼也縱令文字之師千羣萬衆尋汝之辨不可窮矣當於說法人中最為第一南嶽手持如意臨席讚之曰可謂法付法臣法王無事矣復謂師曰吾久羡南嶽恨法無所委汝既得其門當傳燈化物莫作最後斷佛種人也師既奉訓不獲從往南嶽以陳光大元年同法喜等二十七人初至金陵朝野欽風咸來請益儀同沈君理請居瓦官寺開法華經題帝停朝一日敕羣臣同往聽法稟戒一夏開釋大義金陵諸大法匠咸趨座下盡北面之敬九旬談妙即此時也師止瓦官凡八載大注法雨舉國傾心乃謝遣門人曰吾初年共坐者四十人皆得法次百餘人得法者不滿十人其後徒衆轉多得法轉少吾聞天台幽勝昔人見稱將息緣茲嶺以展平生之志夏四月宣帝敕留訓物徐陵泣勸勿往師勉留度夏秋九月遂入天台此山先是神僧定光菴居三十載師至一見即曰頗憶招手相引時否師即悟禮像之徵夜聞空中鐘磬之聲光曰此犍椎集僧得住之相此處金地吾已居北山銀地汝宜居焉即佛隴也乃於此創立伽藍植松引流宛若昔夢一日見神僧謂之曰能制敵勝怨乃可為勇復為說法師問曰大聖所說是何法門當云何學云何弘宣答曰此名一實諦學之以般若宣之以大悲從今以後自行兼人吾皆影響九年二月帝下詔曰禪師佛法雄傑時匠所宗訓兼道俗國之望也宜割始豐縣調天台在六朝時縣名始豐調去聲稅賦也以充衆費蠲兩戶民用給薪水十年左僕射徐陵以禪師創寺啓于朝賜號修禪天台瀕海民業漁捕師以身衣勸人贖一所為放生之池時臨海內史計詡請講金光明經漁者聞法皆好生去殺捨江溪梁六十三所三百餘里俱成法池詡後還都坐事被縈臨當伏法遙想禪師冀垂一救夜夢羣魚巨億吐沫相濡明旦有詔特原詡罪至德元年陳少主敕國子祭酒徐孝克樹為銘以頌功德三年正月前後三遣使詔請至金陵弘宣大法師辭以疾更敕州郡為之勸請曰主上虗己思敬願師一往若一言有益則四生永賴師不獲已而起既至暫安置靈曜四月詔赴太極殿開大智度論題及仁王般若經題還寺就講時百高座居左諸高座法師也五等在右五爵公侯伯豫男也慧曠慧辨皆奉敕問難天子臨莚聽法百僚莫不盡敬禎明元年於光宅講法華時章安預次文句題注二十七歲聽受金陵六十九歲於丹丘添削二年正月隋伐陳國破江南皆歸於隋師以時喪亂遂杖䇿荊湘隋開皇十年正月文帝下詔曰皇帝敬問光宅禪師朕於佛教敬信惟重往者周武毀棄佛法朕曾發心立願必許護持及受命於天遂即興復師已離世網修己化人必希獎進僧倫用光大道十一年晉王楊廣遣使奉迎師曰我與晉王深有緣契即束裝順流不日而至王設千僧齊製疏請授菩薩戒師曰王紆遒佛戒宜立法名總持王贊師曰大師傳佛心燈宜稱智者授戒畢即欲西上王固請留師不允王命有司具裝發遣師往衡山營建功德酬師恩也十二月師至荊州旋鄉將建福庭以答地德乃於當陽山創立精舍道俗稟戒聽法者五千餘人初至當陽望沮漳山色堆藍積翠欲卜清溪以為道場意嫌迫隘遂上金龍池北百餘步有一大樹婆娑偃蓋中虗如菴乃於其處趺坐入定一夕雲開月明見二人儀從如王長者美髯而豐厚少者冠帽而秀發前致敬曰豫即關羽漢末紛亂九州瓜裂曹操不仁孫權自保豫義臣蜀漢期復帝室時事相違有志不遂死有餘烈故王此山大德聖師何枉神足師曰欲於此建立道場以報生身之德耳神曰願哀憫我愚特垂攝受此去一舍山如覆船其土深厚弟子當興子平建寺化供護持佛法願師安禪七日以須其成師期滿出定見湫潭千丈化為平址棟字煥麗巧奪人目神運鬼工其速若此師領衆入居晝夜演法一日神啓師曰弟子獲聞大法更願稟戒永為菩提根本師即秉爐焚香授神皈戒訖神歡喜信受再拜騰空而去於是神之威德昭布千里遠近瞻禱莫不肅敬晉王啓奏當陽造寺事出神心理生望表宜賜嘉名帝可其請賜名玉泉師將還天台晉王留居棲霞庶獲咨決師堅辭王不敢留遂行吳越之民掃巷以迎沿道令牧幡華交接至會稽寓古寺一夕皎月映床獨坐說法如人問難侍者智晞明旦啓曰未審夜來見何因緣師曰吾初夢大風忽起吹壞寶塔次見梵僧謂我曰機緣如薪照用如火傍助如風三事備矣化道乃行華頂之夜許相影響機用將盡傍助亦息故相告耳此死相現也吾憶少時之夢當終此地所以每欲歸山吾終後當藏尸於西南峯纍石為龕植松覆坎立二白塔使見者發菩提心次日啓行至石城乃稱有疾謂智越曰吾終期在此不須前進石城是天台西門大佛是當來靈像處所既好宜最後用心衣鉢道具一分奉彌勒一分充羯磨語已右脅西向而臥專念彌陀觀音及般若名訖令侍者唱二部經名唱法華名竟曰法門父母慧解由生本迹曠大微妙難測四十餘年蘊之知誰唯獨自明了餘人所不能見輟斤絶絃于此日矣唱無量壽經竟曰四十八願莊嚴淨土華池寶樹易往無人火車相現能改悔稱名尚得往生況戒慧熏修行道力故實不唐捐弟子智朗請曰不審師入何位沒此何生誰可宗仰師曰汝等懶種善根問他功德如盲問乳告實何益吾今當為破除汝疑吾不領衆必淨六根為他損己只登五品耳吾諸師友侍從觀音皆來迎我波羅提木叉是汝之師吾常說四種三昧是汝明導我與汝等因法相遇以法為親傳通佛燈是為眷屬又誡維那曰人命將終聞鐘磬聲增其正念惟長惟久氣盡為期云何身冷方乃聲磬耶示誨大衆訖乃唱三寶名如入三昧實開皇十七年十一月二十四日未時也春秋六十僧夏四十安坐在外經歷十日道俗奔赴哭泣繞拜如喪考妣將舁龕歸佛隴連雨不休弟子等呪願乞加神力才舉靈龕應時開霽乃於寺西南峯起塔奉藏從先囑也傳法弟子三十二人得法自行者不可稱數造寺三十六所棲霞靈巖天台玉泉天下四絶造大藏經十五處旃檀金銅畫像八十萬軀度僧一萬四千師三十年唯著一納冬夏不易凡所受施一果一縷悉以入衆凡所弘通不畜章疏安無礙辨契理符文有大機感乃親著述煬帝大業元年十一月二十四日值師忌辰遣通事舍人盧正方入山度四十九僧設千僧齊啓師靈塔視之開龕不見遺體唯空座虗帳而已使者反命帝乃謂羣臣曰智者是朕之師先多靈異朕仁壽元年令張乾威往視龕室法身端坐如入禪定今盧正方往則靈體不見唯空座而已至人得道非虗真不可思議也隋章安尊者灌頂傳師諱灌頂字章安臨海章安人以地目人尊之也始生三月能隨母稱三寶名七歲入攝靜寺依慧拯為驅烏日記萬言二十進具天縱慧解一聞不忘陳至德初陳後主謁智者於修禪稟受教觀研繹既久頓蒙印可因為侍者隨所住處所說法門即能領受佛法大海水流入阿難心師受法智者亦若是也禎明元年隨智者止金陵光宅聽講法華文句云年二十七聽愛金陵隋開皇十三年夏受玄義於江陵十四年夏受圓頓止觀於玉泉凡大師平日講說悉為結集大小部袟百有餘卷傳之百世師之力也煬帝大業十年著涅槃玄義二卷疏二十卷時隋末兵興寇盜羣起師自序云推度聖文凡歷五載何年不見兵火何月不見干戈菜食水齊冰床雪被其勞苦有若此疏成烈火焚之不爇晚年於會稽稱心精舍講說法華時人讚之有跨朗籠基起雲邁印之語郡中有嘉祥吉藏先曾疏解法華聞師之說廢講散衆投足請業深悔前作之妄唐貞觀六年八月七日終於國清壽七十二臘五十二初示疾有異香臨終命弟子曰彌勒經說世尊入滅多爇名香其煙如雲汝今可多焚香吾將去矣因委曲遺誡辭理甚切忽起合掌稱淨土佛菩薩名奄然而化先是貞觀元年同學智晞臨終曰吾生兜率見師智者左右寶座行列皆悉有人唯一座空彼天人曰却後六年頂法師來升此座計歲論期審晞不謬是月九日窆於寺之南山師居攝靜寺講涅槃經羣盜突至見寺門旌旗耀日神兵執仗皆長丈餘賊衆驚奔潰散師每誦經晏坐常有天華飄墜其側所著有八教大意智者別傳各一卷觀心論疏二卷國清百録五卷真觀法師傳南嶽記各一卷吳越王請諡總持尊者唐荊溪尊者湛然傳師諱湛然號荊溪姓戚氏世居晉陵荊溪時人尊其道因以為號家世習儒故幼學夙成在兒童中超然有邁俗之志年十七睿宗景雲二年生玄宗十五年當十七歲訪道淅石遇金華方巖授以止觀之法開元十八年始從學左溪時年二十溪與之語知為法器一日夢披僧服掖二輪游大河中覺而白溪溪曰嘻豈當以止觀二法度衆生於生死之淵乎遂以處士服受教觀之道天寶七年始解縫掖著僧伽黎時年三十八歲尋詣會稽一律師博究律部久之演止觀於吳門左溪既沒師挈密藏獨運東南一日謂門弟子曰道之難行也我知之矣古之人靜以觀其復動以應其物二俱不住乃蹈乎大方今之人或蕩於空或膠於有自病病人道用不振將欲取正舍余誰歸於是大啓妙法旁羅萬行盡攝諸相入於無間即文字以達觀導語默以還源乃祖述所傳著為記文凡數十萬言一家三大部之旨皆為之鈔釋玄義有釋籤文句有記摩訶止觀有輔行其著述甚多具本傳天台章安之道至師而大備天寶大曆間朝廷三詔皆辭以疾師始居蘭陵嘗與江淮名僧四十人同禮五臺有不空三藏門人含光白師曰頃從吾師不空遊天竺見梵僧云聞大唐有天台教迹可以識偏圓簡邪正明止觀可能譯之至西土耶師聞之歎曰可謂中國失法求之四維中國謂夫竺四維謂震旦晚歸台嶺大布而衣一床以居以身誨人耆年不倦大兵大饑之際學者愈蕃瞻望堂室以為依怙建中三年二月五日示疾於佛隴語門人曰道無方性無體生歟死歟其旨一貫吾歸骨此山報盡今夕要與汝等談道而訣夫一念無相謂之空無法不備謂之假不一不異謂之中在凡為三因在聖為三德熱炷則初後同相涉海則淺深一流自利利人在此而已汝其志之言訖隱凡而化壽七十二夏四十三門人奉全身塔於智者塋域之西南隅吳越王請諡圓通尊者翻譯弘傳師竟後總判三分大科仰惟我佛赴衆機緣作散華貫華兩說結集者按說傳之論者依經申之皆不節目古講師但敷弘義理不分章段如什師釋維摩經例也若純用此意後生始不識起盡天親作法華經論以七功德分序品五示現分方便品其餘品各有處分昔河西憑江東瑤取此意節目經文自是漸煩光宅轉細重氛翳於太清三光為之戢耀問津者所不貴曇鸞云細科煙揚雜礪塵飛蓋若過若不及斯乃人情蘭菊各擅其美後生不應是非諍競無三益喪一道三益者世界等三悉檀也一道者第一義悉檀也唯序正流通三分彌天高判今古同遵此經一部二十八品智者大師依之分文初品為序方便品訖分別功德十九行偈凡十五品半名正從偈後盡經凡十一品半名流通又一時分為二從序品至安樂行十四品約迹門開權顯實從涌出訖經十四品約本門開迹顯本本迹各序正流通迹門初品為序方便訖授學無學人記八品為正法師訖安樂行五品為流通本門涌出訖彌勒已問斯事佛今答之半品名序佛告阿逸多下訖分別功德品十九行偈名為正偈後盡經十一品半為流通前三段乃合兩門為正宗其後又分迹本兩門各三分者正明二門開顯權實本迹之旨令脉絡分明知起盡也今依此消文一經云何二序答華嚴處處集衆阿含篇篇如是大品前後付囑皆不乖一部兩序何妨今本門不安五義者以本門非次首也迹門但單流通謂有勸持無囑纍以說法未竟故也有無之意云爾總判三分大科竟經前三段竟先申品目次釋經文今初妙法蓮華經序品第一經題略如前釋今釋品題序品者序義有三謂次由述如是等五事冠於經首次序也放光六瑞起發之端由序也問答釋疑正說弄引敘述也具此三義故稱為序品者梵語跋渠此翻為品義類同者聚在一處故名品也或佛自唱品如梵網心地或結集所置如大論所述或譯人添足如羅什譯摩訶般若成九十品今藥王本事品是佛唱妙音觀音等是結集家譯人未聞諸品之始故言第一次釋經文二初明四釋一因緣二約教三本迹四觀心始從如是終於而退皆以四意消文而今略書或三二一貴在得意不煩筆墨問若略則一若廣匪四所以云何答廣則令智退略則意不周我今處中說令義易明了因緣者亦名感應衆生無機雖近不見慈善根力感而自通感應道交故用因緣釋四悉意也約教者應機設教自有權實淺深不同今經開前四味同歸醍醐令見月亡指故用約教釋也本迹者久成為本近成為迹中間本迹展轉相望今唯論開今日之迹顯初成之本故用本迹釋也觀心者夫尋迹迹廣徒自疲勞尋本本高高不可極如數他寶自無半錢但觀己心之高廣扣無窮之聖應機成致感逮得己利故用觀心釋也然前四教各有觀心法門開顯之後同歸圓乘其大旨即不思議境所謂介爾一念之心三千具足即空假中更有各具互具之義以趣舉一法即法界之大都互具各具互融互攝參而不雜離而不分一多自在不相留礙故輔行云學者縱知內心具三千各具義也不知我心遍彼三千彼彼三千互遍亦爾互具義也彼彼者一彼彼佛一彼彼生心佛衆生皆有各具互具之義如帝網珠交徹融攝重重無盡也然此一念所以能爾者以全性起修全修即性故四明云法界圓融不思議體作我一念之心亦復舉體作生九界也作佛佛界也作依器世間也作正五蘊世間也摩訶止觀一部具詮此理此段節要學者不可不留心是為法華三昧也初明四釋義竟二正釋經大科序正流通三分初序品為序分釋序分有通有別從如是去至却坐一面是通序以諸經通有如是等五事故從爾時世尊去至品盡是別序以別序一經故今初通序二一如是等四事二聞持之衆今初如是我聞一時佛住王舍城耆闍崛山中四事中一如是者舉所聞之法體二我聞者能持之人三一時者聞持和合非異時也四佛者時從佛聞也王城耆山者聞持之所也下文與大比丘等第五聞持之衆故云五事冠經首也諸經皆爾故云通序四釋中一因緣釋如是者三世佛經初皆安如是諸佛道同不與世諍世界悉檀也大論云舉時方令人生信者為人悉檀也又對破外道阿歐二字不如不是對治悉檀也阿無歐有一切外經以二字為首以其所計此二為本部內所明不出所計又如是者信順之辭信則所聞之理會順則師資之道成即第一義悉檀也二約教釋者諸經不同如是亦異不應一匙開於衆戶又佛阿難二文不異為如能詮詮所詮為是今阿難傳佛何等文詮何等是不可以漸文傳頓是以偏文詮圓是傳詮若謬則文不如文不如則理不是此義難明須加詳審若云佛明俗有文字真無文字阿難傳佛俗諦文字與佛說不異故名如因此俗文會真諦理故名為是此則三藏經初明如是也若云佛明即色是空空即是色色空空色無二無別空色不異為如即事而真為是阿難傳佛文不異為如能詮即所詮為是此則通教經初明如是也若云佛明生死是有邊涅槃是無邊出生死有邊入涅槃無邊出涅槃無邊入於中道阿難傳此出有入無出無入中與佛說不異為如從淺至深無非曰是此則別教經初如是也若云佛明生死即涅槃亦即中道況復涅槃寧非中道真如法界實性實際遍一切處無非佛法阿難傳此與佛說不異故名為如如如不動故名為是是則圓經初如是也三約本迹釋如是者三世十方橫豎皆爾過去遠遠現在漫漫未來永永皆悉如是何處是本何處是迹且約釋尊最初成道經初如是者本也中間作佛說經今日所說經初如是者皆迹也又阿難所傳如是者迹也佛所說如是者本也又師弟通達如是非始今日亦非中間者本也而中間而今日者迹也四觀心釋者觀前悉檀教迹等諸如是義悉是行人一念心中因緣生法即空假中圓融三觀圓教如是也四番釋如是竟因緣釋我聞者大論云耳根不壞聲在可聞處作心欲聞衆緣和合故言我聞問應言耳聞那云我聞答我是耳主舉我攝衆緣此世界釋也阿難登座稱我聞大衆皆悲號適見如來今稱我聞又文殊結集先唱題次稱如是我聞時衆悲號二竝生戀慕善此為人釋也阿難身與佛相似短佛僅三指一指二寸衆疑釋尊重出或他方佛來或阿難成佛今唱我聞三疑皆遣此對治釋也阿難學人隨俗稱我聞第一義中無我無聞即第一義也次約教者釋論明凡夫三種稱我謂我見我慢及世流布名字我學人無我見但二種無學并無我慢但一種今阿難聞法時是學人無我見能伏我慢但隨世名字稱我無咎此用三藏意釋我也十住毗婆沙云四句稱我皆墮邪見佛正法中無我誰聞此用通教意也大經云阿難多聞士知我無我而不二雙分別我無我此用別教意也不二是登地雙照是地前又阿難知我無我而不二方便為侍者傳持如來無礙智慧以自在音聲傳權傳實有何不可此用圓教釋我也又正法念經明三阿難阿難陀此云歡喜持小乘藏阿難跋陀此云歡喜賢受持雜藏阿難娑伽此云歡喜海持佛藏阿含經有典藏阿難持菩薩藏蓋指一人具四德傳持四法門其義自顯三本迹者若未會入可言阿難隨世名我若發迹顯本空王佛所同時發心方便示為傳法之人何所不能四觀心者觀因緣所生法即空即假即中即空者我無我也即假者分別我與無我也即中者真妙我也四番釋我竟次釋聞一因緣者阿難佛得道夜生侍佛僅二十餘年未侍佛時應是不聞大論云阿難集法時自云佛初轉法輪我爾時不見如是展轉聞當知不悉聞也展轉從他自他別故聞不聞異未聞者樂欲已得聞者生喜即世界悉也舊解云阿難得佛覺三昧力自能聞即為人悉報恩經云阿難求四願所未聞經願佛重說又云佛口密為說也胎經云佛從金棺出金臂重為阿難現入胎之相未聞諸經皆聞即對治悉以聞治不聞也此經云阿難得記即憶本願持先佛法皆如今也即第一義悉二約教者歡喜阿難面如淨滿月眼若青蓮華親承佛旨如仰完器傳以化人如瀉異瓶此傳聞聞法也歡喜賢住學地得空無相願眼耳鼻舌諸根不漏傳持聞不聞法也典藏阿難多所含受如大雲持雨此傳持不聞聞法也阿難海是多聞士自然能解了是常與無常若知如來常不說法是名菩薩具足多聞佛法大海水流入阿難心此傳持不聞不聞法也今經是海阿難持不聞不聞之妙法三本迹者如上四聞皆迹引而本地不可思議以本事高難量故本理深難思故本迹化莫測故四觀心釋者一念因觀緣法是觀聞聞觀空是觀聞不聞觀假是觀不聞聞觀中是觀不聞不聞一念觀者妙觀也四番釋聞竟因緣釋一時者肇法師云法王啓運嘉會之時此世界悉也論云迦羅是實時示內弟子時食時著衣者為人也三摩耶是假時破外道邪見者對治也若時與道合者第一義也約教者若見諦已上無學已下名下一時若三人同入第一義名中一時若登地已上名上一時若初住已上名上上一時今經是上上一時也本迹者前諸一時迹也久遠實得之一時本也觀心者觀心先空次假後中次第觀心也觀心即空即假即中圓妙觀心也此之粗妙各有觀與境合名為一時相即觀者乃今經觀也四番釋一時竟一因緣釋佛者劫初無病劫盡多病長壽時樂短壽時苦東天下富而壽西天下多珠寶多牛羊北天下無我所無臣屬如此時處不感佛出八萬歲時乃至百歲時南天下未見果而修因故佛出其地此世界釋也日若不出池中未生生已等華翳死無疑佛若出世則有剎利婆羅門居士四天王乃至有頂此就為人釋也三乘根性感佛出世餘不能感善斷有頂種永度生死流此就對治說也佛於法性無動無出能令衆生感見動出而於如來實無動出此就第一義說也次約教者佛名覺者知者於道場樹下三十四心斷正使習氣三十四心者輔行引大論云下八地諸惑因時未斷至樹下時乃以九地九品思惑通名為九以九無礙九解脫合為十八見道中八忍八智合為十六心總合成三十四心聲聞見思前後各斷支佛雖見思頓斷習猶未盡故皆不得論三十四心三藏菩薩至樹王下正習俱盡方得論也知覺世間出世間總相別相覺世即苦集覺出世即道滅亦能覺他身長丈六壽八十老比丘像即三藏佛自覺覺他帶比丘像現尊特身一念相應斷餘殘習者即通佛自覺覺他單現尊特相坐蓮華臺受佛職者即別佛自覺覺他隱前三相唯示不可思議如虗空相即圓佛自覺覺他故像法決疑經云或見如來丈六之身藏或見大身小身通或見坐蓮華臺為千百億釋迦說心地法門別或見身同虗空遍於法界無有分別圖即此義也科注云今經正彰開顯開前三教果頭之佛即是圓教法身之佛故三十二相相相無邊即是尊特亦即法身所以龍女讚云微妙淨法身具相三十二三本迹者一佛為本三佛三迹此寄本中體用中間示現數數唱生唱滅皆是迹也唯本地四佛皆是本也迹中體用俱迹本中體用俱本四觀心釋者觀因緣所生心先空次假後中皆偏覺也觀心即空即假即中是圓覺也四番釋佛竟一因緣釋住者能住住所住所住即忍土王城能住即四威儀住世未滅此世界也又住者往十善道住四禪中此為人也又住者住三三昧即對治也又住者住首楞嚴即第一義也次約教者三藏佛從析門發真無漏住有餘無餘涅槃通佛從體門發真無漏住有餘無餘涅槃別佛從次第門入住祕密藏圓佛從不次第門入住祕密藏前三佛住能所皆粗後一佛住能所皆妙今經是圓佛住於妙住也三本迹者三藏佛應涅槃慈悲垂迹生身住世通佛誓願慈悲扶餘習度衆生作佛事別圓佛皆慈悲熏法性愍衆生故垂應法界當知四佛住本佛住以慈悲故住于忍土王城威儀住世是名迹住四觀心者觀住於境或住無常境即空即假即中等境以無住法住於境中故名為住無住之言通于四教粗智謂住於理實無若在圓中便成絶待四番釋住竟一因緣釋王舍城者天竺稱羅閲祗伽羅羅閲祗此云王舍伽羅此云城國名摩伽陀此云不害有罪者送入陰林中無刑殺法也亦名摩竭提此云天羅開國王名以王名國也耆闍崛山此翻靈鷲前佛後佛皆居此山若佛滅後羅漢住法滅支佛住無支佛鬼神住次約教者像法決疑經云一切大衆所見不同或見娑羅林地悉是土沙草木石壁或見七寶清淨莊嚴或見此林是三世諸佛所遊行處或見此林即是不可思議諸佛真實法體例知此義四見不同所住既然能住亦爾三本迹者本住三德大涅槃山迹居靈鷲又本迹各有靈鷲壽量云常在靈鷲山本也示現出沒迹也四觀心釋山者若觀色陰無知如山識陰如靈三陰如鷲觀此靈鷲無常即析觀也觀此靈鷲即空體觀也觀靈即智性了因智慧莊嚴也鷲即聚集緣因福德莊嚴也山即法性正因不動三法名祕密藏自住其中亦用度人下文云佛自住大乘即別圓二觀也四番釋佛住王舍城等竟中者佛無住住中道升中天中日降中國中夜滅皆表中道今處山中說中道也一釋如是等四事竟二釋第五聞持之衆二初列衆二總結列衆三初聲聞衆二菩薩衆三天龍等衆諸經多爾舊云有事有義事者逐形迹親疏聲聞形出俗網迹近如來證經為親故前列天人形乘服異迹非侍奉證經為疏故後列菩薩形不檢節迹無定處既不同俗復異於僧故居中義者聲聞欣涅槃天人著生死各有所偏菩薩不欣不著居中求宗故在兩間釋論意亦爾今初聲聞衆二初比丘衆二比丘尼衆初又二初多知識二少知識初又三一舉類明數二明位歎德三列名總結今初與大比丘衆萬二千人俱與大比丘衆是舉其氣類萬二千人是明其大數與者共義釋論以七一解共謂一時一處世界悉一戒為人一心一見對治一道一解脫第一義大者梵語摩訶此言大亦言多亦言勝器量尊重為天王等大人所敬故言大升出九十五種之上故言勝遍知內外經書故言多又數至一萬二千故言多又直就中觀心性廣博猶若虗空故名大雙遮二邊入寂滅海故名勝雙照二諦多所含融一心一切心故名多也比丘秦言乞士破煩惱能持戒怖魔等天竺一名含此四義秦無以翻故存本稱怖魔者魔樂生死此人出家復化餘人俱離三界乖於魔意魔用力制翻被五縛但愁懼而已故言怖魔破惡者出家人必破身口七惡故言破惡乞士者在家三種如法養命一田二商三仕出家人佛不許此唯乞自濟身安道存福利檀越故名乞士三義相成即比丘義也初受戒修定修慧已有破惡怖魔乞士三義非獨後心依經家皆歎後心比丘耳衆者梵語僧伽此翻和合衆一人二人三人皆不名僧四人以上乃名為僧事和無別衆法和無別理佛常與千二百五十人俱諸經或多少不定今經云萬二千者本是一萬二千菩薩迹為萬二千聲聞也觀心者觀十二入一入具十法界界界具十界即百界一界十如即千如一入具千如十二入即萬二千法門也二明位歎德皆是阿羅漢至盡諸有結心得自在阿羅漢是明位諸漏下是歎德也阿羅漢或言無翻而含三義一無生義不受後有故二殺賊義斷盡見思故三應供義堪為福田故此藏通二教意耳若別圓者非但殺賊亦殺不賊不賊者涅槃是是亦須破是殺賊義言不賊者猶從二乘得名若於圓別尚名為賊是故須破不生於生亦不生不生無漏是不生取無為證生于界外不生是生故不令生非但應供亦是供應供彼所應名為供應如佛化為道人送供于阿蘭若比丘等觀心者空觀是般若假觀是解脫中觀是法身又從假入空觀乃至中道觀殺無明賊不生二邊心供養此人如供養世尊方等經云供佛及文殊不如施行方等者一食充軀此經云毀讚佛罪福猶輕毀讚持經者罪福甚重何以故佛無食想久離八風不為損益施持經者全肉身續報命生法身增慧命故有益毀之憂惱退悔若失好時則不可救故大損也諸漏已盡無復煩惱兩句歎殺賊德漏即三漏也逮得己利句歎應供德三界因果皆名為他智斷功德皆名己利己利具足故成應供盡諸有結心得自在兩句歎不生德諸有即二十五有生處結即二十五有生因心自在則慧必自在定慧具足乃俱解脫人也三列名總結其名曰阿若憍陳如至大阿羅漢等先列名略舉二十一尊者佛諸弟子皆備衆行而隱其圓能各從一德標名欲引偏好故耳憍陳如姓也此翻火器婆羅門種其先事火從此命族增一阿含云我佛法中寬仁博識初受法味者憍陳如為第一世界悉檀夫巨夜長寢無人能覺日光未出明星前現憍陳如初得無生智譬若明星在衆明之始一切人智明無前陳如最先破暗莫過明星一切人暗滅無前陳如故名阿若對治悉檀太子入山學道父王遣五人追侍二是母黨三是父黨二人以欲為淨三人以苦行為淨太子苦行時二人捨去太子捨苦行受飲食酥油暖水三人又捨去太子得道先為五人說四諦陳如最初稱解故名阿若第一義悉僭補注曰首楞嚴經云時憍陳如起立白佛我今長老於大衆中獨得解名因悟客塵二字成果世尊譬如行客投寄旅亭或宿或食宿食事畢俶裝前途不遑安住若實主人自無攸往如是思惟不住名客住名主人以不住者名為客義又如新霽清暘升天光入隙中發明空中諸有塵相塵質搖動虗空寂然如是思惟澄寂名空搖動名塵以搖動者名為塵義佛言如是客塵主空即四諦也客苦塵集主道空滅也昔智者大師望西禮拜求見楞嚴而不得故出於此摩訶迦葉此翻大龜氏亦翻光波亦翻飲光名畢鉢羅婦名婆陀其家大富千倍勝瓶沙王十六大國無以為鄰畏勝王得罪減一耕犁但用九百九十九雙牛金犂又經云其家有氎最下品者直百千兩金以釘釘入地七尺氎不穿破如本不異付法藏言毗婆尸佛滅後塔像金色缺壞時有貧女丐得金珠倩匠為薄金師歡喜治瑩佛畢立誓為無姻夫婦九十一劫人中天上身恆金色心恆受樂故諸天請結集時讚言耆年欲恚慢已除其形譬如紫金柱上下端嚴妙無比目明清淨如蓮華捨家業及金色婦出家身披無價寶衣截為僧伽黎四疊奉佛為座如是三捨世無倫匹佛授糞掃大衣此衣是大聖大衣又大粗重故迦葉云我受佛衣師想塔想未曾頭枕況以覆臥增一阿含云佛法中行十二頭陀難行苦行大迦葉第一梵語頭陀此云抖擻以抖擻十二種過一者在阿蘭若處離憒閙過二者常行乞食離僧中食及受請過三次第乞食離揀擇過四者受一食法離多求過五者節量食離貪味過六者中後不飲果蜜等漿離求欲過七者糞掃衣離好衣過八者但三衣離增減過九者冢間住離常樂倒計過十者樹下止離怖畏過十一者露地坐離貪樹過十二者常坐不臥離煩惱賊過具如十二頭陀經廣明五是住處法五是食法二是衣法佛臨涅槃付以正法眼藏囑其傳持毋令斷絶為西天第一祖又傳金縷僧伽黎法付阿難畢乃持此衣入雞足山入定俟慈氏下生優樓頻螺此翻木瓜林那提此翻河亦翻江伽耶此翻城兄弟三人竝是事火外道因緣出瑞應經及諸部律約教者如增一阿含云優樓頻螺能將護四衆供給四事令無所乏最為第一那提心意寂然降伏諸結精進第一伽耶觀了諸法都無所著善能教化第一是為酪中教意若轉入生酥即應恥小慕大例則可知若轉入熟酥即應委業領教若轉入醍醐如此經中得記作佛也舍利弗此翻身子亦名珠子名優波提舍彰父德也此翻論義智慧第一年十六究盡閻浮提典籍無事不間十六大國論義無雙五天竺地最為第一師事沙然梵志沙然道術身子皆得一日見頞比丘威儀庠序因問師法頞答云諸法從緣生是故說因緣是法緣及盡我師如是說一聞即得須陀洹果來至佛所七日遍達佛法淵海又云十五日後得阿羅漢為羅云和尚憍梵作師聲聞衆中右面弟子調達破僧引五百比丘去身子往化五百歸中阿含云身子是四衆所生母目連是所養母身子問滿慈賢名何等梵行人云何稱汝答我父名滿我母名慈梵行人稱我為滿慈子身子稱嗟善哉賢者滿慈子為如來弟子智辨聰明決定安隱無畏逮大辨才得甘露幢於甘露自作證值汝者得大饒益諸梵行人應縈衣頂戴滿慈問身子賢者何名梵行人云何稱答我父字優波提舍我母名舍利故稱我為舍利子滿慈子嗟曰今與佛等弟子共論而不知興第二世尊共論而不知興法將共論而不知興轉法輪復轉弟子共論而不知若我知尊者不能答一句況復深論善哉善哉為如來弟子乃至縈衣頂戴佛說一句身子以一為本七日七夜作師子吼更出異句異味使無窮盡況佛多說而身子智辨寧可盡耶約教者若三藏智慧即是無學十智斷結證真輔佛揚化釋論稱為右面大將也通教智慧者如般若中自說所以為摩訶薩謂我見衆生見佛見菩提見轉法輪見破如此等見故名摩訶薩此慧異初教也若從元初但聞牛食忍草即出醍醐若能服者衆病皆除一切諸藥悉入其中為修此行即是圓教智慧也本迹者本住實相智度為母從境生智慧境即是身智慧即是子悲愍衆生迹為五味身子欲轉煩惱惡血令成善乳示為外道智慧作大論師欲烹乳為酪示三藏智慧為第二世尊欲引酪為生酥訥大現小受淨名之屈欲引生酥為熟酥安慰饒益同梵行者於般若領教欲引熟酥為醍醐於法華初悟得記斯皆迹中外現而本地內祕其實久矣觀心者一心三觀攝得一切智慧觀心即空故攝得酪智慧觀心即假故攝得兩酥智慧及世智慧觀心即中故攝得醍醐智慧是名觀心中一慧一切慧一切慧一慧非一慧非一切慧大目犍連姓也翻讚誦文殊問經翻萊茯根真諦云勿伽羅此翻胡豆二物古仙所嗜因以命族釋論云舍利弗才明見貴目犍連豪爽取重智藝相比德行互同增一阿含云我弟子中神通輕舉飛到十方者大目連第一釋論四十一稱左面弟子外道師徒五百用呪移山經一月日簸峨已動目連念言此山若移多所損害即於山頂虗空中結跏山還不動外道相謂我法山動計日必移云何安固還若於初必是沙門使爾自知力弱歸心佛道令無量人正法出家也耆域此翻固活生忉利天目連弟子病乘通往問值諸天出園遊戲耆域乘車不下但合掌而已目連駐之域即云諸天受樂忽遽不暇相看尊者欲何所求具說來意答云斷食為要目連放之車乃得前帝釋與修羅戰勝造得勝堂七寶樓觀莊嚴奇特梁柱支節皆容一綖不相著而能相持天福之妙力能如此目連飛往帝釋將目連看堂諸天女皆羞見目連悉隱逃不出目連念帝釋著樂不修道本即變化燒得勝堂赫然崩壞仍為帝釋廣說無常帝釋歡喜後堂儼然無灰煙色往昔曾助辟支佛剃頭浣染縫袈裟發願得神通本迹者本住真際首楞嚴定能於一念遍應十方種種示現施作佛事以慈悲故迹為五味神通引令入極觀心者觀於一心倐有一切心觀一切心倐無諸心心非有無通至實相摩訶迦旃延此翻為文飾應言扇繩亦好肩皆從姓為名僧一阿含云善分別義敷演道教者迦旃延最為第一如長阿含云有外道執斷見謂無他世凡有十番問答外道言無有他世答言若無他世則無明日又問我見人死不還云何說其受苦故知無他世答云如罪人被駐寧得歸不又問若生天何故不歸故知無他世答云如人墮廁得出寧肯更入廁不又天上一日當此百年生彼三五日未遑歸心設有歸者而汝已化寧得知之又問我鑊煮罪人密蓋其上伺之不見神出故知無他世答云汝晝眠時傍人在邊見汝神出否又問我剝死人皮臠肉碎骨求神不得故知無他世答云如小兒析薪寸寸分裂求火寧有可得不又問我稱死人更重若神去應輕若無神去則無他世答云如火與鐵合鐵則輕鐵失火則重人生有神則輕死失神則重又問我見臨死人反轉求神不得故知無他世答云如人反轉求於貝聲寧得聲耶又問汝雖重重破我執此甚久而不能捨答云如人採穭初見麻取麻次捨麻取麻皮次捨麻皮取縷次捨縷取布次捨布取絹次捨絹取銀次捨銀取金捨劣取勝云何不能捨又問非但我如是說諸人亦如是說云何謂我非答云兩商人逢鬼鬼為人像語言前路豐米足草載之何為一商人便棄前路人牛皆饑遂為鬼所噉一商人云若得新米草可棄故米草人牛皆不為鬼所食諸人妄說如鬼誑言汝不納我言如棄故米草今既得新何不棄故又問我不能捨勸我則瞋答曰汝如養豬人路上遇糞頭擎將還在路逢雨汗下汙頭傍人令棄倒更瞋他謂汝不養豬故令我棄反瞋勸者如是番番析破廣演諸義外道便伏而讚歎言尊者前說明日而我已解欲聞智辨故番番執難善哉妙說迦旃延善論義相亦復如是律中云善能教化歸戒令屠受夜戒淫者受晝戒後受報時各於晝夜見前樂相云云約教者依無常苦空無我破斷常見等是初教論義依空無所有不可得破斷常見等是通教論義依總持四辨觀機照假以藥逗病破斷常見等是別教論義依實相畢竟不有不無破斷常見等是圓教論義阿耨樓䭾亦云阿那律亦阿泥盧豆皆梵音奢切耳此翻無貧亦如意佛之堂弟賢愚經云弗沙佛末法時世饑饉有支佛名利吒行乞空鉢無獲有一貧人見而悲悼白言勝士能受稗不即以所噉奉之食已作十八變後更採稗有兔跳抱其背變為死人無伴得脫待暗還家委地即成金人拔指隨生用腳更出取之無盡惡人惡王欲來奪之但見死尸而其所覩純是金寶九十一劫果報充足故號無貧出家已後隨所至處人見歡喜欲有所須如己家無異阿那律精進七日七夜眼睫不交眠是眼食既七日不眠眼則喪睛失肉眼已佛令求天眼繫心在緣四大淨色半頭而發徹障內外明暗悉覩對梵王曰吾見釋迦大千世界如覩掌果增一云我佛法中天眼徹視者阿那律比丘第一約教者依世禪發天眼凡夫外道也依無漏事禪發天眼三藏意依體法無漏慧發諸行依諸行發天眼通教意依散善發肉眼依禪發天眼依真發慧眼依俗發法眼依中發佛眼別教意依實相發天眼天眼即佛眼圓教意劫賓那此翻房宿父母禱房星感子故用房星以名生身也是比丘初出家未見佛始向佛所夜值雨寄宿陶師房中以草為座晚又一比丘隨後而來亦寄宿前比丘即推草與之在地而坐中夜相問欲何所之答見佛後比丘即為說法豁然得道後比丘即佛也辭在阿含可撿取共佛房宿得見法身從得道處為名故言劫賓那毗沙門持蓋隨賓那後毗沙門是宿主主既侍奉星宿亦然此比丘善占星宿明識圖象從解得名名劫賓那增一阿含云我佛法中善知星宿日月者劫賓那比丘第一約教者析破根塵之舍同佛棲真諦之房三藏意體達根塵之舍即空是共如來同宿真諦之房通教意分別十法界根塵房舍悉得見佛別教意於一根塵房舍即見一切房舍見一切佛圓教意憍梵波提此翻牛呞無量壽經稱牛王增一云牛迹昔五百世曾為牛王牛若食後恆事虗哨餘報未夷唼唼常嚼時人稱為牛呞樂在天上不樂人間者牛迹比丘第一又云人但觀形不知有德若笑羅漢即得罪避人笑故常居天上天知有德不笑其形故居天也佛滅度後迦葉集千大羅漢遣下座僧使追憍梵憍梵問佛及和尚答言皆滅即言佛出我出佛住我住佛滅我滅憍梵般提稽首禮妙衆第一大德僧聞佛滅度我隨去如大象去象子隨約教者住天園是示善有牛嚼是示惡三藏意也以牛嚼身得道示惡非惡居天園而牛嚼示善非善通教意也示界內外善惡者別教意示善惡實相者圓教意離婆多亦云離越此翻星宿或室宿或假和合文殊問經稱常作聲父母從星宿乞子既其感獲因星作名雖得出家猶隨本字假和合者釋論云空亭中宿見二鬼爭尸告其分判設依理枉理俱不免害故隨實而答大鬼拔其手足小鬼取尸補之食竟拭口而去常作聲者其疑此事若我本身眼見拔去若是他身復隨我行住疑惑猶豫逢人即問汝見我身不故言常作聲衆僧云此人易度語云汝身本是他遺體非己有也即得道增一云坐禪入定心不倒亂者離越比丘第一約教者析破五陰非我所有三藏意體達五陰本非我有通教意分別十法界五陰皆非我有別教意達五陰非我有非他有見陰實相圓教意觀心者觀心念佛見十方佛多如夜觀星畢陵伽婆蹉此翻餘習五百世為婆羅門餘習猶高過恆水咄小婢駐流恆神為之兩派神往訴佛佛令懺悔即合手小婢莫瞋大衆笑之懺而更罵佛言本習如此實無高心增一云樹下苦坐不避風雨者婆蹉比丘第一約教者滅慢故無慢三藏意即慢無慢通意分別十法界高下別意八自在我具足佛法圓意薄拘羅者此翻善容或偉形或大肥盛色貌端正故言善容也年一百六十歲無病無夭有五不死報後母置熬槃釜中水中魚食刀破皆不死昔持不殺戒故九十一劫命不中夭昔施僧一訶梨勒果故身常無病能持一戒四戒莊嚴堅持不犯不避水火餘人雖持五戒多毀犯也身樂寂靜獨處閒居不樂衆中眼不樂玄黃等色耳不樂聞世間之聲鼻不嗅世間香舌不曾為人說一兩句話意常在禪定不散亂阿育王禮諸羅漢塔次至其塔而說偈言雖自練無明於世少利益供二十貝子增一云施一錢而貝子從塔飛出來著王足諸臣驚怪閒靜少欲乃至其塔猶有是力故增一云壽命極長終不中夭常樂閒居不處衆中拘羅第一約教者滅喧入真三藏寂靜即喧而真通教寂靜離二邊入中別寂靜即邊而中圓寂靜觀心者心性中道即空即假即中常樂我淨觀也摩訶拘絺羅此翻大膝舍利弗母舅由來論勝姊姊孕論則不勝知所懷者智寄辨尚爾何況出胎即棄家往南天竺讀十八經時人笑之纍世難通一生非冀喟然歎曰在家為姊所勝出路為他所輕誓讀不休無暇剪爪時人呼為長爪梵志學訖還家問甥所在人云為佛弟子即大憍慢我甥八歲聲震五竺彼沙門者有何道術誘我姊子徑往佛所思惟良久不得一法入心語佛言一切法不忍忍即安義此言一切法我皆能破使不得安故言一切法不忍佛問汝見是忍不此墮兩負處若我見忍前已云一切不忍若我見不忍無以勝佛即低頭得法眼淨身子扇佛聞舅論得阿羅漢果增一云得四辨才觸難能答拘絺羅第一南方天王毗留匐叉常來隨侍觀心者觀心即空即定即假即慧以嚴其心難陀亦云放牛難陀此翻善歡喜亦翻欣樂有言是律中跋難陀大論云頻婆娑羅王請佛及比丘僧三月安居語放牛人令近處住令日日送乳酪酥等終竟三月王甚憐之令其見佛其乃與諸同輩議云曾聞一切智人即淨飯王子彼生在王宮頗知放牛事不乃入竹園端坐問佛佛為說十一事等具如止觀第二記因發心出家成無學果從本為名故言放牛言善歡喜者從初慕道為名約教者事歡喜理無歡喜三藏意即事歡喜是理歡喜通教意歡喜地即別教歡喜住即圓教孫陀羅難陀孫陀羅此翻好愛亦翻端正難陀如前種姓如那律中說四月九日生短佛四指容儀挺特與世殊異若入衆中有不識者謂言佛來彌沙塞律云摩竭有裸形外道大聰明國人號為智者見者共身子論議結舌善心生欲於佛法出家見難陀色貌姝偉歎云短小比丘智慧難槩況堂堂者乎求出家難陀即度之約教者俗諦有法喜真諦無喜三藏意即俗喜是真喜通教意從通法喜有俗法喜中法喜別教意即通喜具一切法喜圓教意富樓那增一云我父名滿我母名慈諸梵行人呼我為滿慈子此從父母兩緣得名故云滿慈子是人善知內外經書靡所不知就知滿故復名滿善能廣說分別義理滿願子最第一下文云於說法人中最為第一第一者說滿字也欲還本國利益佛言彼國弊惡汝云何答我當修忍若毀辱我我當自幸不得拳毆拳毆時自幸不得木杖木杖時自幸不得刀刃刀刃時自幸離五陰毒器是為行忍滿故名滿七車喻經中說為大智舍利弗所稱歎一切梵行人皆當縈衣頂戴於汝若見汝者得大利益是為歎滿故名滿約教者殷勤析法所作已辦三藏願滿體達即空於空法得證通教願滿法眼具足別教願滿住祕密藏圓教願滿本迹者本願久滿迹為說法第一示衆生知識也觀心如止觀中人行理等善知識觀人是佛菩薩羅漢行是六度道品理是法性實際須菩提此翻空生生時家中倉庫筐篋器皿一切皆空問占者占者言吉因空而生字曰空生亦云善吉常樂遊止閒林石窟寂靜之處所修行業以空為本常入空定住無諍三昧將護衆生不令起礙嫌行即住嫌住即行約教者滅色空智生藏教意體色空智生通教意從有智生空智從空智生俗智從俗智生中智別教意空生即有智亦即俗智中智圓教意阿難此云歡喜或無染淨飯王冀太子為金輪霸其宗社忽棄國捐王憂惱殆絶魔來誑之汝子已死王哭云阿夷語既虗瑞相亦無驗復有天來云汝子成佛王疑未決須臾信報昨夜天地大動太子成佛王大歡喜白飯王奏云生兒舉國欣欣因名歡喜是為父母作字阿難端正人見皆悅中阿含云四衆若聞阿難所說若多若少無不歡喜欲發問時先為謦咳大衆皆歡喜四衆若觀其默行住坐臥指撝處分進止動轉皆歡喜阿難臘月八日佛成道日生侍佛得二十五年推此佛年五十五阿難年二十五佛時求侍五百請為如前說衆勸阿難阿難順從五百皆歡喜目連騰阿難三願佛言預知譏嫌求不受故衣食欲自利益求出入無時佛印而許佛言阿難勝過去侍過去侍聞說乃解今佛未發言阿難已解如來意須是不須是皆悉能知故以法付阿難如來歡喜四天王各奉佛鉢佛纍而按合成一鉢四緣宛然而此鉢大重阿難歡喜荷持無倦中阿含第七云阿難侍佛二十五年所聞八十千犍度皆誦不遺不重問一句念力歡喜阿難隨佛入天人龍宮見天人龍女心無染著雖未盡殘思而不能染一切天人龍神無不歡喜佛滅度後坐師子床迦葉大衆讚曰面如淨滿月眼若青蓮華佛法大海水流入阿難心自誓坐入涅槃住恐離車有怨進恐闍王有怨於恆河中入風奮迅三昧分身為四分一與天一與龍一毗舍離一阿闍世阿育王禮阿難塔奉千萬兩金偈歎曰能攝持法身法燈故法住念盛佛智海故設上供養念持多所聞口出微妙語世尊所讚歎天人之所愛增一云知時明物所至無疑所憶不忘多聞廣達堪任奉持阿難第一約教者歡喜阿難三藏也賢阿難通也典藏阿難別也海阿難圓也羅睺羅此言覆障太子求出家父王不許殷勤不已王言汝若有子聽汝出家菩薩指妃腹却後六年汝當生男在胎六年故言覆障真諦三藏云羅睺本名修羅能手障日月翻此應言障月佛言我法如月此兒障我不即出家世世障我我世世能捨故言覆障佛出家後耶輸有娠諸釋咸瞋何因有此欲治欲殺惡聲盈路寶女劬毗羅證之小差因焚火坑發大誓願我若為非子母俱滅若真遺體天當為證因抱子投坑坑變為池蓮華捧體王及國人始復不疑後佛還國耶輸令羅睺奉佛歡喜丸羅云以幼稚之年於大衆中徑持上佛耶輸以此息謗謗由有子故言覆障祖王歡喜雖失其子而獲其孫為金輪吾亦何恨想其長大冀神寶至而佛索令出家父王不許耶輸將上高樓目連飛空來取佛度出家付舍利弗為弟子既出家已王位亦失故言覆障後時修道殷勤不獲以問佛佛言汝為人說五陰未答言未當為他說說竟又問汝說十二入未說十八界未說法是得道之門若欲得道當為他說法因廣說法竟然後得道既已得道見愛皆除三界生盡佛敕四大羅漢不得滅度待我法滅盡由是住世于今未得入無餘涅槃二總結云如是衆所知識者或言知秪是識或言聞名為知見形為識見形為知見心為識本迹者本為衆生作滿字知識迹為半字知識上來多知識衆竟二少知識復有學無學二千人次列少知識衆有學無學二千人者但舉位明數而不歎德亦不列名呼此為少知識衆耳聖與凡絶交亦不分別多識少識特以希高慕遠者以多識引之藏名隱德退讓者以少識引之隨順衆生故有若干不可以多少之迹失其本學無學者三藏中十八種學人九種無學人通教五地皆名學六地名無學又通教九地名為學佛地為無學別圓中或就功用無功用或就具足未具足明學無學三藏十八種學人等者具如止觀第六記通教學無學位兩節判者前約二乘後約菩薩又前約三乘共位後約獨菩薩約別圓中亦兩節判者前云功用無功用即約地住前後次具不具即等覺妙覺初入無功用亦得名為無學但是分得故更約具足本迹者本法身大士居滿字學無學位衆生應以半字學無學人莊嚴雙樹也觀中道不緣二邊中間即是無學能如是觀是名為學若就觀門明數者觀一心具十法界十如界如互論即具二千僭補曰界如互論者以界論如則有百界千如以如論界則有萬如千界是謂界如互論以足二千之數也初比丘衆竟二比丘尼衆摩訶波闍波提比丘尼至亦與眷屬俱波闍波提此翻大愛道亦云憍曇彌此翻衆主尼者天竺女人通名也本住智度法門迹為千佛之母生育導師大報恩經云佛姨母憍曇彌求於佛法中出家佛不聽許心懷悵恨憂悲苦惱即出祇洹悲淚滿目阿難見之乃白佛言憍曇彌母人者乳哺養育如來色身至今得佛母人於如來有大恩分如來尚許一切人入佛法中況於母人而不聽許佛言若聽女人入佛法正法當漸微漸減於五百歲故不聽許阿難重白佛言過去諸佛皆具四衆而世尊獨不具耶佛告阿難若憍曇彌愛樂佛法能修八敬之法聽入佛法憍曇彌聞是語已心大歡喜如來即為宣說八敬之法憍曇彌言世尊願不有慮當令奉行假使喪失身命亦不退失八敬法者一尼百歲禮初夏比丘足二不得罵謗比丘三不得舉比丘過四從僧受具戒五有過從僧懺六半月從僧請教誡七依僧三月安居八夏訖從僧自恣又以大悲熏心請云未來惡世之中有善女人信樂佛法者惟願聽許入佛法中佛言善哉若有女人護持佛法漸次修學戒施多聞及諸善法者皆悉聽許觀釋者中觀廣博名大無緣慈名愛中理虗通名道大即自行愛即化他如以愛故受生慈故涉有道即通自行化他也六千者數也觀門者觀六根清淨各具千功德雖眼鼻身各八百耳舌意各千二百以多足少數滿六千亦是觀行意也羅睺羅母耶輸陀羅者以子標母此翻華色亦曰名聞溫良恭儉德齊太子然在家為菩薩之妻天人知識出家為尼衆之主位居無學豈是無名聞衆耶十二遊經出三夫人第一瞿夷二耶輸三鹿野未曾有及瑞應皆云羅睺是瞿夷子涅槃及法華皆云是耶輸子二義云何通或可彼經舉大母此處舉所生釋論云瞿毗陀是寶女不孕即是瞿夷此翻明女故知定是耶輸子也本迹者妻則齊也豈有博地為太子妻故知本住寂定微妙法喜迹為佛妻悲華云寶藏佛所誓願為妻耳上來當分各明本迹觀心更有總論顯善權曲巧明觀行精微茲不具録樂多聞者宜自撿之初聲聞衆竟二菩薩衆者釋論云菩薩為出家在家四衆攝何故別列答有菩薩墮四衆中有四衆不墮菩薩中為其不發心作佛故今別列同發心求作佛者名菩薩衆文為三初氣類大數二明位歎德三列名總結今初菩薩摩訶薩八萬人氣類者即是菩薩摩訶薩也若具存應言菩提薩埵摩訶薩埵什師嫌煩略提埵二字菩提此言道薩埵此言心摩訶此言大此諸人等皆求廣博大道又成熟衆生故道心大道心之氣類也菩薩多種謂偏通別圓如釋論引迦旃延子明六度齊限而滿者此欲調血衆生為乳也若大品明有菩薩發心與薩婆若相應者此欲調乳入酪也若大品明有菩薩發心遊戲神通淨佛國土又如淨名中得不思議解脫者皆能變身登座而復受屈被訶者此欲調酪為生熟酥也若大品明有菩薩發心即坐道樹成正覺轉法輪度衆生者此是調酥為醍醐也故下文云菩薩聞是法疑網皆已除又云若菩薩不聞法華非善行菩薩道若聞此經即善行菩薩道又涅槃云菩薩不聞涅槃常有希望若聞涅槃希望都息故略有四種也本迹者本地難測或居等覺或齊法王如善財入法界見文殊色像無邊法門深遠本鄰諸佛迹輔釋迦為菩薩普現色身三昧力散影垂容以口輪不思議化隨宜廣說可以智知不可以言辨也或齊法王者如文殊本是龍種上尊王佛餘竝準知所以迹引四味歸乎一實譬如鎚鍖器諸淳朴譬中云槌砧者化主為槌輔者為砧乃至互為皆為成器本為古質為淳朴今以未治為淳朴令其成器故名為器淳朴不一故名為諸成醍醐已一期化息然其本地究竟成就豈是今日始入大乘亦非寂滅道場高山先照若頓若漸皆迹所為耳觀解者中道觀心雙照二諦名大通至菩提果名道破五住塵勞名成衆生八萬人者數也餘經集衆甚多此經何少或是語其大數或譬王論密事不可率土同謀觀心者約八正道一道觀十善一善具百界千如十善具千界萬如是一萬衆一道既爾餘七道亦然共成八萬是為觀心不思議也二明位歎德皆於阿耨多羅三藐三菩提至能度無數百千衆生皆於阿耨三菩提不退轉者明位也阿耨菩提此云無上正等正覺不退轉者地師云十住是證不退十行是位不退十回向是行不退十地是念不退此是別教義不會此經今所不用瓔珞云初地三觀現前心心寂滅自然流入此亦別教不退今亦不用若華嚴明初住得如來一身無量身具三不退此圓教不退此是一實事今用此判位也本迹者本地寂滅尚非十地況是初住尚非初住不退況復別通別通之位宜釋餘經列衆圓教之位正在今經諸經論師既不識迹安能知本所歎既謬毀在其中還成增減兩謗何謂歎德觀心者三觀即三不退又一心三觀即一心三不退舊云皆得陀羅尼始是歎德今取不退轉即具兩意成上屬明位起後屬歎德歎德作十二句分為四意初三句歎現德次三句歎往行次四句歎內體後兩句歎外名四意不同而德居於初故稱歎德今以十三句作橫豎消文一豎約十地義便二橫約初住義便不退轉者成前即是明位起後即是歎德以對初地初地名歡喜喜其不退墮二邊入中道獲三不退故知歎初歡喜地也皆得陀羅尼歎二地二地名離垢亦名離達離遮諸惡達持衆善即陀羅尼義故知歎離垢地也樂說辨才歎三地三地名明地內智明外說辨欲知智在說說有種種樂說最勝故知歎第三明地也轉不退轉法輪歎四地四地名𦦨𦦨能破暗又能焦炷轉法輪自害己惑如焦炷破迷他如除暗故知歎第四𦦨地也供養百千諸佛歎五地五地名難勝地此地得深禪定用神通力難勝難及於一念頃遍至十方供養諸佛故知歎第五地也於諸佛所植衆德本歎六地六地名現前由得禪能供養諸佛福資種智種智現前智是德本如植種於地故知歎第六地也常為諸佛之所稱歎歎第七遠行地此地二智方便出過一切廣修利益稱會佛心故知歎第七地也以慈修身歎第八不動地正智不動不出三界但以慈熏身應入五道熏口為說法熏心為設方便正法華具熏三業故知歎第八地也善入佛慧歎第九地九地名善慧深入實際妙徹本源此名義最合故知歎第九地也通達大智歎第十地十地名法雲法身如虗空禪定如大雲智慧如大雨善入佛法名慧巧用佛法名智互舉耳到於彼岸歎十地內德到三諦之彼岸因中說果又到在不久也名稱普聞歎十地外德由內德深廣致令聲名普聞內外相稱若開等覺位者此二句擬之能度百千衆生者餘地度人或一界至九界不名能度十地勝前故稱能度諸地悉具衆功德而今出沒釋者為人情好異故依十地名便故又豎義易解故作此一途消文耳次橫歎者直約初住說之餘位位例可解初發心住一發一切發出過二邊革凡超聖入於中道其心寂滅念念流入薩婆若海故言得不退轉初住遮離取相無知無明等障持達般若解脫法身等德故言得陀羅尼十信似解尚能以一音遍滿三千界何況初住真解口密功德故言樂說辨才初住能分身百世界作佛論其實處無量無邊以能作佛說法教化故言能轉不退法輪初住得不思議神力遍能承事法界諸佛故言供養百千諸佛初住得實相本能植衆德也初住開佛知見知見己法與諸佛同故為佛之所稱歎初住無緣慈普現色身遍應法界故言以慈修身初住入祕密藏故言善入佛慧初住一心三智無能障礙故云通達大智初住事理分究竟故言到於彼岸初住圓德真實與名相稱故言名稱普聞諸佛世界初住能為十法界而作依止安立救護故言能度百千衆生初住更有無量無邊不可思議種種功德略言十三句耳二住去乃至等覺亦復如是故大品云初阿字門具四十一字功德後荼亦具諸字功德中間亦爾字等語等功德亦等問此中歎斷惑德三藏不斷惑可不被歎迹為通別何不歎德答今經正明圓人不歎方便耳三列名總結其名曰文殊師利至如是等菩薩摩訶薩八萬人俱列名者大士大名或從法門或從行德或從本願雖是一名備無量義今依經依觀銷十八菩薩名文殊師利此云妙德大經云了了見佛性猶如妙德等無行經云滿殊尸利普超云濡首思益云雖說諸法而不起法相不起非法相故名妙德悲華云願我行菩薩道所化衆生皆於十方先成正覺令我天眼悉皆見之我之國土皆一生菩薩悉令從我勸發道心我行菩薩道無有齊限寶藏佛言汝作功德甚深甚深願取妙土今故號汝名文殊師利在北方歡喜世界作佛號歡喜藏摩尼寶積佛今猶現在聞名滅四重罪為菩薩像影響釋迦耳觀心性理三德祕密不縱不橫故名妙德觀世音者無量壽經梵語廅婁亘思益云若衆生見者即時畢定得於菩提稱名者得免衆苦故名觀音悲華云若有衆生受苦稱我名者念我者為我天耳天眼所見聞不得免苦不取正覺寶藏佛云汝觀一切衆生生大悲心今當字汝為觀世音此下文自釋名下文指普門品觀心釋者三智名觀三諦名世三觀是語本故名音得大勢者無量壽經梵語摩訶那鉢思益云我投足之處震動三千大千世界及魔宮殿故名大勢至悲華云願我世界如觀世音等無有異寶藏佛言由汝願取大千世界故今當字汝為大勢至觀心釋者三止為足投三諦地動十法界一切見愛所住之處皆悉傾動常精進者大寶積云是菩薩為一衆生經無量劫隨逐不捨猶不受化無一念棄捨以身心俱進故不休息者思益云恆河沙劫為一日夜是三十日為月十二月為歲過百千萬億劫得值一佛如是值恆河沙佛行諸梵行修習功德然後授記心不休息故名不休息觀心者觀空不住空出假不住假而入中不住中雙照二諦名不休息寶掌者普超云被上德鎧乃至佛無能沮敗今是大乘若於夢中不志二乘常以實心諸通慧心為人講宣於諸珍寶心無所貪惜故名寶掌觀心者不思議三諦名之為寶一心三觀名之為掌以此觀掌執此諦寶自利利他故云寶掌藥王者悲華云願賢劫一千四佛初成道我皆供養諸佛入滅我皆起塔劫盡苦惱我皆救護刀兵疾疫作大醫王然後作佛寶藏佛言今當字汝為火淨藥王在後作佛即樓至如來火淨者從燒身立名文中且以世治表出世治勇施者出世法寶遍施衆生而無疲厭故名勇施寶月者所證三諦可尊如寶能證三智圓照如月故名寶月月光者圓妙三智能除昏煩熱惱猶如月光清涼破暗故名月光滿月者三智圓明無有缺減猶如滿月故名滿月大力者智境冥合有大力用故名大力無量力者以大力用遍應衆緣遍拔衆苦故名無量力越三界者以一心三觀超越分段變易二種生死故名越三界也勇施至越三界此七位菩薩文句未檢經闕疑未釋今依科注引補注略釋於此跋陀婆羅者此言善守亦云賢守思益云若衆生聞名者畢定得三菩提故名善守觀解者中道正觀於諸善中最為上首故言善守彌勒者此云慈氏思益云若衆生見者即得慈心三昧故名慈氏賢愚云國王見象師調象即慈心生從是得名慈氏悲華云發願於刀火劫中擁護衆生觀解者中道正觀即是無緣大慈慈善根力令諸心數皆入同體大慈法中離諸不善故名慈氏又云慈乃姓也名阿逸多此翻無勝下文云云寶積者積聚一心三智之寶導師者思益云於墮邪道衆生生大悲心令入正道不求恩報故名導師觀解者三觀妙智導一切行不墜二邊皆入正觀故名導師如是下是結數也二菩薩衆竟三天龍等衆八一欲界天衆爾時釋提桓因至與其眷屬三萬天子俱釋提桓因因陀羅者或云栴提羅此翻能作作忉利天主忉利此翻三十三四面各八城就喜見城合三十三共居須彌頂須彌此翻安明四寶所成高廣三百三十六萬里此是欲天之主故前列雜阿含四十云有一比丘問佛何故名釋提桓因答本為人時行於頓施堪能作主故名釋提桓因何故名富蘭陀羅本為人時數數行施故何故名摩伽婆本為人時名故何故名娑婆羅本為人時此衣布施故何故名憍尸迦本為人時姓故何故名舍脂鉢底舍脂是婦鉢底是夫何故名千眼本為人時聰明於一時坐思千種義觀察稱量故名千眼何故名因提利為三十二天主瓔珞第三云天帝名拘翼教門者阿含中帝釋是阿那含般若明十方難問般若者皆名釋提桓因別圓中明釋提桓因得首楞嚴三昧內證不同過賢劫二千二十四劫作佛號無著世尊本迹者十住行向即三十十地為一等覺為二妙覺為主同棲第一義天共服實相甘露即本也居須彌頂迹也觀心解者自行十善勸他隨喜此三十善皆空皆假皆中即是三十三觀門也共服甘露者大經第六四依品云如三十三天有妙甘露不死之藥譬初住已上理同也明月等三天子是內臣如卿相或云是三光天子明月是寶吉祥月天子大勢至應作普香是明星天子虗空藏應作寶光是寶意日天子觀世音應作此即本迹釋也觀解者三觀即三智三智即三光從三諦生三智諦即天智即子明月等本迹竝出正法華四大天王者帝釋外臣如武將也居四寶山高半須彌廣二十四萬里東提頭賴吒此云持國亦言安民居黃金山領二鬼犍闥婆富單那南毗留勒叉此云增長亦云免離居琉璃山領二鬼薜荔多鳩槃茶西毗留博叉此云非好報亦云惡眼亦云雜語居白銀山領二鬼毒龍毗舍闍北毗沙門此云種種聞亦云多聞居水精山領二鬼羅剎夜叉各領二鬼不令惱人故稱護世本迹者本為常樂我淨四王護持佛法不令外人取其枝葉斫截破壞常王護東方常無常雙樹樂王護南方樂無樂雙樹我王護西方我無我雙樹淨王護北方淨不淨雙樹枝幹喻常華喻於我果喻於樂茂葉喻淨護此華果常能利益一切衆生故迹為四王而護世也觀解者觀四諦智即是四王一諦下除愛見二惑即是護八愛見也次忉利上有𦦨摩此翻善時大論云妙善去忉利三百三十六萬里善時上有兜率陀此翻妙足去𦦨摩如前地遠而不列者略耳何者下天鈍上天著樂尚知來集況不著不鈍而不來耶自在即第五大自在即第六自化五欲他化五欲云云有人言是色界頂大自在此不應超至彼也觀心者入空是自在觀入中是大自在觀二色界天衆娑婆世界主梵天王至與其眷屬萬二千天子俱娑婆此翻忍其土衆生安於十惡不肯出離從人名土故稱為忍悲華經云云何名娑婆是諸衆生忍受三毒及諸煩惱故名忍土亦名雜雜九道共居梵者此翻離欲除下地繫上升色界故名離欲亦稱高淨尸棄者此翻為頂髻又外國喚火為樹提尸棄此王本修火光定破欲界惑從德立名然經標梵王復舉尸棄似如兩人依釋論正以尸棄為王今經舉位顯名恐目一人耳住禪中間內有覺觀外有言說得主領為王單修禪為梵民加四無量心為王也初禪有梵衆梵輔大梵今舉王攝諸也光明者二禪也此有少光無量光光音三禪有少淨無量淨遍淨四禪有密身亦無罣礙無量密亦受福密果亦廣果無想密亦無想又有五那含不煩不熱善見善現及色究竟亦大自在即摩醯首羅經文存略不具但等等此諸天也例有教門本迹觀心思之三龍衆有八龍王至各與若干百千眷屬俱難陀名歡喜跋名善兄弟常護摩竭提雨澤以時國無饑年瓶沙王年為一會百姓聞皆歡喜從此得名即目連所降者也居海中本迹解者本住歡喜地迹居海間觀解者三觀即中道生法喜也娑伽羅從居海受名華嚴所稱舊云因國得名本住智度大海迹處滄溟和修吉此云多頭亦云寶稱居於水中本住普現色身三昧迹示多頭也顴者入假之顴分別無量法門也德叉迦此云現毒亦云多舌或云雨舌本住樂說無礙辨法門迹示多舌阿那婆達多從池得名此云無熱長阿含十八云雪山頂有池名阿耨達池中有五住堂從池為名龍王常處其中閻浮提諸龍有三患一熱風熱沙著身燒皮肉及骨髓以為苦惱二惡風暴起吹其宮殿失寶飾衣等龍身自現以為苦惱三諸龍娛樂時金翅鳥入宮搏撮始生龍子食之怖懼熱惱此池無三患若鳥起心欲往即便命終故名無熱惱池也本住清涼常樂我淨迹處涼池觀者三觀妙慧淨五住之煩唼免二死之熱沙摩那斯此云大身或大意大力等修羅排海淹喜見城此龍縈身以遏海水本住無邊身法門迹為大體觀者中道正觀其性廣博優鉢羅此云黛色蓮華池龍依住從池得名本住法華三昧迹居此池觀者三觀即是修因因即蓮華也正法念經云龍為諸天保境修羅興兵前與龍鬬故知為天所管也四緊那羅衆有四緊那羅王至各與若干百千眷屬俱亦云真陀羅此云疑神似人而有一角故號人非人天帝法樂神居十寶山身有異相即上奏樂佛時說法諸天弦歌般遮于瑟而頌法門舊云法緊奏四諦妙緊奏十二因緣大緊奏六度持緊總奏前三今言奏四教法門也本住不可思議不起滅定安禪合掌以千萬偈讚諸法王迹寄弦管歌詠十力觀者觀音聲即空即假即中隨順三諦即是讚佛也五乾闥婆衆有四乾闥婆王至各與若干百千眷屬俱乾闥婆此云嗅香以香為食亦云香陰其身出香此是天帝俗樂之神也樂者幢倒伎也樂音者鼓節弦管也美者幢倒中勝品者美音者弦管中勝者也幢謂緣幢即竿木也倒謂擲倒等也六阿修羅衆有四阿修羅王至各與若干百千眷屬俱阿修羅者此云無酒四天下採華醞於大海魚龍業力其味不變瞋妒誓斷故言無酒神亦云不端彌天安師云質諒質諒直信也此神諂曲不與名相稱有二種鬼道攝者居大海邊畜生道攝者居大海底婆稚者此云被縛或云五處被縛或云五惡物繫頸不得脫故云被縛亦云有縛為帝釋所縛本能五繫繫魔外道迹為此像耳正法華云最勝觀者以三觀智縛五住惑入實際中佉羅騫䭾此云廣肩胛亦云惡陰涌海水者正本云寶錦本住權實二智慈荷衆生故迹為廣肩胛觀者三觀能鼓覆五住生死大海也正本者正法華耳毗摩質多此云淨心亦云種種疑波海水出聲名毗摩質多即舍脂父也觀佛三昧云光音天生此地地使有欲入海洗不淨墮泥變為卵八千歲生一女千頭少一二十四手此女戲于水水精入身八千歲生一男二十四頭千手少一海水波音名為毗摩質多索乾闥婆女生舍脂帝釋業力令其父居七寶殿納為妻後讒其父遂交兵腳波海水手攻喜見帝釋以般若呪力不能為害正本云燕居本者色心本淨迹為此名觀者正觀中道即是淨心羅睺羅此云障持障持日月者也是畜生種身長八萬四千由旬口廣千由旬寶珠嚴身觀天女天園林若四天下人孝養父母供養沙門者諸天有威力上空雨刀若不爾諸天入宮不出又日放光照其眼不能得見舉手掌障日世人咸言日蝕掩月亦如是或作大聲世人言天獸吼怖日月時倍大其身氣呵日月日月失光來訴佛佛告羅睺莫吞日月羅睺支節戰動身流白汗即放日月日月力衆生力佛力衆因緣故不能為害昔有婆羅門聰明廣施四千車載食於曠野施有一佛塔惡人所燒即以四千車載水滅火救塔歡喜發願願得大身欲界第一既無正信好鬪愛戰喜施故生光明城作羅睺羅修羅王也正本云吸氣本觀云云本觀云云者本住第一義天而迹示非天觀者一心三觀即空即假即中常住寂光而示非天之天七迦樓羅王有四迦樓羅王至各與若干百千眷屬俱迦樓羅此云金翅翅翮金色居四天下大樹上兩翅相去三百三十六萬里有人言莊子呼為鵬鵬行衆鳥翼之亦稱為鳳凰私謂鳳不踐生草噉竹實棲乳桐金翅噉龍云何是類大威德者威勝羣輩又威攝諸龍也正本云具足大身者大羣輩也大滿者龍恆充滿己意也如意者頸有此珠也正本云不可動迦樓鳥有神力雄化為天子雌變為天女化己住處有寶宮亦有百珠而報須食龍胎能噉胎不能噉三卵能噉二濕能噉三化能噉四觀佛三昧經云正音迦樓一日山東噉一龍王五百小龍三方亦爾周而復始壽八千年臨終失勢欲噉龍子龍母嘇𭋣之不得食即瞋從金剛山透海穿地輪過不能過風輪風彈之從故孔涌到金剛山如是七返還山頂命終肉裂火起將燒寶山難陀雨雨滅之肉爛以衝風輪亦七返墮山上成如意珠龍得之即為王人王亦有感此珠者八人衆韋提希子阿闍世王與若干百千眷屬俱韋提希母也翻思惟頻婆娑羅此翻模實父也阿闍世云未生怨大經云阿闍名不生世名怨以不生佛性故則煩惱怨生煩惱怨生故不見佛性不生煩惱即見佛性又阿闍名不生世名世法以世八法所不汙八風故名阿闍世此是本義也普超經云阿闍世從文殊懺悔得柔順忍命終入賓吒羅地獄即入即出生上方佛土得無生忍彌勒出時復來此界名不動菩薩後當作佛號淨界如來其迹既爾本豈可量觀解者貪愛母無明父害此故稱逆逆即順也行於非道通達佛道問佛在人中說法列人衆何少答文略不載人實不少文云及諸小王轉輪聖王等無量義中列四輪王國王國臣國民士女其衆則廣問天人龍鬼皆見佛聞法地獄一道無色一界何意不列答此義今當辨夫諸道升沉由戒有持毀見佛不見佛由乘有緩急然持戒有粗細故報有優劣持乘有大小見佛有權實且略判戒乘各為三品依涅槃一句開為四句釋之其義則顯一戒乘俱急二戒緩乘急三戒急乘緩四戒乘俱緩若通論戒乘一切善法一切觀慧皆得稱戒亦皆是乘人天五乘即是其義道共等戒悉是通意也今就別判三歸五戒十善八齊出家律儀乃至定共能防身口遮惡道果得人天報者名之為戒若聞經生解觀智推尋四諦十二緣六度生滅無生滅等智能破煩惱運出三界者名之為乘故大品云有相之善不動不出無相之善能動能出即此義也若戒乘俱急者持下品戒戒急報在人中持小乘乘急以人中身於三藏教時見佛聞法持中乘乘急以人報身於通教大乘乃至帶方便諸大乘經時見佛聞法持上乘乘急以人報身於華嚴法華等教及諸教中圓見佛聞法預列為同聞衆者是也若持中品戒急報在欲界天持小乘乘急以欲界天身於三藏時見佛聞法餘如上說若持上品戒急加修禪定報在色無色天等持小乘乘急以色無色天身於三藏中見佛聞法餘如上說釋第一句竟若戒緩乘急者三品戒皆緩報墮三途持小乘乘急以三途身於三藏中見佛聞法餘如上說釋第二句竟若戒急乘緩者三戒急故受欲界人天及色無色天身三乘緩故佛雖出世說三乘法愛著樂報耽荒五欲不見佛不聞法舍衛三億家及諸不見聞者三界著樂諸天等是也釋第三句竟若戒乘俱緩者受三途報不見佛不聞法也釋第四句竟此文不列地獄者以其戒緩苦重報隔上乘又緩不能於法華見佛聞法餘經有列者餘乘急耳又不列無色天者上戒急故受天身著定味上乘緩故不能於法華見佛聞法餘經有列者有餘乘急耳若得此意一一勘天龍八部皆識本緣緩急來不來義悉可解將此勘己觀行三世因果朗然可識二總結衆集各禮佛足退坐一面各禮佛足者總結衆集也通序已竟爾時世尊下訖品名別序別序本經也文為五一衆集二現瑞三疑念四發問五答問此五序序正中四一衆集敘人一現瑞敘理一疑念敘行一問答敘教一此則因緣釋也約教者此序序正非三藏非通非別乃是序於圓正耳約本迹者若以序序壽量中本地四一者此義自可知不復記此序顯表迹四密表本四久成不逾此四故也久近雖殊四一理等觀心可解云云觀心云云者以皆表一理觀易彰一心三諦理一也一心三觀行一也作是觀者人一也能詮觀境教一也約六即位位位四一於念念中念念四一一色一香無非四一如此觀行真法華三昧也今初衆集序爾時世尊四衆圍繞供養恭敬尊重讚歎上二句是衆集威儀下二句是衆集供養爾時者即衆雲集時也四衆者舊云出家在家各二合為四衆此名局意不周今約一衆更開為四謂發起衆當機衆影響衆結緣衆發起者權謀智鑒知機知時擊揚發動成辦利益如大象躃樹使象子得飽所謂發起令集發起瑞相乃至發起問答等皆名發起衆舉喻者大權象王躃法身樹至起應地演一乘之實唱飽抄行之機緣當機者宿植德本緣合時熟如癰欲潰不起于座聞即得道此名當機衆影響者古往諸佛法身菩薩隱其圓極匡輔法王如衆星繞月雖無為作而有巨益此名影響衆影響衆者然化主形聲必資伴以影響方令發起擊動事遂如響之應聲影之隨形結緣者力無引導擊動之能德非伏物鎮嚴之用而過去根淺覆漏汙雜三慧不生現世雖見佛聞法無四悉檀益但作未來得度因緣此名結緣衆覆漏等者覆字入聲無聞慧故如器現覆無思慧故如器已漏無修慧故如器汙雜如器雖仰而全以汙雜故為用者棄故總結云三慧不生現世等者現雖得聞而不名慧聞慧尚無思修安有此即五千起去之流雖無三慧然納種在性得為繫珠故知亦無觀行位中世界益也故云無四悉檀益準此分位四悉俱得名為當機故五品已來世界益也六根已來為人對治益也初住已來第一義益是故下文隨喜品末尚成當機一句一偈結緣衆耳然聞略說則有過於一句一偈是則不論聞之多寡但未入品俱名結緣故五品前無復三慧四悉益也比丘衆既爾餘三衆亦然合十六衆類如大通智勝佛時王子覆講即彼時發起衆聞法得道即彼時當機衆聞法未度而世世相值于今有住聲聞地者即彼時結緣衆彼佛世時尚有四四十六衆今佛道同寧得無耶此是圓教十六衆約三教亦例可知本迹可解本迹可解者若且約體用則本住尊極或深位法身迹為四教一十六衆觀心者研境作觀在名字位中即成結緣衆入觀行相似位即成當機衆入分真位即成發起影響衆圍繞者佛初出世人未知法淨居天人化為人像到已右旋旋已敬禮禮已却坐聽法因於天敬人以為楷此因緣解也圍繞者行旋威儀也表四門機動俱見圓理以圓對偏例有四義即教門解也又佛身周匝相好莊嚴四旋瞻仰增念佛定即觀心解也若觀佛色身得見法身即本迹解約觀解者三教觀行猶如行旋皆成圓觀即如念佛三身一身也供養者通三業皆是供養別論卑謹虔禮名恭敬至念專注名尊重發言稱美名讚歎施其依報名供養此中文略具辨應如無量義經廣說天厨天香天鉢等即是供養大莊嚴菩薩及八萬大士合掌叉手即是恭敬一心瞻仰即是尊重說七言偈即是讚歎今論衆集指彼文者彼經衆集說法竟儼然不散即彼座席仍說法華故知三業供養不得有異用彼廣釋此略於義無咎第一衆集序竟第二現瑞序文云今相如本瑞瑞秪是相耳分二初此土六瑞二他土六瑞初中六初說法瑞二入定瑞三雨華瑞四地動瑞五衆喜瑞六放光瑞今初為諸菩薩說大乘經名無量義教菩薩法佛所護念說大乘經者善戒經有七大一法大謂十二部毗佛略也毗佛略方等也二心大謂求於菩提也三解大謂解菩薩藏也四淨大謂見道淨心五莊嚴大謂禪德智慧也六時大謂三僧祗行行也七具足大謂以相好自嚴得菩提也六是因大七是果大大因大果合為大乘經也無量義者法華論列十七種皆法華之異名無量義即法華之一名也今申論意佛直說此名而入此定故得為序大品金光明涅槃皆先唱名於序無妨今經文殊引古佛亦名無量義又云當說大乘經名妙法蓮華此亦序中唱名與論意同也今按彼經釋無量義者從一法生其一法者所謂無相無相不相名為實相從此實相生無量法所謂二法三道四果今釋此文無相者無生死相也不相者不涅槃相也涅槃亦無故言不相無相指中道為實相也二法即頓漸頓謂華嚴頓中一切法也漸謂三藏方等般若一切法也三道即三乘四果即羅漢支佛菩薩佛此等諸法名為無量實相為義處從一義處出無量法從無量法入一義處作序譬如算師從一算下諸算除諸算歸一算由下故除下為除序從一派諸收諸歸一開為合序亦復如是如此消釋不違彼經論亦與此經合教菩薩法者無量義處用教菩薩也義處即諦理也下文普令一切衆亦同得此道又云若我遇衆生盡教以佛道即此意焉佛所護念者無量義處是佛自所證得是故如來之所護念下文云佛自住大乘也雖欲開示衆生根鈍久默斯要不務速說故言護念二入定瑞佛說此經已至身心不動佛說經已入無量義處三昧者慧定相成非禪不智須先入定非智不禪故先說法即智而定即定而智先後入出無有隔礙疑者云若未說無量義而入斯定說此經已何故入定答先入此定後說此經常途可解說此經竟而更入者是為法華作序耳何者若不先開則後無所合先入開定為合定作序稱為瑞相即此義焉身心不動者與所緣之處相應也身之本源湛若虗空心之理性畢竟常寂大通智勝身體及手足靜然安不動其心常憺怕未曾有散亂身若金剛不可動轉心若虗空無有分別問瑞相本論奇異說法入定佛之恆儀何得為瑞答說法雖竟時衆不散肅有所待故知前之說法舉衆來集待於後聞此事奇特與常說異何意非瑞雖入開定意在合定與常入定有異何意非瑞相耶又文殊引古佛六瑞皆有此事若昔非瑞相何以證今今古同然豈可以凡情而非之耶三雨華瑞是時天雨曼陀羅華至及諸大衆四華舊翻白大白赤大赤戒翻適意大適意柔軟大柔軟今言雨華明其昔因非佛因三藏中因是二乘因通中因是共因別因是菩薩因皆非佛因今天雨華報其當獲佛因佛因者即四輪因也小白表銅輪習種性十住開佛知見也大白表銀輪性種性十行示佛知見也小赤表金輪道種性十回向悟佛知見也大赤表琉璃輪聖種性十地入佛知見也四輪皆同是因是因由中而生故從天而雨由是因位故以華表之但因有趣果之義故而散佛上如此因果誰當感尅秪是此會時衆故言及諸大衆也下文殊釋疑次大法蠡等四句又正說中開示悟入又與大車中遊於四方節節相承皆是位義故知華表因位也問四輪是別位義那得釋圓位耶答名通義圓尚無所失況名別義圓而不得耶問答中意者借別顯圓言借別者圓非無位借於次第高下以顯不次平等耳此之借義請後學在心以此宗學者或時亦迷瓔珞四輪是借別義若論圓位六即亦足何須更列四十二耶以分真位長故借別位分其品秩譬虗空體一而飛者淺深玄文尚用名通義圓況名別義圓耶四地動瑞普佛世界六種震動釋地六種動表圓家六番破無明無明盤未曾侵毀方將破壞故動地以表之無明若轉即變為明故普佛世界六種震動也六種表住行向地等妙六番也優婆塞清淨行經云菩薩生時動地示此生已盡無復煩惱一切衆生應得道者煩惱將滅故動即此義也本迹解者如文殊釋疑引古佛為答密得此意即是識本非謂他佛昔現斯瑞而我世尊本亦斯瑞非今一反也觀行者動六根也地相堅固如六根冰執未曾入大乘之道動難動之地表淨未淨之根東涌西沒者東方青主肝肝主眼西方白主肺肺主鼻此表眼根功德生鼻根煩惱互滅鼻根功德生眼中頌惱互滅餘方涌沒表餘根生滅亦復如是六動者動起涌震吼覺一一中又有三謂動遍動等遍動直動為動四天下動為遍動大千動為等遍動餘五亦如是合十八種動此即表淨十八界也言表根者眼鼻已表於東西耳舌理對於南北中央心也四方身也身具四根心遍緣四故以心對身而為涌沒謂中涌邊沒邊涌中沒可表六根及十二入也復有六動者義兼十八於六中前三是形後三是聲形實聲虗六根亦似搖𩗺不安名動自下升高名起𡑝壟凹凸名涌六方出沒亦名涌隱隱有聲名震評磕發響名吼令物覺悟名覺五衆喜瑞爾時會中比丘比丘尼至一心觀佛次明大衆心喜瑞者衆見雨華地動知甘露將降欣躍內充表大機當發感於勝應問喜怒人之常情何得為瑞答天華悅眼地動震心大經云動時能令衆生心動華地是外瑞心喜是內瑞非常之喜昔雖曾有而不為喜所動一心觀佛何得非瑞若言歡喜動陰心者人天義也若喜動真諦無漏心者藏通義也若喜動即假心者別義也喜動實相心者圓義也六放光瑞爾時佛放眉間白毫相光至上至阿迦尼吒天放光表應機設教破惑除疑白毫具種種功德觀佛海三昧經云佛初生時牽長五尺苦行時長一丈四尺得佛時長一丈五尺其毫中表俱空如白琉璃筒內外清淨從初發心中間行行種種相貌乃至入涅槃一切功德皆現毫中毫在二眉之間即表中道常也其相柔軟表樂卷舒自在表我白即表淨放光破暗表中道生智慧光照此土他土表自覺覺他復次二乘雖達二諦不知中道如有二眉而無白毫別教雖知三諦不能毫中具一切法當知從初至後法界中事悉現毫內者即表圓教之意會義云復次衆經明放光不一華嚴經現相品齒間放光出頌集衆是表欲說法又眉間放光從足下入是表以極果而為真因普賢三昧品毛孔放光頌讚普賢是表普賢行遍光明覺品放兩足輪光是表十信法門須彌山頂品放兩足指光是表十住夜摩宮品放兩足上光是表十行兜率宮品放兩膝輪光是表十回向十地品放眉間光是表十地正證中道次第而放故云兼別如來出現品放白毫相光入妙德頂是令問圓妙佛法放口光入普賢口是令說圓妙佛法入法界品放白毫相光令諸菩薩普見法界佛事是欲令其安住師子嚬申三昧大品般若經從足下千輻輪相乃至頂髻一一各放六萬億光明是以身輪表般若遍大涅槃經面門放光是表佛口密說於祕藏今經白毫放光正表中道實相故文殊云今佛放光明助發實相義又光照此土他土十法界事正表十法界無非一實相印所印約教者丈六佛放光三藏義帶劣勝應身放光通教義尊特身放光別教義即丈六是毗盧遮那法身放光圓教義龍女讚云微妙淨法身具相三十二正屬開顯圓也東方者諸方之始表十住是始位迹門說法令生身菩薩朗然見理入於圓住開佛知見舉初即知中後故云靡不周遍當知諸方亦然諸位亦然若本門說法四方佛集即表法身菩薩增道損生四位增長也萬八千世界者如華嚴所照動以剎塵數計此何其少特表十八界各具百界千如為萬八千此等無非佛慧境界耳彌勒問云放一淨光照無量國當知方不局東數不止于萬八千也明矣夫光照東方因光得見他土六瑞所謂六趣衆生諸佛說法三乘修得涅槃起塔等如此十界若相若性若體若力若作若因若緣若果若報從本至末炳然齊現於一光中橫該無際豎徹始終如鏡中像如水中月言有不有言空不空光外無土土外無光所謂空等假等中等上根利智正可向此處頓了同體權實非權非實為未了者更作三周巧說耳昔人云一光東照妙體全彰庶幾得之阿鼻此云無間最在世界之下阿迦尼吒此云色究竟最在世界之上無不盡于光中顯現也初此土六瑞竟二他土六瑞即是此土第六放光瑞中所見境界為令易解兼欲引同故分為六初見六趣瑞二見諸佛瑞是上聖下凡一雙三聞說法瑞四見四衆得道瑞是人法一雙五見菩薩行行瑞六見諸佛涅槃瑞是始終一雙既有可化衆生即有能化之佛有佛即有說法說法即有弟子弟子即是行始行始必致終也又此土六瑞總表衆生當獲自覺彼土六瑞總表衆生當獲覺他又此彼六瑞表此彼諸佛道同今前五瑞是現彼土已與此同第六瑞是現此土當與彼同也今初見六趣瑞於此世界盡見彼土六趣衆生時會大衆即於此界盡見彼土六趣衆生與此土同無別異也二見諸佛瑞又見彼土現在諸佛此見彼土諸佛為五濁故出現於世與此土釋迦佛出世意同三聞說法瑞及聞諸佛所說經法此聞彼佛初從無相一法非頓而頓演大華嚴與此土釋迦佛說華嚴經意同四見四衆得道瑞并見彼諸比丘比丘尼至諸修行得道者此見彼佛非漸而漸為鈍根人說三藏法四衆依之得出世四果辟支佛道與此土釋迦佛說三藏教意同五見菩薩行行瑞復見諸菩薩摩訶薩至行菩薩道此見彼佛非漸而漸為大乘人說方等般若諸大乘經與此土釋迦佛說二酥教意同昔種四教善根為因今稟四教法門為緣四教各有信解以為能感修行四教復各四門故云種種相貌六見諸佛涅槃瑞復見諸佛般涅槃者至起七寶塔此見彼佛施化事畢收無量法還歸一法示滅息化乃至起塔而作佛事是則始從出世終于像法一代所作權實利益光照彼土炳然在目以彼例此前五既同今一豈別當知釋迦從初成道于一無相法出無量法非頓而頓非漸而漸其事已竟今日必當收無量法還入一法開權顯實唱言入滅與彼土同也復次種種因緣者昔善為因今教為緣又別說者正是三藏之後明共不共般若為因助道戒定慧等為緣約三人即有種種因緣又就共不共人種種因緣種種相貌者共不共各四門一一門復有無量相貌五百比丘各說身因即其義也不共四門亦如是故知因緣相貌還入一因一緣一相一貌當知此土亦與彼同二現瑞序竟第三疑念序文為二一彌勒疑念二大衆疑念今初爾時彌勒菩薩作是念至我今當問文中彌勒有三念一正念六瑞二念問誰三念文殊文殊念起第二念除唯初念在但成一疑也神變者神內也變外也神名天心即是天然內慧變名變動即是六瑞外彰首楞嚴云佛住不二法能作神通法王法力超蓋一切彌勒迹示不測外變亦不知內慧故興念至此二大衆疑念爾時比丘比丘尼至今當問誰文中衆有兩念一正念六瑞二念問誰或問曰文殊彌勒德位相亞何故一問一答答夫機有在無位雖齊等賓主異宜聖人承機非問者不能答也因緣法門有權實權補處須問實者須答約教又迹有久近近問久答本迹又名有便易彌勒名慈慈為衆生應須問文殊名妙德德應須答觀解此即四種消文意三疑念序竟四發問序二初長行二偈頌初中二初經家述爾時彌勒菩薩至及諸天龍鬼神等衆會之心二正發問而問文殊師利言至悉見彼佛國界莊嚴二偈頌二初頌上問二頌請答何意有偈頌耶龍樹毗婆沙云一隨國土天竺有散華貫華之說如此間序後銘也二隨樂欲不同有樂散說有樂章句三隨生解不同或於散說得解或於章句得解四隨利鈍利者一聞即悟鈍者再說方悟又表佛殷勤重說又為衆集前後故有偈也偈有六十二行文為兩初五十四行頌上問後八行請答就問為兩前四行問此土後五十行問他土今初於是彌勒菩薩欲重宣此義以偈問曰文殊師利至得未曾有長行總問此土六瑞偈中長有香風地淨無說法入定觀文謂言盈縮尋義不然說法是慧性入定是天心由天心慧性能作動地放光舉末即能知本故縮非縮也但舉放光動地之末則知說法入定之本若無定慧安能現變他不見此意謂彌勒不問兩事便不以為瑞今反難之若彌勒不問文殊何故而答又問指何處為問今指長行總問是也若更顯其別問秪導師兩字是也良以說法入定能導於人既稱導師即是問說法入定也是故非縮他云風由檀林故香地加之嚴淨盈長兩事今謂非盈風本無香而香為奇特故以成瑞夫天華至妙豈有色而無香此表因運至果如華有香風華既集地地則嚴淨因若趣果果則嚴淨金光明云聚集功德莊嚴佛身故以二事顯成四華盈非盈也以果上二事顯因功也由華有香非獨風耳由香風故其地必淨言二事者謂功德法身功德因也法身果也由至果故成就二義一至果二果淨由因至果故令果淨次二句地動瑞次一行衆喜雖不依前次第六瑞宛足二問他土六瑞為六初問六趣衆生二問見彼佛及聞說法三問他土四衆四結前開後五問他土修菩薩行六問他土供養舍利即是問佛涅槃今初三行問六趣衆生眉間光明至於此悉見驗此頌知上文光照東方是總照他土意也此頌頌上總問六趣衆生是能趣之人生死是所趣之處善惡業緣是趣因好醜是趣果也二四行問見彼佛說頓教又覩諸佛至開悟衆生此廣明說法之相謂說頓教逗大根性聖主師子即如此土現盧舍那像也演說經法微妙第一者即如此土先照高山演華嚴教也教諸菩薩者即如此土七處等會無聲聞人也照明佛法開悟衆生者即如此土始見佛身入如來慧也三三行問他土說三乘若人遭苦至為說淨道若人遭苦者設聲聞乘也此頌具明四諦在文分明若人遭苦而造惡業苦不得盡底下衆生是也若人遭苦而造善業苦亦不盡厭下攀上如難陀為欲故持戒等是也若人遭苦於外道法中求解脫增見長非者苦亦不盡若人遭苦厭集復厭依果感佛說涅槃者此人能盡諸苦際也他土亦設此乘也若人有福下一行是說中乘也若供養佛少遭苦致惱若供佛多雖遭苦而福故云聲聞三生種福支佛百劫種福形彼聲聞故言有福志求勝法者聲聞厭苦而修行支佛求道故修行深求緣起勝妙之理即是他土說中乘也若有佛子下是說六度大乘也真慈悲能紹佛種故言佛子修於六度故言種種行上求故言無上慧六度中無六弊如藥中無病故言淨道非究竟也又聲聞苦諦為觀門緣覺集諦為門六度菩薩道諦為門故言淨道四一行半結前開後文殊師利至今當略說見聞若斯即是結前如是衆多即是開後五問他方修菩薩行正與此土方等般若諸大乘教意同文分為三初總問二次第問三雜問次第擬同此土漸教雜問擬同此土不定教也今初一行總問我見彼土恆沙菩薩種種因緣而求佛道總問中經云恆沙者阿耨達池四面各出一河東銀牛口出殑伽河南金象口出信度河西琉璃馬口出縛芻河北頗胝迦師子口出徙多河各繞池一匝流入四海於中殑伽沙細而多外人所計以為福河入洗滅罪佛亦順俗故常指之又佛說法多近此河故以為喻此下六度但略指大體若依二味具出其相具如止觀第二第七記所引問既云方等般若亦應具有兩教二乘何得總問唯求佛道答實如所問但避繁文還同鹿苑故略不說二次第問為六初問施二問戒三問忍四問進五問禪六問慧今初六行問施或有行施至求佛智慧珍寶奴婢貴賤共能此施駟馬寶車豪俠者所施駟馬者四匹共乘故云駟也妻子等是外身身肉等是內身捨頭目即捨命而不言法施者讓後般若也又約身命財與生死後際等得不壞常住即是法施故不別說也二兩行問戒文殊師利至而被法服約比丘論持戒者在家施易戒難出家施難戒易故約比丘明戒此中引五王經云云五王經者此是一卷小經經云昔有五王鄰國無兢互為親友有一大王名曰普安習菩薩行以餘四王邪見熾盛普安愍之呼來殿上七日七夜娛樂受樂四王曰國事衆多請退還家大王自送并命左右而隨送之至於半道而問之言各何所樂一云願春陽之日遊戲原野一云願常作王種種嚴飾人民侍從道路傾目一云願得好婦兒端正無雙一云願父母常在多有兄弟美食音樂共相娛樂各各說已回白大王王何所願答我先說卿所願不常若樂春遊冬則雕朽若樂為王福盡相伐若樂婦兒一朝疾病受苦無量若樂父母常在等一旦有事為他所執四王又問大王如何所樂答言我所樂者不生不滅不苦不樂不饑不渴不寒不熱存亡自在四王問曰如此之樂何處有耶何處有師大王曰吾師號佛近在祗洹諸王歡喜各詣佛所却坐一面白佛自責佛說八苦王及侍從百千萬人得須陀洹捨國入道三一行問忍或見菩薩而作比丘獨處間靜樂誦經典忍有三種間林邃谷惡人惡獸忍耐無瞋即生忍自節守志即苦行忍為求佛道即第一義忍又而作比丘即苦行忍獨處間靜即生忍樂誦經典即第一義忍四一行問精進又見菩薩勇猛精進入於深山思惟佛道夫深山可畏非窳怯者可居勇進者能安之傍若無物思惟實相念念不休進求佛道也窳者如瓜在穴病也五二行問禪又見離欲至讚諸法王前一行問修根本禪後一行問修出世上上禪通途皆得有根本之修也離欲者若離欲得五通通教定也又根本本離欲背捨亦修不淨等離欲別教兼離二乘欲中道又離順道法愛欲深修禪定者發初禪一品此定未深乃至九品傳傳為深又背捨九定八勝十一切入等傳傳為深此定轉變自在能發諸通凡夫但五通二乘具六通別教菩薩讓佛分有無漏亦但稱五通也圓教初後皆具六通安禪萬偈下第二一行明上上禪此是別圓之禪靜散不相妨不起滅定現諸威儀如修羅琴不撫而韻無緣無念有感則形故能安禪讚佛也六三行問慧復見菩薩至而擊法鼓智深者慧窮理本也志固者誓願廣大也此即二種莊嚴能問能持也定慧具足者二乘定多菩薩慧多佛則等又空觀定多假觀慧多中觀則等無量喻即是種種方便助顯第一義也破魔兵者空觀破四魔假觀次第破八魔中觀圓破八魔十魔擊鼓者初發心住便成正覺百佛世界作佛圓擊梵輪法鼓二次第問竟三雜問為七初問禪二問進三問戒四問忍五更問禪六問施七問慧今初二行問禪又見菩薩至令入佛道初一偈問入捨禪即是自行次一偈問入悲禪即是化他菩薩入定放光種種利益具出華嚴思益二一行問進又見佛子未嘗睡眠經行林中勤求佛道此如般舟念佛等法門也般舟此云佛立九十日中常行不坐不臥除睡為最部在方等亦通四教今云勤求佛道揀兩二乘三一行問戒又見具戒威儀無缺淨如寶珠以求佛道威儀無缺即是初不缺戒淨如寶珠即是第十究竟戒中間可解十戒如玄義中說無缺乃至究竟此十戒名出大論具如止觀玄文四一行半問忍又見佛子至以求佛道力者阿含云力有六種小兒啼為力女人嗔為力國王憍為力羅漢進為力諸佛悲為力比丘忍為力五二行更問禪又見菩薩至以求佛道離戲笑是却掉悔蓋離癡眷屬即除嗔蓋近智者除疑蓋一心除亂是却貪蓋攝念山林除睡蓋如寶積經迦葉云有四法急走捨離百由旬外一利養二惡友三惡衆四同住多戲笑或嗔鬬等六五行問施或見菩薩至求無上道前三行正具四事初行二事謂飲食湯藥次行衣服次行臥具房舍諸教之中或復橋梁義井園林浴池今無橋等七三行問慧或有菩薩至求無上道初一行不可說而說般若二一行不可觀而觀般若三一行言語道斷心行處滅即是說不可說觀不可觀而論般若也五問他土修菩薩行竟六有七行明佛滅後以舍利起塔者正頌上他土佛出五濁從無相一法開漸頓教故有二法三道種種行類相貌不同如上所見也今見他土佛般涅槃佛子慕德為樹墳塔即表無量悉歸入一一出無量前相已表無量歸一正是入於涅槃就文為六初一行總標佛滅起塔第二一行明塔數第三一行明塔量第四一行明塔相第五一行明供養第六兩行結如文文殊師利至其華開敷塔婆此云方墳又云殿堂如此土靈宇崇臺峻階承露干雲長表淨域歸心上聖耳樹王者即波利質多正供舍利傍嚴佛國土樹王者即忉利天波利質多羅樹具如釋籤引大經文初頌上問竟二頌請答二初舉疑述請二釋四伏難今初三行舉疑述請佛放一光至願決衆疑白毫為本故先舉次及諸事故言種種又諸佛為本即總攝他土餘五瑞也二五行四伏難四衆欣仰至為說何等言伏難者文殊內心搆難不肯時答其意有三一此瑞希奇不可倉卒輕爾有判二智衆如海謙光推高三靳固前却生衆渴仰故以伏難潛而拒之彌勒彰灼釋難意亦有三一瑞大故疑大若不為釋憂兕在懷妨聞正說二衆海乃多機在仁者三闔衆瞻仁故知注誠殷重所以彰言釋難請令時答初伏難者因正請生請云佛子文殊願決衆疑文殊仍此起初伏難汝云衆疑衆未曾疑若疑應問衆既不疑我何所決彌勒即以第一偈釋云四衆欣仰瞻仁及我及我欲令我問瞻仁欲得仁答文殊因此起第二難衆同有疑不易可答待佛出定然後決疑彌勒即用第二偈釋若有疑住懷憂兕不泰應以時答復知如來何時起定故言佛子時答決疑令喜言時答者催促之詞令其即答文殊因此起第三難我與仁者同居學地欲測佛意微共籌量獨令我答於理不可彌勒即以第三偈釋我亦微心下思躊躇兩楹為說妙法為當授記故言佛坐道場所得妙法為欲說此為當授記文殊因此起第四難若如汝說即是釋疑何煩我答彌勒即以第四偈釋安得以我猶豫之心而判大事故言示諸佛土此非小緣文殊伏難既窮謙光亦止後一偈結請答也此四伏難光宅受於次師次師受于江北釗師既是先賢文外巧思今用之四發問序竟第五答問序有長偈頌長行文為四一惟忖答二略曾見答三廣曾見答四分明判答夫以下測上止可岡像卜度惟昔儔今不可頓決所以初從髣佛次引略見略見未周更引廣見以多證一爾乃分判惟忖答答上此土問略曾見答答上他土問廣曾見答雙答此土他土問判當答雙判此土他土問也今初惟忖答爾時文殊師利至演大法義惟者思惟也忖者忖量惟今如昔忖昔如今然文殊古佛豈應不知迹示思惟也欲說大法者答說法瑞雨大法雨答雨華瑞吹大法蠡答大衆心喜瑞擊大法鼓答地動瑞演大法義答放光瑞欲說大法者惟昔諸佛說無量義後則開權顯實收無量歸一忖於今佛既說法已亦應開權顯實會無量以歸一一者即大法也雨大法雨者惟昔諸佛天雨四華之後普入圓因住行向地忖於今佛雨華之後皆成佛因住行向地故言雨大法雨也吹大法蠡者惟昔四衆見瑞歡喜得未曾有障除機動即改人教行理忖今衆喜亦應障除機動改人教行理所改既深故言吹大法蠡也擊大法鼓者惟昔地動已後即有六番破無明賊忖於今佛地動已後亦應六番破無明惑聲教極妙故言擊大法鼓演大法義者惟昔諸佛放白毫光後說法華彼此道同忖於今佛放光已後廣明五佛道同既是佛道故言演大法義故以一光俱照彼此此表釋迦彼表四佛如是五句悉是惟昔判今忖今類昔會文附義唯少入定一瑞而雨華動地放光等皆由入定故爾意則兼具無勞疑也闕此一條故稱略答耳今更別解初一句總後四句別總者大法是也別者雨吹擊演開示悟入是也如天非小大非赤白而雨赤白之華如第一義非開示悟入見此理時即證開示悟入譬如種子得雨萌開今聞大法雨潤法性種破無明糠開於十住佛知見也譬如吹蠡知是改號今之與先已得十住今從十住聞法更改入十行示佛知見也譬如擊鼓知是誡兵今之與先已在十行今從十行聞法誡入回向悟佛知見也演之言布橫濶豎深乃是演義今之與先已在十向今從十回向入於十地入佛知見窮源盡邊深廣備足也惟昔六瑞已後即開示悟入忖今瑞後亦應如是一惟忖答竟二略舉曾見以答諸善男子我於過去諸佛至故現斯瑞初以己智惟忖今以略曾小分明於前舉此答他土問也此土五瑞不通他土唯放光一瑞遍照東方略曾見答專答放光故如是答他土之問也今見如昔昔秪如今欲令衆生咸得聞知者即聞思兩慧亦信法兩行收無量歸一改三乘教理六番破無明等諸佛道同開示悟入佛之知見故言一切世間難信之法也二略曾見答竟三廣舉曾見以答即雙答此土他土問也彌勒因光橫見東方以為問文殊引昔豎見多佛以為答正顯十方三世諸佛道同文為三初引一佛同次引二萬佛同三引最後佛同初中三初時節二標名三說法今初時節同諸善男子如過去無量無邊不可思議阿僧祇劫二標名同爾時有佛號日月燈明至天人師佛世尊標名同者通號與今佛可同別名云何同此當以緣別義同為釋何者日是慧月是定定慧是自行德燈明是化他德能仁能定慧能自他又日月燈是三智今佛亦三智隨緣稱別義則不殊故言名同三說法同演說正法至成一切種智說法同者昔佛先頓後漸與今佛初頓後漸同也演說正法初中後善者即是頓教也夫七善之語乃通大小尋文是大乘七善初中後善者即是頓教序正流通名為時節善其義深遠即是頓教了義之理二乘不測其邊底故言深遠是名義善其語巧妙即是頓教八音所吐會理直說悅菩薩心即頓教之文名為語善純一無雜不與二乘共即是頓教獨一善具足者具明界內界外滿字之法即是頓教圓滿善清白無二邊瑕穢即是頓教調柔善師云行善梵行之相者梵即頓教無緣慈善次說法同中即五時同也如華嚴四諦品云文殊告諸菩薩四聖諦此娑婆及十方世界一一各有四百萬億十千名號大集亦爾故知諸大乘經多為辨異唯有今經特為顯同非但今佛與他佛法同亦乃己他皆入一味故下文云因緣譬喻皆至種智又初中後善解者不同今且依一途若小乘以戒定慧為三善大乘以初中後心為三善金光明云前心如來不可思議中心如來種種莊嚴後心如來不可破壞此亦三善之意也文殊引古佛頓教七善與今佛頓說七善同亦與他土初頓說同所以用此為答者酬上彌勒據光橫問他土佛云聖主師子演說經法微妙第一文殊豎引昔舉此為答即是初佛說頓法同也為求聲聞人說應四諦法者即是古佛次頓之後開漸教法同也上問若人遭苦為說涅槃今引古佛亦開此漸以答斯問也為求辟支佛說應十二因緣法答上若人有福志求勝法之問也為諸菩薩說應六波羅蜜答上佛子修種種行之問也皆引古佛開漸教同也廣引曾見佛答他土之問也令得三菩提成一切種智者此明古佛開頓漸後即顯實之說始終究竟此答彌勒見他土佛般涅槃涅槃後起塔之問也若引古佛說法至六波羅蜜者明今佛已與昔同從令得三菩提去明今佛當與昔同今佛當與昔同者今分別三同相狀今佛正在於定故以法華為當古佛已說法華故以三皆在昔所以古佛六瑞及以爾前四味而為今同已同唯說法華名為當同古師不以六瑞而為今同具如下破次引二萬佛同次復有佛亦名日月燈明至所可說法初中後善初引一佛備舉頓漸說法同中舉二萬佛但舉說頓同故言初中後善也後引一佛但舉開漸同所以然者指前一佛則後二可知而不引二萬之前佛者正為名字說法皆同據義為便耳姓頗羅墮者此翻捷疾亦云利根亦云滿語也三引最後佛同又三初曾見事與今已同二曾見事與今今同三曾見事與今當同曾謂昔之所更已謂謝在過去曾之與已俱謝俱更今取久遠者為曾小近者為已取六瑞等為今取佛出定去為當也第一從其最後佛有八子者是曾與已同其最後佛未出家時至已於千萬佛所植諸善本昔佛八子今佛一子數雖不等竝出同居之土土有見思俱示有子有子事同一八赴緣別有所表一子總表一道清淨八子表八正道數異有子義同也又昔佛子出家發大乘意今佛子住小乘果此云何同昔化道已竟顯本事彰故言發大乘意今未發迹猶言羅漢至下文發本即是菩薩其義則同二曾見事與今今同二初現瑞同二疑念同初又二初此土六瑞同二他土六瑞同今初是時日月燈明佛至靡不周遍二他土六瑞同如今所見是諸佛土昔佛他土六瑞總云如今所見則知昔佛他土六瑞亦與今同初現瑞同竟二疑念同彌勒當知至欲知此光所為因緣昔明別序既有現瑞懷疑二序同而無集衆發問答問三序者義推則有既言說法知必集衆既道懷疑知應有問若問必答例二必兼得三序同也又若述昔答則不俟文殊費辭既不言答亦不出問其義可解三曾見事與今當同五初因人說法同二時節同三唱滅同四授記同五滅後通經同今初時有菩薩名曰妙光至教菩薩法佛所護念昔佛定起因妙光菩薩說經今佛定起因聲聞身子說經此云何同昔因妙光今因身子正是所因人同昔佛八子師於妙光如來起定對告妙光又付託妙光今佛子羅云亦師身子佛從定起亦對告身子迹門竟又付託身子今古孱齊疑者言妙光是菩薩身子是聲聞云何是同昔事已彰談為菩薩今事未發道是聲聞比及發迹身子是大菩薩非同何謂昔妙光垂迹何必不作聲聞特是文殊巧說方便隱顯耳二時節同六十小劫不起於座至而生懈倦時節同者如下文云五十小劫謂如半日即是同也僭補曰時會聽衆符文會理亡身心相觀行相應六十小劫謂如食頃佛境現前也既至出觀只一座席耳三唱滅同日月燈明佛至當入無餘涅槃昔說法華即唱入滅亦如迦葉佛今佛說寶塔品中明如來不久當入涅槃化道已足唱滅事齊也四授記同時有菩薩名曰德藏至多陀阿伽度如來阿羅訶應供三藐三佛陀正遍知如來十號三號攝足昔授德藏菩薩記今經授聲聞記豈得是同昔事已成故言授菩薩記然正是會三歸一聲聞得記也若說昔授聲聞記者佛從定起更何所論文殊巧談故不發迹耳五滅後通經同三初正明入滅二明滅後通經利益三結會古今今初佛授記已便於中夜入無餘涅槃二明滅後通經利益佛滅度後至恭敬供養尊重讚歎通經者出其人即妙光也久近即八十小劫也所化之衆即八子八百也結會古今即求名妙德等也所化之人八子行成久已得佛八百之一方成今住補處所以引此八子八百者近則釋疑密開壽量釋疑者或謂彌勒補處為大文殊非補處為小小不應答大不應問故舉八百宜應有問妙光昔親對佛先復為師故釋疑非謬密開壽量者八子最小佛號然燈然燈是定光妙光是釋迦九世祖師孫今成佛師祖為弟子師弟無定將密顯生非生滅非滅之意問彌勒昔見諸佛曾聞法華何故疑問答時衆宜應須扣發耳僭補曰釋疑非謬者彌勒八百之一宜應有問文殊八百之師宜應有答由迷本疑迹故為釋疑不謬也妙光九代祖師於釋迦會中影響法化者明師弟更互本無定性密表今日伽耶生非生昔日伽耶滅非滅故云密開壽量三結會古今彌勒當知至求名菩薩汝身是也三廣曾見答竟四分明判答今見此瑞至教菩薩法佛所護念今昔六瑞既同惟忖決定不謬略曾廣曾皆決定也當說大乘決定前說法瑞也名妙法蓮華決定前雨華瑞也教菩薩法決定前衆喜瑞也佛所護念決定前地動瑞也兼入定瑞悉在其中有人作已同當同不作今同尋文云今見此瑞與本無異此正語於今云何喚六瑞作已據此文為今故作三同之釋也四分明判答竟二偈頌二初頌廣舉曾見以答二頌分明判答初中二初頌一佛同二頌最後佛同不頌惟忖及略舉但頌廣舉就廣舉中但頌初後而略中間足可顯義不俟繁文今初二行頌一佛同爾時文殊師利於大衆中欲重宣此義而說偈言我念過去世至令入佛智慧此頌上時節名號及說法等同也二頌最後佛同為三初頌曾見事與今已同二頌曾見事與今現同三頌曾見事與今當同今初一行頌曾見事與今已同佛未出家時所生八王子見大聖出家亦隨修梵行二頌曾見事與今現同又二初頌現瑞同二頌疑念同初又二初頌此土六瑞同二頌他土六瑞同今初四行頌此土六瑞同時佛說大乘至現諸希有事偈長出天鼓自鳴表無問自說也現諸希有事者即總頌諸瑞也二頌他土六瑞同長行但云如今所見是諸佛土其文則略此頌廣也文為五初三行頌見六趣衆生及諸佛土次一行半頌見佛同第三兩句頌聞佛說頓教七善法同也第四三行頌見聲聞等三乘即是昔佛開漸教法同也第五二行頌見菩薩種種因緣即是頌開方等般若教同今初如文此光照東方至各供養其佛第二一行半頌見佛同又見諸如來至內現真金像自然成佛道者方便道則加心修習發真道即是自然任運與理合也約四教可知四機既遍於諸趣四佛遍赴於物機是故四教各有真道問發真自然者何須諸佛說法答如船順流若遇風加棹疾有所至風喻見佛聞法棹喻修行例如初果任運七生若值佛加修或一生二生得至無學自然成佛道是報身琉璃是法身本淨金像是應物現形第三兩句頌頓教同世尊在大衆敷演深法義此將法約人法既深玄當知必運大機開頓教也此頌上純一無雜七善之文第四三行頌漸教同一一諸佛土至斯由佛光照此即將人約法人既二乘必知說三藏教也即上為聲聞人說應四諦等也雖不頌出緣覺兼攝在中行施忍辱等等於四度耳此一行頌上六度大乘也第五兩行頌上見他土菩薩與二酥同又見諸菩薩至說法求佛道但頌上見他土菩薩種種因緣信解相貌略不答上起塔也上不見他土法華相故此後見起塔今答出法華相故起塔入滅事在後答也第二一行半頌疑念同爾時四部衆至是事何因緣二曾見事與今現同竟三頌曾見事與今當同五初頌因人說法二頌時節三頌唱滅四頌授記五頌滅後通經今初兩行三句頌因人說法天人所奉尊至說是法華經因人同者經云從三昧起即讚妙光讚後方始說經說是法華經即此一句頌上說法同二一行一句頌時節滿六十小劫至悉皆能受持六十小劫約不思議延促劫智也妙光皆悉受持昔佛法者亦如身子受佛付囑也三三行頌唱滅佛說是法華至億劫時一遇就此文有唱滅有囑纍囑纍如遺教也四三行半頌授記世尊諸子等至亦度無量衆文中有悲泣如涅槃有慰諭亦如遺教其得度者悉皆得度未度者作得度因緣例如今佛將付彌勒也五頌滅後通經又三初頌示滅供養精進二頌滅後通經利益三頌結會古今今初二行頌示滅佛此夜滅度至以求無上道如薪盡火滅者小乘佛以果報身為薪智慧為火慧依報身身滅智亡大乘佛以機為薪逗應為火衆生機盡應形亦滅倍加精進者應以滅度度者也僭補曰倍復加精進半偈其二衆久發大心後因見佛滅度而倍加精進求無上道故疏云應以滅度度者是也二九行頌滅後通經利益是妙光法師至其數無有量三一行頌結會古今彼佛滅度後懈怠者汝是妙光法師者今則我身是初頌廣舉曾見以答竟二頌分明判答三初頌說法華經二頌教菩薩法三頌佛所護念今初一行頌說經我見燈明佛本光瑞如此以是知今佛欲說法華經僭補曰本光者靈光獨耀實相妙光也二二行頌教菩薩法今相如本瑞至充足求道者頌云佛當雨法雨等頌上教菩薩法故知上之六句但明欲說之由誡衆令生渴慕耳三一行頌佛所護念諸求三乘人若有疑悔者佛當為除斷令盡無有餘又前彌勒釋四伏難令文殊必定有答此中末後四偈是文殊斷四伏疑使彌勒莫復更問初第一疑因文殊廣引先佛曾說法華故彌勒潛疑欲問諸佛赴緣人時各異古佛雖名法華今佛何必如此文殊即以第一偈斷云我見燈明佛本光瑞如此以是知今佛欲說法華經此斷其疑名之問也彌勒因此又疑自有名同義同自有名同義異此名何所顯召文殊即以第二偈斷云今相如本瑞是諸佛方便今佛放光明助發實相義此是斷其疑體之問彌勒因此又疑實相無相何人會之文殊即以第三偈斷云諸人今當知合掌一心待佛當雨法雨充足求道者此斷其疑宗之問彌勒因此又疑佛雨法雨止洽菩薩亦潤二乘文殊即以第四偈斷云諸求三乘人若有疑悔者佛當為除斷令盡無有餘此即斷其疑用之問彌勒聯翩構疑文殊頻煩為斷既事窮理盡即得之於懷可謂善於問答具二莊嚴光宅但知述於釗師釋四種伏難使文殊必答顯彌勒之美不見文殊釋四伏疑令彌勒不問抑妙德之能此義出自天台非傳他疏序品已竟
